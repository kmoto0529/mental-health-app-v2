  svg .f-tree-sway-xl  { transform-origin: center bottom; animation: treeSway 12s ease-in-out infinite 1.8s; }
  @keyframes treeSway {
    0%, 100% { transform: rotate(-0.9deg); }
    50%      { transform: rotate(0.9deg); }

  svg .f-bird-flap { animation: birdFlap 2.4s ease-in-out infinite; transform-origin: center; }
  @keyframes birdFlap {
    0%, 100% { opacity: 0.6; transform: scale(0.98); }
    50%      { opacity: 1;   transform: scale(1.02); }
  }

    0%, 100% { transform: scale(1); }

  svg .f-anim-light { animation: lightPulse 8s ease-in-out infinite; }

  1: 'はじまりの土',
  2: '芽吹き',
  3: '若草の野',
  4: '木立のはじまり',
  5: '小さな森',
  6: '水辺の森',
  7: '静かな森'
};

function calcForestStage(day) {
  if (day >= 28) return 7;
  if (day >= 23) return 6;
  if (day >= 18) return 5;
  if (day >= 13) return 4;
  if (day >= 8)  return 3;
  if (day >= 4)  return 2;
  return 1;
}

function nextStageDaysAway(day) {
  const thresholds = [4, 8, 13, 18, 23, 28, 31];
  for (const t of thresholds) if (day < t) return t - day;
  return 0;
}

function renderForestSvg(day) {
  const d = Math.max(0, Math.min(31, day || 0));
  const stage = calcForestStage(d);
  const visibleElements = FOREST_DAY_ELEMENTS
    .filter(e => e.day <= d)
    .map(e => e.svg)
    .join('\n');
  const centralTree = d >= 1 ? centralTreeSvgForDay(d) : '';
  const skyAndClouds = `<rect width="400" height="180" fill="url(#f-sky-grad)"/>
    <ellipse cx="80" cy="32" rx="30" ry="4.5" fill="white" opacity="0.5"/>
    <ellipse cx="74" cy="34" rx="20" ry="3" fill="white" opacity="0.38"/>`;
  return `
    <svg class="forest-hero-svg" viewBox="0 0 400 260" preserveAspectRatio="xMidYMid slice" data-stage="${stage}" data-day="${d}">
      <defs>
        <linearGradient id="f-sky-grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#FFFEF9"/>
          <stop offset="60%" stop-color="#F5EFE3"/>
          <stop offset="100%" stop-color="#EFE0C9"/>
        </linearGradient>
        <linearGradient id="f-earth-grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#D4B89C"/>
          <stop offset="100%" stop-color="#A8876A"/>
        </linearGradient>
        <linearGradient id="f-water-grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#CDE0E3"/>
          <stop offset="100%" stop-color="#9CB8BE"/>
        </linearGradient>
        <linearGradient id="f-mountain-grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#B9BFB3"/>
          <stop offset="100%" stop-color="#9DA798"/>
        </linearGradient>
      </defs>
      ${skyAndClouds}
      ${visibleElements}
      ${centralTree}
    </svg>
  `;
}

// ---- Day selector ----
const highlightedDays = new Set([1, 7, 14, 21, 28, 31]);
const daySelector = document.getElementById('daySelector');
let currentDay = 1;

for (let d = 1; d <= 31; d++) {
  const btn = document.createElement('button');
  btn.className = 'day-btn' + (highlightedDays.has(d) ? ' highlighted' : '');
  btn.textContent = 'Day ' + d;
  btn.dataset.day = d;
  btn.addEventListener('click', () => setCurrentDay(d));
  daySelector.appendChild(btn);
}

function setCurrentDay(d) {
  currentDay = d;
  document.querySelectorAll('.day-btn').forEach(b => {
    b.classList.toggle('active', Number(b.dataset.day) === d);
  });
  document.getElementById('heroSvgMount').innerHTML = renderForestSvg(d);
  document.getElementById('heroStage').textContent = FOREST_STAGE_NAMES[calcForestStage(d)];
}

setCurrentDay(1);

// ---- Samples ----
const sampleDays = [1, 7, 14, 21, 28, 31];
const samplesGrid = document.getElementById('samplesGrid');
sampleDays.forEach(d => {
  const card = document.createElement('div');
  card.className = 'sample-card';
  card.innerHTML = `
    <div class="sample-svg-wrap">${renderForestSvg(d)}</div>
    <div class="sample-meta">
      <div class="sample-day-label">Day ${d}</div>
      <div class="sample-stage-label">${FOREST_STAGE_NAMES[calcForestStage(d)]}</div>
    </div>
  `;
  samplesGrid.appendChild(card);
});
