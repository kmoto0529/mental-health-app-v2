<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Aside — ひとりで抱えてる、を、ちょっとずつ整理する。</title>

<link rel="manifest" href="manifest.json">

<meta name="description" content="相談したいけどハードルで相談できていない方が、毎日3-5分で気持ちと行動を整理するアプリ">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Aside">

<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">

<style>
/* ============================================================
   Aside v2.1 — ナナメトーンデザインシステム
   ============================================================ */
:root {
  /* ============================================================
     Aside Design Tokens v2 — デザイン部統合版 2026-04-30
     - Primary: Sage Green (デザイン部 v1 準拠)
     - Secondary/FAB: Warm Sand (ブリーフ「ブラウン系」準拠)
     - Crisis: Sage (ブリーフ「赤NG・ブラウン or 緑」準拠)
     ============================================================ */
  /* 背景 — Warm Minimal */
  --bg: #FAF7F2;          /* warm white */
  --bg-card: #FFFFFF;
  --bg-soft: #F0EDE6;     /* surface variant */
  --bg-warm: #EAE0CB;     /* warm sand subtle */

  /* テキスト */
  --text: #2D2D2D;
  --text-soft: #6B6B6B;
  --text-muted: #9E9E9E;

  /* Primary — Sage Green（ブランドメイン） */
  --primary: #6B8F71;
  --primary-light: #9BB89F;
  --primary-dark: #4A6B4F;
  --primary-soft: #E0EBE2;

  /* Secondary — Warm Sand（FAB / 補色アクセント） */
  --secondary: #D4A574;
  --secondary-light: #E8C9A4;
  --secondary-dark: #B8874E;
  --secondary-soft: #F5E8D6;

  /* Legacy 互換 — accent → primary 経由でほぼsage化 */
  --accent: #6B8F71;          /* primary と同期 */
  --accent-soft: #E0EBE2;
  --accent-deep: #4A6B4F;

  /* Crisis — Sage（赤NG。穏やかな緑で寄り添い） */
  --sage: #8FA68C;
  --sage-soft: #D7E0D2;

  --divider: #E0DCD4;
  --shadow-soft: 0 2px 12px rgba(45, 45, 45, 0.05);
  --shadow-card: 0 4px 20px rgba(45, 45, 45, 0.08);
  --shadow-lift: 0 8px 28px rgba(45, 45, 45, 0.12);

  /* 発光トークン（ダーク時のみ視認） */
  --glow-primary: 0 0 16px rgba(167, 196, 160, 0.0);
  --glow-strong:  0 0 24px rgba(167, 196, 160, 0.0);
}

/* ============================================================
   Deep Forest（夜モード 18:00-5:00 自動切替）
   ============================================================ */
[data-theme="dark"] {
  /* 背景 */
  --bg: #1F2A2A;
  --bg-card: #2F3E3E;
  --bg-soft: #2A3838;
  --bg-warm: #2A3A2A;

  /* テキスト */
  --text: #EAEAEA;
  --text-soft: #B0B8B5;
  --text-muted: #7A8580;

  /* Primary — Deep Teal */
  --primary: #4E7C7B;
  --primary-light: #6B9494;
  --primary-dark: #2F5E5D;
  --primary-soft: #2F4040;

  /* Secondary — Sage（光るアクセント） */
  --secondary: #A7C4A0;
  --secondary-light: #DCEBD8;
  --secondary-dark: #87A582;
  --secondary-soft: #2A3A2A;

  /* Legacy alias — accent は sage に */
  --accent: #A7C4A0;
  --accent-soft: #2A3A2A;
  --accent-deep: #DCEBD8;

  /* Crisis — sage 強め */
  --sage: #A7C4A0;
  --sage-soft: #2A3A2A;

  --divider: #3A4949;
  --shadow-soft: 0 2px 12px rgba(0, 0, 0, 0.35);
  --shadow-card: 0 4px 20px rgba(0, 0, 0, 0.45);
  --shadow-lift: 0 8px 28px rgba(0, 0, 0, 0.55);

  /* 発光（夜のみ ON） */
  --glow-primary: 0 0 16px rgba(167, 196, 160, 0.4), 0 0 32px rgba(167, 196, 160, 0.18);
  --glow-strong:  0 0 24px rgba(167, 196, 160, 0.55), 0 0 48px rgba(167, 196, 160, 0.25);

  /* 角丸 */
  --r-sm: 12px;
  --r-md: 18px;
  --r-lg: 24px;
  --r-xl: 32px;

  /* イージング */
  --ease: cubic-bezier(0.22, 0.61, 0.36, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
html {
  background: var(--bg);
  transition: background-color 0.5s var(--ease);
}
body {
  font-family: 'Noto Sans JP', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  font-weight: 400;
  font-size: 15px;
  line-height: 1.7;
  letter-spacing: 0.02em;
  color: var(--text);
  background: var(--bg);
  transition: background-color 0.5s var(--ease), color 0.5s var(--ease);
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  overscroll-behavior: none;
}

button { font-family: inherit; font-size: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, textarea { font-family: inherit; font-size: inherit; color: inherit; border: none; background: transparent; outline: none; }
ul, ol { list-style: none; }
a { color: var(--accent-deep); text-decoration: none; }

/* 見出しは Noto Serif JP で「手紙・日記」のような温かさを演出
   （ナナメの関係＝先生でも友達でもない、の視覚化） */
h1, h2, h3 { font-family: 'Noto Serif JP', 'Noto Sans JP', serif; font-weight: 500; line-height: 1.4; color: var(--text); letter-spacing: 0.01em; }
h1 { font-size: 24px; font-weight: 600; line-height: 1.3; }
h2 { font-size: 18px; font-weight: 500; }
h3 { font-size: 16px; font-weight: 500; }

/* ============================================================
   レイアウト
   ============================================================ */
#app {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  background: var(--bg);
  position: relative;
  padding-bottom: 80px; /* タブバー分 */
}

.screen {
  display: none;
  padding: 20px 20px 40px;
  min-height: 100vh;
  animation: fadeIn 0.4s var(--ease);
}
.screen.active { display: block; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ============================================================
   ボタン
   ============================================================ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  min-height: 52px;
  padding: 14px 28px;
  border-radius: 999px;             /* ピル型 */
  font-family: inherit;
  font-weight: 600;
  font-size: 15px;
  letter-spacing: 0.03em;
  transition: transform 0.15s var(--ease), box-shadow 0.3s var(--ease), background-color 0.3s var(--ease), color 0.3s var(--ease);
  width: 100%;
}
.btn:active { transform: scale(0.97); }

.btn-primary {
  background: var(--primary);
  color: #fff;
  box-shadow: var(--shadow-soft);
}
.btn-primary:hover { background: var(--primary-dark); }
[data-theme="dark"] .btn-primary {
  background: var(--secondary);
  color: #1F2A2A;                   /* 濃い背景に黒文字で読みやすく */
  box-shadow: var(--glow-primary);
}
[data-theme="dark"] .btn-primary:hover {
  background: var(--secondary-light);
  box-shadow: var(--glow-strong);
}

.btn-secondary {
  background: var(--bg-card);
  color: var(--text);
  border: 1px solid var(--divider);
}
.btn-secondary:hover { background: var(--bg-soft); }
[data-theme="dark"] .btn-secondary {
  background: transparent;
  border-color: var(--divider);
}

.btn-ghost {
  background: transparent;
  color: var(--text-soft);
  font-size: 13px;
}
.btn-ghost:hover { color: var(--text); }

.btn-sage {
  background: var(--sage);
  color: #fff;
}
.btn-sage:hover { background: #788C76; }

/* ============================================================
   カード
   ============================================================ */
.card {
  background: var(--bg-card);
  border-radius: var(--r-md);
  padding: 18px;
  box-shadow: var(--shadow-soft);
  margin-bottom: 14px;
  transition: background 0.5s var(--ease), border-color 0.5s var(--ease);
}
.card-soft {
  background: var(--bg-soft);
  border-radius: var(--r-md);
  padding: 18px;
  margin-bottom: 14px;
}
.card-warm {
  background: var(--bg-warm);
  border-radius: var(--r-md);
  padding: 18px;
  margin-bottom: 14px;
}
[data-theme="dark"] .card,
[data-theme="dark"] .card-soft,
[data-theme="dark"] .card-warm {
  background: rgba(47, 62, 62, 0.55);
  border: 1px solid var(--divider);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
[data-theme="dark"] .card-warm {
  background: rgba(58, 73, 73, 0.6);
}

/* ============================================================
   気分入力（天気マーク 5段階）
   ============================================================ */
.mood-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  margin: 16px 0;
}
.mood-item {
  background: var(--bg-card);
  border: 2px solid transparent;
  border-radius: var(--r-md);
  padding: 14px 4px 10px;
  text-align: center;
  transition: all 0.2s var(--ease);
  cursor: pointer;
}
.mood-item:active { transform: scale(0.95); }
.mood-item.selected {
  border-color: var(--accent);
  background: var(--accent-soft);
}
.mood-emoji { font-size: 28px; line-height: 1; margin-bottom: 6px; }
.mood-label { font-size: 11px; color: var(--text-soft); }
.mood-item.selected .mood-label { color: var(--accent-deep); font-weight: 500; }

/* ============================================================
   ドメイン選択（9個）
   ============================================================ */
.domain-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin: 16px 0;
}
.domain-item {
  background: var(--bg-card);
  border: 1px solid var(--divider);
  border-radius: var(--r-md);
  padding: 14px;
  text-align: left;
  transition: all 0.2s var(--ease);
}
.domain-item:active { transform: scale(0.97); }
.domain-item.selected {
  border-color: var(--accent);
  background: var(--accent-soft);
}
.domain-emoji { font-size: 22px; }
.domain-name { font-size: 14px; font-weight: 500; margin-top: 4px; }

/* ============================================================
   タブバー（3タブ）
   ============================================================ */
.tabbar {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  background: var(--bg-card);
  border-top: 1px solid var(--divider);
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  z-index: 100;
  padding-bottom: env(safe-area-inset-bottom);
  transition: background 0.5s var(--ease), border-color 0.5s var(--ease);
}
[data-theme="dark"] .tabbar {
  background: rgba(31, 42, 42, 0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.tabbar-item {
  padding: 10px 0 12px;
  text-align: center;
  color: var(--text-muted);
  transition: color 0.2s var(--ease);
}
.tabbar-item.active { color: var(--accent-deep); }
[data-theme="dark"] .tabbar-item.active { color: var(--secondary); }
.tabbar-icon { font-size: 22px; line-height: 1; margin-bottom: 4px; }
.tabbar-label { font-size: 11px; font-weight: 500; }

/* ============================================================
   フローティング 💬
   ============================================================ */
.fab {
  position: fixed;
  bottom: 90px;
  right: 20px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--secondary);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  box-shadow: var(--shadow-lift);
  z-index: 90;
  transition: transform 0.2s var(--ease), box-shadow 0.4s var(--ease), background 0.4s var(--ease);
}
.fab:hover { background: var(--secondary-dark); }
[data-theme="dark"] .fab {
  background: var(--bg-card);
  color: var(--secondary);
  border: 2px solid var(--secondary);
  box-shadow: var(--glow-primary);
  animation: fab-pulse 4s var(--ease) infinite;
}
[data-theme="dark"] .fab:hover {
  background: var(--secondary);
  color: var(--bg);
  box-shadow: var(--glow-strong);
}
@keyframes fab-pulse {
  0%, 100% { box-shadow: var(--glow-primary); }
  50% { box-shadow: var(--glow-strong); }
}
.fab:active { transform: scale(0.92); }
.fab.hidden { display: none; }

/* ============================================================
   AIメッセージ・吹き出し
   ============================================================ */
.msg {
  display: flex;
  margin-bottom: 14px;
  gap: 10px;
}
.msg-ai { justify-content: flex-start; }
.msg-user { justify-content: flex-end; }
.msg-bubble {
  max-width: 80%;
  padding: 12px 16px;
  border-radius: var(--r-md);
  line-height: 1.7;
  white-space: pre-wrap;
  word-wrap: break-word;
}
.msg-ai .msg-bubble {
  background: var(--bg-card);
  color: var(--text);
  border-bottom-left-radius: 6px;
}
.msg-user .msg-bubble {
  background: var(--accent);
  color: #fff;
  border-bottom-right-radius: 6px;
}
.msg-typing {
  background: var(--bg-card);
  display: inline-flex;
  gap: 4px;
  padding: 14px 18px;
  border-radius: var(--r-md);
  border-bottom-left-radius: 6px;
}
.msg-typing span {
  width: 6px; height: 6px;
  background: var(--text-muted);
  border-radius: 50%;
  animation: typing 1.2s infinite ease-in-out;
}
.msg-typing span:nth-child(2) { animation-delay: .15s; }
.msg-typing span:nth-child(3) { animation-delay: .3s; }
@keyframes typing {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
  40% { transform: scale(1); opacity: 1; }
}

/* ============================================================
   入力欄
   ============================================================ */
.input-row {
  display: flex;
  gap: 8px;
  padding: 12px 16px;
  background: var(--bg-card);
  border-top: 1px solid var(--divider);
  position: sticky;
  bottom: 0;
}
.input-text {
  flex: 1;
  background: var(--bg-soft);
  border-radius: var(--r-md);
  padding: 12px 14px;
  font-size: 15px;
  resize: none;
  max-height: 120px;
}
.input-send {
  background: var(--accent);
  color: #fff;
  border-radius: 50%;
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}
.input-send:disabled { background: var(--text-muted); }

/* 大きなテキストエリア */
.textarea-block {
  width: 100%;
  background: var(--bg-card);
  border-radius: var(--r-md);
  padding: 14px;
  font-size: 15px;
  line-height: 1.7;
  resize: none;
  min-height: 120px;
  border: 1px solid var(--divider);
}
.textarea-block:focus {
  border-color: var(--accent);
  background: #fff;
}

/* ============================================================
   注釈（医療行為ではなくAI推定）
   ============================================================ */
.disclaimer {
  font-size: 11px;
  color: var(--text-muted);
  background: var(--bg-soft);
  border-radius: 8px;
  padding: 8px 12px;
  margin: 12px 0;
  display: flex;
  align-items: flex-start;
  gap: 6px;
  line-height: 1.5;
}
.disclaimer-mini {
  font-size: 10px;
  color: var(--text-muted);
  text-align: center;
  padding: 6px;
  margin: 8px 0 0;
}

/* ============================================================
   トースト
   ============================================================ */
.toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--text);
  color: #fff;
  padding: 12px 20px;
  border-radius: var(--r-md);
  font-size: 14px;
  z-index: 200;
  transition: transform 0.3s var(--ease);
  pointer-events: none;
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ============================================================
   モーダル
   ============================================================ */
.modal-bg {
  position: fixed;
  inset: 0;
  background: rgba(61, 52, 42, 0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  z-index: 300;
  display: none;
}
.modal-bg.open { display: flex; }
.modal-card {
  background: var(--bg-card);
  border-radius: var(--r-lg);
  padding: 24px;
  max-width: 400px;
  width: 100%;
  box-shadow: var(--shadow-lift);
  max-height: 85vh;
  overflow-y: auto;
}
.modal-title { font-family: 'Noto Serif JP', serif; font-size: 18px; margin-bottom: 12px; font-weight: 500; }

/* ============================================================
   クライシス検知（穏やかな寄り添い色）
   ============================================================ */
.crisis-card {
  background: var(--sage-soft);
  border-radius: var(--r-lg);
  padding: 24px;
  margin: 16px 0;
}
.crisis-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 17px;
  color: #2C4A2C;
  margin-bottom: 12px;
}
.crisis-text {
  color: var(--text);
  margin-bottom: 16px;
  line-height: 1.8;
}
.crisis-link {
  display: block;
  background: var(--sage);
  color: #fff;
  padding: 14px 16px;
  border-radius: var(--r-md);
  text-decoration: none;
  margin-bottom: 8px;
  font-weight: 500;
  text-align: center;
}
.crisis-link-sub {
  display: block;
  font-size: 11px;
  margin-top: 2px;
  opacity: 0.9;
  font-weight: 400;
}
.crisis-secondary {
  background: transparent;
  border: 1px solid var(--sage);
  color: #2C4A2C;
  padding: 12px;
  border-radius: var(--r-md);
  width: 100%;
  margin-top: 8px;
  font-weight: 500;
}

/* ============================================================
   行動カード
   ============================================================ */
.action-list { display: flex; flex-direction: column; gap: 10px; margin: 14px 0; }
.action-card {
  background: var(--bg-card);
  border-radius: var(--r-md);
  padding: 14px 16px;
  display: flex;
  gap: 12px;
  align-items: flex-start;
  border: 1px solid transparent;
  transition: all 0.15s var(--ease);
  cursor: pointer;
  text-align: left;
}
.action-card:active { transform: scale(0.98); }
.action-card:hover { border-color: var(--accent-soft); }
.action-card.picked {
  background: var(--accent-soft);
  border-color: var(--accent);
}
.action-icon { font-size: 20px; flex-shrink: 0; }
.action-text { flex: 1; }
.action-title { font-weight: 500; font-size: 14px; margin-bottom: 2px; }
.action-desc { font-size: 12px; color: var(--text-soft); line-height: 1.5; }
.action-meta { font-size: 10px; color: var(--text-muted); margin-top: 4px; }

/* ============================================================
   傾向ビュー（バーチャート）
   ============================================================ */
.bar-row {
  display: grid;
  grid-template-columns: 100px 1fr 30px;
  gap: 10px;
  align-items: center;
  margin-bottom: 8px;
  font-size: 13px;
}
.bar-fill {
  background: var(--accent-soft);
  border-radius: 4px;
  height: 18px;
  position: relative;
  overflow: hidden;
}
.bar-fill::after {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--accent);
  width: var(--w, 0%);
  border-radius: 4px;
  transition: width 0.5s var(--ease);
}

/* ============================================================
   カレンダー
   ============================================================ */
.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  margin: 16px 0;
}
.cal-head {
  text-align: center;
  font-size: 11px;
  color: var(--text-muted);
  padding: 4px;
}
.cal-cell {
  aspect-ratio: 1;
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: var(--bg-soft);
  font-size: 10px;
  color: var(--text-muted);
  cursor: pointer;
}
.cal-cell.has-data { background: var(--accent-soft); color: var(--text); }
.cal-cell-day { font-size: 11px; font-weight: 500; }
.cal-cell-emoji { font-size: 14px; }

/* ============================================================
   ナビゲーション・ヘッダー
   ============================================================ */
.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.page-title { font-family: 'Noto Serif JP', serif; font-size: 20px; font-weight: 500; }
.page-back {
  width: 36px;
  height: 36px;
  border-radius: 50%;

const STORAGE_KEY = 'aside_v2_state';

const defaultState = () => ({
  consent: { given: false, version: '', at: null },
  user: { nickname: '', createdAt: null, daysUsed: 0 },
  initialDone: false,         // 初回オンボ完了
  guidedShown: false,         // 初回ガイダンス見た
  todayMood: null,            // {score, time, comment}
  todayDomain: null,
  records: [],                // 思考記録
  pendingActions: [],         // 提案された行動 (未トラッキング)
  trackedActions: [],         // {actionId, status, date, comment}
  conversations: [],          // {id, messages, domain, distortion, date}
  detectedDistortions: [],    // {distortionId, date, recordId}
  preferences: { categoryWeights: {} },  // ユーザーの好み学習
  ui: { currentTab: 'today' }
});

let state = loadState();

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    const loaded = JSON.parse(raw);
    return Object.assign(defaultState(), loaded);
  } catch (e) {
    console.warn('state load error:', e);
    return defaultState();
  }
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) { console.warn('save error', e); }
}

// ============================================================
// ユーティリティ
// ============================================================
function uid() {
  if (window.crypto && window.crypto.randomUUID) return window.crypto.randomUUID();
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, (c) => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

function todayKey(d = new Date()) {
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), dd = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}

function getMode() {
  const h = new Date().getHours();
  if (h >= 5 && h < 12) return 'morning';
  if (h >= 19 || h < 3) return 'night';
  return 'day';
}

// ============================================================
// ビジュアルテーマ（Light Warm 5-18 / Deep Forest 18-5）
// ============================================================
function getVisualTheme() {
  // 手動上書き対応
  if (state.preferences && state.preferences.themeOverride) {
    return state.preferences.themeOverride;   // 'light' | 'dark'
  }
  const h = new Date().getHours();
  return (h >= 18 || h < 5) ? 'dark' : 'light';
}
function applyVisualTheme() {
  const theme = getVisualTheme();
  document.documentElement.setAttribute('data-theme', theme);
  // theme-color メタタグも切替
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.setAttribute('content', theme === 'dark' ? '#1F2A2A' : '#6B8F71');
}
function probeHeroImage() {
  const img = new Image();
  img.onload = () => { window.ASIDE_HAS_HERO = true; if (currentScreen === 'welcome') render(); };
  img.onerror = () => { window.ASIDE_HAS_HERO = false; if (currentScreen === 'welcome') render(); };
  img.src = './assets/welcome-hero.png';
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function detectDistortion(text) {
  const lower = (text || '').toLowerCase();
  for (const d of DISTORTIONS) {
    for (const ex of d.examples) {
      if (lower.includes(ex.toLowerCase())) return d;
    }
  }
  return null;
}

function detectCrisis(text) {
  const lower = (text || '').toLowerCase();
  let max = 0;
  for (const c of CRISIS_WORDS) {
    if (lower.includes(c.word)) max = Math.max(max, c.sev);
  }
  return max;
}

function getUserName() {
  return state.user.nickname || 'あなた';
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

function modal(html) {
  const m = document.getElementById('modal');
  document.getElementById('modalContent').innerHTML = html;
  m.classList.add('open');
  m.onclick = (e) => { if (e.target === m) closeModal(); };
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }

let currentScreen = 'welcome';

function go(screen, opts = {}) {
  currentScreen = screen;
  if (window.AsideLogger) {
    AsideLogger.screenView(screen, opts);
  }
  render();
  window.scrollTo(0, 0);
}

function render() {
  const showTabbar = ['home', 'record', 'profile'].includes(currentScreen);
  const showFab = ['home', 'record'].includes(currentScreen);
  document.getElementById('tabbar').style.display = showTabbar ? 'grid' : 'none';
  document.getElementById('fab').classList.toggle('hidden', !showFab);

  // タブバー active 状態
  document.querySelectorAll('.tabbar-item').forEach(el => {
    const tab = el.dataset.tab;
    const active = (currentScreen === 'home' && tab === 'today') ||
                   (currentScreen === 'record' && tab === 'record') ||
                   (currentScreen === 'profile' && tab === 'profile');
    el.classList.toggle('active', active);
  });

  let html = '';
  switch (currentScreen) {
    case 'welcome':       html = viewWelcome(); break;
    case 'consent':       html = viewConsent(); break;
    case 'nickname':      html = viewNickname(); break;
    case 'mood-input':    html = viewMoodInput(); break;
    case 'home':          html = viewHome(); break;
    case 'record':        html = viewRecord(); break;
    case 'profile':       html = viewProfile(); break;
    case 'dialog':        html = viewDialog(); break;
    case 'domain':        html = viewDomainSelect(); break;
    case 'action-track':  html = viewActionTrack(); break;
    default:              html = viewHome();
  }
  document.getElementById('main').innerHTML = html;
}

// ============================================================
// AI ナナメ応答（プロンプトパターンマッチング）
// ============================================================
function generateAIResponse(userText, conversation) {
  const turn = conversation.messages.filter(m => m.role === 'user').length;
  const distortion = detectDistortion(userText);

  // クライシス検知
  const crisisSev = detectCrisis(userText);
  if (crisisSev >= 4) {
    return { type: 'crisis', severity: crisisSev };
  }

  // 1ターン目: 共感 + 表層問い
  if (turn === 1) {
    const empathies = [
      'それはしんどかったね。',
      'うん、それモヤモヤするよね。',
      'そっか、それはきつかった。',
    ];
    const questions = [
      'その時、どう感じた？',
      'それでどう思った？',
      'いま、どんな気持ち？',
    ];
    return {
      type: 'normal',
      text: empathies[Math.floor(Math.random()*empathies.length)] + ' ' + questions[Math.floor(Math.random()*questions.length)],
      distortion
    };
  }

  // 2ターン目: 1段深掘り + 認知歪み検出時はラベル提示
  if (turn === 2) {
    let response = 'そう感じたんだね。';
    if (distortion && !conversation.distortionShown) {
      // 認知歪みを1回だけバックグラウンド提示用に保存
      conversation.distortionShown = distortion;
    }
    response += ' なぜそう思うんだろう？';
    return { type: 'normal', text: response, distortion };
  }

  // 3ターン目: 中核信念に近づく深掘り
  if (turn === 3) {
    const responses = [
      'もしそうだとしたら、それはあなたにとって何を意味する？',
      'そう思った時、自分自身についてどんな感じがする？',
      'うん。その気持ちの奥に、もっと何かありそう？',
    ];
    return { type: 'normal', text: responses[Math.floor(Math.random()*responses.length)], distortion };
  }

  // 4ターン目以降: 認知再構成 / 別の見方
  if (turn === 4) {
    if (distortion && distortion.counter) {
      return { type: 'normal', text: distortion.counter, distortion };
    }
    return {
      type: 'normal',
      text: 'そう思っちゃう瞬間って、しんどいよね。もし友達が同じこと言ってたら、何て言ってあげる？',
      distortion
    };
  }

  // 5ターン目以降: 行動提案 or 終了誘導
  if (turn >= 5) {
    return {
      type: 'wrap',
      text: 'うん。話してくれてありがとう。今日のことを踏まえて、明日できそうな小さなこと、選んでみない？',
      distortion
    };
  }

  return { type: 'normal', text: 'それで、その後どうなった？', distortion };
}

// 対話送信
function dialogSend() {
  const input = document.getElementById('dialogInput');
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;

  // ユーザーメッセージ
  currentConversation.messages.push({ role: 'user', text, ts: Date.now() });
  input.value = '';
  input.style.height = 'auto';

  // クライシス検知
  const crisisSev = detectCrisis(text);
  if (crisisSev >= 4) {
    showCrisisModal(crisisSev);
    return;
  }

  // ロギング
  if (window.AsideLogger) {
    AsideLogger.event('dialog_user_message', { text_length: text.length, domain: currentConversation.domain });
  }

  // AI 応答
  currentConversation.typing = true;
  render();
  scrollToBottom();

  setTimeout(() => {
    const response = generateAIResponse(text, currentConversation);
    currentConversation.typing = false;

    if (response.type === 'crisis') {
      showCrisisModal(response.severity);
      return;
    }

    currentConversation.messages.push({ role: 'ai', text: response.text, ts: Date.now() });

    if (response.distortion && !currentConversation.detectedDistortions) {
      currentConversation.detectedDistortions = [];
    }
    if (response.distortion) {
      currentConversation.detectedDistortions = currentConversation.detectedDistortions || [];
      if (!currentConversation.detectedDistortions.find(d => d.id === response.distortion.id)) {
        currentConversation.detectedDistortions.push(response.distortion);
      }
    }

    if (response.type === 'wrap') {
      currentConversation.shouldWrap = true;
    }

    render();
    scrollToBottom();
  }, 700 + Math.random() * 600);
}

function scrollToBottom() {
  setTimeout(() => {
    const area = document.getElementById('msgArea');
    if (area) window.scrollTo(0, document.body.scrollHeight);
  }, 50);
}

function getRecommendedActions(domain, n = 3) {
  let pool = ACTIONS.slice();
  // ドメインフィルタ
  if (domain && domain !== 'good' && domain !== 'later') {
    pool = pool.filter(a => !a.domains || a.domains.includes(domain));
  }
  // 飽き対策（過去14日で出してないもの優先）
  const recentIds = state.pendingActions
    .filter(p => Date.now() - p.recommendedAt < 14*86400000)
    .map(p => p.id);
  pool.sort((a, b) => {
    const ar = recentIds.includes(a.id) ? 1 : 0;
    const br = recentIds.includes(b.id) ? 1 : 0;
    return ar - br;
  });
  // カテゴリ多様性
  const result = [];
  const usedCats = new Set();
  for (const a of pool) {
    if (result.length >= n) break;
    if (!usedCats.has(a.cat) || result.length === pool.length - 1) {
      result.push(a);
      usedCats.add(a.cat);
    }
  }
  // 不足分を追加
  if (result.length < n) {
    for (const a of pool) {
      if (result.length >= n) break;
      if (!result.find(x => x.id === a.id)) result.push(a);
    }
  }
  return result;
}

function pickAction(actionId) {
  const a = ACTIONS.find(x => x.id === actionId);
  if (!a) return;

  const today = todayKey();
  state.pendingActions = state.pendingActions.filter(p => p.date !== today);
  state.pendingActions.push({
    ...a,
    recommendedAt: Date.now(),
    date: today,
    fromConversationId: currentConversation ? currentConversation.id : null
  });
  saveState();

  if (window.AsideLogger) {
    AsideLogger.startAction({
      actionId: a.id,
      type: a.cat === 'physical' ? 'instant_done' : (a.cat === 'cognitive' ? 'memo_done' : 'instant_done'),
      difficulty: 'easy'
    });
  }

  closeModal();
  toast('明日、ちょっと聞かせてね');
  go('home');
}

function trackAction(actionId, status) {
  const today = todayKey();
  state.trackedActions.push({ actionId, status, date: today, ts: Date.now() });
  saveState();

  if (window.AsideLogger && state.pendingActions.find(p=>p.id===actionId)) {
    AsideLogger.event('action_tracked', { actionId, status });
  }

  if (status === 'done') {
    toast('できたんだね、すごい！');
  } else if (status === 'not') {
    toast('無理しなくていいよ');
  } else {
    toast('教えてくれてありがとう');
  }
  go('home');
}

function viewCalendar() {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  const first = new Date(year, month, 1).getDay();
  const days = new Date(year, month+1, 0).getDate();

  const moods = state.records.concat(state.todayMood ? [state.todayMood] : []);
  const moodMap = {};
  moods.forEach(m => { if (m && m.date) moodMap[m.date] = m; });
  // todayMood
  if (state.todayMood) moodMap[state.todayMood.date] = state.todayMood;

  let html = `<div class="card">
    <h3 class="mb-3">${year}年 ${month+1}月</h3>
    <div class="calendar-grid">
      ${['日','月','火','水','木','金','土'].map(d => `<div class="cal-head">${d}</div>`).join('')}
      ${Array(first).fill('<div></div>').join('')}
      ${Array.from({length:days}, (_,i) => {
        const day = i+1;
        const dateKey = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        const m = moodMap[dateKey];
        const emoji = m ? MOODS.find(x => x.id === m.score)?.emoji : '';
        return `<div class="cal-cell ${m?'has-data':''}">
          <div class="cal-cell-day">${day}</div>
          <div class="cal-cell-emoji">${emoji}</div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
  return html;
}

function viewList() {
  const items = [...state.records].reverse().slice(0, 30);

function viewTrends() {
  // 過去 30 日の記録から集計
  const all = state.records.concat(state.todayMood ? [state.todayMood] : []);
  const recentRecords = all.filter(r => r.date && Date.now() - new Date(r.date).getTime() < 30 * 86400000);

  // ドメイン別集計（過去30日の対話から）
  const domainCount = {};
  state.conversations.forEach(c => {
    if (c.date && Date.now() - new Date(c.date).getTime() < 30 * 86400000) {
      domainCount[c.domain] = (domainCount[c.domain] || 0) + 1;
    }
  });
  const domainsSorted = Object.entries(domainCount).sort((a,b) => b[1] - a[1]).slice(0, 5);

  // 認知歪み別集計
  const distortionCount = {};
  state.detectedDistortions.forEach(d => {
    if (Date.now() - new Date(d.date).getTime() < 30 * 86400000) {
      distortionCount[d.distortionId] = (distortionCount[d.distortionId] || 0) + 1;
    }
  });
  const distortionsSorted = Object.entries(distortionCount).sort((a,b) => b[1] - a[1]).slice(0, 5);

  // 行動完遂率
  const recentTracks = state.trackedActions.filter(t => Date.now() - new Date(t.date).getTime() < 30 * 86400000);
  const doneCount = recentTracks.filter(t => t.status === 'done').length;
  const totalCount = recentTracks.length;
  const completionRate = totalCount > 0 ? Math.round(doneCount / totalCount * 100) : 0;

  if (recentRecords.length === 0 && state.conversations.length === 0) {
    return `<div class="card text-center text-soft" style="padding:40px 20px;">
      傾向を見るには、もう少し記録が必要です。<br>
      あと${Math.max(1, 7 - state.user.daysUsed)}日くらい使ってみて。
    </div>`;
  }

  const maxDomain = Math.max(...domainsSorted.map(d => d[1]), 1);
  const maxDist = Math.max(...distortionsSorted.map(d => d[1]), 1);

  return `
    <h3 class="section-title" style="margin-top:0;">📊 ドメイン別</h3>
    <div class="card">
      ${domainsSorted.length === 0 ? '<p class="text-small text-soft">まだデータがありません</p>' : domainsSorted.map(([id, count]) => {
        const d = DOMAINS.find(x => x.id === id);
        return `<div class="bar-row">
          <div>${d ? d.emoji + ' ' + d.name : id}</div>
          <div class="bar-fill" style="--w:${count / maxDomain * 100}%;"></div>
          <div>${count}</div>
        </div>`;
      }).join('')}
    </div>

    <h3 class="section-title">🧠 出やすい考え方のクセ</h3>
    <div class="card">
      ${distortionsSorted.length === 0 ? '<p class="text-small text-soft">まだ検出されていません</p>' : distortionsSorted.map(([id, count]) => {
        const d = DISTORTIONS.find(x => x.id === id);
        return `<div class="bar-row">
          <div>${d ? d.name : id}</div>
          <div class="bar-fill" style="--w:${count / maxDist * 100}%;"></div>
          <div>${count}</div>
        </div>`;
      }).join('')}
    </div>

    <h3 class="section-title">💪 行動の手応え</h3>
    <div class="card">
      <p>試した: ${totalCount}回 / できた: ${doneCount}回 (${completionRate}%)</p>
    </div>

    ${recentRecords.length >= 5 ? `
      <h3 class="section-title">✨ AIからの発見</h3>
      <div class="card-warm">
        <p style="line-height:1.8;">${getInsight(recentRecords, distortionsSorted, completionRate)}</p>
      </div>
    ` : ''}
  `;
}

function getInsight(records, distortions, rate) {
  const insights = [];
  const avgMood = records.reduce((s, r) => s + r.score, 0) / records.length;
  if (avgMood < 3) insights.push('最近、しんどい日が多いね。無理せず、できる範囲で。');
  if (avgMood >= 4) insights.push('全体的に良い感じが続いてる。この調子で。');
  if (rate >= 60) insights.push(`行動の完遂率${rate}%、ちゃんとできてる。`);
  if (distortions[0]) {
    const d = DISTORTIONS.find(x => x.id === distortions[0][0]);
    if (d) insights.push(`「${d.name}」が出やすいみたい。気付くだけでも一歩。`);
  }
  return insights.length > 0 ? insights.join(' ') : '気持ちと行動のパターンが少しずつ見えてきたね。';
}

function computeProfile() {
  // 認知歪み Top 3
  const distortionCount = {};
  state.detectedDistortions.forEach(d => {
    distortionCount[d.distortionId] = (distortionCount[d.distortionId] || 0) + 1;
  });
  const topDistortions = Object.entries(distortionCount)
    .sort((a,b) => b[1] - a[1])
    .slice(0, 3)
    .map(([id, count]) => {
      const d = DISTORTIONS.find(x => x.id === id);
      return d ? { ...d, count } : null;
    })
    .filter(Boolean);

  // 効きやすい行動 Top 3 (done率が高い)
  const actionStats = {};
  state.trackedActions.forEach(t => {
    if (!actionStats[t.actionId]) actionStats[t.actionId] = { done: 0, total: 0 };
    actionStats[t.actionId].total++;
    if (t.status === 'done') actionStats[t.actionId].done++;
  });
  const topActions = Object.entries(actionStats)
    .filter(([_, s]) => s.total >= 2)
    .sort((a,b) => (b[1].done/b[1].total) - (a[1].done/a[1].total))
    .slice(0, 3)
    .map(([id, s]) => {
      const a = ACTIONS.find(x => x.id === id);
      return a ? { ...a, doneRate: s.done/s.total } : null;
    })
    .filter(Boolean);

  return { topDistortions, topActions };
}

function saveThreeLines() {
  const l1 = document.getElementById('line1').value.trim();
  const l2 = document.getElementById('line2').value.trim();
  const l3 = document.getElementById('line3').value.trim();
  const today = todayKey();

  if (l1 || l2 || l3) {
    const r = {
      id: uid(),
      date: today,
      good: l1, mod: l2, note: l3,
      score: state.todayMood ? state.todayMood.score : null,
      comment: [l1 && '✨ ' + l1, l2 && '🌧 ' + l2, l3 && '💭 ' + l3].filter(Boolean).join(' / '),
      createdAt: Date.now()
    };
    state.records.push(r);
    saveState();
    if (window.AsideLogger) AsideLogger.event('three_lines_saved', { lines: [!!l1, !!l2, !!l3] });
    toast('保存したよ');
  }
  closeModal();
  go('home');
}

// ============================================================
// アクションハンドラ
// ============================================================
function handleAction(act, el, ev) {
  switch (act) {
    case 'welcome-next':
      go('consent');
      break;
    case 'consent-agree':
      state.consent = { given: true, version: window.ASIDE_CONFIG.consentVersion, at: Date.now() };
      saveState();
      if (window.AsideLogger) AsideLogger.recordConsent();
      go('nickname');
      break;
    case 'consent-decline':
      modal(`<h2 class="modal-title">またお待ちしています</h2><p>β版は同意いただいた上でのご利用をお願いしています。<br>このタブを閉じてください。</p>`);
      break;
    case 'nickname-save': {
      const v = document.getElementById('nicknameInput').value.trim();
      state.user.nickname = v || 'あなた';
      state.user.createdAt = Date.now();
      saveState();
      go('mood-input');
      break;
    }
    case 'nickname-skip':
      state.user.nickname = '';
      state.user.createdAt = Date.now();
      saveState();
      go('mood-input');
      break;
    case 'mood-pick': {
      const score = Number(el.dataset.score);
      const today = todayKey();
      state.todayMood = { score, date: today, time: Date.now(), comment: '' };
      saveState();
      if (window.AsideLogger) {
        AsideLogger.logEmotion(score, '');
        AsideLogger.setSessionMoodAfter(score);
      }
      if (!state.initialDone) {
        state.initialDone = true;
        saveState();
        go('home');
      } else {
        toast(`${MOODS.find(m=>m.id===score).label}、覚えとくね`);
        render();
      }
      break;
    }
    case 'mood-redo':
      state.todayMood = null;
      saveState();
      render();
      break;
    case 'guide-mood':
      // ホーム上にmoodがすでに表示されているはず、ここはguide状態解除
      state.guidedShown = true;
      saveState();
      render();
      break;
    case 'guide-dismiss':
      state.guidedShown = true;
      saveState();
      render();
      break;
    case 'open-dialog':
      go('domain');
      break;
    case 'domain-pick': {
      const dom = el.dataset.domain;
      currentConversation = {
        id: uid(),
        domain: dom,
        date: todayKey(),
        messages: [],
        detectedDistortions: [],
        startedAt: Date.now()
      };
      // 初回 AI メッセージ
      const initial = getInitialAIMessage(dom);
      currentConversation.messages.push({ role: 'ai', text: initial, ts: Date.now() });
      go('dialog');
      break;
    }
    case 'dialog-back':
      go('home');
      break;
    case 'dialog-end':
    case 'dialog-end-confirm':
      endDialog();
      break;
    case 'dialog-send':
      dialogSend();
      break;
    case 'dismiss-distortion':
      if (currentConversation) currentConversation.distortionDismissed = true;
      render();
      break;
    case 'crisis-close':
      closeModal();
      break;
    case 'open-three-lines':
      openThreeLines();
      break;
    case 'three-lines-only':
      openThreeLines();
      break;
    case 'save-three-lines':
      saveThreeLines();
      break;
    case 'recommend-actions':
      showRecommendedActions();
      break;
    case 'pick-action':
      pickAction(el.dataset.actionId);
      break;
    case 'show-more-actions':
      showMoreActions(el.dataset.domain);
      break;
    case 'skip-actions':
      closeModal();
      break;
    case 'track-done':
      trackAction(el.dataset.actionId, 'done');
      break;
    case 'track-not':
      trackAction(el.dataset.actionId, 'not');
      break;
    case 'track-other':
      trackAction(el.dataset.actionId, 'other');
      break;
    case 'record-view':
      recordView = el.dataset.view;
      render();
      break;
    case 'change-nickname': {
      const newName = prompt('新しいニックネーム', state.user.nickname);
      if (newName !== null) {
        state.user.nickname = newName.trim() || 'あなた';
        saveState();
        render();
      }
      break;
    }
    case 'export-data': {
      const data = JSON.stringify(state, null, 2);
      const blob = new Blob([data], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `aside-data-${todayKey()}.json`;
      a.click();
      toast('データをダウンロードしたよ');
      break;
    }
    case 'show-terms':
      window.open('docs/terms-of-service-beta.md', '_blank');
      break;
    case 'show-crisis-info':
      modal(`
        <h2 class="modal-title">危機時の連絡先</h2>
        <p class="text-small mb-3">いつでも、ここに頼っていい。</p>
        <a href="tel:0120279338" class="crisis-link" style="background:var(--sage);">
          📞 よりそいホットライン
          <span class="crisis-link-sub">0120-279-338（24時間・無料・匿名）</span>
        </a>
        <a href="tel:0570783556" class="crisis-link" style="background:var(--sage);">
          📞 いのちの電話
          <span class="crisis-link-sub">0570-783-556</span>
        </a>
        <a href="tel:0570064556" class="crisis-link" style="background:var(--sage);">
          📞 こころの健康相談統一ダイヤル
          <span class="crisis-link-sub">0570-064-556</span>
        </a>
        <button class="btn btn-ghost mt-3" onclick="closeModal()">閉じる</button>
      `);
      break;
    case 'reset-data':
      if (confirm('本当にすべてのデータを削除しますか？元に戻せません。')) {
        localStorage.removeItem(STORAGE_KEY);
        localStorage.removeItem('aside_user_id');
        localStorage.removeItem('aside_session_id');
        localStorage.removeItem('aside_consent_version');
        localStorage.removeItem('aside_user_row_created');
        location.reload();
      }
      break;
    default:
      console.warn('未定義 act:', act);
  }
}

function getInitialAIMessage(domainId) {
  const messages = {
    work: `${getUserName()}、今日もおつかれさま。仕事のこと、よかったら聞かせて？`,
    relationship: `${getUserName()}、人間関係のこと、モヤモヤするよね。何があった？`,
    self: `${getUserName()}、自分のこと、考えてたんだね。話せる範囲で聞かせて？`,
    sleep: `${getUserName()}、眠りはどんな感じ？最近の睡眠のこと、聞かせて？`,
    sns: `${getUserName()}、SNSで何かあった？気軽に話してみて。`,
    money: `${getUserName()}、お金のことって地味に重いよね。何が引っかかってる？`,
    future: `${getUserName()}、将来のこと、不安になる時あるよね。聞かせて？`,
    good: `${getUserName()}、今日いい日だったんだね ✨ 何があった？`,
    later: `${getUserName()}、おつかれさま。話したくなったらいつでも。今日のひとことだけでも。`,
  };
  return messages[domainId] || messages.self;
}

function endDialog() {
  if (!currentConversation) { go('home'); return; }
  // 会話を保存
  const conv = {
    ...currentConversation,
    endedAt: Date.now()
  };
  state.conversations.push(conv);

  // 検出された認知歪みを記録
  (conv.detectedDistortions || []).forEach(d => {
    state.detectedDistortions.push({
      distortionId: d.id,
      date: todayKey(),
      conversationId: conv.id
    });
  });

  saveState();

  if (window.AsideLogger) {
    AsideLogger.event('dialog_ended', {
      domain: conv.domain,
      message_count: conv.messages.length,
      detected_distortions: (conv.detectedDistortions || []).map(d => d.id)
    });
  }

  // 5ターン以上対話してたら行動レコメンド表示
  const userTurns = conv.messages.filter(m => m.role === 'user').length;
  if (userTurns >= 2) {
    setTimeout(() => showRecommendedActions(), 300);
  }

  currentConversation = null;
  go('home');
}

// ============================================================
// 起動
// ============================================================
document.addEventListener('click', (e) => {
  const target = e.target.closest('[data-act]');
  if (target) {
    handleAction(target.dataset.act, target, e);
  }

  const tab = e.target.closest('[data-tab]');
  if (tab) {
    const t = tab.dataset.tab;
    if (t === 'today') go('home');
    if (t === 'record') go('record');
    if (t === 'profile') go('profile');
  }
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey && document.activeElement?.id === 'dialogInput') {
    e.preventDefault();
    dialogSend();
  }
});

// 初期化
function init() {
  // 利用日数カウント
  if (state.user.createdAt) {
    state.user.daysUsed = Math.floor((Date.now() - state.user.createdAt) / 86400000) + 1;
    saveState();
  }

  // ビジュアルテーマ初期適用 + 定期チェック
  applyVisualTheme();
  setInterval(() => {
    const before = document.documentElement.getAttribute('data-theme');
    applyVisualTheme();
    const after = document.documentElement.getAttribute('data-theme');
    if (before !== after) render();   // 切替時に再描画（mood絵文字差替）
  }, 60_000);

  // ヒーロー画像の存在を確認（無ければ CSS フォールバック）
  probeHeroImage();

  // AsideLogger 初期化
  if (window.AsideLogger) {
    AsideLogger.init();
  }

  // ルーティング判定
  if (!state.consent.given) {
    go('welcome');
  } else if (!state.user.createdAt) {
    go('nickname');
  } else if (!state.initialDone) {
    go('mood-input');
  } else {
    go('home');
  }
}

// Service Worker 登録（PWA）
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js').catch(err => {
      console.warn('[Aside] SW registration failed:', err && err.message);
    });
  });
}

init();

</script>
