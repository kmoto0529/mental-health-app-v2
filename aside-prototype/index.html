function aiPromptToCopyText(p) {
  const lines = [
    `# ${p.title}`,
    `(ID: ${p.id})`,
    '',
    `## 目的`,
    p.purpose,
    '',
    `## トリガー箇所`,
    p.triggerLocation,
    '',
    `## モデル設定`,
    `- model: ${p.model}`,
    `- temperature: ${p.temperature}`,
    `- maxTokens: ${p.maxTokens}`,
    `- 出力フォーマット: ${p.outputFormat}`,
    '',
    `## フォールバック挙動`,
    p.fallbackBehavior,
    '',
    `## セーフティチェック`,
    ...(p.safetyChecks || []).map(s => `- ${s}`),
    '',
    `## システムプロンプト`,
    '```',
    p.systemPrompt,
    '```',
  ];
  if (p.contextTemplate) {
    lines.push('', '## コンテキストテンプレート（動的挿入）', '```', p.contextTemplate, '```');
  }
  if (p.userTemplate) {
    lines.push('', '## ユーザーメッセージテンプレート', '```', p.userTemplate, '```');
  }
  lines.push('', `## 最終更新 / 変更履歴`, `${p.lastUpdated} — ${p.changeNote || '-'}`);
  lines.push('', `## 心理士レビュー状態`, `- 状態: ${p.psychologistReviewStatus || '未設定'}`);
  if (p.psychologistReviewNote) lines.push(`- ノート: ${p.psychologistReviewNote}`);
  return lines.join('\n');
}

// ============================================================
// アクションハンドラ（v3）
// ============================================================
function handleAction(act, el, ev) {
  // 共通: ナビ
  if (act === 'back-home')   { moodDraft = null; moodCatsExpanded = false; go('home'); return; }
  if (act === 'back-action') { go('action'); return; }
  if (act === 'back-record') { go('record'); return; }
  if (act === 'close-modal') { closeModal(); return; }

  // オンボーディング (v0.9.8: 5ステップ刷新)
  if (act === 'welcome-next') { go('consent'); return; }
  if (act === 'open-consent-details') { modal(viewConsentDetailsModal(), 'modal-card-tall'); return; }
  if (act === 'consent-agree' || act === 'consent-agree-from-details') {
    state.consent = { given: true, version: (window.ASIDE_CONFIG && window.ASIDE_CONFIG.consentVersion) || 'v1', at: Date.now() };
    saveState();
    if (window.MoyaLogger) MoyaLogger.recordConsent();
    closeModal();
    go('nickname');
    return;
  }
  if (act === 'nickname-save') {
    const v = (document.getElementById('nicknameInput')||{}).value || '';
    state.user.nickname = v.trim() || 'あなた';
    state.user.createdAt = Date.now();
    saveState();
    go('profile');
    return;
  }
  if (act === 'nickname-skip') {
    state.user.nickname = '';
    state.user.createdAt = Date.now();
    saveState();
    go('profile');
    return;
  }

  // プロフィール画面 (chip 選択)
  if (act === 'profile-pick') {
    const d = ensureProfileDraft();
    const type = el.dataset.type;
    const id = el.dataset.id;
    if (type === 'interests') {
      const i = d.interests.indexOf(id);
      if (i >= 0) d.interests.splice(i, 1);
      else d.interests.push(id);
    } else {
      d[type] = (d[type] === id) ? '' : id;  // 同じものを再タップで解除
    }
    render();
    return;
  }
  if (act === 'profile-save') {
    const d = ensureProfileDraft();
    if (!d.occupation || !d.ageRange || !d.gender) {
      toast('立場・年代・性別を選んでね'); return;
    }
    Object.assign(state.user, {
      occupation: d.occupation,
      ageRange: d.ageRange,
      gender: d.gender,
      interests: d.interests.slice(),
      profileDone: true,
    });
    saveState();
    profileDraft = null;
    go('guide');
    return;
  }

  // 使い方ガイド完了
  if (act === 'guide-done') {
    state.guidedShown = true;
    state.initialDone = true;  // 後方互換
    saveState();
    go('home');
    return;
  }

  // ホーム上での即時気分選択 → mood-full に遷移して気分プリセット
  if (act === 'quick-mood') {
    const score = Number(el.dataset.score);
    moodDraft = { moodScore: score, categories: [], comment: '' };
    go('mood-full');
    return;
  }
  // 気持ち入力フル
  if (act === 'open-mood-full') { moodDraft = null; go('mood-full'); return; }
  // すべての記録を見る → きろくタブのカレンダー > 「最近のきろく」位置へスクロール
  if (act === 'see-all-records') {
    state.ui.recordSubtab = 'calendar';
    go('record');
    setTimeout(() => {
      const headers = document.querySelectorAll('h3.section-title');
      const target = Array.from(headers).find(h => h.textContent.includes('最近のきろく'));
      if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);
    return;
  }
  // 記録詳細
  if (act === 'open-record-detail') {
    const m = state.moodLogs.find(x => x.id === el.dataset.id);
    if (m) {
      const d = new Date(m.createdAt);
      viewParams.dateKey = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      go('day-detail');
    }
    return;
  }
  if (act === 'mood-score') { ensureMoodDraft().moodScore = Number(el.dataset.score); render(); return; }
  if (act === 'mood-cat') {
    const d = ensureMoodDraft();
    const cid = el.dataset.cat;
    if (d.categories.includes(cid)) d.categories = d.categories.filter(x => x !== cid);
    else d.categories.push(cid);
    render();
    return;
  }
  if (act === 'cats-expand')  { moodCatsExpanded = true;  render(); return; }
  if (act === 'cats-collapse'){ moodCatsExpanded = false; render(); return; }
  if (act === 'mood-save-end') {
    const log = saveMoodLog();
    moodDraft = null;
    if (log) toast('記録しました。今日の気持ちを残せただけでも十分です。');
    go('home');
    return;
  }
  if (act === 'mood-save-talk') {
    const log = saveMoodLog();
    moodDraft = null;
    if (log) startMoodChat(log);
    return;
  }
  if (act === 'mood-chat-send') { moodChatSend(); return; }
  if (act === 'mood-quick-reply') {
    const input = document.getElementById('moodChatInput');
    if (input) { input.value = el.dataset.text || ''; }
    moodChatSend();
    return;
  }
  if (act === 'end-mood-chat')  { endMoodChat(); return; }

  // もやもや整理
  if (act === 'moyamoya-start') { moyamoya = { step: 1 }; go('moyamoya'); return; }
  if (act === 'moya-cancel')    { moyamoya = null; go('home'); return; }
  if (act === 'moya-back-step') {
    // step1 では前のstepがないのでホームへ。それ以外は1つ前のstepへ。
    // step6 (レター) → step5 に戻ると「いま、気持ちの強さ」を選び直せる。
    // step4 (別の見方候補) に戻ると候補が再表示される（生成済みなら再生成しない）。
    if (!moyamoya || (moyamoya.step || 1) <= 1) { moyamoya = null; go('home'); return; }
    moyamoya.step = (moyamoya.step || 1) - 1;
    render();
    return;
  }
  if (act === 'moya-step1-next') {
    const v = (document.getElementById('moyaInput')||{}).value || '';
    if (!v.trim()) { toast('短くてOK。何があったか書いてみて'); return; }
    moyamoya.eventText = v.trim();
    const c = detectCrisis(v);
    if (c && c.sev >= 4) { showCrisisModal(c.sev); return; }
    moyamoya.step = 2;
    render();
    return;
  }
  if (act === 'moya-step2-pick') { moyamoya.emotion = el.dataset.emotion; render(); return; }
  if (act === 'moya-step2-show-all') { moyamoya.showAllEmotions = true; render(); return; }
  if (act === 'moya-step2-next') { if (moyamoya.emotion) { moyamoya.step = 3; render(); } return; }
  if (act === 'moya-set-score') {
    moyamoya.emotionScoreBefore = parseInt(el.dataset.score, 10);
    render();
    return;
  }
  if (act === 'moya-set-score-after') {
    moyamoya.emotionScoreAfter = parseInt(el.dataset.score, 10);
    render();
    return;
  }
  if (act === 'moya-step3-next') {
    if (moyamoya.emotionScoreBefore == null) moyamoya.emotionScoreBefore = 5;
    moyamoya.step = 4; render(); return;
  }
  if (act === 'moya-step4-more') {
    moyamoya.alternativeViewsRevealed = Math.min(6, (moyamoya.alternativeViewsRevealed || 3) + 3);
    render();
    return;
  }
  if (act === 'moya-step4-pick') {
    moyamoya.alternativeViewSelectedIndex = parseInt(el.dataset.index, 10);
    render();
    return;
  }
  if (act === 'moya-step4-next') {
    // 選択された1つの見方をレター用に保存（新形式 {label,text} / 旧形式 string 両対応）
    const idx = moyamoya.alternativeViewSelectedIndex;
    if (!Array.isArray(moyamoya.alternativeViews) || typeof idx !== 'number' || idx < 0 || idx >= (moyamoya.alternativeViewsRevealed || 0)) {
      toast('しっくりくる見方を1つ選んでね');
      return;
    }
    const picked = normalizeAltView(moyamoya.alternativeViews[idx]);
    moyamoya.alternativeView = picked.text;
    moyamoya.alternativeViewLabel = picked.label || '';
    moyamoya.step = 5;
    render();
    return;
  }
  if (act === 'moya-step5-next') {
    if (moyamoya.emotionScoreAfter == null) moyamoya.emotionScoreAfter = 5;
    moyamoya.step = 6; render(); return;
  }
  if (act === 'moya-save') {
    const r = saveMoyamoyaRecord();
    moyamoya = null;
    if (r) toast('レターを保存しました');
    go('home');
    return;
  }
  if (act === 'letter-restart') {
    moyamoya = { step: 1 };
    render();
    return;
  }
  if (act === 'letter-share' || act === 'letter-send') {
    const s = moyamoya;
    if (!s) return;
    const text = (s.letterBody || '') + '\n\n— もやの森でもやもや整理しました';
    if (navigator.share) {
      navigator.share({ title: s.letterTitle || 'もやもや整理レター', text }).catch(() => {});
    } else if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(
        () => toast('レターをコピーしました'),
        () => toast('共有に失敗しました')
      );
    } else {
      toast('共有がサポートされていません');
    }
    return;
  }
  if (act === 'letter-save-image') {
    toast('画像保存は近日公開予定です');
    return;
  }

  // FAB → もやもや整理
  if (act === 'open-dialog') { moyamoya = { step: 1 }; go('moyamoya'); return; }

  // 行動タブ - 目標
  if (act === 'goal-chat-start')  { startGoalChat(); go('goal-chat'); return; }
  if (act === 'goal-chat-cancel') { goalChat = null; go('action'); return; }
  if (act === 'goal-chat-send')   { goalChatSend(); return; }
  if (act === 'goal-confirm')     { confirmGoal(); return; }
  if (act === 'goal-redo') {
    if (!goalChat) return;
    goalChat.awaitingConfirm = false;
    goalChat.proposedGoal = null;
    goalChat.messages.push({ role: 'assistant', content: 'もう少し聞かせてください。', createdAt: new Date().toISOString() });
    document.getElementById('main').innerHTML = viewGoalChat();
    return;
  }

  // 行動タブ - 方針/アクション
  if (act === 'show-policies')  { go('policy-select'); return; }
  if (act === 'policy-pick')    { pickPolicy(decodeURIComponent(el.dataset.policyText), el.dataset.depth); return; }
  if (act === 'show-actions')   { go('action-select'); return; }
  if (act === 'action-pick')    { pickAction(decodeURIComponent(el.dataset.actionText)); return; }
  if (act === 'action-done')    { startActionEval(el.dataset.actionId); return; }
  if (act === 'action-skip') {
    state.actionLogs.push({
      id: uid(), actionId: el.dataset.actionId, rating: 0, comment: 'スキップ', createdAt: new Date().toISOString()
    });
    saveState();
    toast('今日はスキップ。明日また。');
    render();
    return;
  }
  if (act === 'action-talk') { moyamoya = { step: 1 }; go('moyamoya'); return; }
  if (act === 'action-change') {
    if (confirm('別のアクションに変更しますか？')) {
      const a = activeAction();
      if (a) a.status = 'inactive';
      saveState();
      go('action-select');
    }
    return;
  }
  if (act === 'eval-rating') { evalRating = Number(el.dataset.rating); render(); return; }
  if (act === 'eval-save')   { saveActionEval(); return; }

  // きろくサブタブ
  if (act === 'record-sub') {
    state.ui.recordSubtab = el.dataset.sub;
    saveState();
    render();
    return;
  }
  if (act === 'day-detail') { viewParams.dateKey = el.dataset.date; go('day-detail'); return; }
  if (act === 'kiroku-detail') { viewParams.recordId = el.dataset.recordId; go('kiroku-detail'); return; }
  if (act === 'kiroku-chat')   { viewParams.chatId = el.dataset.chatId;     go('kiroku-chat');   return; }
  if (act === 'view-kiroku-letter') { viewParams.recordId = el.dataset.recordId; go('kiroku-letter'); return; }
  if (act === 'kiroku-ippo')   { viewParams.ippoId  = el.dataset.ippoId;   go('kiroku-ippo');   return; }
  if (act === 'open-distortions') { go('kiroku-distortions'); return; }
  if (act === 'open-trend') { go('kiroku-trend'); return; }
  if (act === 'open-radar') { go('kiroku-radar'); return; }
  if (act === 'open-ai-analysis') { go('kiroku-ai-analysis'); return; }
  if (act === 'open-action') { go('action'); return; }
  if (act === 'record-filter') {
    state.ui.recordFilter = el.dataset.filter;
    saveState();
    render();
    return;
  }
  if (act === 'cal-prev-month') {
    state.ui.calendarMonthOffset = (state.ui.calendarMonthOffset || 0) - 1;
    saveState();
    render();
    return;
  }
  if (act === 'cal-next-month') {
    const next = (state.ui.calendarMonthOffset || 0) + 1;
    if (next > 0) return; // 未来の月は不可
    state.ui.calendarMonthOffset = next;
    saveState();
    render();
    return;
  }
  if (act === 'report-graph-tab') {
    state.ui.reportGraphTab = el.dataset.graphTab;
    saveState();
    render();
    return;
  }

  // 設定
  // きょうのいっぽ（v0.9.2 仕様書準拠 Steps 0-6）
  // P8 〜: キャンセル/戻るは いっぽタブ内のベース画面に戻る (旧: ホームへ)
  if (act === 'ippo-cancel') { ippoToday = null; render(); return; }
  if (act === 'ippo-onboarding-start') {
    ippoToday = { step: 0, startedAt: new Date().toISOString() };
    render();
    return;
  }
  // 新しい1日画面 → 通常フロー開始 (v0.9.40 〜 必ず Step 0)
  if (act === 'ippo-newday-start') {
    ippoToday = { step: 0, startedAt: new Date().toISOString() };
    render();
    return;
  }
  // 新しい1日画面のおすすめカード直接タップ (v0.9.40 〜 Step 0 から方向選択)
  if (act === 'ippo-newday-pick-rec') {
    ippoToday = { step: 0, startedAt: new Date().toISOString(), preselectedActionId: el.dataset.actionId };
    render();
    return;
  }
  // 「もう一歩やる」 (v0.9.40 〜 必ず Step 0 から)
  if (act === 'ippo-do-another') {
    ippoToday = { step: 0, startedAt: new Date().toISOString() };
    render();
    return;
  }
  // 「行動を選ぶ」画面を開く (P7・v0.9.45 〜)
  if (act === 'ippo-open-picker') {
    ippoToday = { step: 99, pickerTab: 'recommend', startedAt: new Date().toISOString() };
    render();
    return;
  }
  // ベース画面: 最近よくやっているいっぽの「履歴を見る」 (P8)
  if (act === 'ippo-recent-history') {
    ippoToday = { step: 99, pickerTab: 'history', startedAt: new Date().toISOString() };
    render();
    return;
  }
  // ベース画面: 「なぜこれをおすすめするの？」 (P8 軽量実装: 一旦トースト)
  if (act === 'ippo-rec-why') {
    toast('過去の方向選択と実施履歴から、いま合いそうな行動を提案しています');
    return;
  }
  // ベース画面: 習慣を追加/編集 → ピッカーを習慣選択モードで開く (P8)
  if (act === 'ippo-base-add-habit') {
    ippoToday = { step: 99, pickerTab: 'recommend', startedAt: new Date().toISOString(), habitMode: true };
    render();
    return;
  }
  // 行動の習慣 ON/OFF トグル (P8)
  if (act === 'ippo-toggle-habit') {
    const actionId = el.dataset.actionId;
    if (!actionId) return;
    if (!Array.isArray(state.user.habitActionIds)) state.user.habitActionIds = [];
    const idx = state.user.habitActionIds.indexOf(actionId);
    if (idx >= 0) {
      state.user.habitActionIds.splice(idx, 1);
      // 関連ログも削除
      state.habitLogs = (state.habitLogs || []).filter(l => l.habitId !== actionId);
      toast('習慣から外しました');
    } else {
      state.user.habitActionIds.push(actionId);
      toast('習慣に追加しました 🌱');
    }
    saveState();
    render();
    return;
  }

  // ============================================================
  // 習慣詳細 (P8.1 v0.9.47 〜)
  // ============================================================
  if (act === 'ippo-habit-tap') {
    const id = el.dataset.habitId;
    if (!id) return;
    habitView = { habitId: id, mode: 'today', monthOffset: 0 };
    render();
    return;
  }
  if (act === 'ippo-habit-back') {
    habitView = null;
    render();
    return;
  }
  if (act === 'ippo-habit-mode') {
    if (!habitView) return;
    habitView.mode = el.dataset.mode || 'today';
    if (habitView.mode === 'calendar') habitView.monthOffset = 0;
    render();
    return;
  }
  if (act === 'ippo-habit-mark') {
    const id = el.dataset.habitId;
    if (!id) return;
    if (markHabitDoneToday(id)) {
      saveState();
      toast('今日のいっぽを記録しました 🌱');
    }
    render();
    return;
  }
  if (act === 'ippo-habit-unmark') {
    const id = el.dataset.habitId;
    if (!id) return;
    unmarkHabitToday(id);
    saveState();
    toast('チェックを取り消しました');
    render();
    return;
  }
  if (act === 'ippo-habit-cal-prev') {
    if (habitView) { habitView.monthOffset = (habitView.monthOffset || 0) - 1; render(); }
    return;
  }
  if (act === 'ippo-habit-cal-next') {
    if (habitView) {
      const cur = habitView.monthOffset || 0;
      if (cur < 0) { habitView.monthOffset = cur + 1; render(); }
    }
    return;
  }
  if (act === 'ippo-habit-edit-save') {
    const id = el.dataset.habitId;
    if (!id) return;
    const custom = (state.customHabits || []).find(h => h.id === id);
    if (!custom) return;
    const name = (document.getElementById('habit-edit-name') || {}).value || '';
    const duration = (document.getElementById('habit-edit-duration') || {}).value || '';
    const timing = (document.getElementById('habit-edit-timing') || {}).value || '';
    const icon = (document.getElementById('habit-edit-icon') || {}).value || '🌱';
    if (!name.trim()) { toast('行動名を入力してください'); return; }
    custom.name = name.trim();
    custom.duration = duration.trim();
    custom.timing = timing.trim();
    custom.icon = icon.trim() || '🌱';
    saveState();
    toast('保存しました');
    if (habitView) habitView.mode = 'today';
    render();
    return;
  }
  if (act === 'ippo-habit-delete') {
    const id = el.dataset.habitId;
    if (!id) return;
    if (!confirm('この習慣を削除しますか？\n（記録された達成ログも削除されます）')) return;
    deleteHabit(id);
    saveState();
    habitView = null;
    toast('削除しました');
    render();
    return;
  }
  if (act === 'ippo-habit-create-submit') {
    const name = (document.getElementById('habit-create-name') || {}).value || '';
    const duration = (document.getElementById('habit-create-duration') || {}).value || '';
    const timing = (document.getElementById('habit-create-timing') || {}).value || '';
    const icon = (document.getElementById('habit-create-icon') || {}).value || '🌱';
    if (!name.trim()) { toast('行動名を入力してください'); return; }
    if (!Array.isArray(state.customHabits)) state.customHabits = [];
    state.customHabits.push({
      id: 'ch_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
      name: name.trim(),
      duration: duration.trim(),
      timing: timing.trim(),
      icon: icon.trim() || '🌱',
      createdAt: new Date().toISOString(),
    });
    saveState();
    toast('習慣を追加しました 🌱');
    ippoToday = null;
    render();
    return;
  }
  // ピッカーのサブタブ切替 (P7)
  if (act === 'ippo-picker-tab') {
    if (ippoToday) {
      ippoToday.pickerTab = el.dataset.tab || 'recommend';
      render();
    }
    return;
  }
  // ピッカーで行動選択 → preselectedActionId を持って Step 0 から開始 (P7)
  if (act === 'ippo-picker-pick') {
    const actionId = el.dataset.actionId;
    if (!actionId) return;
    ippoToday = { step: 0, preselectedActionId: actionId, startedAt: new Date().toISOString() };
    render();
    return;
  }
  // ピッカーから戻る → ベース画面 / NewDay へ (P7)
  if (act === 'ippo-picker-back') {
    ippoToday = null;
    render();
    return;
  }
  if (act === 'ippo-todaydone-share') {
    const last = ippoCompletedToday();
    if (!last) return;
    const action = ACTIONS.find(a => a.id === last.actionId);
    const text = `きょうのいっぽ\n${action?.title || ''}\n${last.beforeIntensity}/10 → ${last.afterIntensity}/10`;
    if (navigator.share) navigator.share({ title: 'きょうのいっぽ', text }).catch(() => {});
    else if (navigator.clipboard) navigator.clipboard.writeText(text).then(() => toast('コピーしました'));
    return;
  }
  if (act === 'ippo-back') {
    if (ippoToday) ippoToday.step = parseInt(el.dataset.to, 10) || 1;
    render();
    return;
  }
  if (act === 'ippo-restart') {
    ippoToday = { step: 0, startedAt: new Date().toISOString() };
    render();
    return;
  }
  if (act === 'ippo-change-direction') {
    if (ippoToday) {
      ippoToday.step = 0;
      // 既存選択を引き継いで再編集できるよう directionIds はそのまま残す
      ippoToday.candidates = null;  // 推薦再計算
    }
    render();
    return;
  }
  // Step 0: 方向選択 (v0.9.40 〜 複数選択トグル)
  if (act === 'ippo-step0-toggle') {
    if (!ippoToday) return;
    if (!Array.isArray(ippoToday.directionIds)) ippoToday.directionIds = [];
    const id = el.dataset.direction;
    const idx = ippoToday.directionIds.indexOf(id);
    if (idx >= 0) ippoToday.directionIds.splice(idx, 1);
    else ippoToday.directionIds.push(id);
    render();
    return;
  }
  if (act === 'ippo-step0-next') {
    if (!ippoToday || !Array.isArray(ippoToday.directionIds) || ippoToday.directionIds.length === 0) {
      toast('1つ以上選んでね');
      return;
    }
    // 永続化 (今後の NewDay 等で前回値として参照)
    state.user.directionIds = ippoToday.directionIds.slice();
    delete state.user.direction;  // 旧5択は廃止
    saveState();
    // moodLabel/Intensity は既存推薦エンジン互換のためデフォルト値で埋める
    if (!ippoToday.moodLabel) ippoToday.moodLabel = 'なんとなく';
    if (ippoToday.moodIntensity == null) ippoToday.moodIntensity = 5;
    ippoToday.candidates = null;  // 推薦再計算
    ippoToday.step = 2;
    render();
    return;
  }
  // ====== 新5ステップフロー（v0.9.13） ======
  // Step 1: 気分 + 強さ
  if (act === 'ippo-step1-mood') {
    if (ippoToday) ippoToday.moodLabel = el.dataset.mood;
    render();
    return;
  }
  if (act === 'ippo-step1-int') {
    if (ippoToday) ippoToday.moodIntensity = parseInt(el.dataset.score, 10);
    render();
    return;
  }
  if (act === 'ippo-step1-next') {
    if (!ippoToday || !ippoToday.moodLabel) { toast('気分を選んでね'); return; }
    if (ippoToday.moodIntensity == null) ippoToday.moodIntensity = 5;
    ippoToday.candidates = null;  // 推薦再計算
    ippoToday.step = 2;
    render();
    return;
  }
  // Step 2: 推薦
  if (act === 'ippo-step2-pick') {
    if (ippoToday) ippoToday.selectedActionId = el.dataset.actionId;
    render();
    return;
  }
  if (act === 'ippo-step2-more') {
    if (ippoToday) ippoToday.candidatesShown = Math.min(5, (ippoToday.candidatesShown || 3) + 2);
    render();
    return;
  }
  if (act === 'ippo-step2-dur') {
    if (ippoToday) {
      ippoToday.durationPref = el.dataset.dur;
      ippoToday.candidates = null;
      ippoToday.candidatesShown = 3;
    }
    render();
    return;
  }
  if (act === 'ippo-step2-next') {
    if (!ippoToday || !ippoToday.selectedActionId) { toast('いっぽを選んでね'); return; }
    ippoToday.step = 3;
    render();
    return;
  }
  // Step 3: いまやる / あとでやる
  if (act === 'ippo-step3-now') {
    if (!ippoToday || !ippoToday.selectedActionId) return;
    ippoToday.beforeIntensity = ippoToday.moodIntensity;
    ippoToday.timerStartedAt = new Date().toISOString();
    ippoToday.step = 35;  // v0.9.41 〜 タイマー画面 (準備中) を経由
    render();
    return;
  }
  // タイマー画面: 終わったよ → Step 4 (変化記録)
  if (act === 'ippo-timer-done') {
    if (!ippoToday) return;
    ippoToday.timerEndedAt = new Date().toISOString();
    ippoToday.step = 4;
    render();
    return;
  }
  if (act === 'ippo-step3-later') {
    if (!ippoToday || !ippoToday.selectedActionId) return;
    // 保留に追加
    state.ippoPending = state.ippoPending || [];
    state.ippoPending.push({
      id: uid(),
      actionId: ippoToday.selectedActionId,
      moodLabel: ippoToday.moodLabel,
      moodIntensity: ippoToday.moodIntensity,
      directionIds: (ippoToday.directionIds || []).slice(),
      savedAt: new Date().toISOString(),
    });
    saveState();
    toast('「あとでやる」に保存しました');
    // 完了済セッションがあれば todayDone、なければホームへ
    ippoToday = null;
    if (ippoCompletedToday()) render();
    else go('home');
    return;
  }
  // Step 4: 5択定性評価 (v0.9.42 〜)
  if (act === 'ippo-step4-eval') {
    if (!ippoToday) return;
    const ev = IPPO_EVALUATIONS.find(x => x.id === el.dataset.eval);
    if (!ev) return;
    ippoToday.evaluation = { id: ev.id, value: ev.value, label: ev.label };
    render();
    return;
  }
  if (act === 'ippo-step4-next') {
    if (!ippoToday) return;
    if (!ippoToday.evaluation) { toast('感情の変化を選んでね'); return; }
    // session 保存 (Step 45 やったね 遷移時)
    if (!ippoToday.savedAtSummary) {
      const c = ippoToday.candidates?.find(x => x.action.id === ippoToday.selectedActionId);
      const sessionDirIds = (ippoToday.directionIds || getDirectionIds()).slice();
      const ev = ippoToday.evaluation;
      // 後方互換: changeValue を value にマッピング (推薦エンジン pastEffect 互換)
      // before=5 固定・after = 5 - value (clamp 0..10) で旧 0-10 スケールも埋める
      const cv = ev.value;
      const beforeI = 5;
      const afterI = Math.max(0, Math.min(10, 5 - cv));
      state.ippoSessions.push({
        id: uid(),
        moodLabel: ippoToday.moodLabel,
        moodIntensity: ippoToday.moodIntensity,
        directionIds: sessionDirIds,
        directionId: sessionDirIds[0] || null,  // 後方互換
        actionId: ippoToday.selectedActionId,
        score: c?.score.total || null,
        reasons: c?.reasons || [],
        evaluation: ev,            // 新フィールド (v0.9.42 〜)
        changeValue: cv,           // 後方互換: 推薦エンジン pastEffect で使用
        beforeIntensity: beforeI,  // 後方互換 (旧 0-10 スケール)
        afterIntensity: afterI,    // 後方互換
        startedAt: ippoToday.startedAt,
        timerStartedAt: ippoToday.timerStartedAt,
        timerEndedAt: ippoToday.timerEndedAt,
        completedAt: new Date().toISOString(),
      });
      // 保留から消す（再開していた場合）
      if (ippoToday.resumedPendingId) {
        state.ippoPending = (state.ippoPending || []).filter(p => p.id !== ippoToday.resumedPendingId);
      }
      saveState();
      if (window.MoyaLogger) MoyaLogger.event('ippo_completed', {
        evaluation: ev,
        changeValue: cv,
        actionId: ippoToday.selectedActionId,
        directionIds: sessionDirIds,
      });
      ippoToday.savedAtSummary = true;
    }
    // セッション保存後はベース画面 (viewIppoTodayDone) を直接表示
    ippoToday = null;
    toast('いっぽを記録しました');
    render();
    return;
  }
  // ベース画面: おすすめの一歩を直接やる → Step 0 から開始 (action 事前選択)
  if (act === 'ippo-base-do-rec') {
    const actionId = el.dataset.actionId;
    ippoToday = { step: 0, startedAt: new Date().toISOString(), preselectedActionId: actionId };
    render();
    return;
  }
  // ベース画面: きづきタブへ
  if (act === 'ippo-base-go-kizuki') { go('kizuki'); return; }
  // 保留からの再開: Step 3 から
  if (act === 'ippo-resume-pending') {
    const pid = el.dataset.pendingId;
    const p = (state.ippoPending || []).find(x => x.id === pid);
    if (!p) return;
    // 保留時の文脈を再構築。candidates にはこの行動だけ入れて Step 3 から
    const action = ACTIONS.find(a => a.id === p.actionId);
    if (!action) return;
    const pDirIds = (Array.isArray(p.directionIds) && p.directionIds.length > 0)
      ? p.directionIds : (p.directionId ? [p.directionId] : []);
    const score = scoreAction(action, {
      moodLabel: p.moodLabel || 'なんとなく',
      intensity: p.moodIntensity == null ? 5 : p.moodIntensity,
      directionIds: pDirIds,
      durationPref: '1min',
      history: state.ippoSessions || [],
    });
    const reasons = generateActionReasons(action, score, {
      moodLabel: p.moodLabel || 'なんとなく',
      history: state.ippoSessions || [],
    });
    ippoToday = {
      step: 3,
      moodLabel: p.moodLabel || 'なんとなく',
      moodIntensity: p.moodIntensity == null ? 5 : p.moodIntensity,
      directionIds: pDirIds,
      candidates: [{ action, score, reasons }],
      selectedActionId: p.actionId,
      resumedPendingId: p.id,
      startedAt: new Date().toISOString(),
    };
    render();
    return;
  }
  // 深掘り（v0.9.1）
  if (act === 'dd-start') {
    deepDive = { step: 1, deeper: ['', '', ''], depthLevel: 0, startedAt: new Date().toISOString() };
    go('deepdive');
    return;
  }
  // きづきタブから下向き矢印法を起動
  if (act === 'kizuki-open-deepdive') {
    deepDive = { step: 1, deeper: ['', '', ''], depthLevel: 0, startedAt: new Date().toISOString(), from: 'kizuki' };
    go('deepdive');
    return;
  }
  // きづきタブ: ワーク一覧へ
  if (act === 'kizuki-see-all') { go('kizuki-list'); return; }
  // きづきタブ: 一覧→トップへ戻る
  if (act === 'kizuki-list-back') { go('kizuki'); return; }
  // きづきタブ: フィルタ切替
  if (act === 'kizuki-filter') {
    kizukiFilter = el.dataset.filter || 'all';
    render();
    return;
  }
  // きづきタブ: 未実装ワーク (Phase 3 で実装予定)
  if (act === 'kizuki-coming-soon') {
    toast('このワークはまもなく実装予定です 🌱');
    return;
  }
  if (act === 'dd-cancel') {
    const backTo = (deepDive && deepDive.from) || 'record';
    deepDive = null;
    go(backTo);
    return;
  }
  if (act === 'dd-back') {
    if (deepDive) {
      const to = parseInt(el.dataset.to, 10) || 1;
      deepDive.step = to;
      if (to === 4 && deepDive.depthLevel > 0) deepDive.depthLevel -= 1;
    }
    render();
    return;
  }
  if (act === 'dd-step1-pick') {
    if (deepDive) deepDive.themeType = el.dataset.theme;
    render();
    return;
  }
  if (act === 'dd-step1-next') {
    if (!deepDive || !deepDive.themeType) { toast('テーマを選んでね'); return; }
    deepDive.step = 2;
    render();
    return;
  }
  if (act === 'dd-step2-next') {
    const v = (document.getElementById('ddEventInput') || {}).value || '';
    if (!v.trim()) { toast('気になる出来事を書いてみて'); return; }
    if (!deepDive) return;
    deepDive.event = v.trim();
    const c = detectCrisis(v);
    if (c && c.sev >= 4) { showCrisisModal(c.sev); return; }
    deepDive.step = 3;
    render();
    return;
  }
  if (act === 'dd-step3-next') {
    const v = (document.getElementById('ddFirstThoughtInput') || {}).value || '';
    if (!v.trim()) { toast('その時の考えを書いてみて'); return; }
    if (!deepDive) return;
    deepDive.firstThought = v.trim();
    deepDive.depthLevel = 0;
    deepDive.step = 4;
    render();
    return;
  }
  if (act === 'dd-step4-deeper' || act === 'dd-step4-stop') {
    const v = (document.getElementById('ddDeeperInput') || {}).value || '';
    if (!v.trim()) { toast('言葉にしてみよう（短くてOK）'); return; }
    if (!deepDive) return;
    deepDive.deeper[deepDive.depthLevel] = v.trim();
    if (act === 'dd-step4-deeper' && deepDive.depthLevel < 2) {
      deepDive.depthLevel += 1;
      render();
    } else {
      deepDive.step = 5;
      render();
    }
    return;
  }
  if (act === 'dd-step5-conf') {
    if (deepDive) deepDive.confidence = parseInt(el.dataset.score, 10);
    // 入力中のテキストを保持
    if (deepDive) {
      deepDive.coreBelief = (document.getElementById('ddCoreBeliefInput') || {}).value || deepDive.coreBelief || '';
      deepDive.beliefSince = (document.getElementById('ddSinceInput') || {}).value || deepDive.beliefSince || '';
    }
    render();
    return;
  }
  if (act === 'dd-step5-next') {
    if (!deepDive) return;
    const cb = (document.getElementById('ddCoreBeliefInput') || {}).value || '';
    const sn = (document.getElementById('ddSinceInput') || {}).value || '';
    if (!cb.trim()) { toast('コア信念を1行で書いてみよう'); return; }
    deepDive.coreBelief = cb.trim();
    deepDive.beliefSince = sn.trim();
    if (deepDive.confidence == null) deepDive.confidence = 5;
    // AI抽出（バックグラウンド、フォールバックあり）
    deepDive.step = 6;
    deepDive.extractedBelief = deepDive.coreBelief;
    deepDive.tags = ['抽出中...'];
    deepDive.gentleReflection = '';
    deepDive.aiUsed = false;
    render();
    const sessionRef = deepDive;
    extractCoreBeliefAI(sessionRef).then(result => {
      if (deepDive !== sessionRef) return;
      if (result) {
        sessionRef.extractedBelief = result.extractedBelief;
        sessionRef.tags = result.tags || [];
        sessionRef.gentleReflection = result.gentleReflection;
        sessionRef.aiUsed = true;
      } else {
        const r = extractCoreBeliefRule(sessionRef);
        sessionRef.extractedBelief = r.extractedBelief;
        sessionRef.tags = r.tags;
        sessionRef.gentleReflection = r.gentleReflection;
        sessionRef.aiUsed = false;
      }
      render();
    });
    return;
  }
  if (act === 'dd-save') {
    if (!deepDive) return;
    state.deepDiveSessions.push({
      id: uid(),
      themeType: deepDive.themeType,
      event: deepDive.event,
      firstThought: deepDive.firstThought,
      deeper: deepDive.deeper,
      coreBelief: deepDive.coreBelief,
      beliefSince: deepDive.beliefSince,
      confidence: deepDive.confidence,
      extractedBelief: deepDive.extractedBelief,
      tags: deepDive.tags || [],
      gentleReflection: deepDive.gentleReflection || '',
      aiUsed: !!deepDive.aiUsed,
      startedAt: deepDive.startedAt,
      completedAt: new Date().toISOString(),
    });
    // タグ集計の更新
    (deepDive.tags || []).forEach(tagCode => {
      const existing = state.coreBeliefTags.find(t => t.tagCode === tagCode);
      if (existing) {
        existing.confidence = Math.min(1, (existing.confidence || 0) + 0.15);
        existing.updatedAt = new Date().toISOString();
      } else {
        state.coreBeliefTags.push({
          id: uid(),
          tagCode,
          confidence: 0.4,
          updatedAt: new Date().toISOString(),
        });
      }
    });
    saveState();
    if (window.MoyaLogger) MoyaLogger.event('deepdive_saved', { tags: deepDive.tags || [], theme: deepDive.themeType });
    const backTo = deepDive.from || 'record';
    deepDive = null;
    toast('深掘りを保存しました');
    go(backTo);
    return;
  }
  if (act === 'ippo-save-then-dd') {
    // 先に ippo を保存してから深掘りへ
    if (ippoToday) {
      const c = ippoToday.candidates?.find(x => x.action.id === ippoToday.selectedActionId);
      const sessionDirIds = (ippoToday.directionIds || getDirectionIds()).slice();
      state.ippoSessions.push({
        id: uid(),
        moodLabel: ippoToday.moodLabel,
        moodIntensity: ippoToday.moodIntensity,
        directionIds: sessionDirIds,
        directionId: sessionDirIds[0] || null,
        actionId: ippoToday.selectedActionId,
        score: c?.score.total || null,
        reasons: c?.reasons || [],
        beforeIntensity: ippoToday.beforeIntensity,
        afterIntensity: ippoToday.afterIntensity,
        changeValue: ippoToday.beforeIntensity - ippoToday.afterIntensity,
        startedAt: ippoToday.startedAt,
        completedAt: new Date().toISOString(),
      });
      saveState();
    }
    ippoToday = null;
    deepDive = { step: 1, deeper: ['', '', ''], depthLevel: 0, startedAt: new Date().toISOString() };
    go('deepdive');
    return;
  }

  if (act === 'ippo-save') {
    if (!ippoToday) return;
    const c = ippoToday.candidates?.find(x => x.action.id === ippoToday.selectedActionId);
    const sessionDirIds = (ippoToday.directionIds || getDirectionIds()).slice();
    state.ippoSessions.push({
      id: uid(),
      moodLabel: ippoToday.moodLabel,
      moodIntensity: ippoToday.moodIntensity,
      directionIds: sessionDirIds,
      directionId: sessionDirIds[0] || null,
      actionId: ippoToday.selectedActionId,
      score: c?.score.total || null,
      reasons: c?.reasons || [],
      beforeIntensity: ippoToday.beforeIntensity,
      afterIntensity: ippoToday.afterIntensity,
      changeValue: ippoToday.beforeIntensity - ippoToday.afterIntensity,
      startedAt: ippoToday.startedAt,
      completedAt: new Date().toISOString(),
    });
    saveState();
    if (window.MoyaLogger) MoyaLogger.event('ippo_completed', {
      moodLabel: ippoToday.moodLabel,
      changeValue: ippoToday.beforeIntensity - ippoToday.afterIntensity,
      actionId: ippoToday.selectedActionId,
      directionIds: sessionDirIds,
    });
    ippoToday = null;
    toast('いっぽを記録しました');
    go('home');
    return;
  }

  if (act === 'open-settings') { modal(viewSettingsModal()); return; }
  if (act === 'open-suplan-info') {
    modal(viewSuplanInfoModal(), 'suplan-info-modal-card');
    // × ボタンはモーダル外（modal-bg 直下）に注入してスクロールから切り離す
    const m = document.getElementById('modal');
    let outside = m.querySelector('.suplan-info-close-outside');
    if (!outside) {
      outside = document.createElement('button');
      outside.className = 'suplan-info-close-outside';
      outside.dataset.act = 'close-modal';
      outside.setAttribute('aria-label', '閉じる');
      outside.textContent = '×';
      m.appendChild(outside);
    }
    return;
  }
  if (act === 'open-ai-prompts') { modal(viewAIPromptsModal()); return; }
  if (act === 'open-feedback') {
    state.ui.feedbackCategory = state.ui.feedbackCategory || 'request';
    state.ui.feedbackDraft = '';
    modal(viewFeedbackModal(false));
    return;
  }
  if (act === 'feedback-cat') {
    // 入力中の文字列を退避してから再描画（textareaの内容を保持）
    const ta = document.getElementById('feedbackText');
    if (ta) state.ui.feedbackDraft = ta.value || '';
    state.ui.feedbackCategory = el.dataset.cat || 'request';
    modal(viewFeedbackModal(false));
    return;
  }
  if (act === 'feedback-submit') {
    const ta = document.getElementById('feedbackText');
    const text = ((ta && ta.value) || '').trim();
    if (!text) { toast('内容を入力してください'); return; }
    if (text.length > 4000) { toast('長すぎます（4000文字以内）'); return; }
    const cat = state.ui.feedbackCategory || 'request';
    try {
      if (window.MoyaLogger && typeof window.MoyaLogger.event === 'function') {
        window.MoyaLogger.event('feedback', {
          category: cat,
          text: text,
          screen: 'settings',
          submitted_at: new Date().toISOString()
        });
      }
    } catch (e) {
      console.warn('feedback送信エラー:', e);
    }
    state.ui.feedbackDraft = '';
    modal(viewFeedbackModal(true));
    return;
  }
  if (act === 'ai-prompt-expand') {
    modal(viewAIPromptsModal(el.dataset.promptId));
    return;
  }
  if (act === 'ai-prompt-collapse') {
    modal(viewAIPromptsModal());
    return;
  }
  if (act === 'ai-prompt-copy') {
    const p = AI_PROMPTS[el.dataset.promptId];
    if (!p) return;
    const text = aiPromptToCopyText(p);
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(
        () => toast(`「${p.title}」をコピーしました`),
        () => toast('コピーに失敗しました')
      );
    } else {
      toast('クリップボードAPIが使えません');
    }
    return;
  }
  if (act === 'ai-prompt-copy-all') {
    const all = Object.keys(AI_PROMPTS).map(id => aiPromptToCopyText(AI_PROMPTS[id])).join('\n\n---\n\n');
    if (navigator.clipboard) {
      navigator.clipboard.writeText(all).then(
        () => toast('全プロンプトをコピーしました'),
        () => toast('コピーに失敗しました')
      );
    } else {
      toast('クリップボードAPIが使えません');
    }
    return;
  }
  if (act === 'api-key-save') {
    const v = (document.getElementById('apiKeyInput')||{}).value || '';
    const trimmed = v.trim();
    if (!trimmed) { toast('キーを入力してください'); return; }
    if (!trimmed.startsWith('AIza')) {
      if (!confirm('"AIza" で始まらないキーのようです。それでも保存しますか？')) return;
    }
    state.preferences = state.preferences || {};
    state.preferences.geminiApiKey = trimmed;
    saveState();
    toast('APIキーを保存しました');
    closeModal();
    setTimeout(() => modal(viewSettingsModal()), 50);
    return;
  }
  if (act === 'api-key-edit') {
    state.preferences = state.preferences || {};
    delete state.preferences.geminiApiKey;
    saveState();
    closeModal();
    setTimeout(() => modal(viewSettingsModal()), 50);
    return;
  }
  if (act === 'api-key-clear') {
    if (!confirm('APIキーを削除しますか？AI応答はパターン応答に戻ります。')) return;
    state.preferences = state.preferences || {};
    delete state.preferences.geminiApiKey;
    saveState();
    toast('APIキーを削除しました');
    closeModal();
    setTimeout(() => modal(viewSettingsModal()), 50);
    return;
  }
  if (act === 'reset-data') {
    if (confirm('本当にすべてのデータを削除しますか？元に戻せません。')) {
      localStorage.removeItem(STORAGE_KEY);
      localStorage.removeItem(STORAGE_KEY_V2);
      localStorage.removeItem('aside_user_id');
      localStorage.removeItem('aside_session_id');
      localStorage.removeItem('aside_consent_version');
      localStorage.removeItem('aside_user_row_created');
      location.reload();
    }
    return;
  }

  // 互換用ダミー
  if (act === 'crisis-close') { closeModal(); return; }

  console.warn('未定義 act:', act);
}

// 互換用: 一部ロガーから呼ばれる可能性のため残置
function endDialog() { moodChatSession = null; goalChat = null; go('home'); }

// ============================================================
// 起動
// ============================================================
document.addEventListener('click', (e) => {
  const target = e.target.closest('[data-act]');
  if (target) {
    handleAction(target.dataset.act, target, e);
  }

  const tab = e.target.closest('[data-tab]');
  if (tab) {
    const t = tab.dataset.tab;
    if (t === 'home')   go('home');
    if (t === 'action') go('action');
    if (t === 'kizuki') go('kizuki');
    if (t === 'record') go('record');
  }
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    const id = document.activeElement?.id;
    if (id === 'moodChatInput') { e.preventDefault(); moodChatSend(); }
    if (id === 'goalChatInput') { e.preventDefault(); goalChatSend(); }
  }
});

// 初期化
function init() {
  // 利用日数カウント
  if (state.user.createdAt) {
    state.user.daysUsed = Math.floor((Date.now() - state.user.createdAt) / 86400000) + 1;
    saveState();
  }

  // ビジュアルテーマ初期適用 + 定期チェック
  applyVisualTheme();
  setInterval(() => {
    const before = document.documentElement.getAttribute('data-theme');
    applyVisualTheme();
    const after = document.documentElement.getAttribute('data-theme');
    if (before !== after) render();   // 切替時に再描画（mood絵文字差替）
  }, 60_000);

  // ヒーロー画像の存在を確認（無ければ CSS フォールバック）
  probeHeroImage();
  probeConsentDecorDark();
  probeWelcomeDark();

  // MoyaLogger 初期化
  if (window.MoyaLogger) {
    MoyaLogger.init();
  }

  // ルーティング判定 (v0.9.8: 5ステップ刷新)
  if (!state.consent.given) {
    go('welcome');
  } else if (!state.user.createdAt) {
    go('nickname');
  } else if (!state.user.profileDone) {
    go('profile');
  } else if (!state.guidedShown) {
    go('guide');
  } else {
    go('home');
  }
}

// Service Worker 登録（PWA）
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js').catch(err => {
      console.warn('[もやの森] SW registration failed:', err && err.message);
    });
  });
}

init();

</script>
</body>
