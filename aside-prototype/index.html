}

.rescue-step-indicator {
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.08em;
  margin-bottom: 12px;
}
.rescue-prompt {
  font-family: 'Noto Serif JP', serif;
  font-size: 18px;
  color: var(--text);
  line-height: 1.7;
  margin-bottom: 20px;
}
.rescue-choices {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.rescue-choice-btn {
  padding: 16px 18px;
  background: var(--bg-card);
  border: 1.5px solid var(--accent-soft);
  border-radius: var(--r-md);
  font-family: inherit;
  font-size: 14px;
  color: var(--text);
  cursor: pointer;
  text-align: left;
  transition: all .15s var(--ease);
}
.rescue-choice-btn:active { transform: scale(0.98); background: var(--accent-soft); }
.rescue-response {

}

// ===== Forest growth system v2 (31 days, 7 stages) =====
const FOREST_STAGE_NAMES = {
  1: 'はじまりの土',
  2: '芽吹き',
  3: '若草の野',
  4: '木立のはじまり',
  5: '小さな森',
  6: '水辺の森',
  7: '静かな森'
};

function calcForestStage(day) {
  if (day >= 28) return 7;
  if (day >= 23) return 6;
  if (day >= 18) return 5;
  if (day >= 13) return 4;
  if (day >= 8)  return 3;
  if (day >= 4)  return 2;
  return 1;
}

function nextStageDaysAway(day) {
  const thresholds = [4, 8, 13, 18, 23, 28, 31];
  for (const t of thresholds) if (day < t) return t - day;
  return 0;
}

function newForest() {
  return {
    checkinDays: 0,
    lastCheckinDate: null,
    startedAt: Date.now(),
    completedAt: null
  };
}

function addForestCheckin() {
  if (!state.forest) state.forest = newForest();
  const today = todayKey();
  if (state.forest.lastCheckinDate === today) {
    return { gained: 0, stageChanged: false, day: state.forest.checkinDays };
  }
  const prevStage = calcForestStage(state.forest.checkinDays || 0);
  state.forest.checkinDays = Math.min(31, (state.forest.checkinDays || 0) + 1);
  state.forest.lastCheckinDate = today;
  const newStage = calcForestStage(state.forest.checkinDays);
  if (state.forest.checkinDays === 31 && !state.forest.completedAt) {
    state.forest.completedAt = Date.now();
  }
  saveState();
  return {
    gained: 1,
    stageChanged: newStage !== prevStage,
    day: state.forest.checkinDays
  };
}

// Greeting message type templates (fallback when no LLM)
const GREETING_TEMPLATES = {
  first_login_ever: [

};

function daysBetween(aKey, bKey) {
  return Math.round((new Date(bKey) - new Date(aKey)) / 86400000);
}

function getTimeBand() {
  const h = new Date().getHours();
  if (h >= 22 || h < 5) return 'night';
  if (h < 11) return 'morning';
  return 'afternoon';
}

function latestMoodBand() {
  if (!state.moods || state.moods.length === 0) return null;
  const m = [...state.moods].sort((a, b) => (b.checkedAt || 0) - (a.checkedAt || 0))[0];
  if (!m) return null;
  if (m.score <= 1) return 'very_low';
  if (m.score <= 2) return 'low';
  if (m.score >= 4) return 'good';
  return 'neutral';
}

function decideGreetingMessageType(ctx) {
  // Priority order per spec
  if (ctx.isFirstLoginEver) return 'first_login_ever';
  if (ctx.daysSinceLast !== null && ctx.daysSinceLast >= 3) return 'comeback_login';
  if (ctx.moodBand === 'very_low' || ctx.moodBand === 'low') return 'low_mood_login';
  if (ctx.streak >= 3) return 'streak_login';
  if (ctx.timeBand === 'night') return 'night_login';
  if (ctx.moodBand === 'good') return 'good_mood_login';
  return 'default_login';
}

function renderTemplate(tpl, ctx) {
  return tpl
    .replace('{name}', state.nickname || 'あなた')
    .replace('{streak}', String(ctx.streak || 1));
}

function pickTemplateGreeting(messageType, ctx) {
  const list = GREETING_TEMPLATES[messageType] || GREETING_TEMPLATES.default_login;
  const tpl = list[Math.floor(Math.random() * list.length)];
  return renderTemplate(tpl, ctx);
}

async function generateLlmGreeting(messageType, ctx) {
  if (!state.apiKey) return null;
  const profileCtx = buildProfileContext();
  const systemPrompt = `あなたはメンタルヘルスアプリのやさしい語り手。ユーザーにそっと一言かける。

【制約】
- 日本語、1〜2文、60文字以内
- やさしい、受容的、幼すぎない
- 医療判断・診断・強い断定は禁止
- ユーザーを責めない／不安を煽らない
- 説教・過度な励ましは禁止

【メッセージタイプ】${messageType}
【コンテキスト】
- ニックネーム: ${state.nickname || '不明'}
- 連続ログイン: ${ctx.streak}日
- 前回から: ${ctx.daysSinceLast === null ? '初回' : `${ctx.daysSinceLast}日ぶり`}
- 気分: ${ctx.moodBand || '不明'}
- 時間帯: ${ctx.timeBand}
- 森のステージ: ${ctx.forestStage}
- 話し相手ペルソナ: ${getCurrentPersona().name}
${profileCtx ? '\n' + profileCtx + '\n' : ''}
上記を踏まえ、静かでやわらかい一言を返してください。

【出力JSON】
{ "message": "..." }`;

  const model = state.apiModel || 'gemini-2.5-flash';
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(model)}:generateContent?key=${encodeURIComponent(state.apiKey)}`;
  const body = {
    systemInstruction: { parts: [{ text: systemPrompt }] },
    contents: [{ role: 'user', parts: [{ text: '今日の一言をお願い' }] }],
    generationConfig: {
      responseMimeType: 'application/json',
      responseSchema: {
        type: 'object',
        properties: { message: { type: 'string' } },
        required: ['message']
      },
      temperature: 0.85,
      maxOutputTokens: 400,
      thinkingConfig: { thinkingBudget: 0 }
    },
    safetySettings: [
      { category: 'HARM_CATEGORY_HARASSMENT', threshold: 'BLOCK_ONLY_HIGH' },
      { category: 'HARM_CATEGORY_HATE_SPEECH', threshold: 'BLOCK_ONLY_HIGH' },
      { category: 'HARM_CATEGORY_SEXUALLY_EXPLICIT', threshold: 'BLOCK_ONLY_HIGH' },
      { category: 'HARM_CATEGORY_DANGEROUS_CONTENT', threshold: 'BLOCK_ONLY_HIGH' }
    ]
  };
  try {
    const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    if (!res.ok) return null;
    const data = await res.json();
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
    if (!text) return null;
    const parsed = JSON.parse(text);
    return parsed.message || null;
  } catch (e) {
    console.warn('[Aside] LLM greeting failed:', e);
    return null;
  }
}

function dailyPetLogin() {
  if (!state.forest) state.forest = newForest();
  const today = todayKey();
  if (state.lastLoginDate === today) return { firstToday: false };

  const lastDate = state.lastLoginDate;
  const daysSinceLast = lastDate ? daysBetween(lastDate, today) : null;
  const isFirstLoginEver = !lastDate && (state.totalLoginDays || 0) === 0;

  state.lastLoginDate = today;
  state.totalLoginDays = (state.totalLoginDays || 0) + 1;
  // Note: ログインだけでは森を育てない（addForestCheckinは呼ばない）
  const result = { gained: 0 };

  // Determine greeting messageType
  const ctx = {
    isFirstLoginEver,
    daysSinceLast,
    streak: calcStreak() || 1,
    moodBand: latestMoodBand(),
    timeBand: getTimeBand(),
    forestStage: (state.forest ? calcForestStage(state.forest.checkinDays || 0) : 1)
  };
  const messageType = decideGreetingMessageType(ctx);
  const templateMsg = pickTemplateGreeting(messageType, ctx);
  state.currentSaying = templateMsg;
  state.currentSayingKind = messageType;

  // Log daily greeting
  if (!state.dailyGreetingLog) state.dailyGreetingLog = {};
  state.dailyGreetingLog[today] = {
    messageType,
    message: templateMsg,
    ctx,
    timestamp: Date.now(),
    source: 'template'
  };
  saveState();

  // Attempt LLM override in background
  if (state.apiKey) {
    generateLlmGreeting(messageType, ctx).then(msg => {
      if (msg && state.lastLoginDate === today) {
        state.currentSaying = msg;
        if (state.dailyGreetingLog[today]) {
          state.dailyGreetingLog[today].message = msg;
          state.dailyGreetingLog[today].source = 'llm';
        }
        saveState();
        if (App.currentScreen === 'goal') render();
      }
    });
  }

  return { firstToday: true, ...result, daysSinceLast, messageType };
}

function calcThisWeekCount() {
  if (!state.engagement || !state.engagement.dates) return 0;
  const now = new Date(todayKey());
  const monday = new Date(now);
  monday.setDate(now.getDate() - ((now.getDay() + 6) % 7));
  const keys = new Set(state.engagement.dates);
  let count = 0;
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    if (d > now) break;
    if (keys.has(d.toISOString().slice(0, 10))) count++;
  }
  return count;
}

  const customName = overrides[p.id];
  if (customName && customName.trim()) {

  }
  return { ...p, originalName: p.name };
}

function buildSystemPrompt(base) {
  const p = getCurrentPersona();
  const nick = (state.nickname || 'あなた').toString();
  const otherNames = ['ミナ','ケン','ハル','ノリ'].filter(n => n !== (p.originalName || p.name)).join('・');

  const nameHeader =
    `【あなたの名前】\n` +
    `あなたの名前は「${p.name}」です。自己紹介や発話の中でこの名前を一貫して使ってください。\n` +
    `ユーザーが別のペルソナ名（${otherNames}）であなたを呼んだ場合は、一度だけ柔らかく「自分の名前は${p.name}です」と訂正し、その後は相手の話を優先して通常通り会話を続けてください。訂正のために会話を止めたり、相手を責める言い方はしないこと。\n\n` +
    `【ユーザーについて】\n` +
    `このユーザーのニックネームは「${nick}」です。呼びかける時はこの名前を使い、別の名前で呼ばないでください。ニックネームは毎ターン参照してよいですが、1回の返答で2回以上連呼しないこと（自然さを保つため）。\n`;

  let addition = p.systemPromptAddition;
  if (p.originalName && p.name !== p.originalName) {
    addition += `\n\n【補足】ユーザーはあなたの名前を「${p.name}」に上書きしています。このカスタム名を優先してください（元の名前「${p.originalName}」は使わない）。`;
  }
  const profileContext = (typeof buildProfileContext === 'function') ? buildProfileContext() : '';
  const profileTail = profileContext ? '\n\n' + profileContext : '';
  // チャットのはなすモード（feel/organize/forward/breath）が選ばれていれば追加
  const modeId = (typeof chatState !== 'undefined' && chatState && chatState.mode) ? chatState.mode : null;
  const modePrompt = (modeId && typeof buildTalkModePrompt === 'function') ? buildTalkModePrompt(modeId) : '';
  const modeTail = modePrompt ? '\n\n' + modePrompt : '';
  return nameHeader + '\n' + base + '\n\n' + addition + profileTail + modeTail;
}

let state = defaultState();

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state = { ...defaultState(), ...JSON.parse(raw) };
    // Migration: ensure goal.subgoals exists
    if (state.goal && !Array.isArray(state.goal.subgoals)) state.goal.subgoals = [];
    if (!state.engagement) state.engagement = { dates: [] };
    // Migration: convert legacy state.pet (XP-based) to state.forest (v2)
    if (state.pet && !state.forest) {
      const lv = state.pet.level || 1;
      const approxDays = Math.min(31, Math.max(0, Math.floor((lv * 1.5) / 1.5)));
      state.forest = newForest();
      state.forest.checkinDays = approxDays;
      if (approxDays >= 31) state.forest.completedAt = Date.now();
      // carry over greeting state
      if (state.pet.lastLoginDate && !state.lastLoginDate) state.lastLoginDate = state.pet.lastLoginDate;
      if (state.pet.totalLoginDays && !state.totalLoginDays) state.totalLoginDays = state.pet.totalLoginDays;
      if (state.pet.currentSaying && !state.currentSaying) state.currentSaying = state.pet.currentSaying;
      if (state.pet.currentSayingKind && !state.currentSayingKind) state.currentSayingKind = state.pet.currentSayingKind;
      delete state.pet;
      saveState();
    }
    // Migration: legacy forest (v1: actionCount / 12 stages) → v2 (checkinDays / 7 stages)
    if (state.forest && typeof state.forest.actionCount === 'number' && typeof state.forest.checkinDays !== 'number') {
      const approxDays = Math.min(31, Math.max(0, Math.floor(state.forest.actionCount / 1.5)));
      state.forest = {
        checkinDays: approxDays,
        lastCheckinDate: null,
        startedAt: state.forest.createdAt || Date.now(),
        completedAt: approxDays >= 31 ? Date.now() : null
      };
      saveState();
    }
    if (!state.forest) state.forest = newForest();
  } catch (e) { console.warn('state load failed', e); }
}
function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function resetState() {
  localStorage.removeItem(STORAGE_KEY);
  state = defaultState();
}

const DAY_BOUNDARY_HOUR = 6;
const todayKey = () => {
  const now = new Date();
  if (now.getHours() < DAY_BOUNDARY_HOUR) {
    now.setDate(now.getDate() - 1);
  }
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, '0');
  const d = String(now.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
};
const fmtDate = (ts) => {
  const d = new Date(ts);
  return `${d.getMonth() + 1}/${d.getDate()}`;
};
const fmtDateLong = (ts) => {
  const d = new Date(ts);
  const w = ['日','月','火','水','木','金','土'][d.getDay()];
  return `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日 (${w})`;
};

// ---------- Engagement (streak / garden) ----------
function logEngagement() {
  const today = todayKey();
  if (!state.engagement) state.engagement = { dates: [] };
  if (!state.engagement.dates.includes(today)) {
    state.engagement.dates.push(today);
    saveState();
  }
}
function calcStreak() {
  if (!state.engagement || !state.engagement.dates.length) return 0;
  const dates = new Set(state.engagement.dates);
  let streak = 0;
  const d = new Date(todayKey());
  for (let i = 0; i < 365; i++) {
    const key = d.toISOString().slice(0, 10);
    if (dates.has(key)) streak++;
    else break;
    d.setDate(d.getDate() - 1);
  }
  return streak;
}
function calcTotalDays() {
  return (state.engagement && state.engagement.dates || []).length;
}
function renderGardenFlowers(total) {
  const cap = 30;
  const n = Math.min(total, cap);
  let result = '';
  for (let i = 0; i < n; i++) {
    if (i < 3) result += '🌱';
    else if (i < 7) result += '🌿';
    else if (i < 14) result += '🌾';
    else if (i < 21) result += '🌷';
    else result += '🌸';
  }
  if (total > cap) result += `<span class="garden-plus">+${total - cap}</span>`;
  return result || '🌱';
}

function didToday(timestampField) {
  const today = todayKey();
  return (arr) => arr.some(item => {
    const ts = item[timestampField];
    if (!ts) return false;
    const d = new Date(ts);
    if (d.getHours() < DAY_BOUNDARY_HOUR) d.setDate(d.getDate() - 1);
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}` === today;
  });
}

function viewGoal() {

// 今日の行動を「現在の時間帯」「気分効果」で並び替え
function rankActionsForContext(rawActions) {
  if (!Array.isArray(rawActions) || rawActions.length <= 1) return rawActions || [];
  const profile = state.personalizationProfile || {};
  const effectMap = profile.effectByAction || {};
  const slot = currentTimeSlot();
  // 夜向き/朝向きアクションの簡易ヒント
  const SLOT_PREFER = {
    morning: ['act_mood_one', 'act_mood_normal', 'act_mood_select', 'act_one_event', 'act_breath_10s'],
    noon:    ['act_phone_down', 'act_breath_10s', 'act_ai_one_line'],
    evening: ['act_ai_one_line', 'act_mood_night', 'act_reflect_once'],
    night:   ['act_mood_night', 'act_night_reset', 'act_reflect_once', 'act_safe_action']
  };
  const slotList = SLOT_PREFER[slot] || [];
  const scored = rawActions.map(a => {
    let score = 0;
    // 時間帯合致 → +3
    if (slotList.indexOf(a.id) >= 0) score += 3;
    // 気分効果がプラスなら +（delta*2、最大+2）
    const eff = effectMap[a.id];
    if (eff && eff.sampleDays >= 2 && eff.delta > 0) score += Math.min(2, eff.delta * 2);
    // 気分効果マイナスは -0.5
    if (eff && eff.sampleDays >= 2 && eff.delta < 0) score -= 0.5;
    return { a, score };
  });
  scored.sort((x, y) => y.score - x.score);
  return scored.map(x => x.a);
}

// セクション：今日のおすすめ行動（テーマに紐づく行動 最大3件）
function renderTodayActions() {
  const theme = state.weekTheme;
  if (!theme || !theme.actions || theme.actions.length === 0) return '';
  // テーマが再生成待ちのときは今日の行動は出さない
  if (theme.status === 'needs_refresh') return '';
  const actions = rankActionsForContext(theme.actions.slice()).slice(0, 3);
  const today = todayKey();
  const typeLabel = { app: 'アプリ', daily: '日常', social: '人に' };

  const themeShort = theme.title
    ? theme.title.replace(/[、。]/g, '').slice(0, 18) + (theme.title.length > 18 ? '…' : '')
    : null;
  return `
    <div class="today-actions-section-v4">
      <div class="today-actions-label-v4">今日のおすすめ行動</div>
      ${actions.map(a => {
        const doneToday = (state.actionLogs || []).some(log =>
          log.actionId === a.id && log.executedAt && new Date(log.executedAt).toISOString().slice(0,10) === today && log.status === 'done'

// パーソナライズレコメンド：直近の状態から「今のあなたに合いそうなモード」を1つ選ぶ
function recommendTalkMode() {
  const now = Date.now();
  const DAY = 86400000;
  // 今日/昨日の気分
  const recentMoods = (state.moods || []).filter(m => (m.checkedAt || new Date(m.date).getTime()) >= now - 2 * DAY);
  const recentAvg = recentMoods.length ? recentMoods.reduce((s, m) => s + m.score, 0) / recentMoods.length : null;

  // 直近のひといき利用（夜レスキュー）
  const recentRescue = (state.rescueHistory || []).filter(r => r.startedAt >= now - DAY);

  const profile = state.personalizationProfile || (typeof computeProfile === 'function' ? computeProfile() : null) || {};
  const theme = state.weekTheme;
  const hasPendingAction = theme && Array.isArray(theme.actions) && theme.actions.length > 0 && theme.status !== 'needs_refresh';

  // 優先度ルール
  if (recentAvg !== null && recentAvg <= 2.5) return 'feel';        // 気分低 → まず共感
  if (recentRescue.length >= 2) return 'breath';                    // ひといきを繰り返している → breath
  if (profile.supportStyle === 'organizer') return 'organize';      // organizer → 整理
  if (hasPendingAction && profile.completionRate !== null && profile.completionRate >= 40) return 'forward'; // 行動期 → 前進
  if (profile.supportStyle === 'talker') return 'feel';
  return null;
}

function renderForestSvg(day) {
  const d = Math.max(0, Math.min(31, day || 0));
  const stage = calcForestStage(d);
  const visibleElements = FOREST_DAY_ELEMENTS
    .filter(e => e.day <= d)
    .map(e => e.svg)
    .join('\n');
  const centralTree = d >= 1 ? centralTreeSvgForDay(d) : '';
  // Always-visible: 空 + 遠くの雲
  const skyAndClouds = d >= 1
    ? `<rect width="400" height="180" fill="url(#f-sky-grad)"/>
       <ellipse cx="80" cy="32" rx="30" ry="4.5" fill="white" opacity="0.5"/>
       <ellipse cx="74" cy="34" rx="20" ry="3" fill="white" opacity="0.38"/>`
    : `<rect width="400" height="180" fill="url(#f-sky-grad)"/>`;
  return `
    <svg class="forest-hero-svg" viewBox="0 0 400 260" preserveAspectRatio="xMidYMid slice" data-stage="${stage}" data-day="${d}">
      <defs>
        <linearGradient id="f-sky-grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#FFFEF9"/>
          <stop offset="60%" stop-color="#F5EFE3"/>
          <stop offset="100%" stop-color="#EFE0C9"/>
        </linearGradient>
        <linearGradient id="f-earth-grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#D4B89C"/>
          <stop offset="100%" stop-color="#A8876A"/>
        </linearGradient>
        <linearGradient id="f-water-grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#CDE0E3"/>
          <stop offset="100%" stop-color="#9CB8BE"/>
        </linearGradient>
        <linearGradient id="f-mountain-grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#B9BFB3"/>
          <stop offset="100%" stop-color="#9DA798"/>
        </linearGradient>
      </defs>
      ${skyAndClouds}
      ${visibleElements}
      ${centralTree}
    </svg>
  `;
}

function renderForestHero() {
  if (!state.forest) state.forest = newForest();
  const day = state.forest.checkinDays || 0;
  const stage = calcForestStage(day);

  return `

}

function hasTodayMood() {

  return (state.moods || []).some(m => m.date === today);

function renderGoalMandala() {
  const g = state.goal;
  if (!g) return '';
  if (!Array.isArray(g.subgoals)) g.subgoals = [];
  const subs = g.subgoals;
  const latest = g.checkpoints[g.checkpoints.length - 1];
  const initial = g.checkpoints[0];
  const currentScore = latest ? latest.score : 0;
  const startScore = initial ? initial.score : 0;
  const delta = currentScore - startScore;

  // Overall mandala progress = avg of subgoal progress (0 if none)
  const subAvg = subs.length > 0
    ? Math.round(subs.reduce((acc, s) => acc + (s.progress || 0), 0) / subs.length * 10) / 10
    : 0;

  // Build 9 cells: 8 subgoal slots + 1 center
  const cells = [];
  for (let i = 0; i < 9; i++) {
    if (i === 4) {
      // Center: main goal
      cells.push(`
        <div class="mandala-cell center" data-act="goal-edit">
          <div class="mandala-center-title">${escapeHtml(g.aspiration.slice(0, 40))}${g.aspiration.length > 40 ? '…' : ''}</div>
          <div class="mandala-center-meta">${subAvg}/10</div>
        </div>
      `);
    } else {
      const subIdx = i < 4 ? i : i - 1;
      const sub = subs[subIdx];
      if (sub) {
        const pct = Math.max(4, (sub.progress || 0) * 10);
        const isDone = (sub.progress || 0) >= 10;
        cells.push(`
          <div class="mandala-cell sub ${isDone ? 'done' : ''}" data-subgoal-id="${escapeAttr(sub.id)}">
            <div class="mandala-sub-title">${escapeHtml(sub.title)}</div>
            <div class="mandala-sub-progress">
              <div class="mandala-sub-track"><div class="mandala-sub-fill" style="width: ${pct}%"></div></div>
              <div class="mandala-sub-score">${sub.progress || 0}</div>
            </div>
          </div>
        `);
      } else {
        cells.push(`
          <div class="mandala-cell empty" data-act="subgoal-add">
            <div class="mandala-empty-plus">＋</div>
          </div>
        `);
      }
    }
  }

  return `
    <div class="mandala-wrap">
      <div class="mandala-header">
        <span class="mandala-label">ありたい姿と、小さなステップ</span>
        <button class="mandala-checkin" data-act="goal-checkin">進捗記録</button>
      </div>
      <div class="mandala-grid">
        ${cells.join('')}
      </div>
      <div class="mandala-meta">
        ${subs.length === 0
          ? `<span class="mandala-hint">中央をタップして大目標を見る／周りの「＋」で小さなステップを1つずつ追加しよう</span>`
          : subs.length < 8
          ? `<span class="mandala-hint">${subs.length}/8 埋まってる。あと1つ埋めるたび、ゴールに近づく感じがするはず。</span>`
          : `<span class="mandala-hint">8つ全部埋まったね。あとは進捗を書きためていこう。</span>`
        }
      </div>
      ${g.checkpoints.length > 1 ? `
        <div class="goal-progress-trend mandala-trend">
          ありたい姿への距離: スタート時 ${startScore}/10 → 今 ${currentScore}/10 ${delta > 0 ? `<span class="goal-trend-up">（+${delta}）</span>` : delta < 0 ? `<span class="goal-trend-down">（${delta}）</span>` : ''}
        </div>
      ` : ''}
    </div>
  `;
}

const GOAL_CONCERN_CHOICES = [

];

let goalSetupState = {
  phase: null,
  messages: [],
  draft: { mainConcern: '', aspiration: '', initialScore: 5 },
  isEditing: false,
  aiLoading: false
};

function startGoalSetup(editing = false) {
  goalSetupState = {
    phase: 'concern',
    messages: [],
    draft: editing && state.goal
      ? { mainConcern: state.goal.mainConcern || '', aspiration: state.goal.aspiration || '', initialScore: (state.goal.checkpoints[0] && state.goal.checkpoints[0].score) || 5 }
      : { mainConcern: '', aspiration: '', initialScore: 5 },
    isEditing: editing,
    aiLoading: false
  };
  const persona = getCurrentPersona();
  const intro = editing
    ? `また一緒に考えようね。\n今の悩みって、どのあたり？${state.goal && state.goal.mainConcern ? `（前は「${state.goal.mainConcern}」だったね）` : ''}`
    : `${state.nickname}、目標を決めるのを手伝うね。\n\nまず、いま一番引っかかってることって、どんなこと？\n話せる範囲で大丈夫だよ。`;
  pushGoalAi(intro, { type: 'choices', options: GOAL_CONCERN_CHOICES });
}

function pushGoalAi(text, widget = null) {
  goalSetupState.messages.push({ role: 'ai', text, widget, timestamp: Date.now() });
}
function pushGoalUser(text) {
  goalSetupState.messages.push({ role: 'user', text, timestamp: Date.now() });
}

function viewGoalSetup() {
  if (!goalSetupState.phase) startGoalSetup(false);
  const last = goalSetupState.messages[goalSetupState.messages.length - 1];
  const widget = (last && last.role === 'ai') ? last.widget : null;

          </div>

function renderGoalSetupMsg(m) {
  if (m.role === 'ai') {
    return `<div class="msg-group"><div class="msg-avatar"></div><div class="msg-bubble ai">${escapeHtml(m.text).replace(/\n/g, '<br>')}</div></div>`;
  }
  return `<div class="msg-group user"><div class="msg-bubble user">${escapeHtml(m.text).replace(/\n/g, '<br>')}</div></div>`;
}

function renderGoalSetupWidget(w) {
  if (w.type === 'choices') {
    return `
      <div class="choices">
        ${w.options.map(opt => `
          <button class="choice-chip ${opt === '自分で書く' ? 'other' : ''}" data-goal-concern="${escapeAttr(opt)}">${escapeHtml(opt)}</button>
        `).join('')}
      </div>
    `;
  }
  if (w.type === 'score') {
    return `
      <div class="reflect-score-row">
        ${Array.from({length: 10}, (_, i) => i + 1).map(n => `
          <button class="reflect-score-btn" data-goal-score="${n}">${n}</button>
        `).join('')}
      </div>
      <div class="reflect-score-legend"><span>遠い</span><span>近づいてる</span></div>
    `;
  }
  if (w.type === 'confirm') {
    return `
      <div class="reflect-widget-area">
        <button class="btn btn-primary" data-act="goal-setup-confirm">この内容で設定する</button>
        <button class="btn btn-ghost" data-act="goal-setup-restart">もう一度考える</button>
      </div>
    `;
  }
  return '';
}

function handleGoalSetupText(text) {
  if (!text) return;
  pushGoalUser(text);
  if (goalSetupState.phase === 'concern') {
    goalSetupState.draft.mainConcern = text;
    goalSetupState.phase = 'aspiration';
    pushGoalAi(
      '教えてくれてありがとう。\nじゃあ、どんな自分になれたらいいなと思う？ありたい姿を、ことばにしてみて。',
      { type: 'text' }
    );
  } else if (goalSetupState.phase === 'aspiration') {
    goalSetupState.draft.aspiration = text;
    goalSetupState.phase = 'distance';
    pushGoalAi(
      `いいね、ことばにできたね。\n今、そこにどれくらい近づいてる？10段階で。`,
      { type: 'score' }
    );
  }
  saveState();
  render();
  setTimeout(() => {
    const el = document.getElementById('goalSetupMessages');
    if (el) el.scrollTop = el.scrollHeight;
  }, 50);
}

function handleGoalSetupScore(n) {
  goalSetupState.draft.initialScore = n;
  pushGoalUser(`${n}点`);
  goalSetupState.phase = 'summary';
  const d = goalSetupState.draft;
  pushGoalAi(
    `整理するね。\n\n◆いまの悩み:\n${d.mainConcern}\n\n◆ありたい姿:\n${d.aspiration}\n\n◆距離感: ${n}/10\n\nこれで目標として設定していい？`,
    { type: 'confirm' }
  );
  saveState();
  render();
  setTimeout(() => {
    const el = document.getElementById('goalSetupMessages');
    if (el) el.scrollTop = el.scrollHeight;
  }, 50);
}

function confirmGoalSetup() {
  const d = goalSetupState.draft;
  if (!d.aspiration || !d.mainConcern) { toast('もう少しだけ教えてね'); return; }
  const today = todayKey();
  if (!state.goal || !goalSetupState.isEditing) {
    state.goal = {
      mainConcern: d.mainConcern,
      aspiration: d.aspiration,
      createdAt: Date.now(),
      checkpoints: [{ date: today, score: d.initialScore, note: '' }],
      subgoals: []
    };
  } else {
    state.goal.mainConcern = d.mainConcern;
    state.goal.aspiration = d.aspiration;
    const last = state.goal.checkpoints[state.goal.checkpoints.length - 1];
    if (last && last.date === today) last.score = d.initialScore;
    else state.goal.checkpoints.push({ date: today, score: d.initialScore, note: '' });
  }
  saveState();
  goalSetupState = { phase: null, messages: [], draft: { mainConcern: '', aspiration: '', initialScore: 5 }, isEditing: false, aiLoading: false };
  App.go('goal');
  toast(goalSetupState.isEditing ? '目標を更新したよ' : '目標を設定したよ');
}

// ---------- Monthly Mood Calendar ----------
let moodCalendarMonth = null; // 'YYYY-MM'

// 現在の連続記録日数（今日から遡って、途切れるまで）
// 今日記録がなければ、昨日を起点に数える（まだ今日が終わってないので優しく）
// 注意: todayKey() は朝6時境界なので、cursor もそれに合わせて初期化する
function calcCurrentMoodStreak() {
  if (!state.moods || state.moods.length === 0) return 0;
  const dateSet = new Set(state.moods.map(m => m.date));
  const todayStr = todayKey();
  // todayStr（YYYY-MM-DD）から Date を組み立て（朝6時境界で日付が決まるため、実時刻ではなくこれを基準に進める）
  const [ty, tm, td] = todayStr.split('-').map(Number);
  let cursor = new Date(ty, tm - 1, td);
  if (!dateSet.has(todayStr)) {
    cursor.setDate(cursor.getDate() - 1);
  }
  const formatKey = (d) => {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  };
  let streak = 0;
  while (dateSet.has(formatKey(cursor))) {
    streak++;
    cursor.setDate(cursor.getDate() - 1);
  }
  return streak;
}

function openMoodCalendarModal(monthKey) {
  if (!monthKey) {
    const d = new Date();
    moodCalendarMonth = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
  } else {
    moodCalendarMonth = monthKey;
  }
  renderMoodCalendarModal();
}

function renderMoodCalendarModal() {
  const [yStr, mStr] = moodCalendarMonth.split('-');
  const y = Number(yStr), m = Number(mStr);
  const firstDay = new Date(y, m - 1, 1);
  const lastDay = new Date(y, m, 0);
  const daysInMonth = lastDay.getDate();
  const startWeekday = firstDay.getDay(); // 0=Sun
  const today = todayKey();

  // Calculate month stats
  const monthMoods = state.moods.filter(x => x.date.startsWith(moodCalendarMonth));
  const streakDays = calcCurrentMoodStreak();

  const cells = [];
  // Leading empties
  for (let i = 0; i < startWeekday; i++) cells.push('<div class="cal-cell empty"></div>');
  for (let d = 1; d <= daysInMonth; d++) {
    const dateKey = `${moodCalendarMonth}-${String(d).padStart(2, '0')}`;
    const mood = state.moods.find(x => x.date === dateKey);
    const isToday = dateKey === today;
    cells.push(`
      <div class="cal-cell ${mood ? 'has-mood' : ''} ${isToday ? 'today' : ''}" title="${mood ? MOODS.find(x => x.score === mood.score).label : ''}">
        <div class="cal-day">${d}</div>
        <div class="cal-mood">${mood ? MOODS.find(x => x.score === mood.score).emoji : ''}</div>
      </div>
    `);
  }

  openModal(`
    <div class="modal modal-cal">
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="shiftMoodCalendar(-1)" aria-label="前の月">‹</button>
        <div class="cal-nav-title">${y}年 ${m}月</div>
        <button class="cal-nav-btn" onclick="shiftMoodCalendar(1)" aria-label="次の月">›</button>
      </div>
      <div class="modal-body">
        <div class="cal-stats">
          <div><span class="cal-stats-n">${monthMoods.length}</span>日 記録</div>
          <div><span class="cal-stats-n">${streakDays}</span>日 継続</div>
        </div>
        <div class="cal-weekdays">
          <span style="color: var(--danger);">日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span style="color: #4a82c4;">土</span>
        </div>
        <div class="cal-grid">${cells.join('')}</div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal()">閉じる</button>
      </div>
    </div>
  `);
}

function shiftMoodCalendar(delta) {
  const [y, m] = moodCalendarMonth.split('-').map(Number);
  const d = new Date(y, m - 1 + delta, 1);
  moodCalendarMonth = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
  renderMoodCalendarModal();
}

async function aiSuggestSubgoals() {
  const btn = document.getElementById('aiSuggestBtn');
  const area = document.getElementById('aiSuggestArea');
  if (!area) return;
  if (btn) btn.disabled = true;
  area.innerHTML = `<div class="alt-loading">Asideが考えてるよ<br><div class="alt-loading-dots"><span></span><span></span><span></span></div></div>`;
  try {
    const suggestions = await callAiForSubgoals();
    const existingTitles = (state.goal.subgoals || []).map(s => s.title);
    area.innerHTML = `
      <div style="margin-bottom: 12px;">
        <div style="font-size: 12px; color: var(--text-soft); margin-bottom: 6px;">タップで下の入力に反映されるよ:</div>
        ${suggestions.map(s => `
          <button class="reflect-hint suggest-chip ${existingTitles.includes(s) ? 'used' : ''}" data-suggest="${escapeAttr(s)}" style="margin: 3px;">${escapeHtml(s)}</button>
        `).join('')}
      </div>
    `;
    area.querySelectorAll('[data-suggest]').forEach(el => {
      el.addEventListener('click', () => {
        const t = document.getElementById('subgoalTitle');
        if (t) { t.value = el.dataset.suggest; subgoalDraft.title = t.value; t.focus(); }
      });
    });
  } catch (err) {
    area.innerHTML = `<div style="font-size: 12px; color: var(--danger); padding: 8px;">エラー: ${escapeHtml(String(err.message || err).slice(0, 100))}</div>`;
  } finally {
    if (btn) btn.disabled = false;
  }
}

async function callAiForSubgoals() {

あなたは医療・心理・コーチングの専門家ではありません。診断・治療・専門的助言は一切しません。

【あなたの役割】
- ユーザーのありたい姿を、毎日または毎週できる小さな具体的ステップ 6 個に分解する
- 各ステップは短く（15文字以内）、具体的行動で、達成できるかどうかが自己判断できるもの
- 「頑張る」「意識する」等の抽象表現はNG。「朝7時に窓を開ける」「週2回5分歩く」等の具体性
- 否定形は避け、肯定的な行動の形にする
- 汎用の自己啓発TIPSではなく、入力された「ありたい姿」「主訴」の具体性を拾い、このユーザーの状態・ペースにフィットするステップを出す
- 専門用語・説教は使わない
- 心身の負担が極端に大きいステップ（「毎日5km走る」「毎日早起きして勉強2時間」など）は提案しない。最初の一歩は小さく

【絶対禁止】
- 診断・治療・受診の示唆
- 心理学・医学の専門用語
- 「〜すべき」「〜しなさい」の口調
- 自分（AI）の経験を持ち出すこと

【危機サインを感じたときの対応】
ユーザーの「ありたい姿」や主訴に、自殺念慮・自傷・極度の絶望（死にたい・消えたい・全部終わらせたい等）を示唆する内容が含まれる場合は、ステップ提案をせず、以下の1案だけを返してください：

{
  "suggestions": [
    "よりそいホットライン 0120-279-338 に電話する",
    "チャイルドライン 0120-99-7777 に電話する",
    "信頼できる人に「しんどい」と一言伝える",
    "今日は無理せず横になる時間をとる",
    "いますぐ危険を感じたら119にかける",
    "明日の朝、もう一度ここに来る"
  ]
}

【返答形式（必ずJSON）】
{
  "suggestions": ["ステップ1", "ステップ2", "ステップ3", "ステップ4", "ステップ5", "ステップ6"]
}`;
  const userMsg = `【主訴】${state.goal.mainConcern || '特になし'}
【ありたい姿】${state.goal.aspiration}
${(state.goal.subgoals || []).length > 0 ? `【すでに設定済み（重複しないように）】\n${state.goal.subgoals.map(s => s.title).join('\n')}` : ''}

上記から、毎日・毎週できる小さな具体的ステップを6個提案してください。`;

  const model = state.apiModel || 'gemini-2.5-flash';
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(model)}:generateContent?key=${encodeURIComponent(state.apiKey)}`;
  const body = {
    systemInstruction: { parts: [{ text: buildSystemPrompt(systemPrompt) }] },
    contents: [{ role: 'user', parts: [{ text: userMsg }] }],
    generationConfig: {
      responseMimeType: 'application/json',
      responseSchema: {
        type: 'object',
        properties: { suggestions: { type: 'array', items: { type: 'string' } } },
        required: ['suggestions']
      },
      temperature: 0.8,
      maxOutputTokens: 1200,
      thinkingConfig: { thinkingBudget: 0 }
    },
    safetySettings: [
      { category: 'HARM_CATEGORY_HARASSMENT', threshold: 'BLOCK_ONLY_HIGH' },
      { category: 'HARM_CATEGORY_HATE_SPEECH', threshold: 'BLOCK_ONLY_HIGH' },
      { category: 'HARM_CATEGORY_SEXUALLY_EXPLICIT', threshold: 'BLOCK_ONLY_HIGH' },
      { category: 'HARM_CATEGORY_DANGEROUS_CONTENT', threshold: 'BLOCK_ONLY_HIGH' }
    ]
  };
  const res = await fetchGeminiWithRetry(url, body);
  if (!res.ok) throw new Error(`Gemini ${res.status}: ${(await res.text()).slice(0, 200)}`);
  const data = await res.json();
  const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
  if (!text) throw new Error('Empty response');
  const parsed = JSON.parse(text);
  return parsed.suggestions || [];
}

function openSubgoalEditModal(subId) {
  const sg = state.goal.subgoals.find(s => s.id === subId);
  if (!sg) return;
  subgoalDraft = { id: sg.id, title: sg.title, progress: sg.progress || 0 };
  openModal(`
    <div class="modal modal-goal">
      <div class="modal-title">ステップの進捗</div>
      <div class="modal-body">
        <div class="goal-modal-label">タイトル</div>
        <input type="text" class="input goal-modal-input" id="subgoalTitle" maxlength="40" value="${escapeAttr(sg.title)}">
        <div class="goal-modal-label">今の取り組み具合（0〜10）</div>
        <div class="reflect-score-row" style="padding: 4px 0;">
          ${Array.from({length: 11}, (_, i) => i).map(n => `
            <button class="reflect-score-btn ${subgoalDraft.progress === n ? 'picked' : ''}" data-subgoal-score="${n}">${n}</button>
          `).join('')}
        </div>
        <div class="reflect-score-legend"><span>まだ</span><span>できてる</span></div>
        ${sg.history && sg.history.length > 1 ? `
          <div class="goal-modal-label" style="margin-top: 16px;">進捗の歩み</div>
          <div style="font-size: 11px; color: var(--text-soft); background: var(--bg-soft); padding: 10px; border-radius: 8px; line-height: 1.6;">
            ${sg.history.slice(-5).map(h => `${h.date.slice(5).replace('-', '/')} — ${h.progress}/10`).join('  →  ')}
          </div>
        ` : ''}
      </div>
      <div class="modal-actions">
        <button class="btn btn-primary" onclick="saveSubgoalEdit()">保存</button>
        <button class="btn btn-danger" onclick="deleteSubgoal()">削除</button>
        <button class="btn btn-ghost" onclick="closeModal()">キャンセル</button>
      </div>
    </div>
  `);
  const t = document.getElementById('subgoalTitle');
  if (t) t.addEventListener('input', e => subgoalDraft.title = e.target.value);
  document.querySelectorAll('[data-subgoal-score]').forEach(el => {
    el.addEventListener('click', () => {
      subgoalDraft.progress = Number(el.dataset.subgoalScore);
      document.querySelectorAll('[data-subgoal-score]').forEach(b => b.classList.toggle('picked', Number(b.dataset.subgoalScore) === subgoalDraft.progress));
    });
  });
}

function saveSubgoalEdit() {
  const sg = state.goal.subgoals.find(s => s.id === subgoalDraft.id);
  if (!sg) { closeModal(); return; }
  const newTitle = (document.getElementById('subgoalTitle')?.value || subgoalDraft.title).trim();
  if (!newTitle) { toast('タイトルを書いてね'); return; }
  sg.title = newTitle;
  const oldProgress = sg.progress || 0;
  sg.progress = subgoalDraft.progress;
  if (!Array.isArray(sg.history)) sg.history = [];
  if (oldProgress !== sg.progress) {
    const today = todayKey();
    const last = sg.history[sg.history.length - 1];
    if (last && last.date === today) last.progress = sg.progress;
    else sg.history.push({ date: today, progress: sg.progress });
  }
  logEngagement();
  saveState();
  closeModal();
  render();
  toast(sg.progress >= 10 ? 'ここまでこれたね' : '更新したよ');
}

function deleteSubgoal() {
  if (!confirm('このステップを削除する？')) return;
  state.goal.subgoals = state.goal.subgoals.filter(s => s.id !== subgoalDraft.id);
  saveState();
  closeModal();
  render();
  toast('削除したよ');
}

function last7Days() {
  const arr = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    arr.push(d.toISOString().slice(0, 10));
  }
  return arr;
}

// ---------- Chat ----------
let chatState = { session: null, isTyping: false, currentChoices: [], mode: null, modeStartedAt: null };

function startNewChatSession() {
  const today = todayKey();
  const todayMood = state.moods.find(m => m.date === today);
  const session = {
    id: uid(),
    startedAt: Date.now(),
    endedAt: null,
    personaId: state.selectedPersonaId || 'haru',
    moodCheckId: todayMood ? todayMood.id : null,
    moodScore: todayMood ? todayMood.score : null,
    messages: []
  };
  state.currentSessionId = session.id;
  state.sessions.push(session);
  saveState();
  chatState.session = session;
  chatState.currentChoices = [];
}

const SESSION_EXPIRY_MS = 3 * 60 * 60 * 1000; // 3時間で新規セッション

function getLastActivityTime(session) {
  if (!session) return 0;
  const lastMsg = [...(session.messages || [])].reverse().find(m => m.timestamp);
  return lastMsg ? lastMsg.timestamp : (session.startedAt || 0);
}

function viewChat() {
  if (!chatState.session) {
    // resume last open session if available AND within 3h window, else new
    const last = state.sessions.find(s => s.id === state.currentSessionId && !s.endedAt);
    const withinWindow = last && (Date.now() - getLastActivityTime(last) < SESSION_EXPIRY_MS);
    if (last && withinWindow) {
      chatState.session = last;
      const lastAi = [...last.messages].reverse().find(m => m.role === 'assistant');
      chatState.currentChoices = lastAi && lastAi.choices ? lastAi.choices : [];
    } else {
      if (last && !withinWindow) {
        last.endedAt = Date.now();
        saveState();
      }
      startNewChatSession();
    }
  }
  const s = chatState.session;
  const pC = getCurrentPersona();
  const activeMode = chatState.mode ? getTalkMode(chatState.mode) : null;
  const userMsgs = s.messages.filter(m => m.role === 'user').length;
  const softEndHint = chatState.mode && userMsgs >= 5; // 5ターン以降、そろそろまとめようか
  return `
    <div class="screen active chat-screen" style="--p-accent: ${pC.avatarAccent}; --p-color: ${pC.avatarColor};">
      <div class="chat-header">
        <button class="chat-back" data-act="chat-back">${icon('arrow-left')}</button>
        <div class="chat-avatar"></div>
        <div class="chat-title">
          <div class="chat-name">${escapeHtml(getCurrentPersona().name)}</div>
          <div class="chat-status">きいてるよ</div>
        </div>
        ${s.messages.filter(m => m.role === 'user').length >= 2 ? `<button class="chat-to-reflect" data-act="chat-to-reflect" aria-label="この話を整理する">✨ 整理</button>` : ''}
        <button class="chat-end" data-act="chat-end">${chatState.mode ? '今日はここまで' : 'おわる'}</button>
      </div>
      ${activeMode ? `
        <div class="chat-mode-bar">
          <span class="chat-mode-emoji">${activeMode.emoji}</span>
          <span class="chat-mode-text">${escapeHtml(activeMode.shortLabel)}</span>
          <span class="chat-mode-sep">×</span>
          <span class="chat-mode-partner">${escapeHtml(pC.name)}</span>
          ${softEndHint ? '<span class="chat-mode-hint">そろそろ、まとめてみる？</span>' : ''}
        </div>
      ` : ''}
      <div class="chat-messages" id="chatMessages">
        ${s.messages.map(renderMsg).join('')}
        ${chatState.isTyping ? `
          <div class="msg-group" id="typingGroup">
            <div class="msg-avatar"></div>
            <div class="msg-bubble ai"><div class="typing"><span></span><span></span><span></span></div></div>
          </div>
        ` : ''}
      </div>
      <button class="scroll-top-btn" id="scrollTopBtn" data-act="chat-scroll-top" aria-label="上に戻る">${icon('arrow-up')}</button>
      ${renderTalkModeActionPanel(userMsgs)}
      ${chatState.currentChoices.length && !chatState.isTyping ? `
        <div class="choices" id="choicesBar">
          ${chatState.currentChoices.map((c, i) => `
            <button class="choice-chip ${i === chatState.currentChoices.length - 1 ? 'other' : ''}" data-choice="${escapeAttr(c)}">${escapeHtml(c)}</button>
          `).join('')}
        </div>
      ` : ''}
      <div class="chat-input-area">
        <div class="chat-input-hint">${chatState.currentChoices.length ? '上から選んでも、自由に書いてもOK' : '自由に書いてみて'}</div>
        <div class="chat-input-row">
          <textarea class="chat-input" id="chatInput" rows="1" placeholder="自由に書いてみて"></textarea>
          <button class="chat-icon-btn send" data-act="send" id="sendBtn">${icon('send')}</button>
        </div>
      </div>
    </div>
  `;
}

// モード別のアクションパネル（forward: 選択肢 / feel: 終了チェックイン）
function renderTalkModeActionPanel(userMsgs) {
  const mode = chatState.mode;
  if (!mode || chatState.isTyping) return '';
  if (mode === 'forward' && userMsgs >= 2 && !chatState.forwardDecisionMade) {
    // モード3: 選択肢3つ
    return `
      <div class="talk-mode-panel talk-mode-panel-forward">
        <div class="talk-mode-panel-label">どんな向き合い方がしっくり来そう？</div>
        <div class="talk-mode-panel-choices">
          <button class="talk-mode-choice" data-act="talk-forward-choice" data-level="quick">
            <div class="tmc-title">すぐできる</div>
            <div class="tmc-desc">今日〜明日に1回試す小さな一歩</div>
          </button>
          <button class="talk-mode-choice" data-act="talk-forward-choice" data-level="try">
            <div class="tmc-title">少し頑張る</div>
            <div class="tmc-desc">1週間かけて少しずつ進める</div>
          </button>
          <button class="talk-mode-choice" data-act="talk-forward-choice" data-level="deep">
            <div class="tmc-title">しっかり向き合う</div>
            <div class="tmc-desc">じっくり考えてから決めてもいい</div>
          </button>
        </div>
      </div>
    `;
  }
  if (mode === 'feel' && userMsgs >= 3 && !chatState.feelCheckDismissed) {
    // モード1: 終了チェックイン
    return `
      <div class="talk-mode-panel talk-mode-panel-feel">
        <div class="talk-mode-panel-label">少し楽になった？</div>
        <div class="talk-mode-panel-actions">
          <button class="btn btn-primary" data-act="talk-feel-done">はい</button>
          <button class="btn btn-ghost" data-act="talk-feel-continue">もう少し話す</button>
        </div>
      </div>
    `;
  }
  return '';
}

function renderMsg(m) {
  if (m.role === 'assistant') {
    return `
      <div class="msg-group">
        <div class="msg-avatar"></div>
        <div class="msg-bubble ai">${escapeHtml(m.content).replace(/\n/g, '<br>')}</div>
      </div>
    `;
  } else {
    return `
      <div class="msg-group user">
        <div class="msg-bubble user">${escapeHtml(m.content)}</div>
      </div>
    `;
  }
}

const REFLECT_THOUGHT_CHOICES = ['自分はダメだ', 'うまくいかない', '迷惑かけてる', '理解されない', 'もう限界', 'うまく言えない'];

let reflectState = {

  messages: [],
  draft: null,
  aiLoading: false,
  aiError: '',
  reportId: null
};

function newReflectDraft() {

    startedAt: Date.now(),

    thoughts: '',

    emotionAfter: { id: '', label: '', emoji: '', score: 0 }

function pushReflectAi(text, widget = null) {
  reflectState.messages.push({ role: 'ai', text, widget, timestamp: Date.now() });
}
function pushReflectUser(text) {
  reflectState.messages.push({ role: 'user', text, timestamp: Date.now() });
}

    phase: 'event',

function renderReflectMsg(m) {

  return `
    <div class="msg-group user">
      <div class="msg-bubble user">${escapeHtml(m.text).replace(/\n/g, '<br>')}</div>
    </div>
  `;
}

function renderReflectWidget(w) {
  if (w.type === 'choices') {
    return `
      <div class="choices">
        ${w.options.map((opt, i) => `
          <button class="choice-chip ${i === w.options.length - 1 && opt.includes('うまく言えない') ? 'other' : ''}" data-reflect-choice="${escapeAttr(opt)}">${escapeHtml(opt)}</button>
        `).join('')}
      </div>
    `;
  }
  if (w.type === 'emotion') {
    const list = w.expanded ? EMOTION_OPTIONS : EMOTION_OPTIONS.filter(o => EMOTION_PRIMARY_IDS.includes(o.id));
    return `
      <div class="reflect-emotion-scroll">
        ${list.map(opt => `
          <button class="reflect-emotion-chip" data-reflect-emotion="${opt.id}">
            <span>${opt.emoji}</span> ${escapeHtml(opt.label)}
          </button>
        `).join('')}
        ${!w.expanded ? `
          <button class="reflect-emotion-chip reflect-emotion-more" data-reflect-emotion-expand="1">
            ＋ 他の気持ち
          </button>
        ` : ''}
      </div>
    `;
  }
  if (w.type === 'score') {
    return `
      <div class="reflect-score-row">
        ${Array.from({length: 10}, (_, i) => i + 1).map(n => `
          <button class="reflect-score-btn" data-reflect-score="${n}">${n}</button>
        `).join('')}
      </div>
      <div class="reflect-score-legend"><span>← 弱い</span><span>強い →</span></div>
    `;
  }
  if (w.type === 'alternatives') {
    const d = reflectState.draft;
    const isLatestAlt = reflectState.messages.filter(m => m.widget && (m.widget.type === 'alternatives' || m.widget.type === 'alt-error')).slice(-1)[0] === reflectState.messages[reflectState.messages.length - 1];
    const newCount = w.newCount || 0;
    const firstNewIndex = newCount > 0 ? (w.data.length - newCount) : -1;
    const totalAlts = (d.alternativesAI || []).length;
    const canAddMore = totalAlts < MAX_ALTERNATIVES;
    return `
      <div class="reflect-widget-area">
        ${w.data.map((alt, idx) => `
          ${idx === firstNewIndex ? '<div class="alt-divider"><span>あたらしい見方</span></div>' : ''}
          <div class="alt-card ${d.alternativesPicked.includes(alt.uid) ? 'picked' : ''}" data-alt-pick="${escapeAttr(alt.uid)}">
            ${alt.tag ? `<span class="alt-card-tag">${escapeHtml(alt.tag)}</span>` : ''}
            <div class="alt-card-text">${escapeHtml(alt.text)}</div>
          </div>
        `).join('')}
        ${isLatestAlt ? `
          <div class="reflect-alt-actions">
            ${w.showRetry ? `<button class="btn btn-secondary" data-act="reflect-alt-retry">🔄 もう一度AIに聞く</button>` : ''}
            ${canAddMore ? `<button class="btn btn-ghost" data-act="reflect-alt-regen">＋ 他の見方も聞く（あと${MAX_ALTERNATIVES - totalAlts}個）</button>` : `<div class="alt-limit-note">見方は${MAX_ALTERNATIVES}個まで。この中から選んでみよう。</div>`}
            <button class="btn btn-primary" data-act="reflect-alt-confirm">この見方で進む</button>
          </div>
        ` : ''}
      </div>
    `;
  }
  if (w.type === 'alt-error') {
    const d = reflectState.draft;
    const isLatestAlt = reflectState.messages.filter(m => m.widget && (m.widget.type === 'alternatives' || m.widget.type === 'alt-error')).slice(-1)[0] === reflectState.messages[reflectState.messages.length - 1];
    const totalAlts = (d && d.alternativesAI || []).length;
    const canAddMore = totalAlts < MAX_ALTERNATIVES;
    return `
      <div class="reflect-widget-area">
        ${isLatestAlt ? `
          <div class="reflect-alt-actions">
            ${canAddMore ? `<button class="btn btn-primary" data-act="reflect-alt-retry">🔄 もう一度AIに聞く</button>` : `<div class="alt-limit-note">見方は${MAX_ALTERNATIVES}個まで集まったよ。</div>`}
            <button class="btn btn-ghost" data-act="reflect-alt-confirm">ここまでの見方で進む</button>
          </div>
        ` : ''}
      </div>
    `;
  }
  if (w.type === 'report') {
    return `
      <div class="reflect-widget-area" style="padding-top: 12px;">
        <button class="btn btn-primary" data-act="reflect-show-report">レポートを見る</button>
      </div>
    `;
  }
  return '';
}

function shouldShowFreeText(widget) {
  if (!widget) return false;
  if (widget.type === 'choices') return true;
  if (widget.type === 'alternatives') return true;
  return false;
}
function freeTextHint(widget) {
  if (!widget) return '';
  if (widget.type === 'choices') return '選んでも、自由に書いてもOK';

async function handleReflectResponse(text, source) {
  if (!text) return;
  const d = reflectState.draft;
  if (!d) return;

  if (['event', 'thoughts'].includes(reflectState.phase) && detectCrisis(text)) {
    state.crisisLogs.push({ sessionId: d.id, keyword: matchedCrisisKeyword(text), timestamp: Date.now() });
    saveState();
    showCrisisModal(text);
    return;
  }

  pushReflectUser(text);
  const aiAck = (phrase) => pushReflectAi(phrase);

  if (reflectState.phase === 'event') {
    d.event = text;
    reflectState.phase = 'thoughts';
    pushReflectAi(
      '教えてくれてありがとう。\nそのとき、どんな考えが頭に浮かんだ？正しい・間違ってるは気にしないで。',
      { type: 'choices', options: REFLECT_THOUGHT_CHOICES }
    );
  } else if (reflectState.phase === 'thoughts') {
    d.thoughts = text;
    reflectState.phase = 'emotion_before';
    pushReflectAi(
      'うん、そう感じたんだね。\nそのときの気持ちは、どれが一番近い？',
      { type: 'emotion' }
    );
  }
  saveState();
  render();
  scrollReflectToBottom();
}

function handleReflectEmotion(emoId) {
  const opt = EMOTION_OPTIONS.find(o => o.id === emoId);
  if (!opt) return;
  const d = reflectState.draft;

  if (reflectState.phase === 'emotion_before') {
    d.emotionBefore = { id: opt.id, label: opt.label, emoji: opt.emoji, score: 0 };
    pushReflectUser(`${opt.emoji} ${opt.label}`);
    reflectState.phase = 'score_before';
    pushReflectAi(
      `「${opt.label}」だったんだね。\nその強さは、10段階でどのくらい？`,
      { type: 'score' }
    );
  }
  saveState();
  render();
  scrollReflectToBottom();
}

async function handleReflectScore(n) {
  const d = reflectState.draft;
  if (reflectState.phase === 'score_before') {
    d.emotionBefore.score = n;
    pushReflectUser(`${n}点`);
    reflectState.phase = 'alternatives';
    pushReflectAi(`${n}点だったんだね。\nちょっと考えてみるね、別の見方もあるかもしれない。`);
    saveState();
    render();
    scrollReflectToBottom();
    await generateAndShowAlternatives();
  } else if (reflectState.phase === 'score_after') {
    d.emotionAfter.score = n;
    pushReflectUser(`${n}点`);
    reflectState.phase = 'done';
    const delta = d.emotionBefore.score - d.emotionAfter.score;
    const summary = delta > 0
      ? `${d.emotionBefore.score}点から${n}点に変わったね。\n${delta}ポイント軽くなったみたい。\n向き合って整理できたね。`
      : delta < 0
      ? `${d.emotionBefore.score}点から${n}点に変わったね。\n強くなったことに気づけたのも、大切な発見。\nここまで一緒に整理してくれてありがとう。`
      : `${d.emotionBefore.score}点のまま変わらなかったね。\nでも、向き合って言葉にできたのは大きなこと。`;
    pushReflectAi(summary, { type: 'report' });
    saveState();
    render();
    scrollReflectToBottom();
  }
}

async function generateAndShowAlternatives(isRegen = false) {
  reflectState.aiLoading = true;
  reflectState.aiError = '';
  render();
  scrollReflectToBottom();
  const previous = isRegen ? [...(reflectState.draft.alternativesAI || [])] : [];
  try {
    const result = await callAiForAlternatives(reflectState.draft, { previous });
    const freshAlts = (result.alternatives || []).map(a => ({ ...a, uid: uid(), isNew: isRegen }));
    if (isRegen) {
      reflectState.draft.alternativesAI = [...(reflectState.draft.alternativesAI || []), ...freshAlts];
      // Keep existing picks so user doesn't lose them
    } else {
      reflectState.draft.alternativesAI = freshAlts;
      reflectState.draft.alternativesPicked = [];
    }
    reflectState.aiLoading = false;
    pushReflectAi(
      isRegen
        ? 'じゃあ、別の角度でもう3つ追加したよ。\n前の見方の下に並べてあるから、どれでも選んでみて。'
        : '3つ考えてみたよ。\n気になるのがあれば選んでみて。組み合わせたり、自分の言葉で書いてもOK。',
      { type: 'alternatives', data: [...reflectState.draft.alternativesAI], newCount: isRegen ? freshAlts.length : 0 }
    );
    saveState();
    render();
    scrollReflectToBottom();
  } catch (err) {
    console.error('[Aside] alt gen failed:', err);
    reflectState.aiLoading = false;
    reflectState.aiError = String(err.message || err).slice(0, 120);
    if (isRegen) {
      // 既に3件以上ある場合は fallback を注入せず、ユーザーに再試行を提示する
      pushReflectAi(
        'AIに少し接続しづらいみたい。\n何度か試すと繋がることが多いよ。',
        { type: 'alt-error' }
      );
    } else {
      // 初回失敗時のみ fallback を挿入（まだ一つも見方がない状態を避けるため）
      const fb = getFallbackAlternatives(reflectState.draft).map(a => ({ ...a, uid: uid() }));
      reflectState.draft.alternativesAI = fb;
      reflectState.draft.alternativesPicked = [];
      pushReflectAi(
        'AIの応答が取れなかったから、いったん例文を置いておくね。\n気になるのがあれば選んでみて。もう一度AIに聞くこともできるよ。',
        { type: 'alternatives', data: [...reflectState.draft.alternativesAI], newCount: 0, showRetry: true }
      );
    }
    saveState();
    render();
    scrollReflectToBottom();
  }
}

async function handleReflectRegenerateAlternatives() {
  const total = (reflectState.draft && reflectState.draft.alternativesAI || []).length;
  if (total >= MAX_ALTERNATIVES) {
    toast(`見方は最大${MAX_ALTERNATIVES}個までだよ`);
    return;
  }
  pushReflectUser('他の見方も聞いてみたい');
  render();
  scrollReflectToBottom();
  await generateAndShowAlternatives(true);
}

function handleReflectAltConfirm() {
  const d = reflectState.draft;
  const input = document.getElementById('reflectInput');
  if (input && input.value.trim()) {
    d.alternativeCustom = input.value.trim();
    input.value = '';
  }
  if (d.alternativesPicked.length === 0 && !d.alternativeCustom) {
    toast('カードをタップするか、自分の言葉で書いてみて');
    return;
  }
  const pickedAlts = d.alternativesPicked.map(u => d.alternativesAI.find(a => a.uid === u)).filter(Boolean);
  const pickedText = pickedAlts.map(a => a.text).join('\n');
  const userMsg = [pickedText, d.alternativeCustom].filter(Boolean).join('\n\n');
  pushReflectUser(userMsg);
  // Reuse emotionBefore label/emoji — only score changes
  d.emotionAfter = { ...d.emotionBefore, score: 0 };
  reflectState.phase = 'score_after';
  pushReflectAi(
    `なるほど、その見方もいいね。\nその考えを試してみて、さっきの「${d.emotionBefore.label}」は、今は何点くらい？`,
    { type: 'score' }
  );
  saveState();
  render();
  scrollReflectToBottom();
}

function handleReflectShowReport() {
  const d = reflectState.draft;
  d.completedAt = Date.now();
  const existing = state.reflections.find(r => r.id === d.id);
  if (!existing) state.reflections.push(d);
  reflectState.reportId = d.id;
  logEngagement();
  const fr = addForestCheckin();
  saveState();
  App.go('reflectReport');
  if (fr.stageChanged) {
    setTimeout(() => toast('森に、すこし変化があったみたい。'), 400);
  } else {
    toast('ふりかえり完了');
  }
  maybePromptGoalCheckin();
}

function maybePromptGoalCheckin() {
  if (!state.goal) return;
  const last = state.goal.checkpoints[state.goal.checkpoints.length - 1];
  if (!last) return;
  const diffDays = (Date.now() - new Date(last.date).getTime()) / 86400000;
  if (diffDays < 2) return;
  setTimeout(() => {
    if (App.currentScreen !== 'home') return;
    openGoalCheckinModal();
  }, 1500);
}

function scrollReflectToBottom() {
  setTimeout(() => {
    const el = document.getElementById('reflectMessages');
    if (el) el.scrollTop = el.scrollHeight;
  }, 50);
}

async function callAiForAlternatives(d, options = {}) {
  if (!state.apiKey) {
    return { alternatives: getFallbackAlternatives(d) };
  }
  const systemPrompt = `あなたは、ユーザーが書いた出来事と気持ちに対して、「別の捉え方」を3つ、やさしく提案する役割のアシスタントです。
あなたは医療・心理の専門家ではありません。診断・治療・専門的助言は一切しません。

【あなたの役割】
- ユーザーが話した出来事と自動思考・感情に対して、別の捉え方を3つ提案する
- 断定せず、「〜かもしれません」「〜とも考えられます」「〜という見方もあります」のような柔らかい表現を使う
- 各提案は独立した別の角度から（時間軸を変える（例: 3年後の自分がこの場面をどう見るか）／状況の別解釈／自分への声かけ／範囲の見直し（「全部」「絶対」を緩める） など）

【絶対禁止】
- 診断（「うつ」「不安障害」「ADHD」等の状態の名指し）
- 治療・薬剤・受診タイミングの示唆
- 心理学の専門用語をユーザーに当てはめること（「これは破局化です」「読心の認知の歪みです」「愛着の問題ですね」など、ユーザーの思考にラベルを貼る行為は厳禁）
- 「〜すべき」「〜しなさい」のアドバイス口調
- 指示形で書くこと（「〜してみる」「〜を手放す」「〜しましょう」「〜するといい」）。代替案は必ず「〜かもしれません」「〜という見方もあります」「〜とも考えられます」の可能性形に限定する
- ユーザーの感情や考えを否定する（「そんなことないですよ」のような完全否定の代替案は出さない）
- ユーザーの相手（親・友人・上司など）を擁護する方向の代替案（「相手にも事情が」「親も大変だから」「相手は忙しかった」など）。代替案は「ユーザー自身の見え方を広げる」方向に限定し、第三者を代弁・擁護しない
- 他者と比較する（「みんなそう」「もっと大変な人もいる」）
- 過度な楽観論（「きっと大丈夫」「気にしなくていい」）
- 自分（AI）の経験談を持ち出すこと

【危機サインを感じたときの対応】
ユーザーの記述に自殺念慮・自傷を示唆する内容（死にたい・消えたい・自分を傷つけたい・もう無理・楽になりたい・全部終わらせたい等、婉曲表現を含む）が含まれる場合は、別の捉え方を提案する代わりに、以下の1案だけを返してください（3文分解・チャイルドライン含む）：

{
  "alternatives": [
    {
      "tag": "ひとりで抱えないで",
      "text": "今の重さは、ひとりで持ち続けるには大きすぎるかもしれません。よりそいホットライン（0120-279-338・24時間・無料）かチャイルドライン（0120-99-7777・18歳まで・無料）に、いま話してみてもらえませんか。いますぐ危険を感じるときは119へ。"
    }
  ]
}

【返答形式（必ずJSON）】
{
  "alternatives": [
    { "tag": "短いタグ（例: 事実を見る / 視点を変える / 小さな一歩）", "text": "別の考え方（1-2文、50-120文字）" },
    { "tag": "...", "text": "..." },
    { "tag": "...", "text": "..." }
  ]
}

各提案は独立した別の角度から。過度な楽観論はNG。現実的で穏やかに。`;

  const previousBlock = (options.previous && options.previous.length > 0)
    ? `\n\n【すでに提案済み（これとは違う角度で、重複しないように）】\n${options.previous.map((a, i) => `${i + 1}. ${a.tag ? `[${a.tag}] ` : ''}${a.text}`).join('\n')}`
    : '';

  const goalBlock = (state.goal && (state.goal.aspiration || state.goal.mainConcern))
    ? `\n\n【このユーザーが大切にしていること（オンボーディングで設定）】\n${state.goal.aspiration ? `ありたい姿: ${state.goal.aspiration}` : ''}${state.goal.mainConcern ? `\n向き合っている悩み: ${state.goal.mainConcern}` : ''}\n\n別の捉え方の提案は、このユーザーの「ありたい姿」に少しでも近づくヒントになるよう意識してください（ただし提案文に「あなたの目標は…」のように直接書くのは押しつけがましいので避け、自然に方向性を含める）。`
    : '';

  const userMsg = `【出来事】
${d.event}

【そのとき自然と浮かんだ考え】
${d.thoughts}

【そのときの感情】
${d.emotionBefore.label}（強さ ${d.emotionBefore.score}/10）${goalBlock}

上記について、別の捉え方を3つ提案してください。${previousBlock}`;

  const buildUrl = (model) => `https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(model)}:generateContent?key=${encodeURIComponent(state.apiKey)}`;

  const body = {
    systemInstruction: { parts: [{ text: buildSystemPrompt(systemPrompt) }] },
    contents: [{ role: 'user', parts: [{ text: userMsg }] }],
    generationConfig: {
      responseMimeType: 'application/json',
      responseSchema: {
        type: 'object',
        properties: {
          alternatives: {
            type: 'array',
            items: {
              type: 'object',
              properties: {
                tag: { type: 'string' },
                text: { type: 'string' }
              },
              required: ['tag', 'text']
            }
          }
        },
        required: ['alternatives']
      },
      temperature: 0.9,
      maxOutputTokens: 2400,
      thinkingConfig: { thinkingBudget: 0 }
    },
    safetySettings: [
      { category: 'HARM_CATEGORY_HARASSMENT', threshold: 'BLOCK_ONLY_HIGH' },
      { category: 'HARM_CATEGORY_HATE_SPEECH', threshold: 'BLOCK_ONLY_HIGH' },
      { category: 'HARM_CATEGORY_SEXUALLY_EXPLICIT', threshold: 'BLOCK_ONLY_HIGH' },
      { category: 'HARM_CATEGORY_DANGEROUS_CONTENT', threshold: 'BLOCK_ONLY_HIGH' }
    ]
  };

  const { res } = await fetchGeminiSingle(buildUrl, body);
  if (!res.ok) {
    const t = await res.text();
    throw new Error(`Gemini ${res.status}: ${t.slice(0, 200)}`);
  }
  const data = await res.json();
  const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
  if (!text) throw new Error('Empty response');
  // JSONパース失敗をリトライ可能にするため、例外をそのまま投げる
  return JSON.parse(text);
}

let fallbackAltIndex = 0;
function getFallbackAlternatives(d) {
  const sets = [
    [
      { tag: '事実を見る', text: '今ある情報だけでは、最悪の結論にはまだ決まっていないかもしれない。確かに分かっていることだけを書き出してみるのもいいかも。' },
      { tag: '視点を変える', text: '同じ状況にいる大切な人がいたら、自分は何て声をかけるだろう。その言葉を自分にも向けてみることができそう。' },
      { tag: '小さな一歩', text: '全部いっぺんに解決しなくてもいい。今夜・明日にできる、ほんの小さな一歩は何があるだろう。' }
    ],
    [
      { tag: '時間軸', text: '今のしんどさは、1週間後、1ヶ月後にはどう見えるだろう。少し先の自分から今を見てみるのも一つの手。' },
      { tag: '自分を労う', text: 'ここまで頑張ってきた自分を、少しだけ認めてあげてもいいかも。完璧じゃなくても、やれたことは確かにある。' },
      { tag: '一人じゃない', text: 'この気持ちは、自分だけが抱えてるものじゃないかもしれない。言葉にできれば、誰かが受け取ってくれることもある。' }
    ],
    [
      { tag: '思い込みを問う', text: '「絶対こうだ」と思ってることに、例外はないだろうか。一度「もしかして違うかも」と問いかけてみる。' },
      { tag: '感情と事実を分ける', text: '感じてることと、実際に起きてることは、少しだけ違うかもしれない。事実と気持ちを別々の紙に書くイメージで。' },
      { tag: '優先順位', text: '今、一番大事なのは何だろう。全部を完璧にこなそうとせず、今日はこれだけ、と絞ってみる手もある。' }
    ],
    [
      { tag: '体から整える', text: '考えすぎで疲れているかも。少し深呼吸したり、お茶を一杯飲んでから、もう一度考えてみるのも手。' },
      { tag: '言葉の強さ', text: '「いつも」「絶対」「みんな」などの強い言葉を、もう少しやわらかく言い換えてみると、景色が変わることがある。' },
      { tag: '助けを借りる', text: '自分一人で抱え込まなくてもいい。信頼できる誰かに、少しだけ話してみる選択肢もある。' }
    ]
  ];
  const set = sets[fallbackAltIndex % sets.length];
  fallbackAltIndex++;
  return set;
}

// ---------- Reflection Report (Letter Style) ----------
function viewReflectReport() {
  const id = reflectState.reportId || state.currentReflectionId;
  const r = state.reflections.find(x => x.id === id);
  if (!r) { App.go('goal'); return ''; }

  const eb = r.emotionBefore, ea = r.emotionAfter;
  const delta = eb.score - ea.score;
  const closingLine = delta > 0
    ? `気持ちが ${delta} ポイント軽くなったね。\n自分と向き合って、ことばにしてくれたおかげ。`
    : delta < 0
    ? `気持ちが ${Math.abs(delta)} ポイント強くなったみたい。\nそれも、気づけたから見えた自分の大事なサイン。`
    : `気持ちの強さは変わらなかったね。\nでも、向き合って言葉にできたのは、それだけで大きなこと。`;

  const pickedAlts = r.alternativesPicked
    .map(u => typeof u === 'number' ? r.alternativesAI[u] : r.alternativesAI.find(a => a && a.uid === u))
    .filter(Boolean);
  const altText = r.alternativeCustom
    ? (pickedAlts.length ? pickedAlts.map(a => a.text).join('\n\n') + '\n\n' + r.alternativeCustom : r.alternativeCustom)
    : pickedAlts.map(a => a.text).join('\n\n');

  const beforePct = Math.max(4, eb.score * 10);
  const afterPct = Math.max(4, ea.score * 10);
  const barTone = getBarTone(eb.score, ea.score);

  return `
    <div class="screen active letter-screen">
      <div class="letter-top">
        <button class="chat-back" data-act="report-close">${icon('arrow-left')}</button>
        <div class="letter-top-title">
          <div class="letter-top-name">ふりかえり</div>
          <div class="letter-top-date">${fmtDateLong(r.startedAt)}</div>
        </div>
        <div style="width: 36px;"></div>
      </div>

      <div class="letter-body">
        <div class="letter-card">
          <div class="letter-corner tl"></div>
          <div class="letter-corner br"></div>

          <div class="letter-stamp">ASIDE · LETTER</div>

          <div class="letter-greet">${escapeHtml(state.nickname)} へ、</div>
          <div class="letter-intro">きょう、ふりかえってくれてありがとう。</div>

          <div class="letter-block">
            <div class="letter-label">きょうの出来事</div>
            <div class="letter-quote">${escapeHtml(r.event)}</div>
          </div>

          <div class="letter-connector">
            <div class="letter-connector-line"></div>
            <div class="letter-connector-label">そのとき、頭に浮かんだのは</div>
            <div class="letter-connector-line"></div>
          </div>

          <div class="letter-block">
            <div class="letter-thought-card">
              <div class="letter-thought-mark">“</div>
              <div class="letter-thought-text">${escapeHtml(r.thoughts)}</div>
            </div>
          </div>

          <div class="letter-block">
            <div class="letter-emotion-row">
              <div class="letter-emotion-label">
                <span class="letter-emotion-emoji">${escapeHtml(eb.emoji)}</span>
                <span>${escapeHtml(eb.label)}</span>
              </div>
              <div class="letter-emotion-score">${eb.score}<span>/10</span></div>
            </div>
            <div class="letter-emotion-bar">
              <div class="letter-emotion-fill ${barTone.before}" style="--target-width: ${beforePct}%"></div>
            </div>
          </div>

          <div class="letter-shift">
            <div class="letter-shift-curve">${icon('shift-curve')}</div>
            <div class="letter-shift-text">あなたが見つけた、別の見方</div>
          </div>

          <div class="letter-block">
            <div class="letter-thought-card alt">
              <div class="letter-thought-mark">“</div>
              <div class="letter-thought-text">${escapeHtml(altText || '（未記入）')}</div>
            </div>
          </div>

          <div class="letter-block">
            <div class="letter-emotion-row">
              <div class="letter-emotion-label">
                <span class="letter-emotion-emoji">${escapeHtml(ea.emoji)}</span>
                <span>同じ「${escapeHtml(ea.label)}」、いま測ると</span>
              </div>
              <div class="letter-emotion-score ${delta > 0 ? 'lighter' : delta < 0 ? 'heavier' : ''}">${ea.score}<span>/10</span></div>
            </div>
            <div class="letter-emotion-bar">
              <div class="letter-emotion-fill ${barTone.after}" style="--target-width: ${afterPct}%"></div>
              ${delta !== 0 ? `
                <div class="letter-emotion-delta ${delta > 0 ? 'down' : 'up'}">
                  ${delta > 0 ? `−${delta}` : `+${Math.abs(delta)}`}
                </div>
              ` : ''}
            </div>
          </div>

          <div class="letter-closing">${escapeHtml(closingLine).replace(/\n/g, '<br>')}</div>

          <div class="letter-signature">— Aside</div>
        </div>
      </div>

      <div class="letter-footer">
        <button class="btn btn-primary" data-act="reflect-to-chat">この内容で${escapeHtml(getCurrentPersona().name)}と話す</button>
        <button class="btn btn-secondary" data-act="report-home">ホームに戻る</button>
        <button class="btn btn-ghost" data-act="report-share">書き出してコピー</button>
      </div>
    </div>
  `;
}

function getBarTone(before, after) {
  // Both use the same warm accent; after is lighter/softer if delta > 0
  return { before: 'tone-before', after: 'tone-after' };
}

// ---------- History ----------
let historyTopTab = 'list';    // 'list' | 'week' | 'month'
let historyFilter = 'all';     // 'all' | 'chat' | 'reflect' | 'rescue'

const RESCUE_LABEL = { fuzzy: 'なんとなくしんどい', spin: '頭がぐるぐるする', words: '気持ちをことばにしたい', night: '眠る前に整えたい' };

function viewHistory() {
  // 週次・月次タブはinsightsを埋め込む
  if (historyTopTab === 'week' || historyTopTab === 'month') {
    insightsRange = historyTopTab === 'month' ? 'month' : 'week';
    return viewHistoryReport();
  }

  const chatItems = state.sessions.map(s => ({ kind: 'chat', id: s.id, ts: s.startedAt, data: s })).sort((a, b) => b.ts - a.ts);
  const reflectItems = state.reflections.map(r => ({ kind: 'reflect', id: r.id, ts: r.startedAt, data: r })).sort((a, b) => b.ts - a.ts);
  const rescueItems = (state.rescueHistory || []).map(r => ({ kind: 'rescue', id: r.id, ts: r.startedAt, data: r })).sort((a, b) => b.ts - a.ts);

  let items;
  if (historyFilter === 'all') {
    items = [...chatItems, ...reflectItems, ...rescueItems].sort((a, b) => b.ts - a.ts);
  } else if (historyFilter === 'chat') items = chatItems;
  else if (historyFilter === 'reflect') items = reflectItems;
  else items = rescueItems;

  const totalCount = chatItems.length + reflectItems.length + rescueItems.length;

  return `
    <div class="screen active">
      <div class="page-header">
        <div class="page-title">きろく</div>
      </div>
      <div class="history-topbar">
        ${renderHistoryTopTabs()}
        <div class="history-filter-chips">
          <button class="history-chip ${historyFilter === 'all' ? 'active' : ''}" data-act="history-filter" data-filter="all">すべて（${totalCount}）</button>
          <button class="history-chip ${historyFilter === 'chat' ? 'active' : ''}" data-act="history-filter" data-filter="chat">会話（${chatItems.length}）</button>
          <button class="history-chip ${historyFilter === 'reflect' ? 'active' : ''}" data-act="history-filter" data-filter="reflect">整理（${reflectItems.length}）</button>
          <button class="history-chip ${historyFilter === 'rescue' ? 'active' : ''}" data-act="history-filter" data-filter="rescue">ひといき（${rescueItems.length}）</button>
        </div>
      </div>
      <div class="history-list">
        ${items.length === 0 ? renderHistoryEmpty() : items.map(renderHistoryCard).join('')}

}

function renderHistoryTopTabs() {

function renderHistoryCard(item) {
  if (item.kind === 'chat') {
    const s = item.data;
    const userMsgs = s.messages.filter(m => m.role === 'user');
    const pid = s.personaId || state.selectedPersonaId;
    const persona = PERSONAS.find(p => p.id === pid) || PERSONAS[0];
    const displayName = (state.personaNames && state.personaNames[persona.id]) || persona.name;
    const firstUserMsg = userMsgs[0] ? userMsgs[0].content : (s.topicStart || '会話を始めた');
    return `
      <div class="history-item" data-history="chat" data-hid="${s.id}">
        <div class="history-date">${fmtDateLong(s.startedAt)} ・ ${escapeHtml(displayName)}と話した</div>
        <div class="history-preview">${escapeHtml(firstUserMsg.slice(0, 60))}</div>
        <div class="history-meta">
          <span>${userMsgs.length} メッセージ</span>
          ${s.moodScore ? `<span>${MOODS.find(x => x.score === s.moodScore).emoji} ${MOODS.find(x => x.score === s.moodScore).label}</span>` : ''}
          ${s.topicStart ? `<span>🎯 ${escapeHtml(s.topicStart)}</span>` : ''}
        </div>
      </div>
    `;
  }
  if (item.kind === 'reflect') {
    const r = item.data;
    const delta = r.emotionBefore.score - r.emotionAfter.score;
    return `
      <div class="history-item" data-history="reflect" data-hid="${r.id}">
        <div class="history-date">${fmtDateLong(r.startedAt)} ・ もやもや整理</div>
        <div class="history-preview">${escapeHtml((r.event || '').slice(0, 80))}</div>
        <div class="history-meta">
          <span>${r.emotionBefore.emoji} ${r.emotionBefore.label}</span>
          <span>${r.emotionBefore.score} → ${r.emotionAfter.score}${delta > 0 ? `（-${delta}）` : delta < 0 ? `（+${Math.abs(delta)}）` : ''}</span>
        </div>
      </div>
    `;
  }
  if (item.kind === 'rescue') {
    const r = item.data;
    const title = RESCUE_LABEL[r.flowId] || r.flowId;
    let detailLine = r.exitChoice || '';
    if (r.flowId === 'night' && r.detail) {
      if (r.branch === 'A') detailLine = '10秒呼吸した';
      else if (r.branch === 'B') detailLine = `「${r.detail.bLabel || 'ひとこと'}」を置いた`;
      else if (r.branch === 'C') detailLine = `明日にまわす（${r.detail.cTheme || ''}）`;
    }
    return `
      <div class="history-item" data-history="rescue" data-hid="${r.id}">
        <div class="history-date">${fmtDateLong(r.startedAt)} ・ ひといき</div>
        <div class="history-preview">🌫 ${escapeHtml(title)}</div>
        <div class="history-meta">
          <span>${escapeHtml(detailLine)}</span>
        </div>
      </div>
    `;
  }
  return '';
}

function viewHistoryReport() {
  const days = historyTopTab === 'month' ? 30 : 7;
  const ins = computeInsights(days);
  return `
    <div class="screen active">

// 月次レポートに「これまでのテーマ」セクション
function renderThemeHistorySection() {
  const history = (state.weekThemeHistory || []).slice(-8).reverse();
  if (history.length === 0) return '';
  // 各履歴エントリについて、そのweek範囲での実行回数を再計算
  const items = history.map(h => {
    const themeDef = THEME_CATALOG.find(t => t.key === h.key);
    if (!themeDef || !h.weekStartDate) return { ...h, count: 0 };
    const startTs = new Date(h.weekStartDate + 'T00:00:00').getTime();
    const endTs = new Date(h.weekEndDate + 'T23:59:59').getTime();
    let count = 0;
    const t = themeDef.actionType;
    if (t === 'mood_checkin') count = (state.moods || []).filter(m => (m.checkedAt || new Date(m.date).getTime()) >= startTs && (m.checkedAt || new Date(m.date).getTime()) <= endTs).length;
    else if (t === 'ai_talk') count = (state.sessions || []).filter(s => s.startedAt >= startTs && s.startedAt <= endTs).length;
    else if (t === 'thought_record') count = (state.reflections || []).filter(r => (r.completedAt || r.startedAt) >= startTs && (r.completedAt || r.startedAt) <= endTs).length;
    else if (t === 'rescue_use') count = (state.rescueHistory || []).filter(r => r.startedAt >= startTs && r.startedAt <= endTs).length;
    else if (t === 'rescue_night') count = (state.rescueHistory || []).filter(r => r.flowId === 'night' && r.startedAt >= startTs && r.startedAt <= endTs).length;
    return { ...h, count };
  });

  const catLabel = { A: '記録', B: '会話', C: '整理', D: 'ひといき' };

  return `
    <div class="report-block" style="margin-top:16px;">
      <div class="report-block-label">これまでのテーマ</div>
      <div class="theme-history-list">
        ${items.map(i => {
          const weekLabel = i.weekStartDate ? `${i.weekStartDate.slice(5).replace('-', '/')}〜` : '';
          return `
            <div class="theme-history-item">
              <div class="theme-history-top">
                <span class="theme-history-week">${escapeHtml(weekLabel)}</span>
                <span class="theme-history-cat">${escapeHtml(catLabel[i.category] || '')}</span>
              </div>
              <div class="theme-history-title">${escapeHtml(i.title || '')}</div>
              <div class="theme-history-count">${i.count === 0 ? 'ふれなかった週' : `${i.count}回ふれた`}</div>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;
}

// ---------- Settings ----------
// 設定画面：「あなたの傾向」セクション（Profile蓄積の可視化）
function renderSettingsProfileSection() {
  // profile がまだ計算されていない / サンプル少ない時は控えめに省略
  const profile = (function(){
    try { return computeProfile(); } catch(e) { return state.personalizationProfile || null; }
  })();
  if (!profile || !profile.sampleSize) return '';
  const totalSamples = (profile.sampleSize.logs || 0) + (profile.sampleSize.moods || 0)
                     + (profile.sampleSize.sessions || 0) + (profile.sampleSize.reflects || 0)
                     + (profile.sampleSize.rescues || 0);
  if (totalSamples < 3) return '';

  const lines = [];
  if (profile.supportStyle && STYLE_LABELS[profile.supportStyle]) {
    lines.push({ label: '伴走スタイル', value: STYLE_LABELS[profile.supportStyle] });
  }
  if (profile.preferredTimeSlot) {
    lines.push({ label: '行動しやすい時間', value: SLOT_LABELS[profile.preferredTimeSlot] });
  }
  if (profile.preferredActionType) {
    const typeLabel = { app: 'アプリ内', daily: '日常', social: '人と関わる' };
    lines.push({ label: '選ばれやすい行動', value: typeLabel[profile.preferredActionType] || profile.preferredActionType });
  }
  if (profile.completionRate !== null) {
    lines.push({ label: '直近の実施率', value: `${profile.completionRate}%` });
  }

  // 変化の兆し（profileHistory から直近 vs 前回）
  let changeHint = '';
  const hist = state.profileHistory || [];
  if (hist.length >= 2) {
    const latest = hist[hist.length - 1];
    const prev = hist[hist.length - 2];
    if (latest && prev) {
      const dcr = (latest.completionRate || 0) - (prev.completionRate || 0);
      if (dcr >= 10) changeHint = '実施率が少し上がってきています。';
      else if (dcr <= -10) changeHint = '最近は少し無理しない期間のようです。';
      else if (latest.supportStyle && prev.supportStyle && latest.supportStyle !== prev.supportStyle) changeHint = '関わり方が少しずつ変わってきています。';
    }
  }

  if (lines.length === 0) return '';

  return `
    <div class="setting-group">
      <div class="setting-group-title">あなたの傾向（直近30日から）</div>
      ${lines.map(l => `
        <div class="setting-row setting-row-readonly">
          <div class="setting-label">${escapeHtml(l.label)}</div>
          <div class="setting-value">${escapeHtml(l.value)}</div>
        </div>
      `).join('')}
      ${changeHint ? `<div class="setting-hint-line">${escapeHtml(changeHint)}</div>` : ''}
      <div class="setting-sub-note">※ これは口調や提案のヒントに使われます。診断ではありません。</div>
    </div>
  `;
}

function ctaButtonLabel(ctaAct) {
  if (!ctaAct) return 'やってみる';
  if (ctaAct === 'goto-mood') return 'きもちチェック';
  if (ctaAct === 'goto-rescue' || ctaAct === 'goto-rescue-night' || ctaAct === 'goto-rescue-words' || ctaAct === 'goto-rescue-fuzzy') return '少しひと息';
  if (ctaAct === 'start-chat' || ctaAct === 'goto-talk') return '話してみる';
  if (ctaAct === 'start-reflect') return 'もやもや整理';
  return 'やってみる';
}

function renderWeekThemeCard() {
  ensureCurrentWeekTheme();
  const theme = state.weekTheme;
  const goalSet = !!getCurrentDirectionGoal();
  if (!theme || !theme.key || theme.status === 'skipped') {
    if (!goalSet) {
      // 目標未設定時：補助説明モード（テーマ単独では決めさせない）
      return `
        <div class="week-theme-card week-theme-card-secondary">
          <div class="week-theme-label">今週の小さなテーマ</div>

          <div class="week-theme-empty-sub">方向が決まると、今週のテーマを一緒に考えられます。</div>
        </div>
      `;
    }
    return `
      <div class="week-theme-card week-theme-card-empty" data-act="week-theme-open">
        <div class="week-theme-label">今週の小さなテーマ</div>
        <div class="week-theme-empty-title">${theme && theme.status === 'skipped' ? 'やっぱり今週のテーマを決める？' : '今週のテーマを決める'}</div>
        <div class="week-theme-empty-sub">1週間、小さく意識してみよう</div>
        <div class="week-theme-arrow">›</div>
      </div>
    `;
  }
  const themeDef = THEME_CATALOG.find(t => t.key === theme.key);
  const count = computeThemeProgress(theme);
  const target = themeDef && themeDef.target ? themeDef.target : null;
  const ctaAct = themeDef ? themeDef.ctaAct : 'goto-mood';
  const btnLabel = ctaButtonLabel(ctaAct);

  let kindMsg = '';
  if (count === 0) kindMsg = 'できそうな時に、少しだけで大丈夫。';
  else if (count === 1) kindMsg = '一回できたね。';
  else if (count >= 3) kindMsg = '自分のペースで続けられてる。';
  else kindMsg = '少しずつ触れられているね。';

  let dots = '';
  if (target) {
    dots = '<div class="week-theme-dots">';
    for (let i = 0; i < target; i++) {
      dots += `<span class="week-theme-dot ${i < count ? 'filled' : ''}"></span>`;
    }
    dots += '</div>';
  }

  // 上位目標との接続文（3層構造の「つながり」）
  const goalCtx = getCurrentDirectionGoal();
  const goalLine = goalCtx

  const needsRefresh = theme.status === 'needs_refresh';

  return `
    <div class="week-theme-card ${needsRefresh ? 'week-theme-card-stale' : ''}">

      ${needsRefresh ? `<div class="week-theme-stale-hint">目指したい方向が変わったので、今週のテーマを整え直しましょう。</div>` : ''}
      ${dots}
      <div class="week-theme-kind-msg-row">${escapeHtml(kindMsg)}${count > 0 ? `　・　今週${count}回` : ''}</div>
      <div class="week-theme-actions">
        <button class="btn btn-primary week-theme-action-btn" data-act="week-theme-cta" data-cta="${ctaAct}">${escapeHtml(btnLabel)}</button>
      </div>
