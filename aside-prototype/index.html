// 変更理由 → 提案方向のマッピング
const CHANGE_REASONS = [
  { id: 'too_heavy', label: '今の自分には少し重い', hint: 'もっと軽いテーマを出すね' },
  { id: 'lighter', label: 'もう少し軽いものにしたい', hint: '軽量テーマを優先して出すね' },
  { id: 'not_mood', label: '今の気分に合わない', hint: '別の方向のテーマを探してみよう' },
  { id: 'try_other', label: '別のことを試したい', hint: '今と違うカテゴリのテーマを出すね' }
];

// 変更理由別のおすすめキー
function suggestChangeByReason(reason) {
  const currentKey = state.weekTheme ? state.weekTheme.key : null;
  const currentCat = state.weekTheme ? state.weekTheme.category : null;
  const lighter = ['mood_one_word', 'talk_one_line', 'rescue_use']; // 最も軽量
  if (reason === 'too_heavy' || reason === 'lighter') {
    const rec = THEME_CATALOG.find(t => lighter.includes(t.key) && t.key !== currentKey)
             || THEME_CATALOG.find(t => t.key === 'mood_one_word');
    const alts = THEME_CATALOG
      .filter(t => lighter.includes(t.key) && t.key !== rec.key && t.key !== currentKey)
      .slice(0, 2);
    return { recommend: rec, alts, reason: 'もっと軽く始められるテーマをえらびました。' };
  }
  if (reason === 'not_mood' || reason === 'try_other') {
    // 現カテゴリと違うカテゴリから
    const otherCats = ['A', 'B', 'C', 'D'].filter(c => c !== currentCat);
    const rec = THEME_CATALOG.find(t => t.category === otherCats[0])
             || THEME_CATALOG[0];
    const alts = otherCats.slice(1).map(c => THEME_CATALOG.find(t => t.category === c)).filter(Boolean).slice(0, 2);
    return { recommend: rec, alts, reason: '違う方向のテーマをえらびました。' };
  }
  // fallback: 通常提案
  return suggestThemes();
}

function prepareActionSuggestions(opts = {}) {
  const goalKey = (state.directionGoal && state.directionGoal.key) || 'not_sure_yet';
  const userState = state.userStateSurvey || null;
  let pool = getActionsForGoal(goalKey, userState);

  // プロフィール（Phase 3）反映：過去の実績で並び替え
  const profile = computeProfile();
  if (profile.preferredActionType) {
    pool.sort((a, b) => (a.type === profile.preferredActionType ? -1 : b.type === profile.preferredActionType ? 1 : 0));
  }
  // 実施率が低い → やさしめを優先
  if (profile.completionRate !== null && profile.completionRate < 30) {
    pool.sort((a, b) => {
      const order = { easy: 0, normal: 1, bold: 2 };
      return order[a.difficulty] - order[b.difficulty];
    });
  }
  // 仕様§6-3: やさしめ/ふつう/少し前進 をバランスよく混ぜて6件表示
  actionSuggestState.proposals = balancedActionMix(pool, 6);
  actionSuggestState.selected = [];
  actionSuggestState.isAiLoading = false;
  actionSuggestState.aiSuccess = false;
  actionSuggestState.mode = opts.mode || actionSuggestState.mode || 'initial';

  // API keyがあれば裏でAIに問い合わせて差し替え
  if (state.apiKey && !opts.skipAi) {
    triggerAiActionUpgrade(actionSuggestState.mode);
  }
}

// 選ばれた行動から、やさしい意味づけのテーマ文を生成
function generateThemeFromActions(actions) {
  // ルールベース：actionType とキーワードで意味づけを組み立てる
  const types = new Set(actions.map(a => a.type));
  const hasAppOneLine = actions.some(a => a.id === 'act_ai_one_line' || a.id === 'act_mood_one' || a.id === 'act_one_event');
  const hasNight = actions.some(a => a.id === 'act_night_reset' || a.id === 'act_mood_night');
  const hasRescue = actions.some(a => a.id === 'act_rescue_once' || a.id === 'act_breath_10s');
  const hasSocial = types.has('social');
  const hasOrganize = actions.some(a => a.id === 'act_reflect_once');
  const hasMoodRecord = actions.some(a => a.id === 'act_mood_select' || a.id === 'act_mood_normal');

  const variants = [];
  if (hasAppOneLine || hasOrganize) {
    variants.push({ title: '頭の中にためすぎず、少しずつ外に出してみる', meaning: '考えを全部整理しきらなくても大丈夫。今週は、抱え込みすぎない練習をしてみよう。' });
  }
  if (hasNight) {
    variants.push({ title: '夜に自分を放置しない', meaning: '一日の終わりに、ほんの少しだけ自分の方を向く時間をつくってみよう。' });
  }
  if (hasRescue) {
    variants.push({ title: 'しんどい時の手札を1つ持っておく', meaning: '逃げ道があると知っているだけで、ちょっと楽になる。' });
  }
  if (hasSocial) {
    variants.push({ title: '「ひとりで抱えない」の最初の一歩を置く', meaning: 'いきなり頼らなくていい。頼れる場所を心に置くだけで十分。' });
  }
  if (hasMoodRecord) {
    variants.push({ title: '今日の自分を、少しだけ見つける', meaning: 'なんとなくの気分にも、ちゃんと自分の大事な情報がある。' });
  }
  if (variants.length === 0) {
    variants.push({ title: '自分のペースを見つけていく', meaning: '続けやすい形を、今週少しだけ試してみよう。' });
  }
  return variants[themeConfirmState.regenCount % variants.length];
}

// 行動の実行形式を推定（execType 明示があれば優先）
function getActionExecutionType(a) {
  if (!a) return 'instant_done';
  if (a.execType) return a.execType;
  const t = (a.title || '') + ' ' + (a.desc || '');
  // 1. タイトルが強い memo 指標を持つ → memo_done（ctaActより優先）
  if (/残す|メモ|書く|1文|一文|保存|整理する|振り返る|並べる|まとめる|タイトルをつける|向き合う|具体的に決める|整理した内容|3つまで|2つを比べて/.test(t)) return 'memo_done';
  // 2. タイトルが選択系なら choice_done
  if (/近い言葉を1つ|近い色|近い一文|表情を選ぶ|スタンプ|思い浮かべる|1人だけ|度合いを選ぶ|近いものを1つ|条件を考える/.test(t)) return 'choice_done';
  // 3. タイトルが身体系なら instant_done
  if (/呼吸|水を|肩の力|目を閉じ|背伸び|立って|数える|温める|さする|外の空気|伸びる|姿勢|10秒|1分だけ歩く|静かな時間/.test(t)) return 'instant_done';
  // 4. ctaAct ベースのフォールバック
  if (a.ctaAct === 'start-chat') return 'ai_assist';
  if (a.ctaAct === 'start-reflect') return 'ai_assist';
  if (a.ctaAct === 'goto-mood') return 'choice_done';
  if (a.ctaAct === 'goto-rescue' || a.ctaAct === 'goto-rescue-night') return 'instant_done';
  return 'instant_done';
}

  const theme = state.weekTheme;

  const type = getActionExecutionType(action);

  if (type === 'memo_done')    return openMemoActionModal(action);
  if (type === 'ai_assist')    return openAiAssistActionModal(action);
  if (type === 'choice_done')  return openChoiceActionModal(action);
  return openInstantActionModal(action);
}

// ---------- パーソナライズProfile（Phase 3） ----------
// state.personalizationProfile に蓄積する集約分析
// 各所で computeProfile() を呼んで最新化して使う

function computeProfile() {
  const now = Date.now();
  const D30 = now - 30 * 86400000;
  const logs = (state.actionLogs || []).filter(l => l.executedAt >= D30);
  const moods = (state.moods || []).filter(m => (m.checkedAt || new Date(m.date).getTime()) >= D30);
  const sessions = (state.sessions || []).filter(s => s.startedAt >= D30);
  const reflects = (state.reflections || []).filter(r => r.startedAt >= D30);
  const rescues = (state.rescueHistory || []).filter(r => r.startedAt >= D30);

  // === 完了率 ===
  const done = logs.filter(l => l.status === 'done').length;
  const total = logs.length;
  const completionRate = total === 0 ? null : Math.round((done / total) * 100);

  // === 時間帯分布（朝/昼/夕/夜） ===
  const slotBins = { morning: 0, noon: 0, evening: 0, night: 0 };
  const all = [
    ...logs.filter(l => l.status === 'done').map(x => x.executedAt),
    ...sessions.map(x => x.startedAt),
    ...reflects.map(x => x.startedAt),
    ...rescues.map(x => x.startedAt),
    ...moods.map(x => x.checkedAt || new Date(x.date).getTime())
  ];
  all.forEach(ts => {
    const h = new Date(ts).getHours();
    if (h >= 5 && h < 11) slotBins.morning++;
    else if (h >= 11 && h < 16) slotBins.noon++;
    else if (h >= 16 && h < 21) slotBins.evening++;
    else slotBins.night++;
  });
  let preferredTimeSlot = null;
  let maxSlot = 0;
  Object.entries(slotBins).forEach(([k, v]) => { if (v > maxSlot) { maxSlot = v; preferredTimeSlot = k; } });
  if (maxSlot < 3) preferredTimeSlot = null; // サンプル少ない時は無指定

  // === アクションカテゴリ傾向（app/daily/social） ===
  const typeBins = { app: 0, daily: 0, social: 0 };
  logs.filter(l => l.status === 'done').forEach(l => {
    const a = ACTION_CATALOG.find(x => x.id === l.actionId);
    if (a) typeBins[a.type] = (typeBins[a.type] || 0) + 1;
  });
  const preferredActionType = Object.entries(typeBins).sort((a, b) => b[1] - a[1])[0];
  const avoidedActionType = Object.entries(typeBins).sort((a, b) => a[1] - b[1])[0];

  // === 伴走スタイル（recorder / talker / organizer / rescue_user） ===
  const styleScores = {
    recorder: moods.length * 1.0,
    talker: sessions.length * 2.0,
    organizer: reflects.length * 3.0,
    rescue_user: rescues.length * 2.5
  };
  const supportStyle = Object.entries(styleScores).sort((a, b) => b[1] - a[1])[0];
  const supportStyleKey = supportStyle && supportStyle[1] > 0 ? supportStyle[0] : null;

  // === 気分×行動の相関（行動実施日 vs 非実施日の気分平均） ===
  const actionDaysSet = new Set(
    logs.filter(l => l.status === 'done').map(l => new Date(l.executedAt).toISOString().slice(0, 10))
  );
  const actionDayMoods = [];
  const nonActionDayMoods = [];
  moods.forEach(m => {
    const dk = m.date;
    if (actionDaysSet.has(dk)) actionDayMoods.push(m.score);
    else nonActionDayMoods.push(m.score);
  });
  const actionDayMoodAvg = actionDayMoods.length ? actionDayMoods.reduce((s, x) => s + x, 0) / actionDayMoods.length : null;
  const nonActionDayMoodAvg = nonActionDayMoods.length ? nonActionDayMoods.reduce((s, x) => s + x, 0) / nonActionDayMoods.length : null;

  // === アクション別の気分効果（実施した日の気分平均 vs 全体平均） ===
  const moodByDate = {};
  moods.forEach(m => { moodByDate[m.date] = m.score; });
  const overallMoodAvg = moods.length ? moods.reduce((s, m) => s + m.score, 0) / moods.length : null;
  const effectByAction = {};
  if (overallMoodAvg !== null) {
    const actionDatesByAction = {};
    logs.filter(l => l.status === 'done').forEach(l => {
      const dk = new Date(l.executedAt).toISOString().slice(0, 10);
      if (!actionDatesByAction[l.actionId]) actionDatesByAction[l.actionId] = new Set();
      actionDatesByAction[l.actionId].add(dk);
    });
    Object.entries(actionDatesByAction).forEach(([actionId, dates]) => {
      const scores = [];
      dates.forEach(dk => { if (moodByDate[dk] !== undefined) scores.push(moodByDate[dk]); });
      if (scores.length >= 2) {
        const avg = scores.reduce((s, x) => s + x, 0) / scores.length;
        effectByAction[actionId] = { delta: +(avg - overallMoodAvg).toFixed(2), sampleDays: scores.length };
      }
    });
  }

  // === 自由入力量 ===
  const avgMoodCommentLen = moods.length
    ? moods.reduce((s, m) => s + (m.comment ? m.comment.length : 0), 0) / moods.length
    : 0;
  const freeTextTendency = avgMoodCommentLen >= 20 ? 'high' : avgMoodCommentLen >= 8 ? 'mid' : 'low';

  // === execType 別の完了率（§8 実行形式ごとのパーソナライズ） ===
  const execTypeAttempt = { instant_done: 0, memo_done: 0, ai_assist: 0, choice_done: 0 };
  const execTypeDone    = { instant_done: 0, memo_done: 0, ai_assist: 0, choice_done: 0 };
  logs.forEach(l => {
    let et = l.execType;
    if (!et) {
      // 旧ログ（execType なし）は ACTION_CATALOG から推定
      const a = ACTION_CATALOG.find(x => x.id === l.actionId);
      if (a && typeof getActionExecutionType === 'function') et = getActionExecutionType(a);
    }
    if (!et || !(et in execTypeAttempt)) return;
    execTypeAttempt[et]++;
    if (l.status === 'done') execTypeDone[et]++;
  });
  // 最も成功している execType（試行2件以上 かつ 完了率50%以上 を優先）
  let preferredExecType = null;
  let bestScore = -1;
  Object.keys(execTypeAttempt).forEach(k => {
    const att = execTypeAttempt[k];
    if (att < 2) return;
    const rate = execTypeDone[k] / att;
    if (rate >= 0.5 && execTypeDone[k] > bestScore) {
      bestScore = execTypeDone[k];
      preferredExecType = k;
    }
  });

  // 連続実行日数（今日/昨日/おととい... と遡って done が存在した日数）
  const doneDates = new Set(
    logs.filter(l => l.status === 'done').map(l => new Date(l.executedAt).toISOString().slice(0, 10))
  );
  let streak = 0;
  const cur = new Date();
  while (true) {
    const dk = cur.toISOString().slice(0, 10);
    if (doneDates.has(dk)) { streak++; cur.setDate(cur.getDate() - 1); } else break;
  }
  const totalDone = logs.filter(l => l.status === 'done').length;

  const profile = {
    completionRate,
    preferredTimeSlot,
    slotBins,
    preferredActionType: preferredActionType && preferredActionType[1] > 0 ? preferredActionType[0] : null,
    avoidedActionType: avoidedActionType && avoidedActionType[1] === 0 ? avoidedActionType[0] : null,
    supportStyle: supportStyleKey,
    styleScores,
    actionDayMoodAvg,
    nonActionDayMoodAvg,
    effectByAction,
    freeTextTendency,
    execTypeAttempt,
    execTypeDone,
    preferredExecType,
    streak,
    totalDone,
    sampleSize: { logs: total, moods: moods.length, sessions: sessions.length, reflects: reflects.length, rescues: rescues.length },
    updatedAt: Date.now()
  };

  state.personalizationProfile = profile;

  // 週次スナップショット：過去の profile を蓄積
  maybeArchiveProfileSnapshot(profile);

  return profile;
}

// 週次プロファイル履歴の蓄積（月曜午前 or 前回が7日以上前なら1件追加）
function maybeArchiveProfileSnapshot(profile) {
  if (!profile || !profile.sampleSize) return;
  const totalSamples = (profile.sampleSize.logs || 0) + (profile.sampleSize.moods || 0)
                     + (profile.sampleSize.sessions || 0) + (profile.sampleSize.reflects || 0)
                     + (profile.sampleSize.rescues || 0);
  if (totalSamples < 3) return; // サンプル少な過ぎる時は蓄積しない

  if (!Array.isArray(state.profileHistory)) state.profileHistory = [];
  const last = state.profileHistory[state.profileHistory.length - 1];
  const DAY = 86400000;
  if (last && (Date.now() - last.capturedAt) < 7 * DAY) return; // 直近1週間以内は上書きしない

  state.profileHistory.push({
    capturedAt: Date.now(),
    weekKey: (function(){ const d = new Date(); const wkStart = new Date(d); wkStart.setDate(d.getDate() - d.getDay() + 1); return wkStart.toISOString().slice(0,10); })(),
    completionRate: profile.completionRate,
    preferredTimeSlot: profile.preferredTimeSlot,
    preferredActionType: profile.preferredActionType,
    supportStyle: profile.supportStyle,
    actionDayMoodAvg: profile.actionDayMoodAvg,
    nonActionDayMoodAvg: profile.nonActionDayMoodAvg,
    sampleLogs: profile.sampleSize.logs
  });
  // 最大12週分（3ヶ月）保持
  if (state.profileHistory.length > 12) state.profileHistory = state.profileHistory.slice(-12);
  try { saveState(); } catch(e) { /* ignore */ }
}

                     + (p.sampleSize.sessions || 0) + (p.sampleSize.reflects || 0)
                     + (p.sampleSize.rescues || 0);
  if (totalSamples < 3) return ''; // 記録が少なすぎる段階では profile を使わない

  const styleGuide = {
    recorder:    '静かに記録を積み重ねる傾向。言葉を多く求めず、短く受け止める口調で。',

  const lines = ['【このユーザーの傾向（直近30日の記録から・参考情報）】'];

    lines.push(`- 伴走スタイル: ${styleGuide[p.supportStyle]}`);
  }
  if (p.preferredTimeSlot) {
    lines.push(`- よく記録をつける時間帯: ${slotLabel[p.preferredTimeSlot]}`);
  }
  if (p.preferredActionType && typeLabel[p.preferredActionType]) {
    lines.push(`- 選ばれやすい行動タイプ: ${typeLabel[p.preferredActionType]}`);
  }
  if (p.completionRate !== null) {
    if (p.completionRate < 30) {
      lines.push(`- 最近の実施率は低め(${p.completionRate}%)。小さく始められる声かけを優先し、実施していないことを責めない。`);
    } else if (p.completionRate >= 70) {
      lines.push(`- 最近の実施率は高め(${p.completionRate}%)。積み重ねを小さく肯定する声かけを。`);
    } else {
      lines.push(`- 最近の実施率は中程度(${p.completionRate}%)。無理のないペースを尊重する声かけを。`);
    }
  }
  if (p.freeTextTendency === 'low') {
    lines.push(`- コメントは少なめ。言葉を求めず、選択肢で進められる話し方を。`);
  } else if (p.freeTextTendency === 'high') {

  }
  lines.push('');
  lines.push('※ これは口調の柔らかさを選ぶ参考情報です。診断的に使わず、「あなたは◯◯なタイプですね」のように言語化しないこと。');
  return lines.join('\n');
}

// 今週の行動候補をAIに選ばせる（rule-baseの候補プールから3つ選定＋reasonを添える）
async function generateAiActionSuggestions(mode) {
  if (!state.apiKey) return null;
  const goal = (typeof getCurrentDirectionGoal === 'function') ? getCurrentDirectionGoal() : null;
  const userState = state.userStateSurvey || null;
  const goalKey = (state.directionGoal && state.directionGoal.key) || 'not_sure_yet';

  // カタログをAIに渡す（固定IDからのみ選ばせる）
  const candidates = getActionsForGoal(goalKey, userState);
  if (!candidates || candidates.length === 0) return null;

  const systemPrompt = `あなたは、ユーザーの「ありたい方向性」と「直近の傾向」から、今週の小さな行動を3つ選ぶ伴走者です。
あなたは医療・心理の専門家ではありません。診断・治療・専門的助言は一切しません。

【あなたの役割】
- 下記の【行動候補】から、このユーザーに合いそうな3つを選ぶ
- 必ず難易度を分ける（仕様v3.2§13-3準拠）:
  1つ目: difficulty=easy（いちばんやさしい案）
  2つ目: difficulty=normal（ちょうどよさそうな案）
  3つ目: difficulty=bold（少しだけ前に進む案）
- ただし、ユーザーが「しんどい日が多い」状態なら bold は最大1件まで、無理なら normal 2件に差し替えてよい
- 各選択に、「なぜこの人に合いそうか」を1文（30〜70文字）で添える
- reason は診断・分類・心理用語を使わず、「〜かもしれません」「〜に向いていそうです」「〜が今は合いそうです」など柔らかい可能性表現を使う
- reason に「あなたは◯◯なタイプですね」のような決めつけは書かない
- reason は行動を促す命令調（〜しましょう／〜すべき）にしない
- 行動は新しく作らず、必ず【行動候補】にある id を使う

【禁止】
- 診断・治療・医学用語
- 「〜すべき」「〜しなさい」の口調
- 自分（AI）の経験や一般論を持ち出すこと
- ネガティブ方向への誘導

【モード】「${mode}」
- initial: 新規に今週のテーマを決める（方向性を素直に反映）
- continue: 前週と同じ方向性で続ける（同じ/近い行動を再提案）
- ease: 前週が重かった → よりやさしい行動（difficulty:easy寄り、duration短め）を3つ
- step_up: 前週が軽かった → 少しだけ背伸びした行動（normal以上を含める）を3つ
- change: 前週と違う角度（type を前週と変える、新しい切り口）を3つ

【返答形式（必ずJSON）】
{
  "picks": [
    { "id": "act_xxx", "reason": "..." },
    { "id": "act_yyy", "reason": "..." },
    { "id": "act_zzz", "reason": "..." }
  ]
}`;

  const goalLine = goal
    ? `【このユーザーの今の方向性】\n${goal.title}${goal.description ? '（' + goal.description + '）' : ''}`
    : '';
  const surveyBlock = userState
    ? `【最近の状態（オンボーディング設問の回答）】\n- 日々の感覚: ${userState.lifeStatus}\n- 続けやすさ: ${userState.duration}\n- 得意な行動タイプ: ${userState.actionType}`
    : '';
  const prevTheme = state.weekTheme;
  const prevBlock = (prevTheme && prevTheme.status === 'accepted')
    ? `【前週のテーマ】${prevTheme.title}\n【前週選んだ行動】${(prevTheme.actions || []).map(a => a.title).join(' / ')}`
    : '';
  // 効果の大きい行動（過去に気分が少し上向いた日と相関）と現在の時間帯を示す
  const profile = state.personalizationProfile || {};
  const effectPairs = profile.effectByAction
    ? Object.entries(profile.effectByAction).filter(([_, v]) => v.sampleDays >= 2 && v.delta > 0.3).sort((a,b)=>b[1].delta-a[1].delta).slice(0,3)
    : [];
  const effectBlock = effectPairs.length > 0
    ? `【このユーザーの過去データで気分が少し上がりやすかった行動】\n${effectPairs.map(([id, v]) => {
        const a = ACTION_CATALOG.find(x => x.id === id);
        return a ? `- ${a.id}（${a.title}）＋${v.delta.toFixed(1)}ポイント（${v.sampleDays}日分）` : '';
      }).filter(Boolean).join('\n')}\n※ この行動を優先候補にしてよいですが、飽きないよう他カテゴリも混ぜてください。`
    : '';
  const slotNow = currentTimeSlot();
  const slotHint = `【現在の時間帯】${ ({morning:'朝', noon:'日中', evening:'夕方', night:'夜'}[slotNow]) } — この人が今から無理なく取り組みやすい行動を優先。`;
  const candidatesBlock = `【行動候補（この中からidを3つ選ぶ）】\n${candidates.map(a => `- ${a.id} [${a.type}/${a.difficulty}/${a.duration}分] ${a.title}（${a.desc}）`).join('\n')}`;
  const userMsg = [goalLine, surveyBlock, prevBlock, effectBlock, slotHint, candidatesBlock, '', `モード「${mode}」を踏まえて3つ選んでください。`].filter(x => x).join('\n\n');

  const model = state.apiModel || 'gemini-2.5-flash';
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(model)}:generateContent?key=${encodeURIComponent(state.apiKey)}`;
  const body = {
    systemInstruction: { parts: [{ text: buildSystemPrompt(systemPrompt) }] },
    contents: [{ role: 'user', parts: [{ text: userMsg }] }],
    generationConfig: {
      responseMimeType: 'application/json',
      responseSchema: {
        type: 'object',
        properties: {
          picks: {
            type: 'array',
            items: {
              type: 'object',
              properties: { id: { type: 'string' }, reason: { type: 'string' } },
              required: ['id', 'reason']
            }
          }
        },
        required: ['picks']
      },
      temperature: 0.8,
      maxOutputTokens: 1400,
      thinkingConfig: { thinkingBudget: 0 }
    },
    safetySettings: [
      { category: 'HARM_CATEGORY_HARASSMENT', threshold: 'BLOCK_ONLY_HIGH' },
      { category: 'HARM_CATEGORY_HATE_SPEECH', threshold: 'BLOCK_ONLY_HIGH' },
      { category: 'HARM_CATEGORY_SEXUALLY_EXPLICIT', threshold: 'BLOCK_ONLY_HIGH' },
      { category: 'HARM_CATEGORY_DANGEROUS_CONTENT', threshold: 'BLOCK_ONLY_HIGH' }
    ]
  };
  try {
    const res = await fetchGeminiWithRetry(url, body);
    if (!res || !res.ok) return null;
    const data = await res.json();
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
    if (!text) return null;
    const parsed = JSON.parse(text);
    if (!parsed || !Array.isArray(parsed.picks)) return null;
    const picks = parsed.picks.map(p => {
      const a = ACTION_CATALOG.find(x => x.id === p.id);
      if (!a) return null;
      return { ...a, aiReason: String(p.reason || '').trim().slice(0, 120) };
    }).filter(x => x);
    if (picks.length === 0) return null;
    return picks;
  } catch (e) {
    console.warn('[Aside] AI action suggest failed:', e);
    return null;
  }
}

// rule-baseで即時表示 → 裏でAIを呼んで差し替え
async function triggerAiActionUpgrade(mode) {
  if (!state.apiKey) return;
  actionSuggestState.isAiLoading = true;
  actionSuggestState.aiAttempted = true;
  if (App.currentScreen === 'actionSuggest') render();
  try {
    const picks = await generateAiActionSuggestions(mode || 'initial');
    if (picks && picks.length >= 2) {
      actionSuggestState.proposals = picks.slice(0, 3);
      actionSuggestState.selected = [];
      actionSuggestState.aiSuccess = true;
    }
  } catch (e) {
    console.warn('[Aside] triggerAiActionUpgrade:', e);
  } finally {
    actionSuggestState.isAiLoading = false;
    if (App.currentScreen === 'actionSuggest') render();
  }
}

function getActionsForGoal(goalKey, userState) {
  // goalKey に合う候補を抽出
  let pool = ACTION_CATALOG.filter(a => a.goalKeys.includes(goalKey));

  // 状態把握設問で絞り込み
  if (userState) {
    // 続けやすい長さ
    if (userState.duration === 'one') pool = pool.filter(a => a.duration <= 1.5);
    else if (userState.duration === 'three') pool = pool.filter(a => a.duration <= 3);
    // duration === 'five' は制約なし

    // やりやすい行動タイプ
    if (userState.actionType === 'app_only') pool = pool.filter(a => a.type === 'app');
    else if (userState.actionType === 'daily') pool = pool.filter(a => a.type === 'app' || a.type === 'daily');
    // social の場合は全て含む

    // fit_states: 現在の状態に合う候補のみ（states 未定義なら通す）
    if (userState.lifeStatus) {
      const stateKey = userState.lifeStatus; // 'calm' | 'mixed' | 'heavy'
      pool = pool.filter(a => !a.states || a.states.length === 0 || a.states.includes(stateKey));
      // しんどい日が多い → bold は最大1件まで（仕様ルール2）
      if (stateKey === 'heavy') {
        const notBold = pool.filter(a => a.difficulty !== 'bold');
        const bold = pool.filter(a => a.difficulty === 'bold').slice(0, 1);
        pool = notBold.concat(bold);
      }
    }
  }

  if (pool.length === 0) {
    // フォールバック：easy な action 3件
    pool = ACTION_CATALOG.filter(a => a.difficulty === 'easy').slice(0, 4);
  }
  return pool;
}

// 仕様§6-3: 初回表示は やさしめ2-3/ふつう2-3/少し前進1-2 を混ぜる
// 仕様§8: preferredExecType があれば、そのタイプを各難易度で優先
function balancedActionMix(pool, targetSize) {
  targetSize = targetSize || 6;
  const profile = state.personalizationProfile || {};
  const preferredType = profile.preferredExecType || null;
  const execTypeOf = (a) => (typeof getActionExecutionType === 'function') ? getActionExecutionType(a) : null;

  // 各難易度内で preferredExecType を先頭に寄せる
  const prioritize = (arr) => {
    if (!preferredType) return arr.sort(() => Math.random() - 0.5);
    const pref = arr.filter(a => execTypeOf(a) === preferredType).sort(() => Math.random() - 0.5);
    const rest = arr.filter(a => execTypeOf(a) !== preferredType).sort(() => Math.random() - 0.5);
    return pref.concat(rest);
  };

  const easy = prioritize(pool.filter(a => a.difficulty === 'easy'));
  const normal = prioritize(pool.filter(a => a.difficulty === 'normal'));
  const bold = prioritize(pool.filter(a => a.difficulty === 'bold'));
  const pickedEasy = easy.slice(0, 3);
  const pickedNormal = normal.slice(0, 2);
  const pickedBold = bold.slice(0, 1);
  let mix = [...pickedEasy, ...pickedNormal, ...pickedBold];
  // 不足分をプールから補完
  const remaining = prioritize(pool.filter(a => !mix.find(m => m.id === a.id)));
  mix = mix.concat(remaining).slice(0, targetSize);
  return mix;
}

function getCurrentDirectionGoal() {
  if (!state.directionGoal || !state.directionGoal.key || state.directionGoal.status === 'archived') return null;
  return DIRECTION_GOALS.find(g => g.key === state.directionGoal.key) || null;
}

function selectDirectionGoal(key, changeReason) {
  const goalDef = DIRECTION_GOALS.find(g => g.key === key);
  if (!goalDef) return;
  const old = state.directionGoal;
  const now = Date.now();
  // 変更履歴に残す
  if (old && old.key && old.key !== key) {
    if (!state.directionGoalHistory) state.directionGoalHistory = [];
    state.directionGoalHistory.push({
      oldKey: old.key,
      oldTitle: old.title,
      newKey: key,
      newTitle: goalDef.title,
      reason: changeReason || '',
      changedAt: now
    });
  }
  state.directionGoal = {
    key: goalDef.key,
    title: goalDef.title,
    description: goalDef.description,
    status: 'active',
    selectedAt: old && old.key === key ? old.selectedAt : now,
    changedAt: old && old.key !== key ? now : null
  };
  state.directionGoalPromptShown = true;
  saveState();
}

function skipDirectionGoal() {
  state.directionGoal = { status: 'skipped', skippedAt: Date.now() };
  state.directionGoalPromptShown = true;
  saveState();
}

// 今週の範囲（月曜始まり）
function getWeekRange() {
  const today = new Date();
  const day = today.getDay(); // 0=Sun, 1=Mon...
  const diffToMon = (day + 6) % 7; // Mon=0, Sun=6
  const monday = new Date(today);
  monday.setDate(today.getDate() - diffToMon);
  monday.setHours(0, 0, 0, 0);
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  sunday.setHours(23, 59, 59, 999);
  const fmt = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  return { start: fmt(monday), end: fmt(sunday), startTs: monday.getTime(), endTs: sunday.getTime() };
}

// 直近7〜14日の利用傾向を解析してルールベースでテーマを提案
function suggestThemes() {
  const now = Date.now();
  const d14 = now - 14 * 86400000;
  const d7 = now - 7 * 86400000;
  const personaId = (state.selectedPersonaId || 'haru');

  const recentMoods = (state.moods || []).filter(m => m.checkedAt >= d14);
  const recentSessions = (state.sessions || []).filter(s => s.startedAt >= d14);
  const recentReflects = (state.reflections || []).filter(r => r.startedAt >= d14);
  const recentRescues = (state.rescueHistory || []).filter(r => r.startedAt >= d14);

  const moodCount14 = recentMoods.length;
  const chatCount14 = recentSessions.length;
  const reflectCount14 = recentReflects.length;
  const rescueCount14 = recentRescues.length;
  const nightRescueCount = recentRescues.filter(r => r.flowId === 'night').length;

  const lowMood7 = (state.moods || []).filter(m => m.checkedAt >= d7 && m.score <= 2).length;
  const heavyStressWeek = lowMood7 >= 3;

  const nightMoods = recentMoods.filter(m => {
    const h = new Date(m.checkedAt).getHours();
    return h >= 21 || h < 5;
  }).length;
  const dayMoods = recentMoods.length - nightMoods;

  let recommendKey, ruleKey;

  if (heavyStressWeek) {
    recommendKey = 'mood_one_word'; ruleKey = 'heavy_stress';
  } else if (moodCount14 < 2 && chatCount14 === 0 && reflectCount14 === 0) {
    recommendKey = 'mood_one_word'; ruleKey = 'few_usage';
  } else if (nightRescueCount >= 2 || (nightMoods >= 3 && nightMoods > dayMoods)) {
    recommendKey = 'night_reset'; ruleKey = 'night_heavy';
  } else if (moodCount14 >= 3 && chatCount14 <= 1) {
    recommendKey = 'talk_one_line'; ruleKey = 'mood_only';
  } else if (chatCount14 >= 3 && reflectCount14 === 0) {
    recommendKey = 'thought_once'; ruleKey = 'chat_no_organize';
  } else if (reflectCount14 >= 1 && rescueCount14 === 0) {
    recommendKey = 'rescue_use'; ruleKey = 'have_organize_no_rescue';
  } else {
    recommendKey = 'mood_one_word'; ruleKey = 'default';
  }

  // ゴール別バイアス：方向性ゴールが設定されていれば、preferredThemeKeysを優先
  const goalDef = getCurrentDirectionGoal();
  if (goalDef && goalDef.preferredThemeKeys && goalDef.preferredThemeKeys.length > 0) {
    // ルールベースの推奨がゴールとズレていれば、ゴール優先に寄せる
    if (!goalDef.preferredThemeKeys.includes(recommendKey)) {
      // ルールのruleKey を維持しつつ、推奨キーを書き換え（重いルールだけ尊重）
      const forceRule = ['heavy_stress', 'few_usage', 'night_heavy'];
      if (!forceRule.includes(ruleKey)) {
        recommendKey = goalDef.preferredThemeKeys[0];
      }
    }
  }

  // P2-A: 過去4週間のテーマ履歴から同カテゴリ連続を避ける
  const history = (state.weekThemeHistory || []).slice(-4).reverse();
  const recentCats = history.map(h => h.category).filter(Boolean);
  const firstCat = THEME_CATALOG.find(t => t.key === recommendKey)?.category;
  // 直近2週が同じカテゴリなら別のキーに差し替え
  if (firstCat && recentCats[0] === firstCat && recentCats[1] === firstCat) {
    // 同ruleKeyに対する別カテゴリの代替を探す
    const altCat = ['A', 'B', 'C', 'D'].find(c => !recentCats.slice(0, 2).includes(c));
    const altTheme = THEME_CATALOG.find(t => t.category === altCat);
    if (altTheme) recommendKey = altTheme.key;
  }

  const recommend = THEME_CATALOG.find(t => t.key === recommendKey);
  const reason = pickReason(ruleKey, personaId);

  // 候補2つ
  const alts = [];
  // ゴールがあれば、preferredThemeKeys の中から recommend 以外を先に出す
  if (goalDef && goalDef.preferredThemeKeys) {
    goalDef.preferredThemeKeys.forEach(k => {
      if (alts.length >= 2) return;
      if (k === recommendKey) return;
      const t = THEME_CATALOG.find(x => x.key === k);
      if (t && !alts.find(a => a.key === t.key)) alts.push(t);
    });
  }
  // 足りなければカテゴリ分散で補う
  const recentKeys = new Set(history.map(h => h.key));
  if (alts.length < 2) {
    const catsUsed = new Set([recommend.category, ...alts.map(a => a.category)]);
    ['A', 'B', 'C', 'D'].forEach(cat => {
      if (alts.length >= 2) return;
      if (catsUsed.has(cat)) return;
      const pool = THEME_CATALOG.filter(t => t.category === cat && t.key !== recommendKey && !alts.find(a => a.key === t.key));
      const candidate = pool.find(t => !recentKeys.has(t.key)) || pool[0];
      if (candidate) {
        alts.push(candidate);
        catsUsed.add(cat);
      }
    });
  }

  return { recommend, alts, reason, ruleKey, personaId, goalKey: goalDef ? goalDef.key : null };
}

// 今週のテーマに対する進捗カウント
function computeThemeProgress(theme) {
  if (!theme) return 0;
  const week = state.weekTheme && state.weekTheme.weekStartDate
    ? { start: state.weekTheme.weekStartDate, end: state.weekTheme.weekEndDate }
    : getWeekRange();
  const startTs = new Date(week.start + 'T00:00:00').getTime();
  const endTs = new Date(week.end + 'T23:59:59').getTime();

  const matches = (at) => {
    switch (at) {
      case 'mood_checkin':
        return (state.moods || []).filter(m => {
          const ts = m.checkedAt || new Date(m.date).getTime();
          return ts >= startTs && ts <= endTs;
        }).length;
      case 'ai_talk':
        return (state.sessions || []).filter(s => s.startedAt >= startTs && s.startedAt <= endTs).length;
      case 'thought_record':
        return (state.reflections || []).filter(r => (r.completedAt || r.startedAt) >= startTs && (r.completedAt || r.startedAt) <= endTs).length;
      case 'rescue_use':
        return (state.rescueHistory || []).filter(r => r.startedAt >= startTs && r.startedAt <= endTs).length;
      case 'rescue_night':
        return (state.rescueHistory || []).filter(r => r.flowId === 'night' && r.startedAt >= startTs && r.startedAt <= endTs).length;
      default: return 0;
    }
  };

  const themeDef = THEME_CATALOG.find(t => t.key === theme.key);
  if (!themeDef) return 0;
  return matches(themeDef.actionType);
}

// 新しい週に入ったら weekTheme をリセット（過去テーマは履歴に残す）
function ensureCurrentWeekTheme() {
  const week = getWeekRange();
  if (state.weekTheme && state.weekTheme.weekStartDate === week.start) return;
  // 旧テーマを履歴へ
  if (state.weekTheme && state.weekTheme.key) {
    if (!state.weekThemeHistory) state.weekThemeHistory = [];
    state.weekThemeHistory.push({ ...state.weekTheme, archivedAt: Date.now() });
  }
  state.weekTheme = null;
  saveState();
}

// 呼吸アニメーション（a2表示時に呼ばれる）
let _breathTimer = null;
function startBreathAnimation() {
  if (_breathTimer) { clearInterval(_breathTimer); _breathTimer = null; }
  const phrase = document.getElementById('breathPhrase');
  if (!phrase) return;
  const cycle = ['すって', 'そのまま', 'はいて'];
  let t = 0;
  let idx = 0;
  phrase.textContent = cycle[idx];
  const maxT = 15000; // 15秒
  const startTs = Date.now();
  _breathTimer = setInterval(() => {
    const elapsed = Date.now() - startTs;
    if (elapsed >= maxT) {
      clearInterval(_breathTimer); _breathTimer = null;
      // 自動で a3 へ
      if (nightState && nightState.phase === 'a2') {
        nightState.phase = 'a3';
        render();
      }
      return;
    }
    // 吸う4秒・止める2秒・吐く5秒の1サイクル → 簡略化して3段階ループ
    const phase = Math.floor((elapsed / 3500)) % 3;
    if (phase !== idx) {
      idx = phase;
      phrase.textContent = cycle[idx];
    }
  }, 200);
}

function saveNightRescueHistory() {
  if (!state.nightRescueHistory) state.nightRescueHistory = [];
  if (!nightState) return;
  const record = {
    startedAt: nightState.startedAt,
    endedAt: Date.now(),
    stateChoice: nightState.stateChoice,
    branch: nightState.branch,
    bLabel: nightState.bLabel,
    bMemo: nightState.bMemo,
    cTheme: nightState.cTheme,
    cHandoff: nightState.cHandoff,
    cMemo: nightState.cMemo,
    done: nightState.done
  };
  state.nightRescueHistory.push(record);
  // 統合レスキュー履歴にも記録
  if (!state.rescueHistory) state.rescueHistory = [];
  state.rescueHistory.push({
    id: uid(),
    flowId: 'night',
    startedAt: nightState.startedAt,
    endedAt: Date.now(),
    branch: nightState.branch,
    detail: record,
    exitChoice: `branch-${nightState.branch}`,
    linkedDate: todayKey()
  });
  // レスキュー全般と同じく直近使用としても記録
  state.lastRescueExit = { flowId: 'night', ts: Date.now(), exitChoice: nightState.branch ? `branch-${nightState.branch}` : 'exit' };
  saveState();
}

let calendarMonth = null; // 'YYYY-MM'

function viewCalendar() {
  const todayStr = todayKey();
  const todayMood = state.moods.find(m => m.date === todayStr);
  if (!calendarMonth) {
    const d = new Date();
    calendarMonth = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
  }
  const [yStr, mStr] = calendarMonth.split('-');
  const y = Number(yStr), m = Number(mStr);
  const firstDay = new Date(y, m - 1, 1);
  const lastDay = new Date(y, m, 0);
  const daysInMonth = lastDay.getDate();
  const startWeekday = firstDay.getDay();

  const monthMoods = state.moods.filter(x => x.date.startsWith(calendarMonth));
  const streakDays = calcCurrentMoodStreak();

  const cells = [];
  for (let i = 0; i < startWeekday; i++) cells.push('<div class="cal-cell empty"></div>');
  for (let d = 1; d <= daysInMonth; d++) {
    const dateKey = `${calendarMonth}-${String(d).padStart(2, '0')}`;
    const mood = state.moods.find(x => x.date === dateKey);
    const isToday = dateKey === todayStr;
    const isPast = dateKey < todayStr;
    const clickable = isToday;
    const moodClass = mood ? `mood-${mood.score}` : '';
    // 実施機能アイコン（セッション/整理/レスキュー/ひとこと）を最大2個極小で表示
    const daySessions = (state.sessions || []).filter(s => {
      const sd = new Date(s.startedAt);
      const sdKey = `${sd.getFullYear()}-${String(sd.getMonth()+1).padStart(2,'0')}-${String(sd.getDate()).padStart(2,'0')}`;
      return sdKey === dateKey;
    });
    const dayReflects = (state.reflections || []).filter(r => {
      const rd = new Date(r.startedAt);
      const rdKey = `${rd.getFullYear()}-${String(rd.getMonth()+1).padStart(2,'0')}-${String(rd.getDate()).padStart(2,'0')}`;
      return rdKey === dateKey;
    });
    const dayRescues = (state.rescueHistory || []).filter(r => r.linkedDate === dateKey);
    const hasActivity = daySessions.length || dayReflects.length || dayRescues.length;
    const activityIcons = [];
    if (daySessions.length) activityIcons.push('💬');
    if (dayReflects.length) activityIcons.push('✨');
    if (dayRescues.length) activityIcons.push('🌙');
    const clickableAct = (mood || hasActivity || isToday);
    cells.push(`
      <div class="cal-cell ${mood ? 'has-mood' : ''} ${moodClass} ${isToday ? 'today' : ''} ${clickableAct ? 'clickable' : ''}" ${clickableAct ? `data-act="cal-day-open" data-date="${dateKey}"` : ''} title="${mood ? MOODS.find(x => x.score === mood.score).label : ''}">
        <div class="cal-day">${d}</div>
        <div class="cal-mood">${mood ? MOODS.find(x => x.score === mood.score).emoji : ''}</div>
        ${activityIcons.length > 0 ? `<div class="cal-activity">${activityIcons.slice(0,2).join('')}</div>` : ''}
      </div>
    `);
  }

  // 直近7日の気分サマリ（スパーク表示）
  const last7Dates = [];
  for (let i = 6; i >= 0; i--) {
    const dt = new Date();
    dt.setDate(dt.getDate() - i);
    last7Dates.push(dt.toISOString().slice(0, 10));
  }
  const last7Moods = last7Dates.map(dk => state.moods.find(m => m.date === dk));
  const recordedLast7 = last7Moods.filter(Boolean);
  let moodSummaryText = '';
  if (recordedLast7.length >= 3) {
    const avg = recordedLast7.reduce((s, m) => s + m.score, 0) / recordedLast7.length;
    if (avg >= 4) moodSummaryText = 'この1週間は、まあまあ良い日が多そう。';
    else if (avg >= 3) moodSummaryText = 'この1週間は、だいたい「ふつう」の日々。';
    else if (avg >= 2) moodSummaryText = 'この1週間は、少し重い日が多いかも。無理しないで。';
    else moodSummaryText = 'つらい日が続いてるね。ひといきも使っていいよ。';
  }

  return `
    <div class="screen active">
      <div class="page-header">
        <div class="page-title">カレンダー</div>
      </div>
      <div class="home-content">
        ${todayMood ? `
          <div class="today-mood-card">
            <div class="today-mood-icon">${MOODS.find(x => x.score === todayMood.score).emoji}</div>
            <div class="today-mood-text">
              <div class="today-mood-label">きょうのきもち</div>
              <div class="today-mood-value">${MOODS.find(x => x.score === todayMood.score).label}${todayMood.comment ? `<span class="today-mood-comment">・${escapeHtml(todayMood.comment)}</span>` : ''}</div>

          </div>
        ` : `

            <div class="today-cta-title">きょうのきもち、どう？</div>
            <div class="today-cta-sub">30秒でOK。気分を選んで、ひとこと添えてみて。</div>
            <div class="today-cta-btn">きもちをチェックする ›</div>
          </div>
        `}

        <div class="cal-month-nav">
          <button class="cal-nav-btn" data-act="cal-prev" aria-label="前の月">‹</button>
          <div class="cal-month-title">${y}年 ${m}月</div>
          <button class="cal-nav-btn" data-act="cal-next" aria-label="次の月">›</button>
        </div>

        ${state.moods.length === 0 ? `
          <div class="cal-empty-hint">
            今日からで大丈夫。記録するたび、ここに気持ちがたまっていくよ。
          </div>
        ` : `
          <div class="cal-stats">
            <div><span class="cal-stats-n">${monthMoods.length}</span>日 記録</div>
            <div><span class="cal-stats-n">${streakDays}</span>日 継続</div>
          </div>
          <div class="cal-mood-sparkline">
            <div class="cal-mood-sparkline-label">直近7日</div>
            <div class="cal-mood-sparkline-row">
              ${last7Moods.map((m, i) => {
                const dt = new Date(last7Dates[i]);
                const dayLabel = (dt.getMonth() + 1) + '/' + dt.getDate();
                return `<div class="cal-spark-item">
                  <div class="cal-spark-dot ${m ? `mood-${m.score}` : 'no-mood'}">${m ? MOODS.find(x => x.score === m.score).emoji : '·'}</div>

// ---------- レポートV3: 前期間比較+3ブロック構成 ----------
// 集計：指定期間の 気分平均 / 記録日数 / 会話数 / 夜利用割合
// days: 期間の日数 (7=週, 30=月)
// offset: 0=現在, 1=前期間
function computeRangeCompareStats(days, offset) {
  const now = Date.now();
  const DAY = 86400000;
  const startTs = now - (offset + 1) * days * DAY;
  const endTs = now - offset * days * DAY;

  const moods = (state.moods || []).filter(m => {
    const ts = m.checkedAt || new Date(m.date).getTime();
    return ts >= startTs && ts < endTs;
  });
  const sessions = (state.sessions || []).filter(s => s.startedAt >= startTs && s.startedAt < endTs);
  const reflects = (state.reflections || []).filter(r => r.startedAt >= startTs && r.startedAt < endTs);
  const rescues = (state.rescueHistory || []).filter(r => r.startedAt >= startTs && r.startedAt < endTs);

  const moodAvg = moods.length ? moods.reduce((s, m) => s + m.score, 0) / moods.length : null;
  const recordDays = new Set(moods.map(m => m.date)).size;
  const chatCount = sessions.length + reflects.length; // AI会話 + もやもや整理
  // 夜利用: 全イベント中、夜(18:00-23:59)の割合
  const allEvents = [
    ...sessions.map(x => x.startedAt),
    ...reflects.map(x => x.startedAt),
    ...rescues.map(x => x.startedAt),
    ...moods.map(x => x.checkedAt || new Date(x.date).getTime())
  ];
  const nightCount = allEvents.filter(ts => {
    const h = new Date(ts).getHours();
    return h >= 18 && h <= 23;
  }).length;
  const nightRatio = allEvents.length ? nightCount / allEvents.length : null;

  return { moodAvg, recordDays, chatCount, nightRatio, sampleEvents: allEvents.length };
}

// 比較アイコン：↑(+) / →(=) / ↓(-)
function weekCompareArrow(current, previous, rule) {
  if (current === null || current === undefined) return { sym: '—', cls: 'flat', label: '' };
  if (previous === null || previous === undefined) return { sym: '—', cls: 'flat', label: '初週' };
  const diff = current - previous;
  let dir = 'flat';
  if (rule === 'mood') {
    if (diff >= 0.3) dir = 'up';
    else if (diff <= -0.3) dir = 'down';
  } else if (rule === 'days') {
    if (diff > 0) dir = 'up';
    else if (diff < 0) dir = 'down';
  } else if (rule === 'days_month') {
    if (diff >= 3) dir = 'up';
    else if (diff <= -3) dir = 'down';
  } else if (rule === 'chat') {
    if (diff >= 2) dir = 'up';
    else if (diff <= -2) dir = 'down';
  } else if (rule === 'chat_month') {
    if (diff >= 5) dir = 'up';
    else if (diff <= -5) dir = 'down';
  } else if (rule === 'ratio') {
    if (diff >= 0.1) dir = 'up';
    else if (diff <= -0.1) dir = 'down';
  }
  const sym = dir === 'up' ? '↑' : dir === 'down' ? '↓' : '→';
  return { sym, cls: dir, diff };
}

function weeklyMoodWord(avg) {
  if (avg === null || avg === undefined) return '記録なし';
  if (avg >= 4.2) return 'よい';
  if (avg >= 3.5) return 'ふつう寄り';
  if (avg >= 2.5) return 'やや低め';
  return '低め';
}

function weeklyNightWord(ratio) {
  if (ratio === null || ratio === undefined) return '—';
  if (ratio >= 0.5) return '多め';
  if (ratio >= 0.25) return 'ふつう';
  return '少なめ';
}

// kind: 'week' or 'month'
function renderReportSummaryV3(kind) {
  const days = kind === 'month' ? 30 : 7;
  const cur = computeRangeCompareStats(days, 0);
  const prev = computeRangeCompareStats(days, 1);

  // 期間表示
  let periodText;
  if (kind === 'month') {
    const now = new Date();
    const start = new Date(now); start.setDate(now.getDate() - 29);
    const fmt = (d) => `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
    periodText = `${fmt(start)} - ${fmt(now)}`;
  } else {
    const rng = getWeekRange();
    periodText = `${rng.start.slice(5).replace('-', '/')} - ${rng.end.slice(5).replace('-', '/')}`;
  }
  const title = kind === 'month' ? '今月のまとめ' : '今週のまとめ';
  const prevLabel = kind === 'month' ? '先月' : '先週';
  // 月次は記録/会話の比較閾値を大きくする
  const daysRule = kind === 'month' ? 'days_month' : 'days';
  const chatRule = kind === 'month' ? 'chat_month' : 'chat';

  const rows = [
    {
      icon: '🙂',
      label: '気分',
      value: weeklyMoodWord(cur.moodAvg),
      arrow: weekCompareArrow(cur.moodAvg, prev.moodAvg, 'mood'),
      hint: cur.moodAvg !== null ? `平均 ${cur.moodAvg.toFixed(1)} / 5` : ''
    },
    {
      icon: '📅',
      label: '記録',
      value: `${cur.recordDays}日`,
      arrow: weekCompareArrow(cur.recordDays, prev.recordDays, daysRule),
      hint: prev.recordDays !== null ? `${prevLabel} ${prev.recordDays}日` : ''
    },
    {
      icon: '💬',
      label: '会話',
      value: `${cur.chatCount}回`,
      arrow: weekCompareArrow(cur.chatCount, prev.chatCount, chatRule),
      hint: (prev.chatCount !== null && prev.chatCount !== undefined) ? (cur.chatCount - prev.chatCount >= 0 ? `+${cur.chatCount - prev.chatCount}` : `${cur.chatCount - prev.chatCount}`) : ''
    },
    {
      icon: '🌙',
      label: '夜利用',
      value: weeklyNightWord(cur.nightRatio),
      arrow: weekCompareArrow(cur.nightRatio, prev.nightRatio, 'ratio'),
      hint: cur.nightRatio !== null ? `${Math.round(cur.nightRatio * 100)}%` : ''
    }
  ];

  return `
    <div class="report-summary-v3">
      <div class="report-summary-title">${title}</div>
      <div class="report-summary-period">${escapeHtml(periodText)}</div>
      <div class="report-summary-rows">
        ${rows.map(r => `
          <div class="report-summary-row">
            <span class="rs-icon">${r.icon}</span>
            <span class="rs-label">${r.label}</span>
            <span class="rs-value">${escapeHtml(r.value)}</span>
            <span class="rs-arrow rs-arrow-${r.arrow.cls}">${r.arrow.sym}</span>
            <span class="rs-hint">${escapeHtml(r.hint || '')}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

// ② 気づき（ルールベースAI要約、最大3、比較矢印つき）
function renderReportInsightsV3(kind) {
  kind = kind || 'week';
  const days = kind === 'month' ? 30 : 7;
  const cur = computeRangeCompareStats(days, 0);
  const prev = computeRangeCompareStats(days, 1);
  const prevLabel = kind === 'month' ? '先月' : '先週';
  const curLabel = kind === 'month' ? '今月' : '今週';
  const profile = (state.personalizationProfile || (typeof computeProfile === 'function' ? computeProfile() : null)) || {};
  const items = [];

  // 閾値を期間で調整
  const chatDiffThreshold = kind === 'month' ? 5 : 2;
  const recordHigh = kind === 'month' ? 20 : 5;
  const recordLow = kind === 'month' ? 8 : 2;

  // 1. 会話増減
  if (cur.chatCount >= (kind === 'month' ? 10 : 3) && (cur.chatCount - (prev.chatCount || 0)) >= chatDiffThreshold) {
    items.push({ text: '話すことで少し楽になる時間が増えていそう', dir: 'up' });
  } else if ((prev.chatCount || 0) - cur.chatCount >= chatDiffThreshold) {
    items.push({ text: `${curLabel}は話す時間が少し減ったようです`, dir: 'down' });
  }

  // 2. 記録継続
  if (cur.recordDays >= recordHigh) {
    items.push({ text: '気持ちを記録する習慣が続いています', dir: cur.recordDays > (prev.recordDays || 0) ? 'up' : 'flat' });
  } else if (cur.recordDays <= recordLow && (prev.recordDays || 0) > cur.recordDays) {
    items.push({ text: `${curLabel}は記録が少なめ。無理しない${kind === 'month' ? '月' : '週'}だったかも`, dir: 'down' });
  }

  // 3. 夜利用
  if (cur.nightRatio !== null && cur.nightRatio >= 0.5) {
    items.push({ text: '夜の方が行動しやすい傾向があります', dir: 'flat' });
  }

  // 4. 気分の動き
  if (cur.moodAvg !== null && prev.moodAvg !== null) {
    const diff = cur.moodAvg - prev.moodAvg;
    if (diff >= 0.3) items.push({ text: `${prevLabel}より気分が少し上向きになっています`, dir: 'up' });
    else if (diff <= -0.3) items.push({ text: `${prevLabel}より少し疲れが溜まりやすい${kind === 'month' ? '月' : '週'}だったかも`, dir: 'down' });
  }

  // 5. styleヒント（補填）
  if (items.length < 3 && profile.supportStyle && STYLE_MESSAGES && STYLE_MESSAGES[profile.supportStyle]) {
    items.push({ text: STYLE_MESSAGES[profile.supportStyle], dir: 'flat' });
  }

  const finalItems = items.slice(0, 3);
  if (finalItems.length === 0) return '';

  const titleText = kind === 'month' ? '💡 今月の気づき' : '💡 今週の気づき';
  const arrow = (d) => d === 'up' ? '↑' : d === 'down' ? '↓' : '→';
  return `
    <div class="report-insight-v3">
      <div class="report-insight-v3-title">${titleText}</div>
      <ul class="report-insight-v3-list">
        ${finalItems.map(x => `
          <li>
            <span class="ri-text">${escapeHtml(x.text)}</span>
            <span class="ri-arrow ri-arrow-${x.dir}">${arrow(x.dir)}</span>
          </li>
        `).join('')}
      </ul>
    </div>
  `;
}

// ---------- レポート Block 構成（仕様 WEEK-01 / MONTH-01） ----------
function renderReportBlocks(kind, ins, days) {
  const periodLabel = kind === 'month' ? '今月' : '今週';
  const spanLabel = kind === 'month' ? '1ヶ月' : '1週間';

  // Block B: 気分の流れ（直近N日）
  const flowDates = [];
  for (let i = days - 1; i >= 0; i--) {
    const dt = new Date();
    dt.setDate(dt.getDate() - i);
    flowDates.push(dt.toISOString().slice(0, 10));
  }
  const flowMoods = flowDates.map(dk => state.moods.find(m => m.date === dk));

  // Block D: 今週多かった気分
  const moodCounts = [0, 0, 0, 0, 0, 0];
  flowMoods.forEach(m => { if (m) moodCounts[m.score]++; });
  let dominantMoodText = '';
  if (ins.checkinDays > 0) {
    const maxScore = moodCounts.indexOf(Math.max(...moodCounts.slice(1)));
    const label = MOODS.find(x => x.score === maxScore)?.label || '';
    const lowDays = moodCounts[1] + moodCounts[2];
    dominantMoodText = `${periodLabel}は「${label}」が多めでした。` + (lowDays >= 2 ? `\n疲れた日が${lowDays}日ありました。` : '');
  }

  // Block E: よく出てきたテーマ（topicStart集計）
  const topics = {};
  const cutoffTs = Date.now() - days * 86400000;
  (state.sessions || []).filter(s => s.startedAt >= cutoffTs && s.topicStart).forEach(s => {
    topics[s.topicStart] = (topics[s.topicStart] || 0) + 1;
  });
  // もやもや整理のテーマも拾う（あれば）
  const topicList = Object.entries(topics).sort((a, b) => b[1] - a[1]).slice(0, 3).map(t => t[0]);

  // Block F: 今週使ったサポート
  const supportLines = [];
  if (ins.sessionCount > 0) supportLines.push(`AI会話を${ins.sessionCount}回`);
  if (ins.reflectionCount > 0) supportLines.push(`もやもや整理を${ins.reflectionCount}回`);
  const rescueInPeriod = (state.rescueHistory || []).filter(r => r.startedAt >= cutoffTs);
  if (rescueInPeriod.length > 0) {
    const night = rescueInPeriod.filter(r => r.flowId === 'night').length;
    if (night > 0) supportLines.push(`夜のひといきを${night}回`);
    const other = rescueInPeriod.length - night;
    if (other > 0) supportLines.push(`その他のひといきを${other}回`);
  }

  // Block G: AIのやさしい振り返り文
  const narrative = [];
  if (ins.checkinDays >= Math.ceil(days * 0.5)) {
    narrative.push(`${periodLabel}は記録できた日が多かったようです。`);
  } else if (ins.checkinDays >= 2) {
    narrative.push(`${periodLabel}は少しずつでも記録できた日がありそうです。`);
  }
  if (ins.longestStreak >= 3) {
    narrative.push(`最大${ins.longestStreak}日連続で記録できた時期もありました。`);
  }
  if (ins.reflectionImprovements > 0) {
    narrative.push(`整理したあとに気分が軽くなった日もありそうです。`);
  }
  if (rescueInPeriod.some(r => r.flowId === 'night')) {
    narrative.push(`夜に短いサポートを使う日が続いた時期もありました。`);
  }
  if (narrative.length === 0) {
    narrative.push(`${periodLabel}は記録が少なめでした。少しずつで大丈夫です。`);
  }

  // Block（月次限定）: 今月の自分への一言
  const monthSelfMsg = kind === 'month' ? [
    '今月もここに戻ってきた日がありました。',
    '言葉にしづらい日も、少しずつ残せていたようです。',
    '完璧じゃなくても、続いてきたことがあります。'
  ] : null;

  // === 週次ビュー（V3 簡略構造） ===
  if (kind === 'week') {
    const hasAnyData = ins.checkinDays > 0 || ins.sessionCount > 0 || ins.reflectionCount > 0;
    if (!hasAnyData) {
      return `
        <div class="report-header">
          <div class="report-title">今週のふりかえり</div>
          <div class="report-period">${reportPeriodLabel(days)}</div>
        </div>
        ${renderReportLastWeekRecap()}
        <div class="report-empty">
          <div class="report-empty-icon">🌱</div>
          <div class="report-empty-text">今週はまだ記録がないみたい。<br>小さく始めてみよう。</div>
          <div class="empty-actions" style="margin-top:20px;">
            <button class="btn btn-primary" data-act="goto-mood">きもちチェック</button>
            <button class="btn btn-ghost" data-act="start-chat">Asideと話す</button>
          </div>
        </div>
        <div class="report-disclaimer">
          これは記録をもとにしたふりかえりで、診断ではありません。

      </div>

        <div class="report-empty-icon">🌱</div>
        <div class="report-empty-text">今月はまだ記録がないみたい。<br>小さく始めてみよう。</div>
        <div class="empty-actions" style="margin-top:20px;">
          <button class="btn btn-primary" data-act="goto-mood">きもちチェック</button>
          <button class="btn btn-ghost" data-act="start-chat">Asideと話す</button>
        </div>
      </div>
      <div class="report-disclaimer">
        これは記録をもとにしたふりかえりで、診断ではありません。
      </div>
    `;
  }
  return `
    <div class="report-header">
      <div class="report-title">今月のふりかえり</div>
      <div class="report-period">${reportPeriodLabel(days)}</div>
    </div>
    ${renderReportSummaryV3('month')}
    ${renderReportInsightsV3('month')}
    ${renderReportNextActionV3('month')}
    <div class="report-disclaimer">
      これは記録をもとにしたふりかえりで、診断ではありません。<br>
      近くないと感じたら、そのまま気にしなくて大丈夫です。

  `;

      ${lines.map(x => `<div class="report-narrative-line">${escapeHtml(x)}</div>`).join('')}

  `;
}

// 来週どうする？ モード別に次週テーマを自動生成
function handleNextWeekPick(mode) {
  const profile = computeProfile();
  const currentTheme = state.weekTheme;

  // 現テーマを履歴にアーカイブ
  if (currentTheme && currentTheme.key) {
    if (!state.weekThemeHistory) state.weekThemeHistory = [];
    state.weekThemeHistory.push({ ...currentTheme, archivedAt: Date.now() });
  }

  if (mode === 'continue' && currentTheme) {
    // 同じテーマで次週に進める
    const week = getWeekRange();
    const nextMonday = new Date(week.start + 'T00:00:00');
    nextMonday.setDate(nextMonday.getDate() + 7);
    const nextSunday = new Date(nextMonday);
    nextSunday.setDate(nextMonday.getDate() + 6);
    const fmt = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    state.weekTheme = {
      ...currentTheme,
      weekStartDate: fmt(nextMonday),
      weekEndDate: fmt(nextSunday),
      acceptedAt: Date.now(),
      changedAt: null
    };
    saveState();
    toast('来週も同じテーマで進むね');
    App.go('goal');
    return;
  }

  // ease/step_up/change: 新しい行動セットを抽出して themeConfirm へ
  const goalKey = (state.directionGoal && state.directionGoal.key) || 'not_sure_yet';
  const userState = state.userStateSurvey || {};
  let pool = getActionsForGoal(goalKey, userState);

  if (mode === 'ease') {
    // easy・duration短めを最優先
    pool = pool.filter(a => a.difficulty === 'easy').sort((a, b) => a.duration - b.duration);
  } else if (mode === 'step_up') {
    // completion rateが高ければ bold も混ぜる
    const completed = profile.completionRate !== null && profile.completionRate >= 50;
    pool = pool.filter(a => completed ? true : a.difficulty !== 'bold')
               .sort((a, b) => {
                 const order = { easy: 0, normal: 1, bold: 2 };
                 return order[a.difficulty] - order[b.difficulty];
               });
    pool.reverse(); // 難しめから
  } else if (mode === 'change') {
    // 前回と違うテーマキーから抽出
    const prevKeys = new Set(((currentTheme && currentTheme.actions) || []).map(a => a.id));
    pool = pool.filter(a => !prevKeys.has(a.id));
  }

  // プロフィール反映：時間帯・action typeで好みを優先
  if (profile.preferredActionType) {
    pool.sort((a, b) => {
      const af = a.type === profile.preferredActionType ? 0 : 1;
      const bf = b.type === profile.preferredActionType ? 0 : 1;
      return af - bf;
    });
  }
  if (profile.avoidedActionType) {
    pool = pool.filter(a => a.type !== profile.avoidedActionType).concat(
      pool.filter(a => a.type === profile.avoidedActionType)
    );
  }

  if (pool.length === 0) pool = ACTION_CATALOG.filter(a => a.difficulty === 'easy').slice(0, 4);

  // 提案を actionSuggest 経由で表示（ユーザーに選ばせる）
  actionSuggestState = { proposals: pool.slice(0, 4), selected: [], round: 0, mode, isAiLoading: false, aiSuccess: false };
  App.go('actionSuggest');
  toast(mode === 'ease' ? '少しやさしめの候補を出すね' : mode === 'step_up' ? '少しだけ背伸び気味の候補だよ' : '違うテーマを探してみよう');

  // API keyがあれば裏でAIに差し替えをリクエスト
  if (state.apiKey) {
    triggerAiActionUpgrade(mode);
  }
}

// 週次レポート用：Block C/D/E = 気分傾向・AI伴走解釈・合う傾向
function renderReportInsightsV2() {
  const profile = computeProfile();
  const weekStartTs = Date.now() - 7 * 86400000;

  // Block C: 気分の傾向（前半/後半＋行動日/非行動日）
  const weekMoods = (state.moods || [])
    .filter(m => (m.checkedAt || new Date(m.date).getTime()) >= weekStartTs)
    .sort((a, b) => (a.checkedAt || 0) - (b.checkedAt || 0));

  let moodTrendLine = '';
  if (weekMoods.length >= 4) {
    const mid = Math.floor(weekMoods.length / 2);
    const firstAvg = weekMoods.slice(0, mid).reduce((s, m) => s + m.score, 0) / mid;
    const lastAvg = weekMoods.slice(mid).reduce((s, m) => s + m.score, 0) / (weekMoods.length - mid);
    const delta = lastAvg - firstAvg;
    if (delta >= 0.6) moodTrendLine = '週の前半より後半の方が、少し楽になった傾向があります。';
    else if (delta <= -0.6) moodTrendLine = '週の前半より後半の方が、少し重めだったようです。';
    else moodTrendLine = '週を通して、気分は大きく動かなかったみたいです。';
  }

  let actionDayCorr = '';
  if (profile.actionDayMoodAvg !== null && profile.nonActionDayMoodAvg !== null) {
    const diff = profile.actionDayMoodAvg - profile.nonActionDayMoodAvg;
    if (diff >= 0.4) actionDayCorr = '行動を実施した日の方が、少し気分が良い傾向が見えています。';
    else if (diff <= -0.4) actionDayCorr = '行動した日ほど気分が良かったわけではなさそう。無理していたかも。';
  }

  let slotLine = '';
  if (profile.preferredTimeSlot) {
    const slotLabel = SLOT_LABELS[profile.preferredTimeSlot];
    slotLine = `${slotLabel}の方が、行動しやすいようです。`;
  }

  const cBlock = [moodTrendLine, actionDayCorr, slotLine].filter(Boolean);

  // Block D: AI解釈文（伴走スタイル＋実施状況）
  const interpretations = [];
  const weekLogs = (state.actionLogs || []).filter(l => l.executedAt >= weekStartTs);
  const weekDone = weekLogs.filter(l => l.status === 'done').length;
  const weekSkip = weekLogs.filter(l => l.status === 'skipped').length;

  if (weekDone >= 3) {
    interpretations.push('今週は、気持ちをすっきりさせるというより、抱え込みすぎないための動きが少しできていました。');
  } else if (weekDone >= 1) {
    interpretations.push(`今週は ${weekDone} 回、行動に触れられた日がありました。一回でもやれたことは、ちゃんと進んでいる証拠です。`);
  } else if (weekSkip > 0) {
    interpretations.push('今週は動けない日が多かったかもしれません。それも、今の自分を守るための一つの選択です。');
  } else {
    interpretations.push('今週は、まだ始まったばかり。続けやすい形を、ゆっくり探していきましょう。');
  }

  if (profile.supportStyle && profile.sampleSize.logs + profile.sampleSize.moods + profile.sampleSize.sessions >= 5) {
    interpretations.push(STYLE_MESSAGES[profile.supportStyle] + '。');
  }

  // 気分×行動の個別相関（効果がある行動をやさしく言語化）
  const effectLines = [];
  if (profile.effectByAction) {
    const top = Object.entries(profile.effectByAction)
      .filter(([_, v]) => v.sampleDays >= 2 && v.delta > 0.3)
      .sort((a, b) => b[1].delta - a[1].delta)
      .slice(0, 2);
    top.forEach(([actionId, v]) => {
      const a = ACTION_CATALOG.find(x => x.id === actionId);
      if (a) effectLines.push(`「${a.title}」を実施した日は、気分が少し上向きやすい傾向があります。`);
    });
  }

  // Block E: あなたに合いそうな傾向
  const tendencies = [];
  if (profile.supportStyle) tendencies.push(STYLE_MESSAGES[profile.supportStyle]);
  if (profile.preferredTimeSlot) tendencies.push(getTimeSlotMessage(profile.preferredTimeSlot));
  if (profile.preferredActionType) {
    const tLabel = { app: 'アプリ内', daily: '日常での小さな行動', social: '人につながる行動' };
    tendencies.push(`${tLabel[profile.preferredActionType]}が、今のあなたに合っていそうです`);
  }
  if (profile.freeTextTendency === 'low') tendencies.push('選ぶだけでも十分に、自分のほうを向けています');

  return `
    ${cBlock.length > 0 ? `
      <div class="report-block">
        <div class="report-block-label">気分と行動の傾向</div>
        ${cBlock.map(x => `<div class="report-insight-line">${escapeHtml(x)}</div>`).join('')}
      </div>
    ` : ''}

    <div class="report-narrative">
      <div class="report-narrative-label">${escapeHtml(getCurrentPersona().name)}のふりかえり</div>
      ${interpretations.map(x => `<div class="report-narrative-line">${escapeHtml(x)}</div>`).join('')}
      ${effectLines.map(x => `<div class="report-narrative-line report-narrative-evidence">${escapeHtml(x)}</div>`).join('')}
    </div>

    ${tendencies.length > 0 ? `
      <div class="report-block">
        <div class="report-block-label">あなたに合いそうな傾向</div>
        <ul class="report-list">
          ${tendencies.map(t => `<li>${escapeHtml(t)}</li>`).join('')}
        </ul>
      </div>
    ` : ''}
  `;
}

// 週次レポート冒頭: 先週のテーマ振り返り（存在する場合）
function renderReportLastWeekRecap() {
  const history = state.weekThemeHistory || [];
  if (history.length === 0) return '';
  // 最新の履歴エントリ（前週）を取得
  const last = history[history.length - 1];
  if (!last || !last.key) return '';
  // スキップされてたら振り返りスキップ
  if (last.status === 'skipped') return '';
  // 前週の実行回数（archivedAt 時点の記録から推定）
  const themeDef = THEME_CATALOG.find(t => t.key === last.key);
  const startTs = new Date(last.weekStartDate + 'T00:00:00').getTime();
  const endTs = new Date(last.weekEndDate + 'T23:59:59').getTime();
  let count = 0;
  if (themeDef) {
    const t = themeDef.actionType;
    if (t === 'mood_checkin') count = (state.moods || []).filter(m => {
      const ts = m.checkedAt || new Date(m.date).getTime();
      return ts >= startTs && ts <= endTs;
    }).length;
    else if (t === 'ai_talk') count = (state.sessions || []).filter(s => s.startedAt >= startTs && s.startedAt <= endTs).length;
    else if (t === 'thought_record') count = (state.reflections || []).filter(r => (r.completedAt || r.startedAt) >= startTs && (r.completedAt || r.startedAt) <= endTs).length;
    else if (t === 'rescue_use') count = (state.rescueHistory || []).filter(r => r.startedAt >= startTs && r.startedAt <= endTs).length;
    else if (t === 'rescue_night') count = (state.rescueHistory || []).filter(r => r.flowId === 'night' && r.startedAt >= startTs && r.startedAt <= endTs).length;
  }

  let msg;
  if (count === 0) msg = 'ふれる機会はなかったみたい。それもひとつの答え。';
  else if (count === 1) msg = '1回ふれることができた。';
  else msg = `${count}回ふれる機会があった。`;

  return `
    <div class="report-last-theme">
      <div class="report-block-label">先週のテーマ</div>
      <div class="report-last-theme-title">${escapeHtml(last.title)}</div>
      <div class="report-last-theme-msg">${escapeHtml(msg)}</div>
    </div>
  `;
}

// ---------- Insights (旧: 週次・月次レポート) ----------
let insightsRange = 'week'; // 'week' | 'month'

function computeInsights(days) {
  const now = Date.now();
  const cutoff = now - days * 24 * 60 * 60 * 1000;
  const periodDates = [];
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(now - i * 24 * 60 * 60 * 1000);
    periodDates.push(d.toISOString().slice(0, 10));
  }
  const moods = (state.moods || []).filter(m => periodDates.includes(m.date));
  const sessions = (state.sessions || []).filter(s => s.startedAt >= cutoff);
  const reflections = (state.reflections || []).filter(r => r.startedAt >= cutoff);

  const checkinDays = moods.length;
  const moodAvg = moods.length ? (moods.reduce((s, m) => s + m.score, 0) / moods.length) : null;
  const bestMood = moods.length ? moods.reduce((a, b) => a.score >= b.score ? a : b) : null;

  // longest consecutive streak within the period
  let longestStreak = 0, curStreak = 0;
  for (const d of periodDates) {
    if (moods.find(m => m.date === d)) { curStreak++; longestStreak = Math.max(longestStreak, curStreak); }
    else curStreak = 0;
  }

  // deepest rally
  let deepestRally = 0;
  let deepestSession = null;
  sessions.forEach(s => {
    const userMsgs = (s.messages || []).filter(m => m.role === 'user').length;
    if (userMsgs > deepestRally) { deepestRally = userMsgs; deepestSession = s; }
  });

  // reflection improvement
  const reflectionImprovements = reflections.filter(r => {
    const delta = (r.emotionBefore?.score || 0) - (r.emotionAfter?.score || 0);
    return delta > 0;
  }).length;

  // mood comments highlights
  const commentDays = moods.filter(m => m.comment && m.comment.trim());

  // 頑張ったポイント / 良いポイント 抽出
  const highlights = [];
  if (checkinDays >= Math.ceil(days * 0.5)) {
    highlights.push(`${days}日のうち${checkinDays}日きもちをチェックできた。続けている自分を認めていい。`);
  } else if (checkinDays >= 2) {
    highlights.push(`${checkinDays}日きもちをチェックできた。少しずつでも戻ってこれているのがいい兆候。`);
  }
  if (longestStreak >= 3) {
    highlights.push(`最大${longestStreak}日連続で記録できた日があった。続ける力が育っている。`);
  }
  if (reflections.length > 0) {
    highlights.push(`ふりかえりに${reflections.length}回向き合った。${reflectionImprovements > 0 ? `そのうち${reflectionImprovements}回は気持ちが軽くなった。` : '向き合った時間そのものが価値。'}`);
  }
  if (deepestRally >= 6) {
    highlights.push(`Asideと${deepestRally}回ラリーした日があった。言葉にできた時間を大切にしていい。`);
  } else if (sessions.length > 0) {
    highlights.push(`Asideとの対話が${sessions.length}回あった。話してみようと思えたこと自体が一歩。`);
  }
  if (commentDays.length > 0) {
    highlights.push(`ひとことを${commentDays.length}回残した。言葉にするのは簡単じゃないのに、できている。`);
  }
  if (bestMood && bestMood.score >= 4) {
    const lbl = MOODS.find(x => x.score === bestMood.score).label;
    highlights.push(`「${lbl}」と感じた日があった（${bestMood.date.slice(5).replace('-', '/')}）。その日を覚えておくと、自分のリソースになる。`);
  }
  if (highlights.length === 0) {
    highlights.push('この期間はほとんど記録がないね。少しずつ、戻ってこれた日からでいい。');
  }

  // ===== 傾向理解（Trends） =====
  const trends = [];

  // 1. 落ち込みやすい時間帯（moods を checkedAt の時間帯でビン化）
  const bins = { 'morning': [], 'afternoon': [], 'evening': [], 'night': [] };
  (state.moods || []).forEach(m => {
    if (!periodDates.includes(m.date) || !m.checkedAt) return;
    const h = new Date(m.checkedAt).getHours();
    if (h < 11) bins.morning.push(m.score);
    else if (h < 16) bins.afternoon.push(m.score);
    else if (h < 21) bins.evening.push(m.score);
    else bins.night.push(m.score);
  });
  const binAvgs = Object.entries(bins).map(([k, arr]) => ({ k, avg: arr.length ? arr.reduce((s, x) => s + x, 0) / arr.length : null, count: arr.length }));
  const filledBins = binAvgs.filter(b => b.avg !== null && b.count >= 2);
  if (filledBins.length >= 2) {
    const lowest = filledBins.reduce((a, b) => a.avg < b.avg ? a : b);
    const highest = filledBins.reduce((a, b) => a.avg > b.avg ? a : b);
    const timeLabel = { morning: '朝', afternoon: '昼', evening: '夕方', night: '夜' };
    if (lowest.avg < 3 && highest.avg - lowest.avg >= 0.6) {
      trends.push({ icon: '⏰', text: `${timeLabel[lowest.k]}のほうが重く感じやすいみたい（${timeLabel[highest.k]}は比較的軽め）。` });
    }
  }

  // 2. よく話しているテーマ
  const topics = {};
  sessions.forEach(s => {
    if (s.topicStart) topics[s.topicStart] = (topics[s.topicStart] || 0) + 1;
  });
  const topTopic = Object.entries(topics).sort((a, b) => b[1] - a[1])[0];
  if (topTopic && topTopic[1] >= 2) {
    trends.push({ icon: '💬', text: `よく話したテーマは「${topTopic[0]}」（${topTopic[1]}回）。そこに今のフォーカスがあるのかも。` });
  }

  // 3. 整理後の気分改善率
  if (reflections.length >= 2) {
    const rate = Math.round((reflectionImprovements / reflections.length) * 100);
    if (rate >= 50) {
      trends.push({ icon: '✨', text: `ふりかえり後に気分が軽くなった割合は${rate}%。整理するのが合っている傾向。` });
    } else if (rate < 30 && reflections.length >= 3) {
      trends.push({ icon: '🌱', text: `ふりかえりだけでは気分が変わりにくい時期かも。話す・休むも混ぜてみて。` });
    }
  }

  // 4. 相性の良いAI人格（ラリー数ベース）
  const personaRallies = {};
  sessions.forEach(s => {
    const pid = s.personaId || state.selectedPersonaId;
    if (!pid) return;
    const rally = (s.messages || []).filter(m => m.role === 'user').length;
    if (!personaRallies[pid]) personaRallies[pid] = { total: 0, count: 0 };
    personaRallies[pid].total += rally;
    personaRallies[pid].count += 1;
  });
  const personaAvgs = Object.entries(personaRallies).map(([pid, v]) => ({ pid, avg: v.total / v.count, count: v.count }))
    .filter(p => p.count >= 2)
    .sort((a, b) => b.avg - a.avg);
  if (personaAvgs.length > 0 && personaAvgs[0].avg >= 4) {
    const p = PERSONAS.find(x => x.id === personaAvgs[0].pid);
    if (p) {
      const displayName = (state.personaNames && state.personaNames[p.id]) || p.name;
      trends.push({ icon: '🫶', text: `${displayName}との会話で平均${Math.round(personaAvgs[0].avg)}ラリー続いている。相性よさそう。` });
    }
  }

  // 5. 続けられた日数（既存の longestStreak を活用）
  if (longestStreak >= 5) {
    trends.push({ icon: '📿', text: `${longestStreak}日連続で記録できた日があった。続ける力がちゃんとある。` });
  }

  // 6. コメント量の変化（前半 vs 後半）
  const sortedComments = moods.filter(m => m.comment && m.comment.trim()).sort((a, b) => a.date < b.date ? -1 : 1);
  if (sortedComments.length >= 4) {
    const mid = Math.floor(sortedComments.length / 2);
    const avgFirst = sortedComments.slice(0, mid).reduce((s, m) => s + m.comment.length, 0) / mid;
    const avgLast = sortedComments.slice(mid).reduce((s, m) => s + m.comment.length, 0) / (sortedComments.length - mid);
    if (avgLast > avgFirst * 1.4) {
      trends.push({ icon: '✍️', text: `ひとことの文字数が後半ほど増えている。言葉にする力が育ってるね。` });
    }
  }

  return {
    days, checkinDays, moodAvg, longestStreak,
    sessionCount: sessions.length, reflectionCount: reflections.length,
    deepestRally, reflectionImprovements, bestMood, commentDays: commentDays.length,
    highlights, trends
  };
}

function viewInsights() {
  const days = insightsRange === 'month' ? 30 : 7;
  const ins = computeInsights(days);
  const avgText = ins.moodAvg !== null ? ins.moodAvg.toFixed(1) : '—';
  const avgLabel = ins.moodAvg !== null ? (MOODS.find(x => x.score === Math.round(ins.moodAvg))?.label || '') : '';
  return `
    <div class="screen active">
      <div class="page-header insights-header">
        <button class="chat-back" data-act="back-home">${icon('arrow-left')}</button>
        <div class="page-title">レポート</div>
      </div>
      <div class="home-content">
        <div class="insights-tabs">
          <button class="insights-tab ${insightsRange === 'week' ? 'active' : ''}" data-act="insights-week">週次（7日）</button>
          <button class="insights-tab ${insightsRange === 'month' ? 'active' : ''}" data-act="insights-month">月次（30日）</button>
        </div>

        <div class="insights-stats">
        <div class="insights-stat">
          <div class="insights-stat-num">${ins.checkinDays}<span class="insights-stat-unit">/${ins.days}日</span></div>
          <div class="insights-stat-label">きもち記録</div>
        </div>
        <div class="insights-stat">
          <div class="insights-stat-num">${avgText}<span class="insights-stat-unit">/5</span></div>
          <div class="insights-stat-label">気分の平均${avgLabel ? `<br><span style="font-size:10px; color: var(--text-muted);">（${avgLabel}）</span>` : ''}</div>
        </div>
        <div class="insights-stat">
          <div class="insights-stat-num">${ins.sessionCount}<span class="insights-stat-unit">回</span></div>
          <div class="insights-stat-label">Asideと話した</div>
        </div>
        <div class="insights-stat">
          <div class="insights-stat-num">${ins.reflectionCount}<span class="insights-stat-unit">回</span></div>
          <div class="insights-stat-label">ふりかえり</div>
        </div>
      </div>

      <div class="insights-section-title">頑張ったこと・良いポイント</div>
      <div class="insights-highlights">
        ${ins.highlights.map(h => `
          <div class="insights-highlight">
            <div class="insights-highlight-dot"></div>
            <div class="insights-highlight-text">${escapeHtml(h)}</div>
          </div>
        `).join('')}
      </div>

      ${ins.trends && ins.trends.length > 0 ? `
        <div class="insights-section-title">気づき・傾向</div>
        <div class="insights-trends">
          ${ins.trends.map(t => `
            <div class="insights-trend">
              <div class="insights-trend-icon">${t.icon}</div>
              <div class="insights-trend-text">${escapeHtml(t.text)}</div>
            </div>
          `).join('')}
        </div>
      ` : ''}

        <div class="insights-section-title">この${insightsRange === 'month' ? '1ヶ月' : '1週間'}を次に活かす</div>
        <div class="card">
          <div class="card-body">ここで見えた「続けられたこと」や「気持ちが軽くなった瞬間」を目標に反映させよう。</div>
          <div class="card-action">
            <button class="btn btn-primary" data-act="insights-to-goal">目標を見直す</button>
          </div>
        </div>
      </div>
      ${bottomNav('history')}
    </div>
  `;
}
