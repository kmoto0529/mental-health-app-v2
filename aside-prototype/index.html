<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Aside — 気持ちを整えるアプリ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Noto+Serif+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FAF6F0;
  --bg-card: #FFFFFF;
  --bg-soft: #F3EDE3;
  --bg-warm: #EFE5D6;
  --text: #3D342A;
  --text-soft: #8B7F70;
  --text-muted: #B3A896;
  --accent: #C68B5E;
  --accent-soft: #E8D5C0;
  --accent-deep: #9E6B40;
  --sage: #8FA68C;
  --sage-soft: #D7E0D2;
  --danger: #C85450;
  --divider: rgba(61, 52, 42, 0.08);
  --shadow-soft: 0 2px 12px rgba(61, 52, 42, 0.05);
  --shadow-card: 0 4px 20px rgba(61, 52, 42, 0.08);
  --shadow-lift: 0 8px 28px rgba(61, 52, 42, 0.12);
  --r-sm: 12px;
  --r-md: 18px;
  --r-lg: 24px;
  --r-xl: 32px;
  --ease: cubic-bezier(0.22, 0.61, 0.36, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body { height: 100%; }
html { background: var(--bg); }

body {
  font-family: 'Zen Kaku Gothic New', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 16px;
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
  -webkit-tap-highlight-color: transparent;
}

#app {
  width: 100%;
  max-width: 420px;
  min-height: 100vh;
  min-height: 100dvh;
  min-height: var(--app-h, 100dvh);
  margin: 0 auto;
  background: var(--bg);
  position: relative;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
}

@media (min-width: 421px) {
  body { padding: 20px 0; background: linear-gradient(180deg, #F5EDE1, #EDE3D2); }
  #app { min-height: calc(100vh - 40px); min-height: calc(var(--app-h, 100dvh) - 40px); border-radius: 32px; box-shadow: 0 20px 60px rgba(61,52,42,.15); overflow: hidden; }
}

.screen {
  display: none;
  flex-direction: column;
  flex: 1;
  min-height: 100vh;
  min-height: 100dvh;
  min-height: var(--app-h, 100dvh);
  animation: fadeIn .35s var(--ease);
}
@media (min-width: 421px) {
  .screen { min-height: calc(100vh - 40px); min-height: calc(var(--app-h, 100dvh) - 40px); }
}
.screen.active { display: flex; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

/* ---------- Welcome ---------- */
.welcome {
  background: linear-gradient(180deg, #FAF6F0 0%, #EFE5D6 100%);
  padding: 56px 32px 36px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
.welcome-brand {
  font-family: 'Noto Serif JP', serif;
  font-size: 36px;
  letter-spacing: 0.02em;
  color: var(--accent-deep);
  font-weight: 500;
}
.welcome-sub {
  font-size: 13px;
  color: var(--text-soft);
  margin-top: 4px;
  letter-spacing: 0.08em;
}
.welcome-copy {
  margin-top: 16px;
}
.welcome-eyebrow {
  font-family: 'Noto Serif JP', serif;
  font-size: 14px;
  color: var(--text-soft);
  letter-spacing: 0.06em;
  margin-bottom: 10px;
}
.welcome-hero {
  margin-top: 0;
  font-family: 'Noto Serif JP', serif;
  font-size: 30px;
  line-height: 1.55;
  color: var(--text);
  letter-spacing: 0.02em;
  font-weight: 500;
}
.welcome-hero em {
  font-style: normal;
  color: var(--accent);
  border-bottom: 2px solid var(--accent-soft);
  padding-bottom: 2px;
}
.welcome-desc {
  margin-top: 20px;
  color: var(--text-soft);
  font-size: 13.5px;
  line-height: 1.9;
}
.welcome-cta {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.welcome-cta-note {
  text-align: center;
  font-size: 12px;
  color: var(--text-muted);
  letter-spacing: 0.06em;
}
.welcome-visual {
  margin: 28px auto 16px;
  width: 120px;
  height: 120px;
  position: relative;
}
.welcome-blob {
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 35% 35%, var(--accent-soft), var(--bg-warm) 70%);
  border-radius: 50%;
  animation: breathe 5s var(--ease) infinite;
}
.welcome-blob::after {
  content: '';
  position: absolute;
  inset: 20%;
  background: radial-gradient(circle at 40% 40%, #fff, var(--accent-soft));
  border-radius: 50%;
  opacity: 0.7;
}
@keyframes breathe {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

/* ---------- Buttons ---------- */
.btn {
  appearance: none;
  border: none;
  cursor: pointer;
  font-family: inherit;
  font-size: 16px;
  font-weight: 500;
  padding: 16px 28px;
  border-radius: 999px;
  transition: transform .2s var(--ease), box-shadow .2s var(--ease), background .2s var(--ease);
  letter-spacing: 0.02em;
}
.btn:active { transform: scale(0.97); }
.btn-primary {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 4px 16px rgba(198, 139, 94, 0.3);
  width: 100%;
}
.btn-primary:hover { background: var(--accent-deep); }
.btn-secondary {
  background: var(--bg-card);
  color: var(--text);
  border: 1px solid var(--divider);
  width: 100%;
}
.btn-ghost {
  background: transparent;
  color: var(--text-soft);
  font-size: 14px;
  padding: 12px;
}
.btn-danger {
  background: transparent;
  color: var(--danger);
  border: 1px solid var(--danger);
  width: 100%;
}

/* ---------- Onboarding ---------- */
.onb {
  padding: 60px 28px 32px;
  display: flex;
  flex-direction: column;
  flex: 1;
}
.onb-step {
  font-size: 12px;
  color: var(--text-muted);
  letter-spacing: 0.1em;
  margin-bottom: 16px;
}
.onb-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 24px;
  line-height: 1.6;
  margin-bottom: 12px;
}
.onb-hint {
  color: var(--text-soft);
  font-size: 14px;
  line-height: 1.8;
  margin-bottom: 36px;
}
.input {
  width: 100%;
  padding: 18px 20px;
  background: var(--bg-card);
  border: 1px solid var(--divider);
  border-radius: var(--r-md);
  font-family: inherit;
  font-size: 17px;
  color: var(--text);
  transition: border-color .2s var(--ease), box-shadow .2s var(--ease);
  outline: none;
}
.input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.input-hint {
  margin-top: 8px;
  font-size: 12px;
  color: var(--text-muted);
  padding-left: 4px;
}
.onb-footer {
  margin-top: auto;
  padding-top: 24px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* ---------- Home ---------- */
.home-header {
  padding: 32px 24px 16px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.home-greet {
  font-family: 'Noto Serif JP', serif;
  font-size: 20px;
  letter-spacing: 0.01em;
}
.home-greet-sub {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 4px;
}
.home-greet-hint {
  font-size: 12px;
  color: var(--primary);
  margin-top: 6px;
  opacity: 0.85;
  letter-spacing: 0.01em;
}
.home-settings-btn {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: var(--bg-card);
  border: none;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--text-soft);
}

.home-content {
  padding: 16px 20px 120px;
  flex: 1;
  overflow-y: auto;
}

.mood-strip {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  padding: 16px 12px;
  margin: 0 -12px 20px;
  box-sizing: border-box;
  width: calc(100% + 24px);
}
.mood-strip-item {
  min-width: 0;
  text-align: center;
}
.mood-strip-dot {
  width: 100%;
  max-width: 46px;
  aspect-ratio: 1 / 1;
  border-radius: 50%;
  background: var(--bg-card);
  border: 1px solid var(--divider);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  margin: 0 auto 6px;
}
.mood-strip-dot.active { background: var(--accent-soft); border-color: var(--accent); }
.mood-strip-dot.today {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
  box-shadow: 0 4px 12px rgba(198,139,94,.3);
}
.mood-strip-date {
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.05em;
}

.card {
  background: var(--bg-card);
  border-radius: var(--r-lg);
  padding: 24px;
  box-shadow: var(--shadow-soft);
  margin-bottom: 16px;
}
.card-title {
  font-size: 13px;
  color: var(--text-soft);
  letter-spacing: 0.08em;
  margin-bottom: 8px;
}
.card-body {
  font-size: 17px;
  line-height: 1.7;
}
.card-action {
  margin-top: 16px;
}

.cta-big {
  background: linear-gradient(135deg, #F0E0CB, #E8D5C0);
  border-radius: var(--r-xl);
  padding: 28px 24px;
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  transition: transform .2s var(--ease);
}
.cta-big:active { transform: scale(0.98); }
.cta-big::before {
  content: '';
  position: absolute;
  right: -40px; top: -40px;
  width: 160px; height: 160px;
  background: radial-gradient(circle, rgba(255,255,255,0.5), transparent);
  border-radius: 50%;
}
.cta-big-label {
  font-size: 12px;
  color: var(--accent-deep);
  letter-spacing: 0.1em;
  margin-bottom: 6px;
  position: relative;
}
.cta-big-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 22px;
  color: var(--text);
  line-height: 1.5;
  position: relative;
}
.cta-big-sub {
  margin-top: 6px;
  font-size: 13px;
  color: var(--text-soft);
  position: relative;
}

.today-card {
  background: var(--bg-card);
  border-radius: var(--r-lg);
  padding: 20px 24px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 16px;
  box-shadow: var(--shadow-soft);
}
.today-emoji { font-size: 36px; }
.today-text { flex: 1; }
.today-label {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.1em;
  margin-bottom: 2px;
}
.today-comment {
  font-size: 14px;
  color: var(--text);
  line-height: 1.5;
}

/* ---------- Bottom Nav ---------- */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 420px;
  background: rgba(250, 246, 240, 0.92);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-top: 1px solid var(--divider);
  padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
  display: flex;
  justify-content: space-around;
  z-index: 100;
}
@media (min-width: 421px) {
  .bottom-nav { position: absolute; border-radius: 0 0 32px 32px; }
}
.nav-btn {
  flex: 1;
  background: none;
  border: none;
  padding: 10px;
  cursor: pointer;
  color: var(--text-muted);
  font-family: inherit;
  font-size: 10px;
  letter-spacing: 0.05em;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  transition: color .2s;
}
.nav-btn.active { color: var(--accent); }
.nav-btn svg { width: 22px; height: 22px; }

/* ---------- Mood Check ---------- */
.mood-screen {
  padding: 40px 28px 32px;
  display: flex;
  flex-direction: column;
  flex: 1;
}
.mood-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 26px;
  line-height: 1.5;
  margin-bottom: 8px;
}
.mood-sub {
  font-size: 14px;
  color: var(--text-soft);
  margin-bottom: 40px;
}
.mood-picker {
  display: flex;
  justify-content: space-between;
  gap: 8px;
  padding: 16px 0 32px;
}
.mood-option {
  flex: 1;
  aspect-ratio: 1;
  background: var(--bg-card);
  border: 2px solid transparent;
  border-radius: var(--r-md);
  font-size: 32px;
  cursor: pointer;
  transition: all .2s var(--ease);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 4px;
  box-shadow: var(--shadow-soft);
}
.mood-option:active { transform: scale(0.94); }
.mood-option.selected {
  background: var(--accent-soft);
  border-color: var(--accent);
  box-shadow: 0 4px 16px rgba(198,139,94,.2);
}
.mood-option-label {
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.05em;
}
.mood-option.selected .mood-option-label { color: var(--accent-deep); }

.mood-comment-label {
  font-size: 13px;
  color: var(--text-soft);
  margin-bottom: 8px;
  margin-top: 16px;
}
.mood-comment {
  width: 100%;
  padding: 16px;
  background: var(--bg-card);
  border: 1px solid var(--divider);
  border-radius: var(--r-md);
  font-family: inherit;
  font-size: 15px;
  resize: none;
  outline: none;
}
.mood-comment:focus { border-color: var(--accent); }

.mood-footer {
  margin-top: auto;
  padding-top: 24px;
}

/* ---------- Chat ---------- */
.chat-screen {
  display: flex;
  flex-direction: column;
  flex: 0 0 auto;
  height: 100vh;
  height: 100dvh;
  height: var(--app-h, 100dvh);
  min-height: 0;
  max-height: var(--app-h, 100dvh);
  overflow: hidden;
}
@media (min-width: 421px) {
  .chat-screen {
    height: calc(100vh - 40px);
    height: calc(var(--app-h, 100dvh) - 40px);
    max-height: calc(var(--app-h, 100dvh) - 40px);
  }
}
.chat-screen .chat-messages { min-height: 0; }

.chat-header {
  display: flex;
  align-items: center;
  padding: 16px 20px;
  border-bottom: 1px solid var(--divider);
  background: rgba(250, 246, 240, 0.96);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 20;
  flex-shrink: 0;
}
.chat-back {
  width: 36px; height: 36px;
  border: none;
  background: var(--bg-soft);
  border-radius: 50%;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-soft);
}
.chat-back svg {
  width: 18px; height: 18px;
  display: block;
}
.chat-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, var(--p-accent, var(--accent-soft)), var(--p-color, var(--accent)));
  position: relative;
  flex-shrink: 0;
}
.chat-avatar::after {
  content: '';
  position: absolute;
  inset: 25%;
  background: radial-gradient(circle at 40% 40%, #fff, var(--accent-soft));
  border-radius: 50%;
  opacity: 0.6;
}
.chat-title {
  flex: 1;
}
.chat-name {
  font-family: 'Noto Serif JP', serif;
  font-size: 17px;
  line-height: 1.2;
}
.chat-status {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.05em;
}
.chat-end {
  background: none;
  border: none;
  font-family: inherit;
  font-size: 12px;
  color: var(--text-soft);
  cursor: pointer;
  padding: 8px;
}
.chat-to-reflect {
  background: var(--accent-soft);
  border: none;
  font-family: inherit;
  font-size: 11px;
  color: var(--accent-deep);
  cursor: pointer;
  padding: 6px 10px;
  border-radius: 999px;
  letter-spacing: 0.03em;
}
.chat-to-reflect:active { transform: scale(0.95); }

.goal-context-pill {
  margin: 0 16px 8px;
  padding: 8px 12px;
  background: var(--bg-soft);
  border-radius: 10px;
  font-size: 11px;
  color: var(--text-soft);
  line-height: 1.5;
  border: 1px solid var(--accent-soft);
}
.goal-context-pill .goal-context-label {
  color: var(--accent-deep, var(--accent));
  font-weight: 500;
  margin-right: 6px;
  letter-spacing: 0.04em;
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.msg-group {
  display: flex;
  gap: 10px;
  align-items: flex-end;
  animation: slideUp .35s var(--ease);
}
@keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

.msg-group.user { justify-content: flex-end; }
.msg-avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, var(--p-accent, var(--accent-soft)), var(--p-color, var(--accent)));
  flex-shrink: 0;
  position: relative;
  margin-bottom: 4px;
}
.msg-avatar::after {
  content: '';
  position: absolute;
  inset: 25%;
  background: radial-gradient(circle at 40% 40%, #fff, var(--accent-soft));
  border-radius: 50%;
  opacity: 0.6;
}

.msg-bubble {
  max-width: 78%;
  padding: 14px 18px;
  line-height: 1.7;
  font-size: 15px;
  word-wrap: break-word;
  position: relative;
}
.msg-bubble.ai {
  background: var(--bg-card);
  border-radius: 4px 20px 20px 20px;
  color: var(--text);
  box-shadow: var(--shadow-soft);
  border: 1px solid rgba(61, 52, 42, 0.04);
}
.msg-bubble.user {
  background: var(--accent);
  color: #fff;
  border-radius: 20px 20px 4px 20px;
}

.scroll-top-btn {
  position: absolute;
  right: 16px;
  bottom: 120px;
  width: 40px; height: 40px;
  border-radius: 50%;
  background: rgba(250, 246, 240, 0.95);
  border: 1px solid var(--divider);
  box-shadow: 0 4px 12px rgba(61, 52, 42, 0.12);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--accent-deep);
  opacity: 0;
  transform: translateY(8px);
  pointer-events: none;
  transition: opacity .2s var(--ease), transform .2s var(--ease);
  z-index: 5;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
.scroll-top-btn.show {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}
.scroll-top-btn:active { transform: scale(0.92); }
.scroll-top-btn svg { width: 18px; height: 18px; }

.typing {
  display: inline-flex;
  gap: 4px;
  padding: 4px 0;
}
.typing span {
  width: 6px; height: 6px;
  background: var(--text-muted);
  border-radius: 50%;
  animation: typing 1.2s infinite ease-in-out;
}
.typing span:nth-child(2) { animation-delay: .15s; }
.typing span:nth-child(3) { animation-delay: .3s; }
@keyframes typing {
  0%, 60%, 100% { transform: scale(0.8); opacity: 0.4; }
  30% { transform: scale(1.2); opacity: 1; }
}

.choices {
  padding: 6px 16px 0 54px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  animation: slideUp .45s var(--ease);
}
.choice-chip {
  background: var(--bg-card);
  border: 1.5px solid var(--accent-soft);
  color: var(--accent-deep);
  padding: 10px 16px;
  border-radius: 999px;
  font-family: inherit;
  font-size: 14px;
  cursor: pointer;
  transition: all .2s var(--ease);
  font-weight: 500;
}
.choice-chip:active { transform: scale(0.95); }
.choice-chip:hover { background: var(--accent-soft); }
.choice-chip.other {
  background: transparent;
  border-color: var(--divider);
  color: var(--text-soft);
}

.chat-input-area {
  padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
  background: rgba(250, 246, 240, 0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-top: 1px solid var(--divider);
}
.chat-input-hint {
  text-align: center;
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 6px;
  letter-spacing: 0.05em;
}
.chat-input-row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
  background: var(--bg-card);
  border-radius: var(--r-lg);
  padding: 8px 8px 8px 16px;
  border: 1px solid var(--divider);
}
.chat-input {
  flex: 1;
  border: none;
  background: none;
  font-family: inherit;
  font-size: 15px;
  color: var(--text);
  resize: none;
  outline: none;
  line-height: 1.5;
  max-height: 100px;
  padding: 8px 0;
}
.chat-input::placeholder { color: var(--text-muted); }
.chat-icon-btn {
  width: 40px; height: 40px;
  border: none;
  background: var(--bg-soft);
  border-radius: 50%;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-soft);
  flex-shrink: 0;
}
.chat-icon-btn.send { background: var(--accent); color: #fff; }
.chat-icon-btn.send:disabled { background: var(--text-muted); opacity: .5; }
.chat-icon-btn svg {
  width: 20px; height: 20px;
  display: block;
}

/* ---------- History ---------- */
.page-header {
  padding: 32px 24px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.page-header.insights-header {
  justify-content: flex-start;
  gap: 14px;
}
.page-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 24px;
}
.history-list {
  padding: 8px 20px 120px;
}
.history-item {
  background: var(--bg-card);
  border-radius: var(--r-lg);
  padding: 18px 20px;
  margin-bottom: 12px;
  cursor: pointer;
  box-shadow: var(--shadow-soft);
  transition: transform .15s var(--ease);
}
.history-item:active { transform: scale(0.98); }
.history-date {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.08em;
  margin-bottom: 6px;
}
.history-preview {
  font-size: 14px;
  line-height: 1.6;
  color: var(--text);
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
.history-meta {
  margin-top: 10px;
  font-size: 11px;
  color: var(--text-muted);
  display: flex;
  gap: 12px;
}

.empty {
  text-align: center;
  padding: 80px 20px;
  color: var(--text-muted);
}
.empty-emoji { font-size: 40px; margin-bottom: 16px; opacity: 0.6; }
.empty-text { font-size: 14px; line-height: 1.8; }

/* ---------- Settings ---------- */
.settings-list { padding: 8px 20px 120px; }
.setting-group {
  background: var(--bg-card);
  border-radius: var(--r-lg);
  overflow: hidden;
  margin-bottom: 16px;
  box-shadow: var(--shadow-soft);
}
.setting-group-title {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.1em;
  padding: 16px 20px 6px;
  text-transform: uppercase;
}
.setting-row {
  padding: 14px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--divider);
  cursor: pointer;
}
.setting-row:last-child { border-bottom: none; }
.setting-label { font-size: 15px; }
.setting-value {
  font-size: 13px;
  color: var(--text-soft);
  max-width: 180px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.setting-row-readonly {
  pointer-events: none;
}
.setting-hint-line {
  padding: 10px 20px 0;
  font-size: 12px;
  color: var(--primary);
  letter-spacing: 0.01em;
}
.setting-sub-note {
  padding: 8px 20px 0;
  font-size: 11px;
  color: var(--text-muted);
  line-height: 1.6;
}
.report-narrative-evidence {
  color: var(--primary);
  opacity: 0.92;
}

/* ---------- Modal ---------- */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(61, 52, 42, 0.4);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: fadeIn .25s var(--ease);
}
.modal-backdrop.open { display: flex; }
.modal {
  background: var(--bg-card);
  border-radius: var(--r-xl);
  padding: 28px;
  max-width: 380px;
  width: 100%;
  box-shadow: var(--shadow-lift);
  animation: modalIn .3s var(--ease);
}
@keyframes modalIn {
  from { opacity: 0; transform: scale(.95) translateY(10px); }
  to { opacity: 1; transform: none; }
}
.modal-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 20px;
  margin-bottom: 12px;
}
.modal-body {
  font-size: 14px;
  line-height: 1.8;
  color: var(--text-soft);
  margin-bottom: 20px;
}
.modal-body textarea, .modal-body input {
  width: 100%;
  margin-top: 12px;
}
.modal-actions {
  display: flex;
  gap: 10px;
  flex-direction: column;
}

/* ---------- Crisis ---------- */
.crisis-modal {
  background: var(--bg-card);
  border-radius: var(--r-xl);
  padding: 28px 24px;
  max-width: 380px;
  width: 100%;
  border-top: 6px solid var(--danger);
}
.crisis-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 20px;
  margin-bottom: 8px;
  color: var(--text);
}
.crisis-msg {
  font-size: 14px;
  line-height: 1.8;
  color: var(--text);
  margin-bottom: 20px;
}
.crisis-hotlines {
  background: var(--bg-soft);
  border-radius: var(--r-md);
  padding: 16px;
  margin-bottom: 16px;
}
.hotline {
  padding: 12px 0;
  border-bottom: 1px solid var(--divider);
}
.hotline:last-child { border-bottom: none; }
.hotline-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
}
.hotline-num {
  display: block;
  margin-top: 4px;
  font-size: 17px;
  color: var(--accent-deep);
  text-decoration: none;
  font-weight: 500;
  letter-spacing: 0.02em;
}
.hotline-hours {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 2px;
}

/* ---------- Toast ---------- */
.toast {
  position: fixed;
  top: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(-80px);
  background: var(--text);
  color: #fff;
  padding: 12px 20px;
  border-radius: 999px;
  font-size: 13px;
  box-shadow: var(--shadow-lift);
  transition: transform .3s var(--ease), opacity .3s var(--ease);
  z-index: 300;
  opacity: 0;
  pointer-events: none;
  visibility: hidden;
}
.toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
  pointer-events: auto;
  visibility: visible;
}

/* ---------- Utility ---------- */
.spacer { flex: 1; }
.text-center { text-align: center; }
.mt-16 { margin-top: 16px; }
.mt-24 { margin-top: 24px; }
.hidden { display: none !important; }

/* ---------- Reflection Flow ---------- */
.reflect-screen {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 100vh;
}
@media (min-width: 421px) { .reflect-screen { min-height: calc(100vh - 40px); } }

.reflect-header {
  padding: 20px 20px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.reflect-header-title {
  flex: 1;
  font-family: 'Noto Serif JP', serif;
  font-size: 18px;
}
.reflect-header-step {
  font-size: 12px;
  color: var(--text-muted);
  letter-spacing: 0.1em;
}

.reflect-progress {
  display: flex;
  gap: 6px;
  padding: 0 20px 20px;
}
.reflect-dot {
  flex: 1;
  height: 4px;
  background: var(--divider);
  border-radius: 2px;
  transition: background .3s var(--ease);
}
.reflect-dot.done { background: var(--accent); }
.reflect-dot.current { background: var(--accent); opacity: 0.5; }

.reflect-body {
  flex: 1;
  overflow-y: auto;
  padding: 0 24px 24px;
}

.reflect-prompt {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  margin-bottom: 24px;
}
.reflect-prompt .msg-avatar { width: 36px; height: 36px; }
.reflect-prompt-body {
  flex: 1;
}
.reflect-prompt-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 22px;
  line-height: 1.5;
  margin-bottom: 4px;
}
.reflect-prompt-sub {
  font-size: 13.5px;
  color: var(--text-soft);
  line-height: 1.7;
}

.reflect-textarea {
  width: 100%;
  padding: 16px 18px;
  background: var(--bg-card);
  border: 1px solid var(--divider);
  border-radius: var(--r-md);
  font-family: inherit;
  font-size: 15px;
  color: var(--text);
  resize: vertical;
  min-height: 120px;
  outline: none;
  line-height: 1.7;
}
.reflect-textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

.reflect-hints {
  margin-top: 14px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.reflect-hint {
  background: var(--bg-card);
  border: 1px solid var(--divider);
  padding: 8px 14px;
  border-radius: 999px;
  font-size: 13px;
  color: var(--text-soft);
  cursor: pointer;
  font-family: inherit;
  transition: all .2s var(--ease);
}
.reflect-hint:active { transform: scale(0.95); }
.reflect-hint:hover { background: var(--bg-soft); color: var(--text); }

.reflect-emotion-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 20px;
}
.reflect-emotion-btn {
  aspect-ratio: 1;
  background: var(--bg-card);
  border: 1.5px solid transparent;
  border-radius: var(--r-md);
  cursor: pointer;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 4px;
  box-shadow: var(--shadow-soft);
  font-family: inherit;
  transition: all .2s var(--ease);
}
.reflect-emotion-btn:active { transform: scale(0.94); }
.reflect-emotion-btn.selected {
  background: var(--accent-soft);
  border-color: var(--accent);
}
.reflect-emotion-emoji { font-size: 24px; }
.reflect-emotion-label {
  font-size: 11px;
  color: var(--text-soft);
  letter-spacing: 0.02em;
}
.reflect-emotion-btn.selected .reflect-emotion-label { color: var(--accent-deep); font-weight: 500; }

.reflect-slider-wrap {
  background: var(--bg-card);
  border-radius: var(--r-lg);
  padding: 20px;
  box-shadow: var(--shadow-soft);
  margin-bottom: 20px;
}
.reflect-slider-label {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 16px;
}
.reflect-slider-title {
  font-size: 13px;
  color: var(--text-soft);
}
.reflect-slider-value {
  font-family: 'Noto Serif JP', serif;
  font-size: 28px;
  color: var(--accent-deep);
  font-weight: 500;
}
.reflect-slider {
  width: 100%;
  -webkit-appearance: none;
  appearance: none;
  height: 8px;
  background: var(--bg-soft);
  border-radius: 4px;
  outline: none;
}
.reflect-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  box-shadow: 0 3px 8px rgba(198,139,94,.4);
}
.reflect-slider::-moz-range-thumb {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  border: none;
  box-shadow: 0 3px 8px rgba(198,139,94,.4);
}
.reflect-slider-ticks {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.05em;
}

.reflect-footer {
  padding: 16px 20px calc(16px + env(safe-area-inset-bottom));
  background: rgba(250, 246, 240, 0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-top: 1px solid var(--divider);
  display: flex;
  gap: 10px;
}
.reflect-footer .btn { flex: 1; }

.alt-card {
  background: var(--bg-card);
  border: 1.5px solid var(--divider);
  border-radius: var(--r-lg);
  padding: 16px 18px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: all .2s var(--ease);
  position: relative;
}
.alt-card:hover { border-color: var(--accent-soft); }
.alt-card.picked {
  background: var(--accent-soft);
  border-color: var(--accent);
}
.alt-card-tag {
  display: inline-block;
  font-size: 10px;
  color: var(--accent-deep);
  background: var(--bg);
  padding: 3px 10px;
  border-radius: 999px;
  letter-spacing: 0.08em;
  margin-bottom: 8px;
  border: 1px solid var(--accent-soft);
}
.alt-card-text {
  font-size: 14.5px;
  line-height: 1.7;
}

.alt-loading {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-muted);
  font-size: 13px;
}
.alt-loading-dots {
  display: inline-flex;
  gap: 5px;
  margin-top: 12px;
}
.alt-loading-dots span {
  width: 8px; height: 8px;
  background: var(--accent-soft);
  border-radius: 50%;
  animation: typing 1.2s infinite ease-in-out;
}
.alt-loading-dots span:nth-child(2) { animation-delay: .15s; }
.alt-loading-dots span:nth-child(3) { animation-delay: .3s; }

.reflect-section-title {
  font-size: 12px;
  color: var(--text-muted);
  letter-spacing: 0.1em;
  margin: 20px 0 12px;
  text-transform: uppercase;
}

/* ---------- Reflection Report ---------- */
.report-screen {
  min-height: 100vh;
  padding-bottom: 40px;
}
@media (min-width: 421px) { .report-screen { min-height: calc(100vh - 40px); } }

.report-header {
  padding: 20px 20px 12px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.report-title {
  flex: 1;
  font-family: 'Noto Serif JP', serif;
  font-size: 18px;
}

.report-body {
  padding: 0 20px;
}

.report-section-label {
  display: flex;
  align-items: center;
  gap: 6px;
  justify-content: center;
  font-family: 'Noto Serif JP', serif;
  font-size: 16px;
  color: var(--accent-deep);
  margin: 20px 0 12px;
}
.report-section-label svg { width: 18px; height: 18px; }

.report-card {
  background: var(--bg-card);
  border-radius: var(--r-lg);
  padding: 20px 22px;
  box-shadow: var(--shadow-soft);
  margin-bottom: 6px;
}
.report-card-text {
  font-size: 15px;
  line-height: 1.8;
  color: var(--text);
  white-space: pre-wrap;
}

.report-arrow-down {
  display: flex;
  justify-content: center;
  padding: 8px 0;
}
.report-arrow-down svg { color: var(--accent-soft); }

.report-psycho {
  background: linear-gradient(135deg, #F3EDE3, #EFE5D6);
  border-radius: var(--r-lg);
  padding: 20px 22px;
  text-align: center;
  font-family: 'Noto Serif JP', serif;
  font-size: 14px;
  line-height: 1.9;
  color: var(--text);
  margin: 16px 0;
  position: relative;
}

.report-split {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  position: relative;
}
.report-split-arrows {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: -4px;
}
.report-split-arrow {
  display: flex;
  justify-content: center;
  color: var(--accent-soft);
}

.report-col {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.report-col-header {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--accent-deep);
  font-weight: 500;
  padding: 0 4px;
}
.report-col-header svg { width: 16px; height: 16px; }

.report-col-card {
  background: var(--bg-card);
  border-radius: var(--r-md);
  padding: 14px;
  box-shadow: var(--shadow-soft);
  font-size: 13.5px;
  line-height: 1.7;
  color: var(--text);
  white-space: pre-wrap;
  flex: 1;
  min-height: 90px;
}
.report-col-card.alt {
  background: linear-gradient(135deg, #FFFFFF, #F7EDDE);
}

.report-emotion-card {
  margin-top: 8px;
  background: var(--bg-card);
  border-radius: var(--r-md);
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  box-shadow: var(--shadow-soft);
}
.report-emotion-emoji { font-size: 22px; }
.report-emotion-info { flex: 1; }
.report-emotion-label {
  font-size: 12px;
  color: var(--text-soft);
}
.report-emotion-score {
  font-family: 'Noto Serif JP', serif;
  font-size: 18px;
  color: var(--text);
  font-weight: 500;
}

.report-summary {
  margin: 24px 0 20px;
  background: linear-gradient(135deg, var(--accent-soft), #F3EDE3);
  border-radius: var(--r-lg);
  padding: 24px;
  text-align: center;
}
.report-summary-title {
  font-size: 12px;
  color: var(--accent-deep);
  letter-spacing: 0.1em;
  margin-bottom: 10px;
}
.report-summary-change {
  font-family: 'Noto Serif JP', serif;
  font-size: 24px;
  color: var(--text);
  margin-bottom: 6px;
}
.report-summary-change span.from { color: var(--text-soft); }
.report-summary-change span.to { color: var(--accent-deep); font-weight: 500; }
.report-summary-delta {
  font-size: 13px;
  color: var(--text-soft);
  line-height: 1.6;
}

.report-footer {
  padding: 8px 20px 32px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.alt-editor {
  width: 100%;
  padding: 14px 16px;
  background: var(--bg-card);
  border: 1.5px solid var(--divider);
  border-radius: var(--r-md);
  font-family: inherit;
  font-size: 14.5px;
  color: var(--text);
  resize: vertical;
  min-height: 100px;
  outline: none;
  line-height: 1.7;
  margin-top: 4px;
}
.alt-editor:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

/* ---------- Reflection Chat Widgets ---------- */
.reflect-emotion-scroll {
  padding: 8px 16px 10px 16px;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  animation: slideUp .4s var(--ease);
}
.reflect-emotion-chip {
  background: var(--bg-card);
  border: 1.5px solid var(--accent-soft);
  color: var(--text);
  padding: 12px 18px;
  border-radius: 999px;
  font-family: inherit;
  font-size: 15px;
  cursor: pointer;
  transition: all .2s var(--ease);
  display: inline-flex;
  align-items: center;
  gap: 8px;
  line-height: 1.2;
  box-shadow: 0 1px 3px rgba(61, 52, 42, 0.05);
  min-height: 46px;
}
.reflect-emotion-chip:active { transform: scale(0.94); }
.reflect-emotion-chip:hover { background: var(--accent-soft); border-color: var(--accent); }
.reflect-emotion-chip > span:first-child { font-size: 22px; line-height: 1; }
.reflect-emotion-more {
  background: var(--bg-soft);
  border-color: var(--divider);
  color: var(--text-soft);
  font-weight: 500;
}
.reflect-emotion-more:hover { background: var(--bg-warm); color: var(--text); border-color: var(--accent-soft); }

.reflect-score-row {
  padding: 8px 20px 4px;
  display: flex;
  gap: 5px;
  animation: slideUp .4s var(--ease);
  align-items: center;
  justify-content: stretch;
}
.reflect-score-btn {
  flex: 1 1 0;
  min-width: 0;
  aspect-ratio: 1;
  max-height: 40px;
  border-radius: 50%;
  background: var(--bg-card);
  border: 1.5px solid var(--accent-soft);
  color: var(--accent-deep);
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s var(--ease);
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.reflect-score-btn:active { transform: scale(0.85); background: var(--accent); color: #fff; }
.reflect-score-btn:hover { background: var(--accent-soft); }
.reflect-score-legend {
  padding: 2px 20px 8px;
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.08em;
  display: flex;
  justify-content: space-between;
}
.reflect-score-legend span:first-child { padding-left: 2px; }
.reflect-score-legend span:last-child { padding-right: 2px; }

.reflect-widget-area {
  /* チャット内インライン化：AI吹き出しの下に続けて表示、
     chat-messages と一緒にスクロールする */
  padding: 4px 0 12px 42px;
  margin-top: -4px;
  animation: slideUp .45s var(--ease);
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.reflect-widget-area .alt-card { margin-bottom: 0; }
.alt-divider {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 4px 0 2px;
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--text-muted);
  text-transform: none;
}
.alt-divider::before,
.alt-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--divider);
}
.alt-divider span { flex-shrink: 0; }
.reflect-alt-actions {
  margin-top: 6px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.reflect-alt-actions .btn { width: 100%; }
.alt-limit-note {
  font-size: 11px;
  color: var(--text-muted);
  text-align: center;
  padding: 8px 12px;
  background: var(--bg-soft);
  border-radius: 8px;
  letter-spacing: 0.04em;
  line-height: 1.6;
}

/* ---------- Letter Report ---------- */
.letter-screen {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  background: linear-gradient(180deg, #EFE5D6 0%, #E8DCC9 100%);
}
@media (min-width: 421px) { .letter-screen { min-height: calc(100vh - 40px); } }

.letter-top {
  padding: 16px 16px 12px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.letter-top-title {
  flex: 1;
  text-align: center;
}
.letter-top-name {
  font-family: 'Noto Serif JP', serif;
  font-size: 15px;
  color: var(--text);
  letter-spacing: 0.05em;
}
.letter-top-date {
  font-size: 11px;
  color: var(--text-soft);
  letter-spacing: 0.05em;
  margin-top: 2px;
}

.letter-body {
  flex: 1;
  padding: 0 16px 12px;
  overflow-y: auto;
}

.letter-card {
  background: #FFFEF9;
  background-image:
    radial-gradient(ellipse at top left, rgba(198, 139, 94, 0.04), transparent 50%),
    radial-gradient(ellipse at bottom right, rgba(168, 179, 155, 0.04), transparent 50%);
  border-radius: 4px;
  padding: 40px 28px 32px;
  box-shadow:
    0 1px 2px rgba(61, 52, 42, 0.06),
    0 8px 24px rgba(61, 52, 42, 0.1),
    0 16px 48px rgba(61, 52, 42, 0.08);
  position: relative;
  overflow: hidden;
}
.letter-card::before,
.letter-card::after {
  content: '';
  position: absolute;
  background: linear-gradient(45deg, transparent 45%, rgba(198, 139, 94, 0.1) 45%, rgba(198, 139, 94, 0.1) 55%, transparent 55%);
  width: 20px;
  height: 20px;
}
.letter-corner {
  position: absolute;
  width: 24px;
  height: 24px;
  border: 1px solid rgba(198, 139, 94, 0.25);
  pointer-events: none;
}
.letter-corner.tl { top: 12px; left: 12px; border-right: none; border-bottom: none; }
.letter-corner.br { bottom: 12px; right: 12px; border-left: none; border-top: none; }

.letter-stamp {
  position: absolute;
  top: 14px;
  right: 14px;
  font-size: 9px;
  color: var(--accent-deep);
  opacity: 0.4;
  letter-spacing: 0.25em;
  font-weight: 500;
  border: 1px solid currentColor;
  padding: 3px 8px;
  border-radius: 2px;
}

.letter-greet {
  font-family: 'Noto Serif JP', serif;
  font-size: 22px;
  color: var(--text);
  margin-bottom: 8px;
  letter-spacing: 0.02em;
}
.letter-intro {
  font-size: 13.5px;
  color: var(--text-soft);
  line-height: 1.8;
  margin-bottom: 28px;
}

.letter-block {
  margin-bottom: 22px;
}

.letter-label {
  font-size: 10px;
  color: var(--accent-deep);
  letter-spacing: 0.18em;
  margin-bottom: 10px;
  font-weight: 500;
  display: inline-block;
  border-bottom: 1px solid var(--accent-soft);
  padding-bottom: 3px;
}

.letter-quote {
  font-size: 15px;
  line-height: 1.85;
  color: var(--text);
  font-family: 'Noto Serif JP', serif;
  white-space: pre-wrap;
  padding: 4px 2px;
}

.letter-connector {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 22px 0 18px;
}
.letter-connector-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(198, 139, 94, 0.3), transparent);
}
.letter-connector-label {
  font-size: 11px;
  color: var(--text-soft);
  letter-spacing: 0.08em;
}

.letter-thought-card {
  background: var(--bg-soft);
  border-left: 3px solid var(--accent-soft);
  border-radius: 0 12px 12px 0;
  padding: 16px 18px 16px 16px;
  position: relative;
}
.letter-thought-card.alt {
  background: linear-gradient(135deg, #F5EFE6, #EFE8DA);
  border-left-color: var(--accent);
}
.letter-thought-mark {
  position: absolute;
  top: -6px;
  left: 14px;
  font-family: 'Noto Serif JP', serif;
  font-size: 36px;
  color: var(--accent-soft);
  line-height: 1;
  font-weight: 500;
}
.letter-thought-card.alt .letter-thought-mark { color: var(--accent); }
.letter-thought-text {
  font-size: 14.5px;
  line-height: 1.85;
  color: var(--text);
  white-space: pre-wrap;
  padding-top: 6px;
}

.letter-emotion-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 8px;
}
.letter-emotion-label {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--text);
}
.letter-emotion-emoji { font-size: 18px; }
.letter-emotion-score {
  font-family: 'Noto Serif JP', serif;
  font-size: 26px;
  color: var(--text);
  font-weight: 500;
  line-height: 1;
}
.letter-emotion-score span {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 400;
  margin-left: 2px;
}
.letter-emotion-score.lighter { color: var(--sage); }
.letter-emotion-score.heavier { color: var(--danger); opacity: 0.8; }

.letter-emotion-bar {
  height: 10px;
  background: rgba(168, 179, 155, 0.15);
  border-radius: 999px;
  overflow: hidden;
  position: relative;
}
.letter-emotion-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent-soft), var(--accent));
  border-radius: 999px;
  width: 0;
  animation: barFill 1.1s var(--ease) 0.2s forwards;
}
.letter-emotion-fill.tone-after {
  background: linear-gradient(90deg, #DDE0D5, var(--sage));
  animation-delay: 0.9s;
}
@keyframes barFill {
  to { width: var(--target-width); }
}
.letter-emotion-delta {
  position: absolute;
  right: 8px;
  top: -22px;
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 999px;
  opacity: 0;
  animation: deltaIn 0.5s var(--ease) 1.5s forwards;
}
.letter-emotion-delta.down {
  background: var(--sage-soft);
  color: #5A6F56;
}
.letter-emotion-delta.up {
  background: #F5D9D6;
  color: var(--danger);
}
@keyframes deltaIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: none; }
}

.letter-shift {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  margin: 24px 0 18px;
  color: var(--accent);
}
.letter-shift-curve {
  width: 40px;
  height: 40px;
  color: var(--accent);
  opacity: 0.7;
}
.letter-shift-text {
  font-size: 12px;
  color: var(--accent-deep);
  letter-spacing: 0.1em;
  font-weight: 500;
}

.letter-closing {
  margin: 28px 0 8px;
  padding: 20px 16px;
  background: linear-gradient(135deg, var(--accent-soft), #F5EFE6);
  border-radius: 14px;
  font-family: 'Noto Serif JP', serif;
  font-size: 15px;
  line-height: 1.9;
  color: var(--text);
  text-align: center;
  position: relative;
}

.letter-signature {
  text-align: right;
  margin-top: 18px;
  font-family: 'Noto Serif JP', serif;
  font-size: 16px;
  color: var(--accent-deep);
  font-style: italic;
  letter-spacing: 0.05em;
}

.letter-footer {
  padding: 12px 20px calc(16px + env(safe-area-inset-bottom));
  display: flex;
  flex-direction: column;
  gap: 8px;
  background: rgba(239, 229, 214, 0.7);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}

/* ---------- Persona ---------- */
.onb-persona .onb-hint { white-space: pre-line; }
.persona-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 4px;
}
.persona-card {
  display: flex;
  gap: 14px;
  align-items: flex-start;
  background: var(--bg-card);
  border: 2px solid transparent;
  border-radius: var(--r-lg);
  padding: 16px;
  cursor: pointer;
  transition: all .2s var(--ease);
  box-shadow: var(--shadow-soft);
}
.persona-card:hover { border-color: var(--accent-soft); }
.persona-card.selected {
  border-color: var(--accent);
  background: linear-gradient(135deg, #FFFEF9, #F7EDDE);
}
.persona-card input[type="radio"] { display: none; }
.persona-card-compact {
  display: flex;
  gap: 12px;
  align-items: center;
  background: var(--bg);
  border: 1.5px solid transparent;
  border-radius: var(--r-md);
  padding: 12px;
  cursor: pointer;
  margin-bottom: 8px;
  transition: all .2s var(--ease);
}
.persona-card-compact:hover { background: var(--bg-soft); }
.persona-card-compact.selected {
  border-color: var(--accent);
  background: var(--accent-soft);
}
.persona-card-compact input[type="radio"] { display: none; }
.persona-avatar {
  width: 56px; height: 56px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-family: 'Noto Serif JP', serif;
  font-size: 24px;
  font-weight: 500;
  position: relative;
  box-shadow: 0 3px 10px rgba(61, 52, 42, 0.12);
}
.persona-avatar span {
  z-index: 1;
  text-shadow: 0 1px 2px rgba(0,0,0,.15);
}
.persona-card-compact .persona-avatar { width: 44px; height: 44px; font-size: 18px; }
.persona-info { flex: 1; font-size: 13px; line-height: 1.6; }
.persona-name { font-size: 16px; color: var(--text); margin-bottom: 2px; }
.persona-name strong { font-family: 'Noto Serif JP', serif; font-weight: 500; }
.persona-age {
  font-size: 11px;
  color: var(--text-soft);
  background: var(--bg-soft);
  padding: 1px 6px;
  border-radius: 999px;
  margin-left: 4px;
}
.persona-tagline {
  font-size: 12.5px;
  color: var(--accent-deep);
  margin-bottom: 6px;
  font-weight: 500;
}
.persona-bg {
  font-size: 12px;
  color: var(--text-soft);
  line-height: 1.7;
  margin-bottom: 4px;
}
.persona-specialty {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.05em;
}
.persona-mini-avatar {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 26px; height: 26px;
  border-radius: 50%;
  color: white;
  font-size: 13px;
  font-family: 'Noto Serif JP', serif;
  margin-right: 8px;
  vertical-align: middle;
  box-shadow: 0 2px 6px rgba(61, 52, 42, 0.12);
}

.modal-persona { max-width: 420px; }
.modal-persona .modal-body { max-height: 60vh; overflow-y: auto; padding-right: 4px; }

/* ---------- Goal Card ---------- */
.goal-card {
  background: var(--bg-card);
  border-radius: var(--r-lg);
  padding: 18px 20px;
  margin-bottom: 16px;
  box-shadow: var(--shadow-soft);
  position: relative;
}
.goal-setup {
  background: linear-gradient(135deg, #F5EFE6, #EFE5D6);
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: transform .15s var(--ease);
  border: 1.5px dashed var(--accent-soft);
}
.goal-setup:active { transform: scale(0.98); }
.goal-setup-body { flex: 1; }
.goal-setup-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 17px;
  color: var(--text);
  margin-bottom: 2px;
}
.goal-setup-sub {
  font-size: 12px;
  color: var(--text-soft);
  line-height: 1.6;
}
.goal-icon { font-size: 28px; flex-shrink: 0; }
.goal-setup-arrow { font-size: 28px; color: var(--accent); font-weight: 300; }

.goal-active-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.goal-active-label {
  font-size: 12px;
  color: var(--accent-deep);
  letter-spacing: 0.1em;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 6px;
}
.goal-active-label .goal-icon { font-size: 16px; }
.goal-active-edit {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  padding: 4px;
  display: flex;
}
.goal-active-edit svg { width: 16px; height: 16px; }
.goal-active-body {
  font-family: 'Noto Serif JP', serif;
  font-size: 16.5px;
  line-height: 1.7;
  color: var(--text);
  margin-bottom: 14px;
}
.goal-progress-wrap { margin-bottom: 10px; }
.goal-progress-track {
  height: 8px;
  background: rgba(168, 179, 155, 0.15);
  border-radius: 999px;
  overflow: hidden;
}
.goal-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent-soft), var(--accent));
  border-radius: 999px;
  transition: width .6s var(--ease);
}
.goal-progress-meta {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-top: 6px;
  font-size: 11px;
  color: var(--text-soft);
  letter-spacing: 0.05em;
}
.goal-progress-score {
  font-family: 'Noto Serif JP', serif;
  font-size: 20px;
  color: var(--text);
  font-weight: 500;
}
.goal-progress-score span { font-size: 11px; color: var(--text-muted); margin-left: 2px; }
.goal-progress-trend {
  font-size: 11px;
  color: var(--text-soft);
  margin-bottom: 10px;
  padding: 6px 10px;
  background: var(--bg-soft);
  border-radius: 8px;
}
.goal-trend-up { color: var(--sage); font-weight: 500; }
.goal-trend-down { color: var(--danger); font-weight: 500; opacity: 0.7; }
.goal-checkin-btn { width: 100%; }

.modal-goal .modal-body { padding-right: 4px; }
.goal-modal-label {
  font-size: 12px;
  color: var(--accent-deep);
  letter-spacing: 0.05em;
  margin: 14px 0 6px;
  font-weight: 500;
}
.goal-modal-label:first-child { margin-top: 0; }
.goal-modal-input {
  font-size: 14px;
  padding: 12px 14px;
  line-height: 1.6;
}
.goal-modal-aspiration {
  font-family: 'Noto Serif JP', serif;
  font-size: 15.5px;
  line-height: 1.8;
  color: var(--text);
  padding: 12px 14px;
  background: var(--bg-soft);
  border-radius: var(--r-sm);
}
.reflect-score-btn.picked {
  background: var(--accent) !important;
  color: #fff !important;
  border-color: var(--accent);
}

/* ---------- Garden Card ---------- */
.garden-card {
  background: linear-gradient(180deg, #FFFEF9, #F3EDE3);
  border-radius: var(--r-lg);
  padding: 18px 20px 14px;
  margin-bottom: 16px;
  box-shadow: var(--shadow-soft);
  position: relative;
  overflow: hidden;
}
.garden-streak-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 10px;
}
.garden-streak-main {
  display: flex;
  align-items: baseline;
  gap: 6px;
}
.garden-streak-num {
  font-family: 'Noto Serif JP', serif;
  font-size: 32px;
  font-weight: 500;
  color: var(--accent-deep);
  line-height: 1;
}
.garden-streak-unit {
  font-size: 13px;
  color: var(--text);
}
.garden-total {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.05em;
}
.garden-visual {
  font-size: 22px;
  line-height: 1.4;
  letter-spacing: 2px;
  padding: 4px 0;
  min-height: 32px;
  word-break: break-all;
}
.garden-plus {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 500;
  letter-spacing: 0.05em;
  padding-left: 4px;
}
.garden-ground {
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--sage-soft), transparent);
  margin-top: 4px;
  margin-bottom: 10px;
}
.garden-quote {
  font-size: 12px;
  color: var(--text-soft);
  text-align: center;
  letter-spacing: 0.05em;
  font-family: 'Noto Serif JP', serif;
}

.setting-label {
  display: flex;
  align-items: center;
}

/* ---------- Profile (onboarding step 2) ---------- */
.onb-profile .onb-hint { margin-bottom: 20px; }
.profile-group {
  margin-bottom: 18px;
}
.profile-group-label {
  font-size: 12px;
  color: var(--accent-deep);
  letter-spacing: 0.1em;
  margin-bottom: 8px;
  font-weight: 500;
}
.profile-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.profile-chip {
  background: var(--bg-card);
  border: 1.5px solid var(--divider);
  color: var(--text);
  padding: 10px 16px;
  border-radius: 999px;
  font-family: inherit;
  font-size: 14px;
  cursor: pointer;
  transition: all .2s var(--ease);
  box-shadow: 0 1px 3px rgba(61, 52, 42, 0.04);
}
.profile-chip:active { transform: scale(0.94); }
.profile-chip.selected {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

/* Persona suggested badge */
.persona-suggested {
  position: absolute;
  top: -6px;
  right: -8px;
  background: var(--accent-deep);
  color: #fff;
  font-size: 9px;
  padding: 3px 7px;
  border-radius: 999px;
  letter-spacing: 0.05em;
  font-weight: 500;
  box-shadow: 0 2px 6px rgba(61, 52, 42, 0.2);
}
.persona-card .persona-avatar { position: relative; }

/* ---------- Talk tab: Persona Card ---------- */
.talk-persona-card {
  background: linear-gradient(135deg, var(--p-accent, var(--accent-soft)), var(--bg-card));
  border-radius: var(--r-lg);
  padding: 14px 16px 18px;
  margin-bottom: 16px;
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow-soft);
  position: relative;
}
.talk-persona-card-body {
  display: flex;
  align-items: center;
  gap: 14px;
}
.talk-persona-avatar {
  width: 60px; height: 60px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, var(--p-accent), var(--p-color));
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Noto Serif JP', serif;
  font-size: 26px;
  font-weight: 500;
  flex-shrink: 0;
  box-shadow: 0 4px 12px rgba(61, 52, 42, 0.15);
}
.talk-persona-info { flex: 1; min-width: 0; }
.talk-persona-name {
  font-family: 'Noto Serif JP', serif;
  font-size: 17px;
  color: var(--text);
  margin-bottom: 2px;
}
.talk-persona-age {
  font-size: 11px;
  color: var(--text-muted);
  background: rgba(255,255,255,0.5);
  padding: 1px 6px;
  border-radius: 999px;
  margin-left: 4px;
}
.talk-persona-tag {
  font-size: 12px;
  color: var(--accent-deep);
  margin-bottom: 2px;
}
.talk-persona-specialty {
  font-size: 11px;
  color: var(--text-soft);
}
.talk-persona-change {
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
  text-align: right;
  font-size: 10px;
  color: var(--text-soft);
  line-height: 1.3;
  letter-spacing: 0.05em;
}
.talk-persona-chevron {
  font-size: 22px;
  color: var(--accent);
  line-height: 1;
}

/* ---------- Mandala Grid ---------- */
.mandala-wrap {
  margin-bottom: 20px;
  padding: 16px;
  background: linear-gradient(180deg, #F5EFE6, #EFE5D6);
  border-radius: var(--r-lg);
}
.mandala-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.mandala-label {
  font-size: 11px;
  color: var(--accent-deep);
  letter-spacing: 0.1em;
  font-weight: 500;
}
.mandala-checkin {
  background: var(--bg-card);
  color: var(--accent-deep);
  border: 1px solid var(--accent-soft);
  padding: 6px 12px;
  border-radius: 999px;
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
  transition: all .2s var(--ease);
}
.mandala-checkin:hover { background: var(--accent-soft); }
.mandala-checkin:active { transform: scale(0.95); }

.mandala-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  aspect-ratio: 1;
  max-width: 380px;
  margin: 0 auto;
}
.mandala-cell {
  aspect-ratio: 1;
  background: var(--bg-card);
  border-radius: var(--r-sm);
  padding: 8px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  cursor: pointer;
  transition: all .2s var(--ease);
  box-shadow: var(--shadow-soft);

/* ---------- Forest Hero (v2: 31 days) ---------- */
.forest-hero {
  position: relative;
  width: calc(100% + 40px);
  margin: 28px -20px 18px;
  height: 44vh;
  min-height: 210px;
  max-height: 280px;
  overflow: hidden;
  background: linear-gradient(180deg, #FFFEF9 0%, #F5EFE3 55%, #EFE0C9 100%);
  box-shadow: 0 6px 14px rgba(139, 127, 112, 0.08);
  border-top: 1px solid var(--divider);
}
.forest-hero-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  display: block;
}
.forest-hero-progress {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  padding: 14px 20px 14px;
  background: linear-gradient(180deg, rgba(255,254,249,0) 0%, rgba(255,254,249,0.78) 55%, rgba(255,254,249,0.92) 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.forest-hero-day {
  font-family: 'Noto Serif JP', serif;
  font-size: 13px;
  color: var(--text-soft);
  letter-spacing: 0.06em;
}
.forest-hero-day strong {
  font-size: 22px;
  color: var(--accent-deep);
  font-weight: 500;
  margin-right: 2px;
}
.forest-hero-stage {
  font-family: 'Noto Serif JP', serif;
  font-size: 15px;
  color: var(--text);
  letter-spacing: 0.08em;
  margin-top: 2px;
}
.forest-hero-hint {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.04em;
  margin-top: 2px;
}
.forest-info-btn {
  position: absolute;
  top: 12px;
  right: 12px;
  width: 26px; height: 26px;
  border-radius: 50%;
  background: rgba(255, 254, 249, 0.85);
  border: 1px solid var(--divider);
  color: var(--text-soft);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .15s var(--ease);
  z-index: 3;
  backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
}
.forest-info-btn:hover { background: var(--accent-soft); color: var(--accent-deep); }
/* Gentle animations (v3 — subtle) */
/* 1) 樹冠の風揺れ: 大きい木ほどゆっくり */
.forest-hero-svg .f-tree-sway,
.forest-hero-svg .f-tree-sway-sm,
.forest-hero-svg .f-tree-sway-md,
.forest-hero-svg .f-tree-sway-lg,
.forest-hero-svg .f-tree-sway-xl { transform-origin: center bottom; }
.forest-hero-svg .f-tree-sway    { animation: treeSway 8s ease-in-out infinite; }
.forest-hero-svg .f-tree-sway-sm { animation: treeSway 6s ease-in-out infinite; }
.forest-hero-svg .f-tree-sway-md { animation: treeSway 8s ease-in-out infinite .6s; }
.forest-hero-svg .f-tree-sway-lg { animation: treeSway 10s ease-in-out infinite 1.2s; }
.forest-hero-svg .f-tree-sway-xl { animation: treeSway 12s ease-in-out infinite 1.8s; }
@keyframes treeSway {
  0%, 100% { transform: rotate(-0.9deg); }
  50%      { transform: rotate(0.9deg); }
}
/* 2) 鳥の羽ばたき（opacity+scale で呼吸） */
.forest-hero-svg .f-bird-flap { transform-origin: center; animation: birdFlap 2.4s ease-in-out infinite; }
@keyframes birdFlap {
  0%, 100% { opacity: 0.6; transform: scale(0.98); }
  50%      { opacity: 1;   transform: scale(1.02); }
}
/* 3) うさぎ・鹿・リスの呼吸 */
.forest-hero-svg .f-critter-breath { transform-origin: center bottom; animation: critterBreath 3.6s ease-in-out infinite; }
@keyframes critterBreath {
  0%, 100% { transform: scale(1); }
  50%      { transform: scale(1.015); }
}
/* 4) 蝶の軽いホバー */
.forest-hero-svg .f-butterfly-hover { transform-origin: center; animation: butterflyHover 4s ease-in-out infinite; }
@keyframes butterflyHover {
  0%, 100% { transform: translate(0, 0); opacity: 0.85; }
  50%      { transform: translate(1px, -2px); opacity: 1; }
}
/* Legacy (継続) */
.forest-hero-svg .f-anim-grass { transform-origin: center bottom; animation: grassSway 9s ease-in-out infinite; }
@keyframes grassSway { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(0.8deg); } }
.forest-hero-svg .f-anim-water { animation: waterFlow 6s ease-in-out infinite; }
@keyframes waterFlow { 0%, 100% { transform: translateX(0); opacity: 0.75; } 50% { transform: translateX(2px); opacity: 0.88; } }
.forest-hero-svg .f-anim-bird { animation: birdFloat 14s ease-in-out infinite; }
@keyframes birdFloat { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(4px, -2px); } }
.forest-hero-svg .f-anim-light { animation: lightPulse 8s ease-in-out infinite; }
@keyframes lightPulse { 0%, 100% { opacity: 0.06; } 50% { opacity: 0.12; } }

  color: var(--text);
  margin-bottom: 6px;
  letter-spacing: 0.02em;
}
.mood-section-sub {
  font-size: 12px;
  color: var(--text-soft);
  letter-spacing: 0.04em;
}
.mood-section-arrow {
  position: absolute;
  right: 22px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 22px;
  color: var(--text-muted);
  opacity: 0.6;
}

/* 記録済み */
.mood-section-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.mood-section-edit {
  font-size: 11px;
  color: var(--text-soft);
  letter-spacing: 0.05em;
}
.mood-section-filled-body {
  display: flex;
  align-items: center;
  gap: 18px;
}
.mood-section-emoji-big {
  font-size: 48px;
  line-height: 1;
  flex-shrink: 0;
}
.mood-section-filled-text {
  flex: 1;
  min-width: 0;
}
.mood-section-filled-label {
  font-family: 'Noto Serif JP', serif;
  font-size: 20px;
  color: var(--text);
  margin-bottom: 4px;
}
.mood-section-filled-comment {
  font-size: 13px;
  color: var(--text-soft);
  line-height: 1.7;
}

/* ---------- 今週の小さなテーマ ---------- */
.week-theme-card {
  background: linear-gradient(135deg, #F4E8D3, var(--bg-card));
  border: 1px solid var(--accent-soft);
  border-radius: var(--r-lg);
  padding: 18px 20px;
  margin-bottom: 12px;
  box-shadow: 0 2px 10px rgba(139, 127, 112, 0.06);
}
.week-theme-card-empty {
  cursor: pointer;
  display: block;
  padding: 16px 44px 18px 20px;
  position: relative;
}
.week-theme-card-empty:active { transform: scale(0.98); }
.week-theme-label {
  font-size: 10px;
  color: var(--accent-deep);
  letter-spacing: 0.12em;
  font-weight: 500;
  margin-bottom: 6px;
}
.week-theme-empty-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 15px;
  color: var(--text);
  margin-bottom: 4px;
}
.week-theme-empty-sub {
  font-size: 11px;
  color: var(--text-soft);
  line-height: 1.6;
}
.week-theme-arrow {
  font-size: 22px;
  color: var(--accent-deep);
  opacity: 0.6;
  position: absolute;
  right: 18px;
  top: 50%;
  transform: translateY(-50%);
}
.week-theme-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
}
.week-theme-change {
  background: none;
  border: none;
  font-family: inherit;
  font-size: 11px;
  color: var(--text-soft);
  cursor: pointer;
  padding: 4px 8px;
  letter-spacing: 0.05em;
}
.week-theme-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 17px;
  color: var(--text);
  line-height: 1.5;
  margin-bottom: 6px;
}
.week-theme-goal-link {
  font-size: 11px;
  color: var(--primary);
  opacity: 0.9;
  line-height: 1.6;
  margin: -2px 0 8px;
}
.week-theme-stale-hint {
  font-size: 12px;
  color: var(--danger);
  background: rgba(200, 120, 80, 0.08);
  padding: 8px 10px;
  border-radius: 6px;
  margin: 2px 0 10px;
  line-height: 1.6;
}
.week-theme-card-stale {
  opacity: 0.92;
  border-left-color: var(--danger);
}
.week-theme-desc {
  font-size: 12px;
  color: var(--text-soft);
  line-height: 1.7;
  margin-bottom: 12px;
}
.week-theme-progress {
  font-size: 11px;
  color: var(--accent-deep);
  background: rgba(255,255,255,0.6);
  padding: 6px 12px;
  border-radius: 999px;
  display: inline-block;
  margin-bottom: 12px;
}
.week-theme-actions {
  display: flex;
  gap: 8px;
}
.week-theme-actions .btn { flex: 1; }

/* ---------- テーマ選択モーダル ---------- */
.theme-modal { max-width: 420px; }
.theme-reason {
  font-family: 'Noto Serif JP', serif;
  font-size: 13px;
  color: var(--text-soft);
  line-height: 1.8;
  white-space: pre-line;
  margin-bottom: 14px;
}
.theme-section-label {
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.12em;
  margin-bottom: 8px;
}
.theme-rec-card {
  background: linear-gradient(135deg, var(--accent-soft), var(--bg-card));
  border: 1.5px solid var(--accent);
  border-radius: var(--r-md);
  padding: 16px 18px;
  cursor: pointer;
  margin-bottom: 6px;
  transition: transform .15s var(--ease);
}
.theme-rec-card:active { transform: scale(0.98); }
.theme-rec-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 15px;
  color: var(--text);
  margin-bottom: 4px;
}
.theme-rec-desc {
  font-size: 12px;
  color: var(--text-soft);
  line-height: 1.7;
  margin-bottom: 8px;
}
.theme-rec-cta {
  font-size: 12px;
  color: var(--accent-deep);
  font-weight: 500;
}
.theme-alt-card {
  background: var(--bg-card);
  border: 1px solid var(--divider);
  border-radius: var(--r-md);
  padding: 12px 14px;
  cursor: pointer;
  margin-bottom: 6px;
  transition: transform .15s var(--ease);
}
.theme-alt-card:active { transform: scale(0.98); background: var(--bg-soft); }
.theme-alt-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 13px;
  color: var(--text);
  margin-bottom: 2px;
}
.theme-alt-desc {
  font-size: 11px;
  color: var(--text-muted);
  line-height: 1.6;
}
.theme-current-card {
  background: var(--bg-soft);
  border-radius: var(--r-md);
  padding: 12px 14px;
}
.theme-current-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 14px;
  color: var(--text);
  margin-top: 6px;
}
.theme-current-progress {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 4px;
}

/* ---------- レポート末尾のテーマ提案 ---------- */
.report-theme {
  background: linear-gradient(135deg, var(--accent-soft), var(--bg-card));
  border: 1px solid var(--accent);
  border-radius: var(--r-md);
  padding: 18px 20px;
  margin-bottom: 16px;
}
.report-theme-narrative {
  font-family: 'Noto Serif JP', serif;
  font-size: 13px;
  color: var(--text);
  line-height: 1.8;
  margin: 10px 0 14px;
  white-space: pre-line;
}
.report-theme-suggest-card {
  background: rgba(255,255,255,0.6);
  border-radius: var(--r-md);
  padding: 14px 16px;
  margin-bottom: 12px;
}
.report-theme-actions {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.report-theme-actions .btn { width: 100%; }

/* ---------- Phase 2: 週次レポート 追加ブロック ---------- */
.report-insight-line {
  font-size: 13px;
  color: var(--text);
  line-height: 1.9;
  margin-bottom: 6px;
}
.report-insight-line:last-child { margin-bottom: 0; }

.report-next-week {
  background: linear-gradient(135deg, #F4E8D3, var(--bg-card));
  border: 1px solid var(--accent);
  border-radius: var(--r-md);
  padding: 18px 20px;
  margin-bottom: 12px;
}
.report-next-options {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 10px;
}
/* ---------- 週次レポートV3 ---------- */
.report-summary-v3 {
  background: var(--bg-card);
  border: 1px solid var(--divider);
  border-radius: var(--r-md);
  padding: 18px 18px 16px;
  margin: 12px 0;
}
.report-summary-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 16px;
  color: var(--text);
  margin-bottom: 2px;
}
.report-summary-period {
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 14px;
}
.report-summary-rows {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.report-summary-row {
  display: grid;
  grid-template-columns: 24px 54px 1fr 30px auto;
  align-items: center;
  gap: 10px;
  padding: 6px 0;
  border-bottom: 1px dashed rgba(0,0,0,0.06);
  font-size: 14px;
}
.report-summary-row:last-child { border-bottom: none; }
.report-summary-row .rs-icon { font-size: 18px; text-align: center; }
.report-summary-row .rs-label { color: var(--text-soft); font-size: 12px; }
.report-summary-row .rs-value { color: var(--text); font-weight: 500; }
.report-summary-row .rs-arrow { font-size: 18px; text-align: center; font-weight: 700; }
.report-summary-row .rs-arrow-up   { color: #6ba86a; }
.report-summary-row .rs-arrow-down { color: #c97a54; }
.report-summary-row .rs-arrow-flat { color: var(--text-muted); }
.report-summary-row .rs-hint { font-size: 11px; color: var(--text-muted); text-align: right; }

.report-insight-v3 {
  background: rgba(212, 165, 116, 0.04);
  border-radius: var(--r-md);
  padding: 16px 18px;
  margin: 12px 0;
  border-left: 2px solid var(--primary);
}
.report-insight-v3-title {
  font-size: 13px;
  color: var(--text-soft);
  margin-bottom: 10px;
  letter-spacing: 0.02em;
}
.report-insight-v3-list {
  list-style: none;
  padding: 0;
  margin: 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.report-insight-v3-list li {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--text);
  line-height: 1.6;
}
.report-insight-v3-list .ri-text { flex: 1; }
.report-insight-v3-list .ri-arrow {
  width: 24px;
  text-align: center;
  font-weight: 700;
  font-size: 16px;
  flex-shrink: 0;
}
.report-insight-v3-list .ri-arrow-up   { color: #6ba86a; }
.report-insight-v3-list .ri-arrow-down { color: #c97a54; }
.report-insight-v3-list .ri-arrow-flat { color: var(--text-muted); }

.report-next-action-v3 {
  margin: 14px 0;
}
.report-next-action-v3-title {
  font-size: 13px;
  color: var(--text-soft);
  margin-bottom: 10px;
}
.report-week-quote {
  background: var(--bg-card);
  border-radius: var(--r-md);
  padding: 18px 18px 20px;
  margin-top: 14px;
  text-align: center;
  border: 1px solid var(--divider);
}
.report-week-quote .rwq-label {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.05em;
  margin-bottom: 6px;
}
.report-week-quote .rwq-text {
  font-family: 'Noto Serif JP', serif;
  font-size: 15px;
  color: var(--text);
  margin-bottom: 14px;
  line-height: 1.6;
}
.report-week-quote .rwq-cta {
  width: 100%;
}

.report-next-btn {
  padding: 12px 14px;
  background: rgba(255, 255, 255, 0.7);
  border: 1px solid var(--accent-soft);
  border-radius: var(--r-md);
  font-family: inherit;
  font-size: 13px;
  color: var(--text);
  text-align: left;
  cursor: pointer;
  transition: all .15s var(--ease);
}
.report-next-btn:active { transform: scale(0.98); background: var(--accent-soft); }

/* ---------- 先週テーマ振り返り / テーマ履歴 ---------- */
.report-last-theme {
  background: var(--bg-soft);
  border-radius: var(--r-md);
  padding: 14px 16px;
  margin-bottom: 12px;
  border-left: 3px solid var(--accent-soft);
}
.report-last-theme-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 14px;
  color: var(--text);
  margin: 4px 0 4px;
}
.report-last-theme-msg {
  font-size: 12px;
  color: var(--text-soft);
  line-height: 1.7;
}

.theme-history-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.theme-history-item {
  background: var(--bg-soft);
  border-radius: var(--r-md);
  padding: 10px 14px;
}
.theme-history-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 4px;
}
.theme-history-week {
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.05em;
}
.theme-history-cat {
  font-size: 10px;
  color: var(--accent-deep);
  background: var(--bg-card);
  padding: 2px 8px;
  border-radius: 999px;
}
.theme-history-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 13px;
  color: var(--text);
  margin-bottom: 3px;
}
.theme-history-count {
  font-size: 11px;
  color: var(--text-soft);
}

/* ---------- ホーム進捗ドット ---------- */
.week-theme-dots {
  display: flex;
  gap: 6px;
  margin-bottom: 10px;
}
.week-theme-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: rgba(255,255,255,0.5);
  border: 1px solid var(--accent-soft);
}
.week-theme-dot.filled {
  background: var(--accent);
  border-color: var(--accent);
}
.week-theme-progress-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
}
.week-theme-progress-done {
  background: var(--accent) !important;
  color: #fff !important;
}
.week-theme-kind-msg {
  font-size: 11px;
  color: var(--text-soft);
  letter-spacing: 0.02em;
}
.week-theme-kind-msg-row {
  font-size: 12px;
  color: var(--text-soft);
  line-height: 1.6;
  margin: 0 0 16px 0;
}
.week-theme-action-btn { width: 100%; }

/* ---------- テーマ選択モーダル（ラジオ型） ---------- */
.theme-radio-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 8px;
}
.theme-radio-card {
  position: relative;
  padding: 14px 16px;
  background: var(--bg-soft);
  border: 1.5px solid transparent;
  border-radius: var(--r-md);
  cursor: pointer;
  transition: all .15s var(--ease);
}
.theme-radio-card:active { transform: scale(0.98); }
.theme-radio-card.selected {
  background: linear-gradient(135deg, #F4E8D3, var(--bg-card));
  border-color: var(--accent);
  box-shadow: 0 2px 10px rgba(198, 139, 94, 0.14);
}
.theme-radio-badge {
  display: inline-block;
  font-size: 10px;
  color: var(--accent-deep);
  background: var(--bg-card);
  padding: 2px 8px;
  border-radius: 999px;
  margin-bottom: 6px;
  letter-spacing: 0.06em;
  font-weight: 500;
}
.theme-radio-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 14px;
  color: var(--text);
  margin-bottom: 4px;
}
.theme-radio-desc {
  font-size: 12px;
  color: var(--text-soft);
  line-height: 1.7;
}
.theme-radio-cta {
  display: block;
  width: 100%;
  margin-top: 12px;
  padding: 10px 14px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 999px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: transform .15s var(--ease);
}
.theme-radio-cta:active { transform: scale(0.97); }

/* ---------- 状態把握ミニ設問 ---------- */
.survey-screen {
  padding: 24px 8px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.survey-step {
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.12em;
}
.survey-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 22px;
  color: var(--text);
  line-height: 1.6;
}
.survey-sub {
  font-size: 13px;
  color: var(--text-soft);
  margin-bottom: 8px;
}
.survey-options {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.survey-option {
  padding: 16px 18px;
  background: var(--bg-card);
  border: 1.5px solid var(--accent-soft);
  border-radius: var(--r-md);
  font-family: inherit;
  font-size: 15px;
  color: var(--text);
  text-align: left;
  cursor: pointer;
  transition: all .15s var(--ease);
}
.survey-option:active { transform: scale(0.98); }
.survey-option.selected {
  background: linear-gradient(135deg, var(--accent-soft), var(--bg-card));
  border-color: var(--accent);
}
.survey-actions {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 12px;
}
.survey-actions .btn { width: 100%; }

/* ---------- 行動提案 ---------- */
.suggest-screen {
  padding: 20px 8px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.suggest-step {
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.12em;
}
.suggest-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 20px;
  color: var(--text);
  line-height: 1.6;
}
.suggest-goal-pill {
  display: inline-block;
  padding: 5px 12px;
  background: var(--accent-soft);
  color: var(--accent-deep);
  border-radius: 999px;
  font-size: 11px;
  max-width: fit-content;
}
.suggest-sub {
  font-size: 12px;
  color: var(--text-soft);
}
.suggest-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.suggest-card {
  padding: 14px 16px;
  background: var(--bg-card);
  border: 1.5px solid var(--divider);
  border-radius: var(--r-md);
  cursor: pointer;
  transition: all .15s var(--ease);
}
.suggest-card:active { transform: scale(0.98); }
.suggest-card.selected {
  background: linear-gradient(135deg, var(--accent-soft), var(--bg-card));
  border-color: var(--accent);
  box-shadow: 0 2px 10px rgba(198,139,94,0.12);
}
.suggest-card-head {
  display: flex;
  gap: 6px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.suggest-label {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 999px;
  letter-spacing: 0.04em;
}
.suggest-label-type { background: var(--accent-soft); color: var(--accent-deep); }
.suggest-label-diff { background: var(--bg-soft); color: var(--text-soft); }
.suggest-label-time { background: var(--bg-soft); color: var(--text-soft); }
.suggest-card-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 15px;
  color: var(--text);
  margin-bottom: 4px;
}
.suggest-card-desc {
  font-size: 12px;
  color: var(--text-soft);
  line-height: 1.7;
}
.suggest-card-reason {
  margin-top: 8px;
  padding: 8px 10px;
  font-size: 12px;
  color: var(--text-main);
  background: rgba(212, 165, 116, 0.08);
  border-left: 2px solid var(--primary);
  border-radius: 6px;
  line-height: 1.6;
}
.suggest-ai-loading {
  margin: 8px 4px 12px;
  padding: 10px 12px;
  font-size: 12px;
  color: var(--text-soft);
  text-align: center;
  background: rgba(0,0,0,0.025);
  border-radius: 8px;
  animation: pulse-soft 1.6s ease-in-out infinite;
}
.suggest-ai-badge {
  margin: 4px 4px 10px;
  padding: 6px 10px;
  font-size: 11px;
  color: var(--primary);
  text-align: center;
  background: rgba(212, 165, 116, 0.1);
  border-radius: 999px;
  letter-spacing: 0.02em;
}
@keyframes pulse-soft {
  0%, 100% { opacity: 0.7; }
  50%      { opacity: 1.0; }
}
.suggest-actions {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 8px;
}
.suggest-actions .btn { width: 100%; }

/* ---------- テーマ確定 ---------- */
.confirm-screen {
  padding: 24px 8px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.confirm-step {
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.12em;
}
.confirm-label {
  font-size: 11px;
  color: var(--accent-deep);
  letter-spacing: 0.12em;
  font-weight: 500;
  text-align: center;
}
.confirm-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 22px;
  color: var(--text);
  line-height: 1.7;
  text-align: center;
  padding: 0 8px;
}
.confirm-meaning {
  font-size: 13px;
  color: var(--text-soft);
  line-height: 1.9;
  text-align: center;
  padding: 0 16px;
}
.confirm-actions-label {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.08em;
  margin-top: 12px;
  padding-left: 4px;
}
.confirm-actions-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.confirm-action {
  display: flex;
  gap: 10px;
  padding: 12px 14px;
  background: var(--bg-soft);

}

}

}

}

}
.night-head {
  font-family: 'Noto Serif JP', serif;
  font-size: 22px;
  color: var(--text);
  line-height: 1.6;
  letter-spacing: 0.02em;
}
.night-sub {
  font-size: 14px;
  color: var(--text-soft);
  line-height: 1.8;
}

  font-size: 11px;

}

}

}
.night-hero-head {

}
.night-hero-sub {

  color: var(--text-soft);

}
.night-hero-note {

  font-size: 11px;
  color: var(--text-muted);
  background: var(--bg-card);
  padding: 4px 12px;
  border-radius: 999px;
  letter-spacing: 0.05em;
}

/* ---------- 呼吸アニメーション ---------- */
.breath-stage {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 28px;
  padding: 40px 0 20px;
  min-height: 320px;
}
.breath-circle {
  width: 160px;
  height: 160px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, var(--accent-soft), var(--accent));
  box-shadow: 0 0 40px rgba(198, 139, 94, 0.18);
  animation: breath 10.5s cubic-bezier(.45,.05,.55,.95) infinite;
  opacity: 0.82;
}
@keyframes breath {
  0%   { transform: scale(0.65); opacity: 0.55; }
  38%  { transform: scale(1); opacity: 0.85; }   /* 吸う → 広がる */
  57%  { transform: scale(1); opacity: 0.85; }   /* そのまま */
  100% { transform: scale(0.65); opacity: 0.55; }/* はいて → 縮む */
}
.breath-phrase {
  font-family: 'Noto Serif JP', serif;
  font-size: 26px;
  color: var(--text);
  letter-spacing: 0.12em;
  line-height: 1;
}
.breath-sub {
  font-size: 12px;
  color: var(--text-muted);
  letter-spacing: 0.05em;
}

/* ---------- ミニ体験（オンボ直後） ---------- */
.mini-response {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin: 40px 0 24px;
  animation: slideUp .5s var(--ease);
}

  width: 48px; height: 48px;
  border-radius: 50%;

  font-size: 20px;
  flex-shrink: 0;
}

  flex: 1;

}

}
.mini-actions {

  gap: 10px;
  padding: 0 8px;
}
.mini-actions .btn { width: 100%; }

}

}

.rescue-emoji {

}

}

  font-size: 11px;
  color: var(--text-muted);

}
.rescue-arrow {
