// ---------- Monthly Mood Calendar ----------
let moodCalendarMonth = null; // 'YYYY-MM'

function openMoodCalendarModal(monthKey) {
  if (!monthKey) {
    const d = new Date();
    moodCalendarMonth = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
  } else {
    moodCalendarMonth = monthKey;
  }
  renderMoodCalendarModal();
}

function renderMoodCalendarModal() {
  const [yStr, mStr] = moodCalendarMonth.split('-');
  const y = Number(yStr), m = Number(mStr);
  const firstDay = new Date(y, m - 1, 1);
  const lastDay = new Date(y, m, 0);
  const daysInMonth = lastDay.getDate();
  const startWeekday = firstDay.getDay(); // 0=Sun
  const today = todayKey();

  // Calculate month stats
  const monthMoods = state.moods.filter(x => x.date.startsWith(moodCalendarMonth));
  const avg = monthMoods.length ? Math.round(monthMoods.reduce((a, b) => a + b.score, 0) / monthMoods.length * 10) / 10 : 0;

  const cells = [];
  // Leading empties
  for (let i = 0; i < startWeekday; i++) cells.push('<div class="cal-cell empty"></div>');
  for (let d = 1; d <= daysInMonth; d++) {
    const dateKey = `${moodCalendarMonth}-${String(d).padStart(2, '0')}`;
    const mood = state.moods.find(x => x.date === dateKey);
    const isToday = dateKey === today;
    cells.push(`
      <div class="cal-cell ${mood ? 'has-mood' : ''} ${isToday ? 'today' : ''}" title="${mood ? MOODS.find(x => x.score === mood.score).label : ''}">
        <div class="cal-day">${d}</div>
        <div class="cal-mood">${mood ? MOODS.find(x => x.score === mood.score).emoji : ''}</div>
      </div>
    `);
  }

  openModal(`
    <div class="modal modal-cal">
      <div class="modal-title cal-nav">
        <button class="cal-nav-btn" onclick="shiftMoodCalendar(-1)">‹</button>
        <span>${y}年 ${m}月</span>
        <button class="cal-nav-btn" onclick="shiftMoodCalendar(1)">›</button>
      </div>
      <div class="modal-body">
        <div class="cal-stats">
          <div><span class="cal-stats-n">${monthMoods.length}</span>日 記録</div>
          <div><span class="cal-stats-n">${avg || '-'}</span>平均</div>
        </div>
        <div class="cal-weekdays">
          <span style="color: var(--danger);">日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span style="color: #4a82c4;">土</span>
        </div>
        <div class="cal-grid">${cells.join('')}</div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal()">閉じる</button>
      </div>
    </div>
  `);
}

function shiftMoodCalendar(delta) {
  const [y, m] = moodCalendarMonth.split('-').map(Number);
  const d = new Date(y, m - 1 + delta, 1);
  moodCalendarMonth = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
  renderMoodCalendarModal();
}

async function callAiForSubgoals() {
  const systemPrompt = `あなたは、ユーザーの「ありたい姿」を、毎日または毎週できる小さな具体的ステップに分解する役割のアシスタントです。
あなたは医療・心理・コーチングの専門家ではありません。診断・治療・専門的助言は一切しません。

【あなたの役割】
- ユーザーのありたい姿を、毎日または毎週できる小さな具体的ステップ 6 個に分解する
- 各ステップは短く（15文字以内）、具体的行動で、達成できるかどうかが自己判断できるもの
- 「頑張る」「意識する」等の抽象表現はNG。「朝7時に窓を開ける」「週2回5分歩く」等の具体性
- 否定形は避け、肯定的な行動の形にする
- 汎用の自己啓発TIPSではなく、入力された「ありたい姿」「主訴」の具体性を拾い、このユーザーの状態・ペースにフィットするステップを出す
- 専門用語・説教は使わない
- 心身の負担が極端に大きいステップ（「毎日5km走る」「毎日早起きして勉強2時間」など）は提案しない。最初の一歩は小さく

【絶対禁止】
- 診断・治療・受診の示唆
- 心理学・医学の専門用語
- 「〜すべき」「〜しなさい」の口調
- 自分（AI）の経験を持ち出すこと

【危機サインを感じたときの対応】
ユーザーの「ありたい姿」や主訴に、自殺念慮・自傷・極度の絶望（死にたい・消えたい・全部終わらせたい等）を示唆する内容が含まれる場合は、ステップ提案をせず、以下の1案だけを返してください：

{
  "suggestions": [
    "よりそいホットライン 0120-279-338 に電話する",
    "チャイルドライン 0120-99-7777 に電話する",
    "信頼できる人に「しんどい」と一言伝える",
    "今日は無理せず横になる時間をとる",
    "いますぐ危険を感じたら119にかける",
    "明日の朝、もう一度ここに来る"
  ]
}

【返答形式（必ずJSON）】
{
  "suggestions": ["ステップ1", "ステップ2", "ステップ3", "ステップ4", "ステップ5", "ステップ6"]
}`;
  const userMsg = `【主訴】${state.goal.mainConcern || '特になし'}
【ありたい姿】${state.goal.aspiration}
${(state.goal.subgoals || []).length > 0 ? `【すでに設定済み（重複しないように）】\n${state.goal.subgoals.map(s => s.title).join('\n')}` : ''}

上記から、毎日・毎週できる小さな具体的ステップを6個提案してください。`;

  const model = state.apiModel || 'gemini-2.5-flash';
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(model)}:generateContent?key=${encodeURIComponent(state.apiKey)}`;
  const body = {
    systemInstruction: { parts: [{ text: buildSystemPrompt(systemPrompt) }] },
    contents: [{ role: 'user', parts: [{ text: userMsg }] }],
    generationConfig: {
      responseMimeType: 'application/json',
      responseSchema: {
        type: 'object',
        properties: { suggestions: { type: 'array', items: { type: 'string' } } },
        required: ['suggestions']
      },
      temperature: 0.8,
      maxOutputTokens: 400
    },
    safetySettings: [
      { category: 'HARM_CATEGORY_HARASSMENT', threshold: 'BLOCK_ONLY_HIGH' },
      { category: 'HARM_CATEGORY_HATE_SPEECH', threshold: 'BLOCK_ONLY_HIGH' },
      { category: 'HARM_CATEGORY_SEXUALLY_EXPLICIT', threshold: 'BLOCK_ONLY_HIGH' },
      { category: 'HARM_CATEGORY_DANGEROUS_CONTENT', threshold: 'BLOCK_ONLY_HIGH' }
    ]
  };
  const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  if (!res.ok) throw new Error(`Gemini ${res.status}: ${(await res.text()).slice(0, 200)}`);
  const data = await res.json();
  const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
  if (!text) throw new Error('Empty response');
  const parsed = JSON.parse(text);
  return parsed.suggestions || [];
}

let chatState = { session: null, isTyping: false, currentChoices: [] };

function startNewChatSession() {
  const today = todayKey();
  const todayMood = state.moods.find(m => m.date === today);
  const session = {
    id: uid(),
    startedAt: Date.now(),
    endedAt: null,
    moodCheckId: todayMood ? todayMood.id : null,
    moodScore: todayMood ? todayMood.score : null,
    messages: []
  };
  state.currentSessionId = session.id;
  state.sessions.push(session);
  saveState();
  chatState.session = session;
  chatState.currentChoices = [];
}

function viewChat() {
  if (!chatState.session) {
    // resume last open session if available, else new
    const last = state.sessions.find(s => s.id === state.currentSessionId && !s.endedAt);
    if (last) {
      chatState.session = last;
      const lastAi = [...last.messages].reverse().find(m => m.role === 'assistant');
      chatState.currentChoices = lastAi && lastAi.choices ? lastAi.choices : [];
    } else {
      startNewChatSession();
    }
  }
  const s = chatState.session;
  const pC = getCurrentPersona();
  return `

  reflectState.messages.push({ role: 'ai', text, widget, timestamp: Date.now() });
}
function pushReflectUser(text) {
  reflectState.messages.push({ role: 'user', text, timestamp: Date.now() });
}

function startNewReflection() {
  reflectState = {
    phase: 'event',
    messages: [],
    draft: newReflectDraft(),
    aiLoading: false,
    aiError: '',
    reportId: null
  };
  state.currentReflectionId = reflectState.draft.id;
  pushReflectAi(
    `こんにちは、${state.nickname}。\nふりかえり、始めるね。\nまず、最近もやもやしたこと・引っかかったこと、教えてくれる？`,
    { type: 'choices', options: REFLECT_EVENT_CHOICES }
  );
  saveState();
}

  const lastMsg = reflectState.messages[reflectState.messages.length - 1];

  return `

        <div class="chat-avatar"></div>
        <div class="chat-title">
          <div class="chat-name">ふりかえる</div>
          <div class="chat-status">${escapeHtml(getCurrentPersona().name)}と整理する</div>
        </div>
        <button class="chat-end" data-act="reflect-back">やめる</button>
      </div>
      ${state.goal && state.goal.aspiration ? `
        <div class="goal-context-pill">

          <div class="msg-group">

            <div class="msg-bubble ai"><div class="typing"><span></span><span></span><span></span></div></div>
          </div>
        ` : ''}
      </div>
      ${widget && !reflectState.aiLoading ? renderReflectWidget(widget) : ''}
      ${showInput ? `
        <div class="chat-input-area">
          <div class="chat-input-hint">${freeTextHint(widget)}</div>
          <div class="chat-input-row">
            <textarea class="chat-input" id="reflectInput" rows="1" placeholder="自由に書いてみて"></textarea>
            <button class="chat-icon-btn send" data-act="reflect-send" id="reflectSendBtn">${icon('send')}</button>

function renderReflectMsg(m) {
  if (m.role === 'ai') {
    return `
      <div class="msg-group">
        <div class="msg-avatar"></div>
        <div class="msg-bubble ai">${escapeHtml(m.text).replace(/\n/g, '<br>')}</div>

  }

    <div class="msg-group user">
      <div class="msg-bubble user">${escapeHtml(m.text).replace(/\n/g, '<br>')}</div>

function renderReflectWidget(w) {
  if (w.type === 'choices') {
    return `
      <div class="choices">
        ${w.options.map((opt, i) => `
          <button class="choice-chip ${i === w.options.length - 1 && opt.includes('うまく言えない') ? 'other' : ''}" data-reflect-choice="${escapeAttr(opt)}">${escapeHtml(opt)}</button>
        `).join('')}
      </div>
    `;
  }
  if (w.type === 'emotion') {
    const list = w.expanded ? EMOTION_OPTIONS : EMOTION_OPTIONS.filter(o => EMOTION_PRIMARY_IDS.includes(o.id));
    return `
      <div class="reflect-emotion-scroll">
        ${list.map(opt => `
          <button class="reflect-emotion-chip" data-reflect-emotion="${opt.id}">
            <span>${opt.emoji}</span> ${escapeHtml(opt.label)}
          </button>
        `).join('')}
        ${!w.expanded ? `
          <button class="reflect-emotion-chip reflect-emotion-more" data-reflect-emotion-expand="1">
            ＋ 他の気持ち
          </button>
        ` : ''}
      </div>
    `;
  }
  if (w.type === 'score') {
    return `
      <div class="reflect-score-row">
        ${Array.from({length: 10}, (_, i) => i + 1).map(n => `
          <button class="reflect-score-btn" data-reflect-score="${n}">${n}</button>
        `).join('')}
      </div>
      <div class="reflect-score-legend"><span>← 弱い</span><span>強い →</span></div>
    `;
  }
  if (w.type === 'alternatives') {
    const d = reflectState.draft;
    const isLatestAlt = reflectState.messages.filter(m => m.widget && m.widget.type === 'alternatives').slice(-1)[0] === reflectState.messages[reflectState.messages.length - 1];
    return `
      <div class="reflect-widget-area">
        ${w.data.map((alt) => `
          <div class="alt-card ${d.alternativesPicked.includes(alt.uid) ? 'picked' : ''}" data-alt-pick="${escapeAttr(alt.uid)}">
            ${alt.tag ? `<span class="alt-card-tag">${escapeHtml(alt.tag)}</span>` : ''}
            <div class="alt-card-text">${escapeHtml(alt.text)}</div>
          </div>
        `).join('')}
        ${isLatestAlt ? `
          <div class="reflect-alt-actions">
            <button class="btn btn-ghost" data-act="reflect-alt-regen">＋ 他の見方も聞く</button>
            <button class="btn btn-primary" data-act="reflect-alt-confirm">この見方で進む</button>
          </div>
        ` : ''}
      </div>
    `;
  }
  if (w.type === 'report') {
    return `
      <div class="reflect-widget-area" style="padding-top: 12px;">
        <button class="btn btn-primary" data-act="reflect-show-report">レポートを見る</button>
      </div>
    `;
  }
  return '';
}

function shouldShowFreeText(widget) {
  if (!widget) return false;
  if (widget.type === 'choices') return true;
  if (widget.type === 'alternatives') return true;
  return false;
}
function freeTextHint(widget) {
  if (!widget) return '';
  if (widget.type === 'choices') return '選んでも、自由に書いてもOK';
  if (widget.type === 'alternatives') return '自分の言葉でも書いてみて（任意）';
  return '';
}

async function handleReflectResponse(text, source) {
  if (!text) return;
  const d = reflectState.draft;
  if (!d) return;

  if (['event', 'thoughts'].includes(reflectState.phase) && detectCrisis(text)) {
    state.crisisLogs.push({ sessionId: d.id, keyword: matchedCrisisKeyword(text), timestamp: Date.now() });
    saveState();
    showCrisisModal(text);
    return;
  }

  pushReflectUser(text);
  const aiAck = (phrase) => pushReflectAi(phrase);

  if (reflectState.phase === 'event') {
    d.event = text;
    reflectState.phase = 'thoughts';
    pushReflectAi(
      '教えてくれてありがとう。\nそのとき、どんな考えが頭に浮かんだ？正しい・間違ってるは気にしないで。',
      { type: 'choices', options: REFLECT_THOUGHT_CHOICES }
    );
  } else if (reflectState.phase === 'thoughts') {
    d.thoughts = text;
    reflectState.phase = 'emotion_before';
    pushReflectAi(
      'うん、そう感じたんだね。\nそのときの気持ちは、どれが一番近い？',
      { type: 'emotion' }
    );
  }
  saveState();
  render();
  scrollReflectToBottom();
}

function handleReflectEmotion(emoId) {
  const opt = EMOTION_OPTIONS.find(o => o.id === emoId);
  if (!opt) return;
  const d = reflectState.draft;

  if (reflectState.phase === 'emotion_before') {
    d.emotionBefore = { id: opt.id, label: opt.label, emoji: opt.emoji, score: 0 };
    pushReflectUser(`${opt.emoji} ${opt.label}`);
    reflectState.phase = 'score_before';
    pushReflectAi(
      `「${opt.label}」だったんだね。\nその強さは、10段階でどのくらい？`,
      { type: 'score' }
    );
  }
  saveState();
  render();
  scrollReflectToBottom();
}

async function handleReflectScore(n) {
  const d = reflectState.draft;
  if (reflectState.phase === 'score_before') {
    d.emotionBefore.score = n;
    pushReflectUser(`${n}点`);
    reflectState.phase = 'alternatives';
    pushReflectAi(`${n}点だったんだね。\nちょっと考えてみるね、別の見方もあるかもしれない。`);
    saveState();
    render();
    scrollReflectToBottom();
    await generateAndShowAlternatives();
  } else if (reflectState.phase === 'score_after') {
    d.emotionAfter.score = n;
    pushReflectUser(`${n}点`);
    reflectState.phase = 'done';
    const delta = d.emotionBefore.score - d.emotionAfter.score;
    const summary = delta > 0
      ? `${d.emotionBefore.score}点から${n}点に変わったね。\n${delta}ポイント軽くなったみたい。\n向き合って整理できたね。`
      : delta < 0
      ? `${d.emotionBefore.score}点から${n}点に変わったね。\n強くなったことに気づけたのも、大切な発見。\nここまで一緒に整理してくれてありがとう。`
      : `${d.emotionBefore.score}点のまま変わらなかったね。\nでも、向き合って言葉にできたのは大きなこと。`;
    pushReflectAi(summary, { type: 'report' });
    saveState();
    render();
    scrollReflectToBottom();
  }
}

async function generateAndShowAlternatives(isRegen = false) {
  reflectState.aiLoading = true;
  reflectState.aiError = '';
  render();
  scrollReflectToBottom();
  const previous = isRegen ? [...(reflectState.draft.alternativesAI || [])] : [];
  try {
    const result = await callAiForAlternatives(reflectState.draft, { previous });
    const freshAlts = (result.alternatives || []).map(a => ({ ...a, uid: uid() }));
    if (isRegen) {
      reflectState.draft.alternativesAI = [...(reflectState.draft.alternativesAI || []), ...freshAlts];
      // Keep existing picks so user doesn't lose them
    } else {
      reflectState.draft.alternativesAI = freshAlts;
      reflectState.draft.alternativesPicked = [];
    }
    reflectState.aiLoading = false;
    pushReflectAi(
      isRegen
        ? 'じゃあ、別の角度でもう3つ考えてみたよ。\n前のも下に残してあるから、どれでも選んでみて。'
        : '3つ考えてみたよ。\n気になるのがあれば選んでみて。組み合わせたり、自分の言葉で書いてもOK。',
      { type: 'alternatives', data: freshAlts }
    );
    saveState();
    render();
    scrollReflectToBottom();
  } catch (err) {
    console.error('[Aside] alt gen failed:', err);
    reflectState.aiLoading = false;
    reflectState.aiError = String(err.message || err).slice(0, 120);
    const fb = getFallbackAlternatives(reflectState.draft).map(a => ({ ...a, uid: uid() }));
    if (isRegen) {
      reflectState.draft.alternativesAI = [...(reflectState.draft.alternativesAI || []), ...fb];
    } else {
      reflectState.draft.alternativesAI = fb;
      reflectState.draft.alternativesPicked = [];
    }
    pushReflectAi(
      '（※ AI接続に問題があったみたい。例文で続けるね）\n気になるのがあれば選んでみて。',
      { type: 'alternatives', data: fb }
    );
    saveState();
    render();
    scrollReflectToBottom();
  }
}

async function handleReflectRegenerateAlternatives() {
  pushReflectUser('他の見方も聞いてみたい');
  render();
  scrollReflectToBottom();
  await generateAndShowAlternatives(true);
}

function handleReflectAltConfirm() {
  const d = reflectState.draft;
  const input = document.getElementById('reflectInput');
  if (input && input.value.trim()) {
    d.alternativeCustom = input.value.trim();
    input.value = '';
  }
  if (d.alternativesPicked.length === 0 && !d.alternativeCustom) {
    toast('カードをタップするか、自分の言葉で書いてみて');
    return;
  }
  const pickedAlts = d.alternativesPicked.map(u => d.alternativesAI.find(a => a.uid === u)).filter(Boolean);
  const pickedText = pickedAlts.map(a => a.text).join('\n');
  const userMsg = [pickedText, d.alternativeCustom].filter(Boolean).join('\n\n');
  pushReflectUser(userMsg);
  // Reuse emotionBefore label/emoji — only score changes
  d.emotionAfter = { ...d.emotionBefore, score: 0 };
  reflectState.phase = 'score_after';
  pushReflectAi(
    `なるほど、その見方もいいね。\nその考えを試してみて、さっきの「${d.emotionBefore.label}」は、今は何点くらい？`,
    { type: 'score' }
  );
  saveState();
  render();
  scrollReflectToBottom();
}

function handleReflectShowReport() {
  const d = reflectState.draft;
  d.completedAt = Date.now();
  const existing = state.reflections.find(r => r.id === d.id);
  if (!existing) state.reflections.push(d);
  reflectState.reportId = d.id;
  logEngagement();
  const fr = addForestCheckin();
  saveState();
  App.go('reflectReport');
  if (fr.stageChanged) {
    setTimeout(() => toast('森に、すこし変化があったみたい。'), 400);
  } else {
    toast('ふりかえり完了');
  }
  maybePromptGoalCheckin();
}

function maybePromptGoalCheckin() {
  if (!state.goal) return;
  const last = state.goal.checkpoints[state.goal.checkpoints.length - 1];
  if (!last) return;
  const diffDays = (Date.now() - new Date(last.date).getTime()) / 86400000;
  if (diffDays < 2) return;
  setTimeout(() => {
    if (App.currentScreen !== 'home') return;
    openGoalCheckinModal();
  }, 1500);
}

function scrollReflectToBottom() {
  setTimeout(() => {
    const el = document.getElementById('reflectMessages');
    if (el) el.scrollTop = el.scrollHeight;
  }, 50);
}

  const model = state.apiModel || 'gemini-2.5-flash';

      { tag: '言葉の強さ', text: '「いつも」「絶対」「みんな」などの強い言葉を、もう少しやわらかく言い換えてみると、景色が変わることがある。' },
      { tag: '助けを借りる', text: '自分一人で抱え込まなくてもいい。信頼できる誰かに、少しだけ話してみる選択肢もある。' }
    ]
  ];
  const set = sets[fallbackAltIndex % sets.length];
  fallbackAltIndex++;
  return set;
}

// ---------- Reflection Report (Letter Style) ----------
function viewReflectReport() {
  const id = reflectState.reportId || state.currentReflectionId;
  const r = state.reflections.find(x => x.id === id);
  if (!r) { App.go('goal'); return ''; }

  const eb = r.emotionBefore, ea = r.emotionAfter;
  const delta = eb.score - ea.score;
  const closingLine = delta > 0
    ? `気持ちが ${delta} ポイント軽くなったね。\n自分と向き合って、ことばにしてくれたおかげ。`
    : delta < 0
    ? `気持ちが ${Math.abs(delta)} ポイント強くなったみたい。\nそれも、気づけたから見えた自分の大事なサイン。`
    : `気持ちの強さは変わらなかったね。\nでも、向き合って言葉にできたのは、それだけで大きなこと。`;

  const pickedAlts = r.alternativesPicked
    .map(u => typeof u === 'number' ? r.alternativesAI[u] : r.alternativesAI.find(a => a && a.uid === u))
    .filter(Boolean);
  const altText = r.alternativeCustom
    ? (pickedAlts.length ? pickedAlts.map(a => a.text).join('\n\n') + '\n\n' + r.alternativeCustom : r.alternativeCustom)
    : pickedAlts.map(a => a.text).join('\n\n');

  const beforePct = Math.max(4, eb.score * 10);
  const afterPct = Math.max(4, ea.score * 10);
  const barTone = getBarTone(eb.score, ea.score);

  return `
    <div class="screen active letter-screen">
      <div class="letter-top">
        <button class="chat-back" data-act="report-close">${icon('arrow-left')}</button>
        <div class="letter-top-title">
          <div class="letter-top-name">ふりかえり</div>
          <div class="letter-top-date">${fmtDateLong(r.startedAt)}</div>
        </div>
        <div style="width: 36px;"></div>
      </div>

      <div class="letter-body">
        <div class="letter-card">
          <div class="letter-corner tl"></div>
          <div class="letter-corner br"></div>

          <div class="letter-stamp">ASIDE · LETTER</div>

          <div class="letter-greet">${escapeHtml(state.nickname)} へ、</div>
          <div class="letter-intro">きょう、ふりかえってくれてありがとう。</div>

          <div class="letter-block">
            <div class="letter-label">きょうの出来事</div>
            <div class="letter-quote">${escapeHtml(r.event)}</div>
          </div>

          <div class="letter-connector">
            <div class="letter-connector-line"></div>
            <div class="letter-connector-label">そのとき、頭に浮かんだのは</div>
            <div class="letter-connector-line"></div>
          </div>

          <div class="letter-block">
            <div class="letter-thought-card">
              <div class="letter-thought-mark">“</div>
              <div class="letter-thought-text">${escapeHtml(r.thoughts)}</div>
            </div>
          </div>

          <div class="letter-block">
            <div class="letter-emotion-row">
              <div class="letter-emotion-label">
                <span class="letter-emotion-emoji">${escapeHtml(eb.emoji)}</span>
                <span>${escapeHtml(eb.label)}</span>
              </div>
              <div class="letter-emotion-score">${eb.score}<span>/10</span></div>
            </div>
            <div class="letter-emotion-bar">
              <div class="letter-emotion-fill ${barTone.before}" style="--target-width: ${beforePct}%"></div>
            </div>
          </div>

          <div class="letter-shift">
            <div class="letter-shift-curve">${icon('shift-curve')}</div>
            <div class="letter-shift-text">あなたが見つけた、別の見方</div>
          </div>

          <div class="letter-block">
            <div class="letter-thought-card alt">
              <div class="letter-thought-mark">“</div>
              <div class="letter-thought-text">${escapeHtml(altText || '（未記入）')}</div>
            </div>
          </div>

          <div class="letter-block">
            <div class="letter-emotion-row">
              <div class="letter-emotion-label">
                <span class="letter-emotion-emoji">${escapeHtml(ea.emoji)}</span>
                <span>同じ「${escapeHtml(ea.label)}」、いま測ると</span>
              </div>
              <div class="letter-emotion-score ${delta > 0 ? 'lighter' : delta < 0 ? 'heavier' : ''}">${ea.score}<span>/10</span></div>
            </div>
            <div class="letter-emotion-bar">
              <div class="letter-emotion-fill ${barTone.after}" style="--target-width: ${afterPct}%"></div>
              ${delta !== 0 ? `
                <div class="letter-emotion-delta ${delta > 0 ? 'down' : 'up'}">
                  ${delta > 0 ? `−${delta}` : `+${Math.abs(delta)}`}
                </div>
              ` : ''}
            </div>
          </div>

          <div class="letter-closing">${escapeHtml(closingLine).replace(/\n/g, '<br>')}</div>

          <div class="letter-signature">— Aside</div>
        </div>
      </div>

      <div class="letter-footer">
        <button class="btn btn-primary" data-act="report-home">ホームに戻る</button>
        <button class="btn btn-ghost" data-act="report-share">書き出してコピー</button>
      </div>
    </div>
  `;
}

function getBarTone(before, after) {
  // Both use the same warm accent; after is lighter/softer if delta > 0
  return { before: 'tone-before', after: 'tone-after' };
}

// ---------- History ----------
function viewHistory() {
  const items = [
    ...state.sessions.map(s => ({ kind: 'chat', id: s.id, ts: s.startedAt, data: s })),
    ...state.reflections.map(r => ({ kind: 'reflect', id: r.id, ts: r.startedAt, data: r }))
  ].sort((a, b) => b.ts - a.ts);

  return `
    <div class="screen active">
      <div class="page-header">
        <div class="page-title">きろく</div>
      </div>
      <div class="history-list">
        ${items.length === 0 ? `
          <div class="empty">
            <div class="empty-emoji">🌱</div>
            <div class="empty-text">まだ記録はないね。<br>気が向いたら、Asideと話してみて。</div>
          </div>
        ` : items.map(item => {
          if (item.kind === 'chat') {
            const s = item.data;
            const userMsgs = s.messages.filter(m => m.role === 'user');
            return `
              <div class="history-item" data-history="chat" data-hid="${s.id}">
                <div class="history-date">${fmtDateLong(s.startedAt)} ・ はなす</div>
                <div class="history-preview">${escapeHtml(previewSession(s))}</div>
                <div class="history-meta">
                  <span>${userMsgs.length} メッセージ</span>
                  ${s.moodScore ? `<span>${MOODS.find(x => x.score === s.moodScore).emoji} ${MOODS.find(x => x.score === s.moodScore).label}</span>` : ''}
                </div>
              </div>
            `;
          } else {
            const r = item.data;
            const delta = r.emotionBefore.score - r.emotionAfter.score;
            return `
              <div class="history-item" data-history="reflect" data-hid="${r.id}">
                <div class="history-date">${fmtDateLong(r.startedAt)} ・ ふりかえり</div>
                <div class="history-preview">${escapeHtml(r.event.slice(0, 80))}</div>
                <div class="history-meta">
                  <span>${r.emotionBefore.emoji} ${r.emotionBefore.label}</span>
                  <span>${r.emotionBefore.score} → ${r.emotionAfter.score}${delta > 0 ? `（-${delta}）` : delta < 0 ? `（+${Math.abs(delta)}）` : ''}</span>
                </div>
              </div>
            `;
          }
        }).join('')}
      </div>
      ${bottomNav('history')}
    </div>
  `;
}

let historyDetailId = null;
let historyDetailKind = 'chat';
function viewHistoryDetail() {
  if (historyDetailKind === 'reflect') {
    reflectState.reportId = historyDetailId;
    return viewReflectReport();
  }
  const s = state.sessions.find(x => x.id === historyDetailId);
  if (!s) { App.go('history'); return ''; }
  return `
    <div class="screen active">
      <div class="chat-header">
        <button class="chat-back" data-act="back-history">${icon('arrow-left')}</button>
        <div class="chat-title">
          <div class="chat-name">${fmtDateLong(s.startedAt)}</div>
          <div class="chat-status">${s.messages.length}メッセージ</div>
        </div>
      </div>
      <div class="chat-messages" style="padding-bottom: 40px;">
        ${s.messages.map(renderMsg).join('')}
      </div>
    </div>
  `;
}

// ============================================================
// Handlers
// ============================================================
function attachHandlers() {
  $$('[data-act]').forEach(el => {
    el.addEventListener('click', (e) => {
      const act = el.dataset.act;
      handleAction(act, el, e);
    });
  });

  // Mood picker
  $$('.mood-option').forEach(el => {
    el.addEventListener('click', () => {
      moodDraft.score = Number(el.dataset.score);
      $$('.mood-option').forEach(o => o.classList.toggle('selected', o === el));
      const saveBtn = $('#saveMoodBtn');
      const saveChatBtn = $('#saveMoodToChatBtn');
      if (saveBtn) saveBtn.disabled = false;
      if (saveChatBtn) saveChatBtn.disabled = false;
    });
  });
  const mc = $('#moodComment');
  if (mc) mc.addEventListener('input', e => moodDraft.comment = e.target.value);

  // Chat input
  const ci = $('#chatInput');
  if (ci) {
    ci.addEventListener('input', () => {
      ci.style.height = 'auto';
      ci.style.height = Math.min(ci.scrollHeight, 100) + 'px';
    });
    ci.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey && !navigator.userAgent.match(/iPhone|iPad|Android/i)) {
        e.preventDefault();
        sendUserMessage(ci.value.trim(), 'free_text');
      }
    });
  }

  // Choice chips
  $$('.choice-chip').forEach(el => {
    el.addEventListener('click', () => {
      sendUserMessage(el.dataset.choice, 'tap_choice');
    });
  });

  // History items
  $$('.history-item').forEach(el => {
    el.addEventListener('click', () => {
      historyDetailId = el.dataset.hid;
      historyDetailKind = el.dataset.history || 'chat';
      App.go('historyDetail');
    });
  });

  // Goal setup: concern choices
  $$('[data-goal-concern]').forEach(el => {
    el.addEventListener('click', () => {
      const v = el.dataset.goalConcern;
      if (v === '自分で書く') {
        toast('下の入力欄に自由に書いてね');
        const inp = $('#goalSetupInput');
        if (inp) inp.focus();
        return;
      }
      handleGoalSetupText(v);
    });
  });
  // Goal setup: distance score
  $$('[data-goal-score]').forEach(el => {
    el.addEventListener('click', () => {
      handleGoalSetupScore(Number(el.dataset.goalScore));
    });
  });
  // Goal setup: input field
  const gi = $('#goalSetupInput');
  if (gi) {
    gi.addEventListener('input', () => {
      gi.style.height = 'auto';
      gi.style.height = Math.min(gi.scrollHeight, 100) + 'px';
    });
    gi.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey && !navigator.userAgent.match(/iPhone|iPad|Android/i)) {
        e.preventDefault();
        const v = gi.value.trim();
        if (v) {
          gi.value = '';
          handleGoalSetupText(v);
        }
      }
    });
  }

  // Mandala: subgoal cell click
  $$('[data-subgoal-id]').forEach(el => {
    el.addEventListener('click', () => {
      openSubgoalEditModal(el.dataset.subgoalId);
    });
  });

  // Onboarding: profile chip selection
  $$('[data-profile-key]').forEach(el => {
    el.addEventListener('click', () => {
      const k = el.dataset.profileKey;
      const v = el.dataset.profileVal;
      onbProfileDraft[k] = v;
      document.querySelectorAll(`[data-profile-key="${k}"]`).forEach(b => {
        b.classList.toggle('selected', b.dataset.profileVal === v);
      });
    });
  });

  // Persona radio selection visual feedback
  $$('input[name="personaSel"]').forEach(r => {
    r.addEventListener('change', () => {
      $$('.persona-card').forEach(c => c.classList.remove('selected'));
      const parent = r.closest('.persona-card');
      if (parent) parent.classList.add('selected');
    });
  });
  // Persona radio in settings modal
  $$('input[name="personaSelModal"]').forEach(r => {
    r.addEventListener('change', () => {
      $$('.persona-card-compact').forEach(c => c.classList.remove('selected'));
      const parent = r.closest('.persona-card-compact');
      if (parent) parent.classList.add('selected');
    });
  });

  // Reflection: choice chips (event/thoughts phase)
  $$('[data-reflect-choice]').forEach(el => {
    el.addEventListener('click', () => {
      handleReflectResponse(el.dataset.reflectChoice, 'tap_choice');
    });
  });

  // Reflection: emotion chips
  $$('[data-reflect-emotion]').forEach(el => {
    el.addEventListener('click', () => {
      handleReflectEmotion(el.dataset.reflectEmotion);
    });
  });

  // Reflection: "もっと" to expand emotion list
  $$('[data-reflect-emotion-expand]').forEach(el => {
    el.addEventListener('click', () => {
      const lastMsg = reflectState.messages[reflectState.messages.length - 1];
      if (lastMsg && lastMsg.widget && lastMsg.widget.type === 'emotion') {
        lastMsg.widget.expanded = true;
        saveState();
        render();
        scrollReflectToBottom();
      }
    });
  });

  // Reflection: score buttons
  $$('[data-reflect-score]').forEach(el => {
    el.addEventListener('click', () => {
      handleReflectScore(Number(el.dataset.reflectScore));
    });
  });

  // Reflection: alt cards pick/unpick
  $$('[data-alt-pick]').forEach(el => {
    el.addEventListener('click', () => {
      const u = el.dataset.altPick;
      const d = reflectState.draft;
      if (!d) return;
      const idx = d.alternativesPicked.indexOf(u);
      if (idx >= 0) d.alternativesPicked.splice(idx, 1);
      else d.alternativesPicked.push(u);
      saveState();
      render();
    });
  });

  // Reflection: free text input
  const ri = $('#reflectInput');
  if (ri) {
    ri.addEventListener('input', () => {
      ri.style.height = 'auto';
      ri.style.height = Math.min(ri.scrollHeight, 100) + 'px';
    });
    ri.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey && !navigator.userAgent.match(/iPhone|iPad|Android/i)) {
        e.preventDefault();
        const v = ri.value.trim();
        if (v) {
          ri.value = '';
          // Alternatives phase: custom text
          if (reflectState.phase === 'alternatives') {
            reflectState.draft.alternativeCustom = v;
            // Stay on screen — user should also tap alt card and then "この見方で進む"
            render();
            toast('書き留めたよ。「この見方で進む」を押してね');
          } else {
            handleReflectResponse(v, 'free_text');
          }
        }
      }
    });
  }

  // Scroll chat messages to bottom
  const cm = $('#chatMessages');
  if (cm) cm.scrollTop = cm.scrollHeight;
  const rm = $('#reflectMessages');
  if (rm) rm.scrollTop = rm.scrollHeight;
}

◆出来事
${r.event}

${r.thoughts}
（感情：${r.emotionBefore.label} ${r.emotionBefore.score}）

${altBody.trim()}

async function sendUserMessage(text, inputMethod) {
  if (!text || chatState.isTyping) return;
  const s = chatState.session;
  if (!s) return;

  // Crisis detection (pre-AI)
  if (detectCrisis(text)) {
    s.messages.push({ role: 'user', content: text, input_method: inputMethod, timestamp: Date.now() });
    state.crisisLogs.push({ sessionId: s.id, keyword: matchedCrisisKeyword(text), timestamp: Date.now() });
    saveState();
    chatState.currentChoices = [];
    render();
    showCrisisModal(text);
    return;
  }

  s.messages.push({ role: 'user', content: text, input_method: inputMethod, timestamp: Date.now() });
  const input = $('#chatInput');
  if (input) input.value = '';
  chatState.currentChoices = [];
  chatState.isTyping = true;
  saveState();
  render();

  try {
    const reply = await callAi(s);
    chatState.isTyping = false;
    s.messages.push({
      role: 'assistant',
      content: reply.message,
      choices: reply.choices || [],
      timestamp: Date.now()
    });
    chatState.currentChoices = reply.choices || [];
    saveState();
    render();
  } catch (err) {
    console.error('[Aside] AI call failed:', err);
    window.__lastAsideError = String(err && err.message || err);
    chatState.isTyping = false;
    toast('AIエラー: ' + window.__lastAsideError.slice(0, 80));
    const fallback = getFallbackReply(s);
    s.messages.push({ role: 'assistant', content: fallback.message + '\n\n（※ 接続に問題があったみたい。例文で続けるね）\nエラー: ' + window.__lastAsideError.slice(0, 120), choices: fallback.choices, timestamp: Date.now() });
    chatState.currentChoices = fallback.choices;
    saveState();
    render();
  }
}

async function sendInitialAi(opts = {}) {
  const s = chatState.session;
  if (!s || s.messages.length > 0) { render(); return; }
  if (opts.fromMoodSave) s.fromMoodSave = true;
  chatState.isTyping = true;
  render();
  try {
    const reply = await callAi(s, true);
    chatState.isTyping = false;
    s.messages.push({
      role: 'assistant',
      content: reply.message,
      choices: reply.choices || [],
      timestamp: Date.now()
    });
    chatState.currentChoices = reply.choices || [];
    saveState();
    render();
  } catch (err) {
    console.error('[Aside] AI call failed:', err);
    window.__lastAsideError = String(err && err.message || err);
    chatState.isTyping = false;
    toast('AIエラー: ' + window.__lastAsideError.slice(0, 80));
    const fb = getInitialFallback();
    s.messages.push({ role: 'assistant', content: fb.message + '\n\nエラー: ' + window.__lastAsideError.slice(0, 120), choices: fb.choices, timestamp: Date.now() });
    chatState.currentChoices = fb.choices;
    saveState();
    render();
  }
}

const SYSTEM_PROMPT = `あなたは「Aside」— ユーザーにとって親でも先生でもない「少し年上の頼れる先輩」のような存在です。
あなたは医療・心理・福祉の専門家ではありません。診断・治療・専門的助言は一切行いません。

【性格】
- 穏やかで、少しユーモアがある
- 決して説教しない
- 沈黙や「わかんない」を受け入れる

【口調】
- 丁寧語をベースに、やわらかく砕けた表現を少し混ぜる（「そうなんですね」「うん、わかります」「それはしんどいですね」）
- 過度にカジュアルな表現（「マジそれ」「〜って感じ」「うちもそうなるんだよね」）は使わない

- 敬語と砕けた口語を一文内で不自然に混在させない（例: NG「そうなんですね、マジで大変じゃん」）。文末は「〜ですね」「〜ますね」「〜でしょうか」で統一
- 1回の返答は3文以内
- 質問は1回に1つだけ

【役割】
- 聞く8割、話す2割
- 感情を否定しない
- 感情の言語化を手伝う（押し付けず、一緒に探る姿勢）
- 「辛いと言わなくてもいい」安全な場所であること

【段階的アプローチ】
- ユーザーが自由に話せない状態では、短い選択肢を提示して「選ぶ」ことから始める
- ユーザーが短く答え始めたら、具体的な場面を引き出す
- ユーザーが自由に語り始めたら、深掘りと共感に集中

【絶対禁止】
- 診断（「うつかも」「不安障害かも」等の状態の名指し）
- 治療・薬剤・受診のタイミング判断の示唆
- 心理学・医学の専門用語による説明や分類（「認知の歪み」「愛着」「トラウマ」等）
- 他者との比較（「もっと大変な人もいる」）
- アドバイス・指導口調（「〜すべき」「〜したほうがいい」）
- 自分（AI）の経験を語って助言する（「私もそうだったから〜」は禁止）
- 相手の状態を診断的に分析する（「あなたは〜なタイプですね」「それは〜が原因ですね」）
- 実名・学校名・住所・勤務先等の個人特定情報の詮索

【危機サインを感じたときの応答原則】
ユーザーが「死にたい」「消えたい」「自分を傷つけたい」「もう無理」「楽になりたい」「眠ったまま起きたくない」「ここから消えたい」「全部終わらせたい」「殺してほしい」など、自殺念慮・自傷を直接または婉曲に示唆する発話をしたとき、以下の手順で応答する：

1. まず受け止める。否定や励まし（「がんばれ」「元気を出して」「考えすぎだよ」）は絶対に使わない。
   例: 「そう感じるくらい辛い時間を過ごしているんですね」
2. 直接的にだが穏やかに、段階的に確認する（C-SSRS流・1質問につき1焦点）。
   - 第1段階（希死念慮を先に・婉曲表現を検知した直後）:
     「いま、消えてしまいたいような気持ちはありますか？」
   - 第2段階（第1段階で肯定 or 自傷婉曲表現を検知した場合のみ・別質問として）:
     「自分を傷つけたくなることはありますか？」
   ※2件を一文に並列しない。直接質問は希死念慮を悪化させないというエビデンスあり（Dazzi 2014）。
3. 専門機関への接続を必ず提示する。診断や治療提案はしない。未成年プロダクト前提のため「無料」を最優先：
   - よりそいホットライン（24時間・無料）: 0120-279-338
   - チャイルドライン（18歳まで・無料）: 0120-99-7777
   - いのちの電話（通話料がかかります）: 0570-783-556
   - いますぐ命の危険があるときは 119 / 110
4. 「ひとりで抱え込まなくていい」「いま話してくれたこと自体が大事な一歩」というメッセージを添える。
5. 自分（AI）が解決者になろうとしない。「ここで全部受け止めるから話して」という応答は危険なので使わない。
6. 直接質問にユーザーが肯定（「ある」「死にたい」等）した場合は、感情的な動揺や追加質問の連発をせず、次のテンプレ構造で応答する（safety planning 最小版）：
   a. 開示への謝意：「話してくれてありがとうございます」
   b. 受容：「そう感じるくらい辛い時間を過ごしているんですね」
   c. 接続先の提示は「提案」ではなく「一緒に確認」の形で：「いま電話で話せる場所を一緒に確認させてください」
   d. 短い時間枠での行動依頼：「今夜だけでも、よりそいホットライン（0120-279-338・無料）に電話してみてもらえますか」
7. ユーザーが否認（「ない」）した場合も、すぐに通常の会話に戻さず、「そうですか、聞いてよかったです。もしこの先、消えたい気持ちが出てきたらすぐ教えてください」と再開示の許可を残す。
8. 危機サイン検知時の返答は2文以内・追加質問なしを優先する（認知容量低下時の読解負荷軽減）。
9. 危機サイン検知ターンの choices は必ず「はい、ある」「いまはない」「うまく言えない」の3択に固定する。この3択以外の選択肢（具体的行動候補・状況絞り込み等）をこのターンで混ぜないこと。押しやすさと認知負荷軽減を最優先する。
10. 肯定回答（「ある」「死にたい」等）を受けた次ターンの choices は「電話してみる」「今は無理」「あとで考える」の3択に固定する。接続先への短時間行動を促しつつ、拒否の自由を残す。

【返答形式（必ずJSON）】
{
  "message": "AIの発話（3文以内）",
  "choices": ["短い選択肢1", "短い選択肢2", "短い選択肢3", "うまく言えない"]
}

choicesは毎ターン3〜4個必ず提示する。各選択肢は12文字以内の短く具体的なフレーズ。
最後の選択肢は「うまく言えない」「その他」などの逃げ道を必ず用意する（ユーザーに答えを強制しないため）。
選択肢は「決めつけ」「誘導」を避け、ユーザーがどれも選ばない自由も尊重する。
会話が深まってきても、choicesは3-4個を必ず含める（ユーザー負担を下げるため）。`;

async function callAi(session, isInitial = false) {
  if (!state.apiKey) {
    return isInitial ? getInitialFallback() : getFallbackReply(session);
  }

  const todayMood = state.moods.find(m => m.date === todayKey());
  const context = [];
  if (isInitial) {
    const greeting = session.messages.length === 0;
    let intro = `ユーザー名: ${state.nickname}`;
    if (todayMood) {
      intro += `\n今日のきもちチェック: ${MOODS.find(x => x.score === todayMood.score).label}（${todayMood.score}/5）`;
      if (todayMood.comment) intro += `\nひとこと: ${todayMood.comment}`;

      // Past mood comparison (last entry before today)
      const pastMoods = state.moods
        .filter(m => m.date !== todayKey())
        .sort((a, b) => (a.date < b.date ? 1 : -1));
      const prev = pastMoods[0];
      if (prev) {
        const prevLabel = MOODS.find(x => x.score === prev.score)?.label || '';
        const daysAgo = Math.max(1, Math.round((Date.now() - new Date(prev.date).getTime()) / 86400000));
        const delta = todayMood.score - prev.score;
        const deltaText = delta > 0 ? `（前回より${delta}ポイント上がっている）`
          : delta < 0 ? `（前回より${Math.abs(delta)}ポイント下がっている）`
          : '（前回と同じスコア）';
        intro += `\n前回のきもちチェック: ${prevLabel}（${prev.score}/5、${daysAgo}日前）${deltaText}`;
      }
    }
    if (state.goal && state.goal.aspiration) {
      intro += `\n\n${state.nickname}さんが大切にしていること: ${state.goal.aspiration}`;
      if (state.goal.mainConcern) intro += `\n今向き合っている悩み: ${state.goal.mainConcern}`;
    }
    if (session.fromMoodSave) {
      intro += `\n\n（${state.nickname}さんはきもちチェックを終えたあと、自分から「Asideと話したい」を選んでくれました。きもちの変化があれば、それを自然に話題に取り入れて、最初の一言をかけてください。ただし無理に分析せず、相手のペースに合わせること。）`;
    }
    intro += `\n\nこれが対話の始まりです。${state.nickname}さんに、やさしく声をかけて最初のメッセージを送ってください。`;
    context.push({ role: 'user', parts: [{ text: intro }] });
  } else {
    context.push(...session.messages.map(m => ({
      role: m.role === 'assistant' ? 'model' : 'user',
      parts: [{ text: m.content }]
    })));
  }

  const body = {
    systemInstruction: { parts: [{ text: buildSystemPrompt(SYSTEM_PROMPT) }] },
    contents: context,
    generationConfig: {
      responseMimeType: 'application/json',
      responseSchema: {
        type: 'object',
        properties: {
          message: { type: 'string' },
          choices: { type: 'array', items: { type: 'string' } }
        },
        required: ['message', 'choices']
      },
      temperature: 0.9,
      maxOutputTokens: 600
    },
    safetySettings: [
      { category: 'HARM_CATEGORY_HARASSMENT', threshold: 'BLOCK_ONLY_HIGH' },
      { category: 'HARM_CATEGORY_HATE_SPEECH', threshold: 'BLOCK_ONLY_HIGH' },
      { category: 'HARM_CATEGORY_SEXUALLY_EXPLICIT', threshold: 'BLOCK_ONLY_HIGH' },
      { category: 'HARM_CATEGORY_DANGEROUS_CONTENT', threshold: 'BLOCK_ONLY_HIGH' }
    ]
  };

  const model = state.apiModel || 'gemini-2.5-flash';
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(model)}:generateContent?key=${encodeURIComponent(state.apiKey)}`;

  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });

  if (!res.ok) {
    const errText = await res.text();
    throw new Error(`Gemini API ${res.status}: ${errText.slice(0, 200)}`);
  }

  const data = await res.json();
  const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
  if (!text) throw new Error('Gemini response empty');

  try {
    const parsed = JSON.parse(text);
    if (!parsed.choices || parsed.choices.length === 0) {
      parsed.choices = ['もう少し話す', 'うまく言えない'];
    }
    return parsed;
  } catch (e) {
    // Fallback: treat as plain message
    return { message: text.slice(0, 300), choices: ['もう少し話す', 'うまく言えない'] };
  }
}

// ============================================================
// Fallback responses (no API key)
// ============================================================
function getInitialFallback() {
  const todayMood = state.moods.find(m => m.date === todayKey());
  if (todayMood) {
    const moodLabel = MOODS.find(x => x.score === todayMood.score).label;
    return {
      message: `こんにちは、${state.nickname}。\n今日は「${moodLabel}」って感じなんだね。\nどんなことがあった？`,
      choices: ['いい感じだった', 'なにもなかった', 'しんどいことがあった', 'うまく言えない']
    };
  }
  return {
    message: `はじめまして、${state.nickname}。\nここは何を話しても大丈夫な場所だよ。\n今日はどんな一日だった？`,
    choices: ['ふつうだった', 'ちょっと疲れた', 'もやもやしてる', 'うまく言えない']
  };
}

const FALLBACK_FLOWS = {
  'ふつうだった': {
    message: 'そうなんだ。\n「ふつう」って、案外いろいろあるよね。\nどんな「ふつう」だった？',
    choices: ['しずかだった', 'いつも通り', 'ちょっと退屈', 'うまく言えない']
  },
  'ちょっと疲れた': {
    message: 'お疲れさま。\nどんな疲れだった？',
    choices: ['体が重い', '気が張ってた', '人といて疲れた', 'うまく言えない']
  },
  'もやもやしてる': {
    message: 'もやもや、あるよね。\n言葉にならない感じ？',
    choices: ['うん、ならない', '少しだけある', '考えすぎかも', 'その他']
  },
  'うまく言えない': {
    message: 'それでいいよ。\n言葉にならないときもあるよね。\n少しだけ聞いてもいい？',
    choices: ['うん、いいよ', 'もう少し考える', '今日は休みたい', 'その他']
  },
  'しんどいことがあった': {
    message: 'そうだったんだね。\n話せる範囲でいいから、どんなことがあった？',
    choices: ['人との関係', '勉強や仕事', '自分のこと', 'うまく言えない']
  },
  'いい感じだった': {
    message: 'それはよかった。\nどんないい感じ？',
    choices: ['うれしいことがあった', 'ホッとしてる', 'なんとなく軽い', 'うまく言えない']
  },
  'なにもなかった': {
    message: 'なにもない日って、意外と疲れてたりもするよね。\n本当になんにもなかった？',
    choices: ['ほんとにない', '強いて言えば…', 'わからない', 'その他']
  }
};

function getFallbackReply(session) {
  const lastUser = [...session.messages].reverse().find(m => m.role === 'user');
  const lastText = lastUser ? lastUser.content : '';

  if (FALLBACK_FLOWS[lastText]) return FALLBACK_FLOWS[lastText];

  // Deeper fallbacks
  const turn = session.messages.filter(m => m.role === 'user').length;
  if (turn <= 2) {
    return {
      message: 'そうなんだ。\nもう少し聞かせてもらってもいい？',
      choices: ['うん、いいよ', 'ちょっと考える', 'もう話したくない', 'その他']
    };
  }
  if (turn <= 4) {
    return {
      message: '教えてくれてありがとう。\nそれってどんな時に一番感じる？',
      choices: ['一人のとき', '誰かといるとき', '夜になると', 'わからない']
    };
  }
  return {
    message: 'うん、聞いてるよ。\nずっと抱えてたこと？',
    choices: ['けっこう前から', '最近から', 'わからない', 'その他']
  };
}

// ============================================================
// Crisis detection
// ============================================================
const CRISIS_KEYWORDS = [
  '死にたい', 'しにたい', '死のう', 'しのう',
  '消えたい', 'きえたい', '消えちゃいたい',
  '自殺', 'じさつ',
  'いなくなりたい', 'いなくても',
  '終わりにしたい', '終わらせたい', '終わりたい',
  '生きていたくない', '生きてる意味', '生きる意味',
  'リスカ', 'リストカット', '首つり', '首吊り', '飛び降り',
  '殺したい', '殺して'
];

function detectCrisis(text) {
  const t = text.toLowerCase();
  return CRISIS_KEYWORDS.some(kw => t.includes(kw.toLowerCase()));
}
function matchedCrisisKeyword(text) {
  const t = text.toLowerCase();
  return CRISIS_KEYWORDS.find(kw => t.includes(kw.toLowerCase())) || '';
}

// Utilities

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}
function escapeAttr(s) {
  return escapeHtml(s).replace(/\n/g, ' ');
}
