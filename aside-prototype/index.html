  // step 6 はレターでステップ表示しない。1-5のみ "Step X / 5"
  const stepLabel = `Step ${s.step} / 5`;

  if (s.step === 1) {
    return moyamoyaScreen(stepLabel, '何があったのかを教えてください', `
      <p class="text-soft mb-3">うまくまとまっていなくても大丈夫。</p>
      <textarea class="textarea-block" id="moyaInput" placeholder="例：上司に強く注意された" rows="4">${escapeHtml(s.eventText || '')}</textarea>
      <div style="margin-top:16px; display:grid; gap:10px;">
        <button class="btn btn-primary" data-act="moya-step1-next">つづける</button>
        <button class="btn-ghost" data-act="moya-cancel">キャンセル</button>
      </div>
    `);
  }
  if (s.step === 2) {
    // 主要 8 個を初期表示。「もっと見る」で全件展開。
    // ただし「その他」を選んでいる場合や、選択中の感情が初期8個に含まれない場合は全件表示を強制。
    const PRIMARY_COUNT = 8;
    const showAll = !!s.showAllEmotions;
    const primaryNames = new Set(EMOTIONS.slice(0, PRIMARY_COUNT).map(e => e.name));
    const selectedOutsidePrimary = s.emotion && !primaryNames.has(s.emotion);
    const visibleEmotions = (showAll || selectedOutsidePrimary) ? EMOTIONS : EMOTIONS.slice(0, PRIMARY_COUNT);
    const hasMore = visibleEmotions.length < EMOTIONS.length;
    return moyamoyaScreen(stepLabel, 'どんな気持ちが一番近かった？', `
      <div class="moya-emo-grid">
        ${visibleEmotions.map(e => `
          <button class="moya-emo-item ${s.emotion === e.name ? 'selected' : ''}" data-act="moya-step2-pick" data-emotion="${e.name}">
            <span class="moya-emo-emoji">${e.emoji}</span>
            <span class="moya-emo-name">${e.name}</span>
          </button>
        `).join('')}
      </div>
      ${hasMore ? `
        <button class="btn-ghost" data-act="moya-step2-show-all" style="margin-top:12px; width:100%; font-size:13px; padding:10px 12px;">他の気持ちも見る（あと ${EMOTIONS.length - visibleEmotions.length} 個）</button>
      ` : ''}
      <div style="margin-top:16px; display:grid; gap:10px;">
        <button class="btn btn-primary" data-act="moya-step2-next" ${!s.emotion ? 'disabled' : ''}>つづける</button>
        <button class="btn-ghost" data-act="moya-cancel">キャンセル</button>
      </div>
    `);
  }
  if (s.step === 3) {
    const v = s.emotionScoreBefore == null ? 5 : s.emotionScoreBefore;
    return moyamoyaScreen(stepLabel, 'その気持ちの強さはどのくらい？', `
      <div style="text-align:center; margin: 28px 0 18px;">
        <div id="moyaScoreNum" style="font-size:64px; font-weight:600; font-family:'Noto Serif JP', serif; color: var(--primary, #6B8F71); line-height:1;">${v}</div>
        <div class="text-tiny text-muted" style="margin-top:6px;">0=ほぼ感じない / 10=最大</div>
      </div>
      <div class="moya-scale-row">
        ${Array.from({length: 11}, (_, n) => `
          <button class="moya-scale-btn ${v === n ? 'selected' : ''}" data-act="moya-set-score" data-score="${n}">${n}</button>
        `).join('')}
      </div>
      <div style="margin-top:24px; display:grid; gap:10px;">
        <button class="btn btn-primary" data-act="moya-step3-next">つづける</button>
        <button class="btn-ghost" data-act="moya-cancel">キャンセル</button>
      </div>
    `);
  }
  if (s.step === 4) {
    // 初回到達時に AI 生成を発火（既に生成済みなら何もしない）
    if (!s.alternativeViewsFetched) {
      s.alternativeViewsFetched = true;
      s.alternativeViewsLoading = true;
      const sessionRef = s;
      generateAlternativeViewsAI(s.eventText, s.emotion, s.emotionScoreBefore).then(views => {
        if (moyamoya !== sessionRef) return; // 中断/離脱
        sessionRef.alternativeViews = views || generateAlternativeViewsTemplate(sessionRef.eventText, sessionRef.emotion);
        sessionRef.alternativeViewsRevealed = 3;
        sessionRef.alternativeViewsLoading = false;
        sessionRef.alternativeViewsAIUsed = !!views;
        render();
      }).catch(() => {
        if (moyamoya !== sessionRef) return;
        sessionRef.alternativeViews = generateAlternativeViewsTemplate(sessionRef.eventText, sessionRef.emotion);
        sessionRef.alternativeViewsRevealed = 3;
        sessionRef.alternativeViewsLoading = false;
        sessionRef.alternativeViewsAIUsed = false;
        render();
      });
    }

    if (s.alternativeViewsLoading || !s.alternativeViews) {
      return moyamoyaScreen(stepLabel, '別の見方を考えています...', `
        <div class="moya-loading">
          <div class="moya-loading-spinner"></div>
          <p class="moya-loading-text">あなたのできごとに合わせて、<br>AIが認知行動療法の観点から考え中です。</p>
        </div>
        <div style="margin-top:8px;">
          <button class="btn-ghost" data-act="moya-cancel" style="width:100%;">キャンセル</button>
        </div>
      `);
    }

    const visible = s.alternativeViews.slice(0, s.alternativeViewsRevealed);
    const canMore = s.alternativeViewsRevealed < s.alternativeViews.length;
    const selectedIdx = s.alternativeViewSelectedIndex;
    const hasSelection = typeof selectedIdx === 'number' && selectedIdx >= 0 && selectedIdx < s.alternativeViewsRevealed;
    return moyamoyaScreen(stepLabel, '別の見方を考えてみました', `
      <p class="text-tiny text-muted mb-3">⚠️ AIが推定した参考情報です。納得できるものを1つ選んでください。</p>
      <div style="display:flex; flex-direction:column; gap:10px;">
        ${visible.map((rawV, i) => {
          const v = normalizeAltView(rawV);
          return `
          <button class="moya-altview-card ${selectedIdx === i ? 'selected' : ''}" data-act="moya-step4-pick" data-index="${i}">
            <span class="moya-altview-num">${i+1}</span>
            <div class="moya-altview-body">
              ${v.label ? `<span class="moya-altview-label">${escapeHtml(v.label)}</span>` : ''}
              <p class="moya-altview-text">${escapeHtml(v.text).replace(/\n/g, '<br>')}</p>
            </div>
          </button>`;
        }).join('')}
      </div>
      ${canMore ? `
        <button class="btn btn-secondary" data-act="moya-step4-more" style="margin-top:14px; width:100%;">他の見方も見てみる</button>
      ` : ''}
      <div style="margin-top:18px; display:grid; gap:10px;">
        <button class="btn btn-primary" data-act="moya-step4-next" ${!hasSelection ? 'disabled' : ''}>この見方で進む</button>
        <button class="btn-ghost" data-act="moya-cancel">キャンセル</button>
      </div>
    `);
  }
  if (s.step === 5) {
    const v = s.emotionScoreAfter == null ? Math.max(0, (s.emotionScoreBefore || 5) - 2) : s.emotionScoreAfter;
    return moyamoyaScreen(stepLabel, 'いま、気持ちの強さはどのくらい？', `
      <p class="text-soft mb-2">さっきは <strong>${s.emotionScoreBefore}</strong> でした。</p>
      <div style="text-align:center; margin: 28px 0 18px;">
        <div id="moyaScoreNum" style="font-size:64px; font-weight:600; font-family:'Noto Serif JP', serif; color: var(--primary, #6B8F71); line-height:1;">${v}</div>
      </div>
      <div class="moya-scale-row">
        ${Array.from({length: 11}, (_, n) => `
          <button class="moya-scale-btn ${v === n ? 'selected' : ''}" data-act="moya-set-score-after" data-score="${n}">${n}</button>
        `).join('')}
      </div>
      <div style="margin-top:24px; display:grid; gap:10px;">
        <button class="btn btn-primary" data-act="moya-step5-next">レターを作る</button>
        <button class="btn-ghost" data-act="moya-cancel">キャンセル</button>
      </div>
    `);
  }
  if (s.step === 6) {
    if (!s.letterBody) {
      const letter = generateLetter(s);
      s.letterTitle = letter.title;
      s.letterBody = letter.body;
    }
    return renderMoyamoyaLetter(s);
  }
  return '';
}

// 後方互換ヘルパー：旧形式 string も受け取って {label, text} に正規化
function normalizeAltView(v, fallbackLabel) {
  if (v && typeof v === 'object' && typeof v.text === 'string') {
    return { label: typeof v.label === 'string' ? v.label : (fallbackLabel || ''), text: v.text };
  }
  if (typeof v === 'string') return { label: fallbackLabel || '', text: v };
  return { label: fallbackLabel || '', text: '' };
}

function generateAlternativeViewsTemplate(eventText, emotion) {
  const short = (eventText || '').slice(0, 28) + ((eventText || '').length > 28 ? '…' : '');

// v0.7.5 CBT (認知行動療法) ベースのAI別の見方生成
// プロンプトは AI_PROMPTS.cbt_alternative_views を参照
async function generateAlternativeViewsAI(eventText, emotion, score) {
  if (!getApiKey()) return null;
  const def = AI_PROMPTS.cbt_alternative_views;
  const sys = def.systemPrompt;
  const user = def.userTemplate
    .replace('{eventText}', eventText || '')
    .replace('{emotion}', emotion || '')
    .replace('{score}', score == null ? 5 : score);

  try {
    const text = await callGemini(sys, [{ role: 'user', content: user }], { temperature: def.temperature, maxTokens: def.maxTokens });
    if (!text) return null;
    const cleaned = text.trim()
      .replace(/^```(?:json)?\s*/i, '')
      .replace(/```\s*$/, '')
      .trim();
    // 先頭に余計な文字がある場合は最初の[から]までを抽出
    const start = cleaned.indexOf('[');
    const end = cleaned.lastIndexOf(']');
    if (start < 0 || end < 0 || end <= start) return null;
    const arr = JSON.parse(cleaned.slice(start, end + 1));
    if (!Array.isArray(arr)) return null;
    // 新形式 [{label, text}, ...] / 旧形式 [string, ...] の両方を受け入れる
    const validLabels = new Set(MOYA_ALTVIEW_LABELS.map(l => l.name));
    const views = arr.map(v => normalizeAltView(v))
      .filter(v => v.text && v.text.length > 0)
      .map(v => ({
        label: validLabels.has(v.label) ? v.label : '',
        text: v.text.trim()
      }));
    if (views.length < 3) return null;
    // 6個に揃える（不足分はテンプレ補填）
    const fb = generateAlternativeViewsTemplate(eventText, emotion);
    while (views.length < 6) views.push(fb[views.length]);
    return views.slice(0, 6);
  } catch (e) {
    console.warn('[CBT-AI] failed', e);
    return null;
  }
}

// 旧API互換（テンプレ）
function generateAlternativeViews(eventText, emotion) {
  return generateAlternativeViewsTemplate(eventText, emotion);
}
function generateAlternativeView(eventText, emotion) {
  return generateAlternativeViewsTemplate(eventText, emotion).join('\n\n');
}

function generateLetter(s) {
  const date = new Date();
  const dateStr = `${date.getMonth()+1}月${date.getDate()}日`;
  const eventShort = (s.eventText || '').slice(0, 20);
  const title = `${eventShort || '今日'}の整理（${dateStr}）`;
  // 10段階スケール: diff>=2 で「軽くなった」、>0 で「ほぐれていく」、それ以下は据え置き
  const diff = (s.emotionScoreBefore || 0) - (s.emotionScoreAfter || 0);
  const closing = diff >= 2
    ? '少しだけ心が軽くなったね。それで十分です。'
    : diff > 0
    ? '気持ちは少しずつほぐれていきます。今日は書けただけでも一歩。'
    : '今日はまだ重く感じるかもしれない。それでも書いてくれたこと、覚えておこう。';
  // alternativeView は step4 で1つ選択された見方
  const altText = s.alternativeView || (Array.isArray(s.alternativeViews) ? s.alternativeViews.slice(0, s.alternativeViewsRevealed || 3).map((v, i) => `${i+1}. ${normalizeAltView(v).text}`).join('\n\n') : '');
  const body = `今日起きたこと\n${s.eventText}\n\n感じていたこと\n${s.emotion}（強さ ${s.emotionScoreBefore} / 10）\n\n別の見方\n${altText}\n\n少し楽になるための一言\n${closing}`;
  return { title, body };
}

function getEmotionNeed(emotion) {
  return EMOTION_NEEDS_MAP[emotion] || '今のあなたが何を大切にしたいのか、もう少し丁寧に見つめてみてもいいかもしれません。';
}
function getScoreLabel(score) {
  const n = score == null ? 5 : score;
  if (n >= 8) return { text: 'つらい', emoji: '😨' };
  if (n >= 6) return { text: 'しんどい', emoji: '😣' };
  if (n >= 4) return { text: '重い', emoji: '😟' };
  if (n >= 2) return { text: '少し感じる', emoji: '😐' };
  return { text: 'ほぼ感じない', emoji: '😌' };
}
function getScoreAfterLabel(before, after) {
  const b = before == null ? 5 : before;
  const a = after == null ? b : after;
  const diff = b - a;
  if (diff >= 1) return { text: 'すこし楽になった', emoji: '😌' };
  if (diff === 0) return { text: 'いつも通り', emoji: '😐' };
  return { text: 'まだ重い', emoji: '😶' };
}
function formatLetterDate(d) {
  const days = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
  return {
    full: `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`,
    year: d.getFullYear(),
    md: `${d.getMonth()+1}/${d.getDate()}`,
    day: days[d.getDay()] + '.'
  };
}

//   opts.dateOverride: ISO文字列。record.createdAt を渡すと当時の日付で表示する
function renderMoyamoyaLetter(s, opts) {
  opts = opts || {};
  const isPast = opts.viewMode === 'past';
  const date = opts.dateOverride ? new Date(opts.dateOverride) : new Date();
  const dateInfo = formatLetterDate(date);
  const before = s.emotionScoreBefore == null ? 5 : s.emotionScoreBefore;
  const after = s.emotionScoreAfter == null ? before : s.emotionScoreAfter;
  const diff = before - after;
  const beforeLbl = getScoreLabel(before);
  const afterLbl = getScoreAfterLabel(before, after);
  const need = getEmotionNeed(s.emotion);
  const closing = diff >= 2
    ? '少しだけ心が軽くなったね。それで十分です。'
    : diff > 0
    ? '気持ちは少しずつほぐれていきます。今日は書けただけでも一歩。'
    : '今日はまだ重く感じるかもしれない。それでも書いてくれたこと、覚えておこう。';
  const altText = s.alternativeView || '';
  const eventText = s.eventText || '';
  const emotion = s.emotion || '';

  const summaryAltShort = altText.length > 60 ? altText.slice(0, 58) + '…' : altText;

  return `
    <div class="screen active letter-screen">
      <div class="letter-pageheader">

  };

// 画面: 行動タブ（v3 - 目標→方針→行動）

function activeGoal() { return state.goals.find(g => g.status === 'active') || null; }
function activePolicy() {
  const g = activeGoal();
  if (!g) return null;
  return state.policies.filter(p => p.goalId === g.id).pop() || null;
}
function activeAction() {
  const p = activePolicy();
  if (!p) return null;
  return state.actions.filter(a => a.policyId === p.id && a.status === 'active').pop() || null;
}
function sameDay(a, b) { return a.toDateString() === b.toDateString(); }
function formatDate(iso) {
  const d = new Date(iso);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// ============================================================
// 習慣化ヘルパー (P8.1 v0.9.47 〜)
// ============================================================
function dateKey(d) {
  const dt = d instanceof Date ? d : new Date(d);
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
}

function getHabitItem(id) {
  if (!id) return null;
  const custom = (state.customHabits || []).find(h => h.id === id);
  if (custom) return {
    id: custom.id, title: custom.name, icon: custom.icon || '🌱',
    time: custom.duration || '', technique: '',
    timing: custom.timing || '', desc: '', isCustom: true,
  };
  const a = ACTIONS.find(x => x.id === id);
  if (a) return {
    id: a.id, title: a.title, icon: a.icon, time: a.time,
    technique: a.technique || '', desc: a.desc || '',
    timing: '', isCustom: false,
  };
  return null;
}

function getAllHabitIds() {
  const action = (state.user && state.user.habitActionIds) || [];
  const custom = (state.customHabits || []).map(h => h.id);
  // dedup, custom が action よりも後ろに来る
  return [...new Set([...action, ...custom])];
}

function isHabitDoneOn(habitId, date) {
  const k = dateKey(date);
  return (state.habitLogs || []).some(l => l.habitId === habitId && l.date === k);
}

function getHabitStreak(habitId) {
  let streak = 0;
  const d = new Date();
  for (let i = 0; i < 365; i++) {
    if (isHabitDoneOn(habitId, d)) {
      streak++;
      d.setDate(d.getDate() - 1);
    } else break;
  }
  return streak;
}

function getCurrentWeekDates() {
  // 月〜日 (週初めを月曜にする)
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const day = today.getDay(); // 0=Sun ... 6=Sat
  const monOffset = day === 0 ? -6 : 1 - day;
  const result = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + monOffset + i);
    result.push(d);
  }
  return result;
}

function markHabitDoneToday(habitId) {
  const today = dateKey(new Date());
  if (!Array.isArray(state.habitLogs)) state.habitLogs = [];
  if (state.habitLogs.some(l => l.habitId === habitId && l.date === today)) return false;
  state.habitLogs.push({
    id: 'hl_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
    habitId, date: today, completedAt: new Date().toISOString(),
  });
  return true;
}

function unmarkHabitToday(habitId) {
  const today = dateKey(new Date());
  state.habitLogs = (state.habitLogs || []).filter(l => !(l.habitId === habitId && l.date === today));
}

function deleteHabit(habitId) {
  if (Array.isArray(state.user.habitActionIds)) {
    state.user.habitActionIds = state.user.habitActionIds.filter(id => id !== habitId);
  }
  state.customHabits = (state.customHabits || []).filter(h => h.id !== habitId);
  state.habitLogs = (state.habitLogs || []).filter(l => l.habitId !== habitId);
}

// 月の日付配列 (1日 〜 月末)
function getMonthDates(year, month0) {
  const last = new Date(year, month0 + 1, 0).getDate();
  const result = [];
  for (let d = 1; d <= last; d++) result.push(new Date(year, month0, d));
  return result;
}

  if (!ippoToday) {

    if (!hasIppoHist && !hasHabit) return viewIppoOnboarding();
    return viewIppoBase(ippoCompletedToday() || null);

  // 進行中: ステップ別画面 (Step 0 → 2 → 3 → 35 → 4 → 完了 → ベース)

  switch (ippoToday.step) {
    case 0:  return viewIppoStep0(ippoToday);
    case 2:  return viewIppoStep2(ippoToday);

    case 35: return viewIppoTimer(ippoToday);
    case 4:  return viewIppoStep4(ippoToday);

    default: ippoToday = null; return viewAction();

// Step 6: AIフィードバック + 次の一歩を提案（仕様書 §6 統合画面）
// ============================================================
// 行動後サマリー指標計算（v0.9.6 改善の可視化）
// ============================================================
// 連続日数: 直近で連続して ippoSession を完了した日数
function calcIppoStreakDays() {
  const sessions = (state.ippoSessions || []).slice().sort((a, b) => new Date(b.completedAt) - new Date(a.completedAt));
  if (sessions.length === 0) return 0;
  const dayKey = (d) => `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
  const days = new Set(sessions.map(s => dayKey(new Date(s.completedAt))));
  let streak = 0;
  const today = new Date();
  for (let i = 0; i < 365; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    if (days.has(dayKey(d))) streak++;
    else { if (i === 0) continue; break; }  // 今日まだ未完了でも昨日まで連続なら継続
  }
  return streak;
}
// 平均マッチ度
function calcAvgMatchScore() {
  const sessions = (state.ippoSessions || []).filter(s => typeof s.score === 'number');
  if (sessions.length === 0) return null;
  return Math.round(sessions.reduce((a, s) => a + s.score, 0) / sessions.length);
}
// よく効く一歩（変化値の平均が最も高いアクション）
function calcMostEffectiveAction() {
  const map = {};
  (state.ippoSessions || []).forEach(s => {
    if (!s.actionId || typeof s.changeValue !== 'number') return;
    if (!map[s.actionId]) map[s.actionId] = { sum: 0, count: 0 };
    map[s.actionId].sum += s.changeValue;
    map[s.actionId].count++;
  });
  let best = null;
  for (const id in map) {
    const m = map[id];
    if (m.count < 1) continue;
    const avg = m.sum / m.count;
    if (!best || avg > best.avg) best = { id, avg, count: m.count };
  }
  if (!best) return null;
  const action = ACTIONS.find(a => a.id === best.id);
  return { action, avg: best.avg, count: best.count };
}
// 最近の傾向（直近5件のパターンから1行のインサイト）
function calcRecentTrendInsight() {
  const recent = (state.ippoSessions || []).slice(-5);
  if (recent.length < 2) return 'まずは1つ実施できたね。少しずつデータが溜まっていくよ';
  // 気分別の変化値平均から最も効きやすいパターンを抽出
  const byMood = {};
  recent.forEach(s => {
    if (!byMood[s.moodLabel]) byMood[s.moodLabel] = [];
    byMood[s.moodLabel].push(s.changeValue || 0);
  });
  let bestMood = null;
  for (const m in byMood) {
    const avg = byMood[m].reduce((a, b) => a + b, 0) / byMood[m].length;
    if (!bestMood || avg > bestMood.avg) bestMood = { label: m, avg };
  }
  // 短い時間の行動の方が効きやすいか
  const shortActs = recent.filter(s => {
    const a = ACTIONS.find(x => x.id === s.actionId);
    return a && /^[12]分|^1分|^2分/.test(a.time || '');
  });
  if (bestMood && bestMood.avg >= 2 && bestMood.label) {
    return `${bestMood.label}のときは、軽い行動が効きやすいようです`;
  }
  if (shortActs.length >= recent.length / 2) {
    return '短時間の行動が効果を出しているようです';
  }
  return '少しずつ、自分に合うパターンが見えてきています';
}

// 深掘りの発動条件（仕様書 §5 発動のきっかけ）
function shouldSuggestDeepDive() {
  const sessions = (state.ippoSessions || []).slice(-3);
  if (sessions.length < 2) return false;
  // 同じ気分が2日以上続く OR 強さ7以上が2日以上
  const sameMood = sessions.filter(s => s.moodLabel === sessions[sessions.length - 1].moodLabel).length >= 2;
  const highIntensity = sessions.filter(s => (s.moodIntensity || 0) >= 7).length >= 2;
  // 変化値が小さい
  const lowChange = sessions.filter(s => (s.changeValue || 0) < 1).length >= 2;
  return sameMood || highIntensity || lowChange;
}

function viewIppoActionPicker(s) {
  const tab = s.pickerTab || 'recommend';

  const habitMode = !!s.habitMode;
  const cardOpts = habitMode ? { habitMode: true } : {};

  let body = '';
  if (tab === 'recommend') {
    const recs = getTopRecommendations({
      moodLabel: 'なんとなく',
      intensity: 5,
      directionIds: getDirectionIds(),
      durationPref: '1min',
      history: sessions,
    }, 8);
    body = recs.length === 0
      ? `<div class="ippo-picker-empty">おすすめが見つかりませんでした<br>カテゴリから選ぶをお試しください</div>`
      : recs.map(r => renderActionPickerCard(r.action, { ...cardOpts, meta: `おすすめ度 ${r.score.total}%・${r.action.technique}` })).join('');
  } else if (tab === 'category') {
    body = ACTION_CATEGORIES.map(cat => {
      const items = ACTIONS.filter(a => a.cat === cat.id);
      if (items.length === 0) return '';
      return `
        <div class="ippo-picker-cat-h"><span>${cat.icon}</span><span>${escapeHtml(cat.name)}</span><span style="color:var(--text-muted); font-weight:400; font-size:11px; margin-left:auto;">${items.length}件</span></div>
        <div class="ippo-picker-cat-list">
          ${items.map(a => renderActionPickerCard(a, { ...cardOpts, meta: a.technique })).join('')}
        </div>
      `;
    }).join('');
  } else if (tab === 'history') {
    const hist = getIppoActionHistory();
    body = hist.length === 0
      ? `<div class="ippo-picker-empty">まだ実施した記録がありません<br>「おすすめ」または「カテゴリから選ぶ」から始めましょう</div>`
      : hist.map(h => {
          const a = ACTIONS.find(x => x.id === h.actionId);
          if (!a) return '';
          const avg = h.evalCount > 0 ? (h.evalSum / h.evalCount) : null;
          const metaParts = [`最後: ${formatDate(h.lastDate)}`, `${h.count}回`];
          if (avg !== null) metaParts.push(`平均 ${ippoEvalAvgEmoji(avg)}`);
          return renderActionPickerCard(a, { ...cardOpts, meta: metaParts.join(' ・ ') });
        }).join('');
  } else if (tab === 'custom' && habitMode) {
    body = renderHabitCreateForm();
  }

  return `
    <div class="screen active ippo-screen ippo-picker-screen">
      <div class="page-header">
        <button class="back-btn" data-act="ippo-picker-back" aria-label="戻る">‹</button>

        <button class="ippo-picker-tab ${tab === 'category' ? 'active' : ''}" data-act="ippo-picker-tab" data-tab="category" role="tab" aria-selected="${tab === 'category'}">カテゴリ</button>

        ${habitMode ? `<button class="ippo-picker-tab ${tab === 'custom' ? 'active' : ''}" data-act="ippo-picker-tab" data-tab="custom" role="tab" aria-selected="${tab === 'custom'}">自分でつくる</button>` : ''}
      </div>

      <div class="ippo-picker-body">
        ${body}
      </div>
    </div>
  `;

// 行動別の履歴集計 (履歴サブタブ用)
function getIppoActionHistory() {
  const sessions = (state.ippoSessions || []).filter(s => s.actionId && s.completedAt);
  const map = {};
  sessions.forEach(s => {
    if (!map[s.actionId]) {
      map[s.actionId] = { actionId: s.actionId, count: 0, lastDate: null, evalSum: 0, evalCount: 0 };
    }
    const m = map[s.actionId];
    m.count++;
    const dt = new Date(s.completedAt);
    if (!m.lastDate || dt > m.lastDate) m.lastDate = dt;
    let v = null;
    if (s.evaluation && typeof s.evaluation.value === 'number') v = s.evaluation.value;
    else if (typeof s.changeValue === 'number') v = s.changeValue;
    if (v !== null) { m.evalSum += v; m.evalCount++; }
  });
  return Object.values(map).sort((a, b) => (b.lastDate || 0) - (a.lastDate || 0));
}

// 平均評価 (-2 〜 +3) を 5択絵文字に丸める
function ippoEvalAvgEmoji(avg) {
  if (avg >= 2.5) return '😄';
  if (avg >= 1.5) return '😊';
  if (avg >= 0.5) return '🙂';
  if (avg >= -0.5) return '😐';
  return '😞';
}

function renderHabitCalendar(item, monthOffset) {
  const today = new Date();
  const target = new Date(today.getFullYear(), today.getMonth() + monthOffset, 1);
  const year = target.getFullYear();
  const month0 = target.getMonth();
  const first = new Date(year, month0, 1);
  const last = new Date(year, month0 + 1, 0);
  const startDay = first.getDay(); // 0=Sun
  const daysInMonth = last.getDate();
  // 月のログ数
  const monthLogs = (state.habitLogs || []).filter(l => l.habitId === item.id && l.date.startsWith(`${year}-${String(month0+1).padStart(2,'0')}`));
  const doneCount = monthLogs.length;
  const achievementRate = daysInMonth > 0 ? Math.round((doneCount / daysInMonth) * 100) : 0;

  // セル構築
  const cells = [];
  for (let i = 0; i < startDay; i++) cells.push(`<div class="habit-cal-cell empty"></div>`);
  for (let d = 1; d <= daysInMonth; d++) {
    const dt = new Date(year, month0, d);
    const done = isHabitDoneOn(item.id, dt);
    const isFuture = dt > today;
    const isToday = dateKey(dt) === dateKey(today);
    cells.push(`
      <div class="habit-cal-cell ${done ? 'done' : ''} ${isFuture ? 'future' : ''} ${isToday ? 'today' : ''}">
        <div class="habit-cal-num">${d}</div>
        ${done ? '<div class="habit-cal-mark">✓</div>' : ''}
      </div>
    `);
  }

  return `
    <div class="habit-cal-nav">
      <button class="btn-ghost habit-cal-nav-btn" data-act="ippo-habit-cal-prev" aria-label="前月">‹</button>
      <div class="habit-cal-nav-label">${year}年${month0 + 1}月</div>
      <button class="btn-ghost habit-cal-nav-btn ${monthOffset >= 0 ? 'disabled' : ''}" data-act="ippo-habit-cal-next" aria-label="翌月" ${monthOffset >= 0 ? 'disabled' : ''}>›</button>
    </div>

    <div class="habit-cal-stats">
      <div>${month0 + 1}月の記録：<strong>${doneCount}</strong> / ${daysInMonth}日</div>
      <div>達成率 <strong>${achievementRate}%</strong></div>
    </div>

    <div class="habit-cal-weekhead">
      ${['日','月','火','水','木','金','土'].map((l, i) => `<div class="habit-cal-weekday ${i === 0 ? 'sun' : i === 6 ? 'sat' : ''}">${l}</div>`).join('')}
    </div>
    <div class="habit-cal-grid">
      ${cells.join('')}
    </div>
  `;
}

    case 2: return viewDdEvent(s);

    case 4: return viewDdDeeper(s);
    case 5: return viewDdCoreBelief(s);
    case 6: return viewDdOutcome(s);
    default: deepDive = null; return viewDdTheme({ step: 1, deeper: ['', '', ''], depthLevel: 0 });
  }
}

function extractCoreBeliefRule(s) {
  const allText = [s.event, s.firstThought, ...(s.deeper || []), s.coreBelief].filter(Boolean).join(' ');
  const tags = [];
  // ルールベースのキーワード判定
  if (/ダメ|無価値|価値.*ない|存在.*意味/.test(allText)) tags.push('自己否定が強い');
  if (/評価|嫌われ|ダメな人|どう見られ/.test(allText)) tags.push('評価に敏感');
  if (/失敗|うまくいかない|ミス|落ちこぼれ/.test(allText)) tags.push('失敗を恐れやすい');
  if (/捨て|見捨て|ひとり|孤独|去られる/.test(allText)) tags.push('見捨てられ不安');
  if (/完璧|きちんと|ちゃんと|完全|妥協/.test(allText)) tags.push('完璧主義傾向');
  if (/比べ|周りは|みんな|あの人/.test(allText)) tags.push('他者比較しやすい');
  if (/迷惑|頼れない|甘え|助け.*求め/.test(allText)) tags.push('助けを求めにくい');
  if (/全部.*せい|私のせい|責任|全て.*悪い/.test(allText)) tags.push('過剰責任');
  return {
    extractedBelief: s.coreBelief,
    tags: tags.slice(0, 3).length > 0 ? tags.slice(0, 3) : ['自己否定が強い'],
    gentleReflection: 'たどり着いた考えは、これまでのあなたを守ろうとしてきた一部かもしれません。決めつけず、ゆっくり眺めてみるだけでも十分です。',
  };
}

async function extractCoreBeliefAI(s) {
  if (!getApiKey()) return null;
  const def = AI_PROMPTS.deep_dive_extraction;
  const user = def.userTemplate
    .replace('{event}', s.event || '')
    .replace('{firstThought}', s.firstThought || '')
    .replace('{deeper1}', (s.deeper && s.deeper[0]) || '')
    .replace('{deeper2}', (s.deeper && s.deeper[1]) || '')
    .replace('{deeper3}', (s.deeper && s.deeper[2]) || '')
    .replace('{coreBelief}', s.coreBelief || '')
    .replace('{beliefSince}', s.beliefSince || '')
    .replace('{confidence}', s.confidence == null ? 5 : s.confidence);

  try {
    const text = await callGemini(def.systemPrompt, [{ role: 'user', content: user }], { temperature: def.temperature, maxTokens: def.maxTokens });
    if (!text) return null;
    const cleaned = text.trim().replace(/^```(?:json)?\s*/i, '').replace(/```\s*$/, '').trim();
    const start = cleaned.indexOf('{'), end = cleaned.lastIndexOf('}');
    if (start < 0 || end <= start) return null;
    const parsed = JSON.parse(cleaned.slice(start, end + 1));
    if (typeof parsed.extractedBelief !== 'string') return null;
    // タグは固定候補にフィルタ
    const tags = (parsed.tags || []).filter(t => DD_BELIEF_TAGS.includes(t));
    return {
      extractedBelief: parsed.extractedBelief,
      tags: tags.length > 0 ? tags.slice(0, 3) : null,
      gentleReflection: typeof parsed.gentleReflection === 'string' ? parsed.gentleReflection : '',
    };
  } catch (e) {
    console.warn('[DD-AI] failed', e);
    return null;
  }
}

function startGoalChat() {
  goalChat = {
    messages: [{ role: 'assistant', content: '今、いちばん変えたいことや、少し楽になりたいことはありますか？\n\nまとまっていなくて大丈夫。思っていることをそのまま書いてみてください。', createdAt: new Date().toISOString() }],
    proposedGoal: null, sourceSummary: null, awaitingConfirm: false
  };
}

function goalChatSend() {
  if (!goalChat) return;
  const input = document.getElementById('goalChatInput');
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';

  const crisis = detectCrisis(text);
  if (crisis && crisis.sev >= 4) { showCrisisModal(crisis.sev); return; }

  goalChat.messages.push({ role: 'user', content: text, createdAt: new Date().toISOString() });
  const turns = goalChat.messages.filter(m => m.role === 'user').length;

  if (turns < 2) {
    goalChat.messages.push({ role: 'assistant', content: '話してくれてありがとう。\n\nもう少し聞かせてください。それを変えたいと思うのは、最近どんな出来事があったからですか？', createdAt: new Date().toISOString() });
  } else {
    const proposal = generateGoalProposal(goalChat.messages);
    goalChat.proposedGoal = proposal.goalText;
    goalChat.sourceSummary = proposal.summary;
    goalChat.awaitingConfirm = true;
    goalChat.messages.push({ role: 'assistant', content: `話してくれてありがとう。\n\n今の話を整理すると、あなたは「${proposal.summary}」と感じているように見えます。\n\n目標としては、以下のように置くのはどうでしょうか？\n\n「${proposal.goalText}」\n\nこの目標で進めてもよさそうですか？`, createdAt: new Date().toISOString() });
  }

  document.getElementById('main').innerHTML = viewGoalChat();
  setTimeout(scrollChatToBottom, 50);
}

function generateGoalProposal(messages) {
  const userText = messages.filter(m => m.role === 'user').map(m => m.content).join(' ');
  let theme = '気持ちの揺れ';
  if (/仕事|職場|上司|会社|残業/.test(userText)) theme = '仕事での不安';
  else if (/恋愛|彼|恋人/.test(userText)) theme = '恋愛での不安';
  else if (/家族|親|母|父/.test(userText)) theme = '家族との関係';
  else if (/友|友達|友人/.test(userText)) theme = '友人との関係';
  else if (/将来|未来|キャリア/.test(userText)) theme = '将来への不安';
  const summary = `${theme}を減らして、自分を責めすぎずに過ごせるようになりたい`;
  const goalText = `${theme}を感じたときも、自分を責めすぎず、落ち着いて次の行動を選べるようになる`;
  return { summary, goalText };
}

function confirmGoal() {
  if (!goalChat || !goalChat.proposedGoal) return;
  const goal = {
    id: uid(),
    goalText: goalChat.proposedGoal,
    sourceSummary: goalChat.sourceSummary,
    status: 'active',
    createdAt: new Date().toISOString(),
    updatedAt: new Date().toISOString()
  };
  state.goals.forEach(g => { g.status = 'archived'; });
  state.goals.push(goal);
  persistAIChat({ sourceType: 'goal', sourceId: goal.id, messages: goalChat.messages.slice() });
  saveState();
  goalChat = null;
  if (window.MoyaLogger) MoyaLogger.event('goal_set');
  toast('目標を決めました');
  go('action');
}

// ============================================================
// すぷらんキャラクター（v0.9.7: 成長段階を撤去し単一ベースに統合）
//   - すぷらんはキャラクターとして成長しない方針
//   - 画像は base.png 1枚を中心に、表情/ポーズ/季節/家族/日常で
//     カテゴリ別 PNG を上書き表示する構造
//   - PNG が無い場合は SVG プレースホルダーで描画
// ============================================================
function suplanExpression() {
  const last = state.moodLogs && state.moodLogs[state.moodLogs.length - 1];
  if (!last) return 'calm';
  if (last.moodScore <= 2) return 'sad';
  if (last.moodScore >= 4) return 'happy';
  return 'calm';
}

// ホーム右上のすぷらんアイコン用：毎回見るためネガティブ表情は出さない
function suplanHomeExpression() {
  const e = suplanExpression();
  return e === 'sad' ? 'calm' : e;
}

// ============================================================
// すぷらん画像レンダリング（v0.9.5 同期 IMG + onerror チェーン）
//
// 旧実装の問題: `suplanProbeAsset` が初回必ず false を返すため
// 初回レンダリング時はSVG。currentScreen ガードで再レンダーが走らない
// 場合（モーダル内、深いネスト、画面遷移直後など）SVGのまま残ってしまう。
//
// 新実装: <img> を直接出力し、onerror で次候補にチェーン。
// ブラウザが既にキャッシュしているPNGは即時表示（SVGフラッシュなし）。
// 全候補失敗時のみ最終フォールバックとして SVG 描画。
// ============================================================
const _suplanAssetCache = {};  // path → true (success) / false (404確認済) / undefined (未試行)

// 起動時に確実存在する資産をプリウォームし、初回IMG src選択を高速化
function preWarmSuplanAssets() {
  const known = ['base'];
  known.forEach(p => {
    if (p in _suplanAssetCache) return;
    const img = new Image();
    img.onload  = () => { _suplanAssetCache[p] = true; };
    img.onerror = () => { _suplanAssetCache[p] = false; };
    img.src = `./assets/suplan/${p}.png`;
  });
}

// 旧API互換: 同期チェック用（cache 参照のみ、async 起動はしない）
function suplanProbeAsset(category, name) {
  return _suplanAssetCache[`${category}/${name}`] === true;
}

// メイン関数: PNG優先、IMG が連鎖的に onerror で次候補へ。最終はSVG
// opts.stage は後方互換のため受け取るが無視する（成長段階廃止）
function suplan(opts = {}) {
  const expression = opts.expression || suplanExpression();
  const pose = opts.pose || null;
  const seasonal = opts.seasonal || null;
  const family = opts.family || null;
  const daily = opts.daily || null;
  const size = opts.size || 96;

  // 優先順候補
  const allPaths = [];
  if (family)      allPaths.push(`family/${family}`);
  if (daily)       allPaths.push(`daily/${daily}`);
  if (pose)        allPaths.push(`poses/${pose}`);
  if (seasonal)    allPaths.push(`seasonal/${seasonal}`);
  if (expression && expression !== 'calm') allPaths.push(`expressions/${expression}`);
  allPaths.push(`base`);  // 単一ベース画像

  // 既知 false（404確認済）はチェーンから除外
  const tryOrder = allPaths.filter(p => _suplanAssetCache[p] !== false);
  // 既知 true（成功確認済）があれば最優先に
  tryOrder.sort((a, b) => (_suplanAssetCache[b] === true ? 1 : 0) - (_suplanAssetCache[a] === true ? 1 : 0));

  if (tryOrder.length === 0) {
    return suplanSvg({ expression, pose, size });
  }

  const primary = tryOrder[0];
  const chain = tryOrder.slice(1);
  const safeAttr = (s) => String(s).replace(/[<>"&]/g, '');

  return `<img src="./assets/suplan/${primary}.png"
    width="${size}" height="${size}" alt="すぷらん"
    data-suplan-chain="${chain.join('|')}"
    data-suplan-size="${size}"
    data-suplan-expression="${safeAttr(expression)}"
    style="display:block; pointer-events:none; object-fit: contain;"
    onload="window.suplanImgLoad && window.suplanImgLoad(this)"
    onerror="window.suplanImgChainFail && window.suplanImgChainFail(this)">`;
}

// IMG 成功時: キャッシュに記録（次回以降即座にこのパスを最優先）
window.suplanImgLoad = function(img) {
  const m = (img.src || '').match(/assets\/suplan\/(.+)\.png/);
  if (m && m[1]) _suplanAssetCache[m[1]] = true;
};

// IMG 失敗時: 次候補にチェーン or 最終 SVG
window.suplanImgChainFail = function(img) {
  if (!img || !img.parentNode) return;
  const m = (img.src || '').match(/assets\/suplan\/(.+)\.png/);
  if (m && m[1]) _suplanAssetCache[m[1]] = false;

  const chain = (img.dataset.suplanChain || '').split('|').filter(Boolean);
  if (chain.length > 0) {
    const next = chain.shift();
    img.dataset.suplanChain = chain.join('|');
    img.src = `./assets/suplan/${next}.png`;
    return;
  }
  // 全候補失敗 → SVG置換
  const size = parseInt(img.dataset.suplanSize, 10) || 96;
  const expression = img.dataset.suplanExpression || 'calm';
  try {
    img.outerHTML = suplanSvg({ expression, size });
  } catch (_) {
    img.style.display = 'none';
  }
};

// 旧API互換
window.suplanImgFail = window.suplanImgChainFail;

// 起動時プリウォーム（先頭で実行）
preWarmSuplanAssets();

// ============================================================
// Gemini API 呼び出し
// ============================================================
function getApiKey() {
  return (state.preferences && state.preferences.geminiApiKey) || null;
}

async function callGemini(systemPrompt, messages, options = {}) {
  const key = getApiKey();
  if (!key) return null;
  const model = options.model || 'gemini-2.5-flash';
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${encodeURIComponent(key)}`;
  const contents = messages.map(m => ({
    role: m.role === 'assistant' ? 'model' : 'user',
    parts: [{ text: m.content }]
  }));
  const body = {
    contents,
    systemInstruction: systemPrompt ? { parts: [{ text: systemPrompt }] } : undefined,
    generationConfig: {
      temperature: options.temperature ?? 0.8,
      maxOutputTokens: options.maxTokens ?? 512,
      thinkingConfig: { thinkingBudget: 0 },
    },
  };
  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!res.ok) {
      console.warn('[Gemini]', res.status, await res.text());
      return null;
    }
    const data = await res.json();
    const txt = data?.candidates?.[0]?.content?.parts?.[0]?.text;
    return txt || null;
  } catch (e) {
    console.warn('[Gemini] network', e);
    return null;
  }
}

// ============================================================
// きろく分析エンジン（v0.9.3 仕様書 §5 思考のクセ分析）
//   - DISTORTIONS の examples（キーワード）を使ってルールベースで検出
//   - eventText + letterBody から認知の歪みパターンをスコアリング
//   - TOP3 を「少しだけ／ややあり／ちょっと強め」のラベル付きで返す
// ============================================================
function distortionLabel(score) {
  if (score >= 50) return { label: 'ちょっと強め', tone: 'high', color: '#D77B5B' };
  if (score >= 25) return { label: 'ややあり',     tone: 'mid',  color: '#B07F2F' };
  if (score >= 8)  return { label: '少しだけ',     tone: 'low',  color: '#7BA876' };
  return { label: 'ほぼなし', tone: 'none', color: 'var(--text-muted)' };
}

function analyzeDistortions(records, daysWindow = 28) {
  const since = new Date();
  since.setDate(since.getDate() - daysWindow);
  const recent = (records || []).filter(r => new Date(r.createdAt) >= since);
  const total = Math.max(1, recent.length);

  return DISTORTIONS.map(d => {
    let hits = 0;
    let hitRecords = 0;
    recent.forEach(r => {
      const text = (r.eventText || '') + ' ' + (r.letterBody || '') + ' ' + (r.alternativeView || '');
      let hitInThis = 0;
      d.examples.forEach(ex => {
        const re = new RegExp(ex.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g');
        const m = text.match(re);
        if (m) hitInThis += m.length;
      });
      hits += hitInThis;
      if (hitInThis > 0) hitRecords++;
    });
    // ratio of records that hit, weighted by hit density
    const ratio = hitRecords / total;
    const density = hits / total;
    const score = Math.min(100, Math.round(ratio * 70 + density * 30));
    return {
      id: d.id,
      name: d.name,
      desc: d.desc,
      counter: d.counter,
      tier: d.tier,
      hits, hitRecords, total,
      score,
      level: distortionLabel(score),
    };
  }).sort((a, b) => b.score - a.score);
}

function getDistortionTrend(records, days = 60, halfDays = 30) {
  // 直近halfDays vs その前halfDays（合計days）を比較
  const now = new Date();
  const old = new Date(now); old.setDate(old.getDate() - days);
  const mid = new Date(now); mid.setDate(mid.getDate() - halfDays);
  const inRange = (r, from, to) => {
    const t = new Date(r.createdAt);
    return t >= from && t < to;
  };
  const recentRecords = (records || []).filter(r => inRange(r, mid, now));
  const olderRecords  = (records || []).filter(r => inRange(r, old, mid));

  const scoreAtSet = (set) => {
    return DISTORTIONS.map(d => {
      const t = Math.max(1, set.length);
      let hitRecs = 0;
      set.forEach(r => {
        const text = (r.eventText || '') + ' ' + (r.letterBody || '') + ' ' + (r.alternativeView || '');
        if (d.examples.some(ex => text.includes(ex))) hitRecs++;
      });
      return { id: d.id, name: d.name, score: Math.min(100, Math.round((hitRecs / t) * 100)) };
    });
  };
  const before = scoreAtSet(olderRecords);
  const after  = scoreAtSet(recentRecords);
  return DISTORTIONS.map((d, i) => ({
    id: d.id,
    name: d.name,
    before: before[i].score,
    after: after[i].score,
    delta: after[i].score - before[i].score,
  })).sort((a, b) => Math.abs(b.delta) - Math.abs(a.delta));
}

// 1記録 から「事実 / 解釈 / 感情 / 行動」に分解（仕様書 §5 詳細）
function decomposeRecord(record) {
  // 事実: eventText
  const fact = record.eventText || '';
  // 解釈: letterBody から「別の見方」直前のネガ思考を抽出（無ければ未記録）
  let interp = '';
  if (record.alternativeView) {
    // alternativeView は AI の new view なので、ネガ思考そのものではないが、推測の手がかり
    interp = '（このきろくでは元のネガティブ思考は明示記録されていません）';
  }
  // 感情
  const emo = {
    label: record.emotion || '',
    before: record.emotionScoreBefore,
    after: record.emotionScoreAfter,
  };
  // 行動: 同日の ippoSession から取得
  const sameDay = (state.ippoSessions || []).find(s =>
    s.completedAt && record.createdAt && sameDay2(new Date(s.completedAt), new Date(record.createdAt))
  );
  let action = '';
  if (sameDay) {
    const a = ACTIONS.find(x => x.id === sameDay.actionId);
    action = a ? `${a.title}（${a.time}）— 強さ ${sameDay.beforeIntensity}→${sameDay.afterIntensity}` : '記録あり';
  }

  // 検出された認知の歪み（このレコードから）
  const text = fact + ' ' + (record.letterBody || '') + ' ' + (record.alternativeView || '');
  const detectedDistortions = DISTORTIONS.filter(d => d.examples.some(ex => text.includes(ex)))
    .map(d => ({ id: d.id, name: d.name }));

  return { fact, interp, emo, action, detectedDistortions };
}
function sameDay2(a, b) { return a.toDateString() === b.toDateString(); }

// 1記録 ごとに「すぷらんメモ」を生成（記録一覧で表示）
function generateRecordMemo(record) {
  const dec = decomposeRecord(record);
  if (dec.detectedDistortions.length > 0) {
    const top = dec.detectedDistortions[0];
    return `${top.name}のパターンがあるかも`;
  }
  if (dec.emo.before != null && dec.emo.after != null) {
    const change = dec.emo.before - dec.emo.after;
    if (change >= 3) return '気持ちがしっかり軽くなった日';
    if (change >= 1) return 'すこし気持ちが軽くなった';
    if (change <= -1) return 'まだ少し重く感じた日かも';
  }
  return null;
}

// カレンダーすぷらんからのひとこと（曜日・気分パターンから）
function generateWeeklySuplanMessage() {
  const recent = (state.moodLogs || []).slice(-14);
  if (recent.length < 3) return 'まだ記録が少ないみたい。少しずつでだいじょうぶ。';
  const lowDays = recent.filter(m => m.moodScore <= 2).length;
  const ratio = lowDays / recent.length;
  if (ratio >= 0.5) return '直近、気分がしんどい日が多かったみたい。一歩を小さくして、自分を労わる時間を増やしてもいいかも。';
  if (ratio >= 0.3) return '気分の波が少し大きいみたい。睡眠と休息を少しだけ大事にしてみよっか。';
  if (ratio >= 0.15) return 'おだやかな日が増えてきてるね。今のペースを大事にしていこう。';
  return 'いい感じのリズムが続いてるよ。すこしずつ積み重なってる証拠だよ。';
}

// ============================================================
// モバイルキーボード対応（v0.9.6: visualViewport 駆動）
//
// 問題: iOS Safari は 100dvh がキーボード表示時に縮まらない。
//       かつ Safari の bottom toolbar の伸縮で chat-screen が
//       viewport を埋めない場合がある。
//
// 解決: position:fixed の chat-screen を visualViewport.height に
//       JS で合わせる。visualViewport.offsetTop も反映して
//       常に「見えている領域」にピッタリ重ねる。
//       これで通常時は最下端、キーボード時はキーボード直上に
//       入力欄が張り付く（LINE/標準iOS Mail と同じ挙動）。
// ============================================================
(function setupChatKeyboard() {
  const CHAT_INPUT_IDS = ['moodChatInput', 'goalChatInput'];

  function isChatInput(el) {
    return el && CHAT_INPUT_IDS.indexOf(el.id) !== -1;
  }

  // CSS変数 --chat-vh を「可視 viewport の高さ」に同期させる
  // body.in-chat-mode を付けると body 自体が position:fixed; height:--chat-vh
  // になり、入力欄が常に visualViewport の下端に張り付く
  // body.keyboard-open はキーボード表示判定。iOS の safe-area-inset-bottom が
  // キーボード表示中も home indicator 値を返してしまうため、これで上書きする。
  window.fitChatScreenToViewport = function fitChatScreenToViewport() {
    const vv = window.visualViewport;
    const h = vv ? vv.height : window.innerHeight;
    document.documentElement.style.setProperty('--chat-vh', h + 'px');
    const inChat = !!document.querySelector('.mood-chat-screen.active');
    document.documentElement.style.setProperty('--app-pad-bottom', inChat ? '0px' : '80px');
    document.body.classList.toggle('in-chat-mode', inChat);

    // visualViewport が大幅に縮んでいればキーボードが出ている (80px 超の差)
    const keyboardOpen = !!(vv && (window.innerHeight - vv.height - vv.offsetTop) > 80);
    document.body.classList.toggle('keyboard-open', keyboardOpen);

    if (inChat) {
      // CSS class が遅れて適用されるケース対策に body.style.height も直接書く
      // (iOS Safari/PWA で稀に CSS変数が即時反映されない事象の保険)
      document.body.style.height = h + 'px';
      if (window.scrollY > 0) window.scrollTo(0, 0);
    } else {
      document.body.style.height = '';
    }
  };

  // mood-chat-list の最終行を可視領域に
  function scrollMoodChatBottom() {
    const list = document.getElementById('moodChatList');
    if (!list) return;
    list.scrollTop = list.scrollHeight;
  }
  // 旧 goal-chat（document スクロール）の最終要素を可視領域に
  function scrollLegacyChatBottom() {
    const box = document.getElementById('goalChatBox');
    if (box && box.lastElementChild) {
      try { box.lastElementChild.scrollIntoView({ block: 'end', behavior: 'smooth' }); }
      catch (_) { box.lastElementChild.scrollIntoView(false); }
    }
  }

  function adjustLegacyInputForViewport() {
    // mood-chat-screen は visualViewport 駆動で対応するので除外
    if (document.querySelector('.mood-chat-screen.active')) return;
    const inputRow = document.querySelector('.input-row');
    if (!inputRow || !window.visualViewport) return;
    const vv = window.visualViewport;
    const keyboardOffset = Math.max(0, window.innerHeight - (vv.height + vv.offsetTop));
    inputRow.style.bottom = keyboardOffset + 'px';
  }

  if (window.visualViewport) {
    const onVVChange = () => {
      window.fitChatScreenToViewport();
      adjustLegacyInputForViewport();
      requestAnimationFrame(() => {
        scrollMoodChatBottom();
        scrollLegacyChatBottom();
      });
    };
    window.visualViewport.addEventListener('resize', onVVChange);
    window.visualViewport.addEventListener('scroll', onVVChange);
  }
  // visualViewport 非対応時のフォールバック
  window.addEventListener('resize', () => window.fitChatScreenToViewport());
  // 通常スクロールでも追従させる（iOS Safari address bar 伸縮対策）
  window.addEventListener('scroll', () => window.fitChatScreenToViewport(), { passive: true });

  document.addEventListener('focusin', (e) => {
    if (!isChatInput(e.target)) return;
    setTimeout(() => {
      window.fitChatScreenToViewport();
      adjustLegacyInputForViewport();
      scrollMoodChatBottom();
      scrollLegacyChatBottom();
    }, 300);
  });

  document.addEventListener('focusout', (e) => {
    if (!isChatInput(e.target)) return;
    setTimeout(() => window.fitChatScreenToViewport(), 100);
    if (document.querySelector('.mood-chat-screen.active')) return;
    const inputRow = document.querySelector('.input-row');
    if (inputRow) inputRow.style.bottom = '0';
  });
})();

function persistAIChat({ sourceType, sourceId, messages, summary }) {
  const idx = state.aiChats.findIndex(c => c.sourceType === sourceType && c.sourceId === sourceId);
  if (idx >= 0) {
    state.aiChats[idx].messages = messages;
    if (summary) state.aiChats[idx].summary = summary;
  } else {
    state.aiChats.push({
      id: uid(), sourceType, sourceId, messages,
      summary: summary || '',
      createdAt: new Date().toISOString()
    });
  }
  saveState();
}

let viewParams = {};

// ============================================================
// 「最近のきろく」カード生成（ホームと きろくタブで共通利用 / v0.9.35〜）
//   it: { kind: 'mood' | 'moyamoya' | 'ippo', t: ISO, data: {...} }
//   遷移先:
//     mood (会話あり): kiroku-chat / mood (会話なし): クリック不可
//     moyamoya: kiroku-detail（中で「レターを見る」遷移可）
//     ippo: kiroku-ippo
// ============================================================
function renderKirokuRowItem(it) {
  if (!it || !it.data) return '';
  if (it.kind === 'moyamoya') {
    const r = it.data;
    const memo = generateRecordMemo(r);
    const titleText = r.letterTitle || (r.eventText || '').slice(0, 30);
    const emoLine = `${r.emotion || ''}（${r.emotionScoreBefore}→${r.emotionScoreAfter}）`;
    return `
      <button class="kr-rec-card" data-act="kiroku-detail" data-record-id="${r.id}">
        <div class="kr-rec-meta">${formatDate(r.createdAt)} ・ もやもや整理</div>
        <div class="kr-rec-title">${escapeHtml(titleText)}</div>
        <div class="kr-rec-emo">${escapeHtml(emoLine)}</div>
        ${memo ? `<div class="kr-rec-memo">🌱 すぷらんメモ: ${escapeHtml(memo)}</div>` : ''}
      </button>
    `;
  }
  if (it.kind === 'mood') {
    const m = it.data;
    const moodObj = MOODS.find(x => x.id === m.moodScore);
    const chat = (state.aiChats || []).find(c => c.sourceType === 'mood_log' && c.sourceId === m.id);
    const hasChat = chat && (chat.messages || []).length > 1;
    return `
      <button class="kr-rec-card" ${hasChat ? `data-act="kiroku-chat" data-chat-id="${chat.id}"` : 'style="cursor:default;"'}>
        <div class="kr-rec-meta">${formatDate(m.createdAt)} ・ 気分の記録${hasChat ? ' ・ AI会話あり' : ''}</div>
        <div class="kr-rec-title">${moodObj ? moodObj.emoji + ' ' + moodObj.label : ''}</div>
        ${m.comment ? `<div class="kr-rec-emo">${escapeHtml(m.comment)}</div>` : ''}
        ${hasChat ? `<div class="kr-rec-memo">💬 タップで会話履歴を見る（${(chat.messages || []).length}件）</div>` : ''}
      </button>
    `;
  }
  if (it.kind === 'ippo') {
    const s = it.data;
    const action = (typeof ACTIONS !== 'undefined') ? ACTIONS.find(a => a.id === s.actionId) : null;
    const actionTitle = action ? `${action.icon || ''} ${action.title}` : (s.actionId || '一歩');
    const change = (typeof s.changeValue === 'number') ? s.changeValue : ((s.beforeIntensity || 0) - (s.afterIntensity || 0));
    const moodLine = `${s.moodLabel || ''}（${s.beforeIntensity ?? '-'}/10 → ${s.afterIntensity ?? '-'}/10）`;
    const memo = change > 0 ? `🌱 ${change}ポイント軽くなった` : change === 0 ? '🌱 落ち着いた状態をキープ' : '🌱 まずは行動できたのが大事だよ';
    return `
      <button class="kr-rec-card" data-act="kiroku-ippo" data-ippo-id="${s.id}">
        <div class="kr-rec-meta">${formatDate(s.completedAt)} ・ きょうのいっぽ</div>
        <div class="kr-rec-title">${escapeHtml(actionTitle)}</div>
        <div class="kr-rec-emo">${escapeHtml(moodLine)}</div>
        <div class="kr-rec-memo">${escapeHtml(memo)}</div>
      </button>
    `;
  }
  return '';
}

function viewCalendarSection() {
  const now = new Date();
  const offset = state.ui.calendarMonthOffset || 0;
  const base = new Date(now.getFullYear(), now.getMonth() + offset, 1);
  const year = base.getFullYear();
  const month = base.getMonth();
  const first = new Date(year, month, 1).getDay();
  const days = new Date(year, month+1, 0).getDate();
  const isCurrentMonth = (offset === 0);

  const moodMap = {};
  state.moodLogs.forEach(m => {
    const d = new Date(m.createdAt);
    const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if (!moodMap[k] || new Date(moodMap[k].createdAt) < d) moodMap[k] = m;
  });

  let html = `<div class="card">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;">
      <button data-act="cal-prev-month" aria-label="前の月" style="border:none; background:var(--bg-soft); width:32px; height:32px; border-radius:999px; cursor:pointer; color:var(--text);">‹</button>
      <h3 style="margin:0;">${year}年 ${month+1}月</h3>
      <button data-act="cal-next-month" aria-label="次の月" ${isCurrentMonth?'disabled style="border:none; background:transparent; width:32px; height:32px; border-radius:999px; opacity:0.25; cursor:not-allowed; color:var(--text);"':'style="border:none; background:var(--bg-soft); width:32px; height:32px; border-radius:999px; cursor:pointer; color:var(--text);"'}>›</button>
    </div>
    <div class="calendar-grid">
      ${['日','月','火','水','木','金','土'].map(d => `<div class="cal-head">${d}</div>`).join('')}
      ${Array(first).fill('<div></div>').join('')}
      ${Array.from({length:days}, (_,i) => {
        const day = i+1;
        const dateKey = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        const m = moodMap[dateKey];
        const moodObj = m ? MOODS.find(x => x.id === m.moodScore) : null;
        return `<button class="cal-cell ${m?'has-data':''}" data-act="day-detail" data-date="${dateKey}" style="border:none; cursor:pointer;">
          <div class="cal-cell-day">${day}</div>
          <div class="cal-cell-emoji">${moodObj ? moodObj.emoji : ''}</div>
        </button>`;
      }).join('')}
    </div>
  </div>`;

  // 5色凡例
  html += `<div class="text-tiny text-muted text-center" style="margin: 8px 0 14px;">
    <span style="margin-right:6px;">⛈ とてもつらい</span>
    <span style="margin-right:6px;">🌧 つらい</span>
    <span style="margin-right:6px;">☁ ふつう</span>
    <span style="margin-right:6px;">🌤 よい</span>
    <span>☀ とてもよい</span>
  </div>`;

  // すぷらんからのひとこと
  html += `
    <div class="kr-hero-card">
      <div style="width:48px; height:48px;">${suplan({ stage: 'futaba', expression: 'happy', size: 48 })}</div>
      <div>
        <div class="kr-hero-title">今週のすぷらんからのひとこと</div>
        <div class="kr-hero-msg">${escapeHtml(generateWeeklySuplanMessage())}</div>
      </div>
    </div>
  `;

  // 記録一覧（フィルタ + すぷらんメモ）
  const filter = state.ui.recordFilter || 'all';
  html += `
    <h3 class="section-title">最近のきろく</h3>
    <div class="kr-filter-row">
      <button class="kr-filter-chip ${filter==='all'?'selected':''}" data-act="record-filter" data-filter="all">すべて</button>
      <button class="kr-filter-chip ${filter==='mood'?'selected':''}" data-act="record-filter" data-filter="mood">気分</button>
      <button class="kr-filter-chip ${filter==='moyamoya'?'selected':''}" data-act="record-filter" data-filter="moyamoya">もやもや</button>
      <button class="kr-filter-chip ${filter==='ippo'?'selected':''}" data-act="record-filter" data-filter="ippo">いっぽ</button>
    </div>
  `;

  // フィルタに応じて結合
  let items = [];
  if (filter === 'all' || filter === 'mood') {
    items = items.concat((state.moodLogs || []).map(m => ({ kind: 'mood', t: m.createdAt, data: m })));
  }
  if (filter === 'all' || filter === 'moyamoya') {
    items = items.concat((state.moyamoyaRecords || []).map(r => ({ kind: 'moyamoya', t: r.createdAt, data: r })));
  }
  if (filter === 'all' || filter === 'ippo') {
    items = items.concat((state.ippoSessions || []).filter(s => s.completedAt).map(s => ({ kind: 'ippo', t: s.completedAt, data: s })));
  }
  items.sort((a, b) => new Date(b.t) - new Date(a.t));
  items = items.slice(0, 12);

  if (items.length === 0) {
    html += `<div class="card mt-3 text-center text-soft" style="padding:30px 20px;">
      まだ記録がありません。<br>ホームから「きもち」を残してみよう。
    </div>`;
  } else {
    html += items.map(renderKirokuRowItem).join('');
  }

  return html;
}

// ============================================================
function viewKirokuIppo() {
  const ippoId = viewParams.ippoId;
  const s = (state.ippoSessions || []).find(x => x.id === ippoId);
  if (!s) { setTimeout(() => go('record'), 0); return ''; }
  const action = (typeof ACTIONS !== 'undefined') ? ACTIONS.find(a => a.id === s.actionId) : null;
  const actionTitle = action ? `${action.icon || ''} ${action.title}` : (s.actionId || '一歩');
  const before = s.beforeIntensity == null ? null : s.beforeIntensity;
  const after  = s.afterIntensity  == null ? null : s.afterIntensity;
  const change = (typeof s.changeValue === 'number')
    ? s.changeValue
    : (before != null && after != null ? (before - after) : 0);
  const reactionLabel = ({
    better: 'すこし楽になった',
    same:   '変わらなかった',
    hard:   'むずかしかった'
  })[s.reaction] || (s.reaction ? String(s.reaction) : '記録なし');
  const memo = change > 0 ? `🌱 ${change}ポイント軽くなった`
              : change === 0 ? '🌱 落ち着いた状態をキープ'
              : '🌱 まずは行動できたのが大事だよ';
  const beforePos = before == null ? null : Math.max(0, Math.min(100, before * 10));
  const afterPos  = after  == null ? null : Math.max(0, Math.min(100, after  * 10));

  return `
    <div class="screen active" style="padding-bottom:40px;">
      <div class="kr-det-page-h">
        <button class="kr-det-back" data-act="back-record">‹</button>
        <span style="font-size:14px; font-weight:500;">いっぽの記録</span>
        <span style="width:36px;"></span>
      </div>
      <div style="padding: 0 16px;">
        <div class="text-tiny text-muted">${formatDate(s.completedAt || s.startedAt || s.createdAt)} ・ きょうのいっぽ</div>
        <h2 style="margin: 6px 0 4px; font-family:'Noto Serif JP', serif;">${escapeHtml(actionTitle)}</h2>
        <div class="text-small text-soft" style="margin-bottom: 14px;">
          ${escapeHtml(s.moodLabel || '')}${before != null ? `（${before}/10 → ${after != null ? after + '/10' : '-'}）` : ''}
        </div>

        <div class="kr-det-card">
          ${action && action.desc ? `
            <div class="kr-det-section">
              <div class="kr-det-section-h fact">🌱 取り組んだこと</div>
              <p>${escapeHtml(action.desc)}</p>
              ${action.technique ? `<p class="text-tiny text-muted" style="margin-top:6px;">技法: ${escapeHtml(action.technique)}${action.time ? ' / ' + escapeHtml(action.time) : ''}</p>` : ''}
            </div>
          ` : ''}

          ${before != null || after != null ? `
            <div class="kr-det-section">
              <div class="kr-det-section-h emotion">💗 気持ちの強さの変化</div>
              <p>${escapeHtml(s.moodLabel || '気持ち')}（${before != null ? before + '/10' : '-'}${after != null ? ' → ' + after + '/10' : ''}）</p>
              ${beforePos != null ? `
                <div class="kr-det-emo-bar" style="margin-top:8px;">
                  <span class="text-tiny text-muted">楽</span>
                  <div class="kr-det-emo-bar-track" style="position:relative;">
                    <div class="kr-det-emo-bar-thumb" style="left: ${beforePos}%; opacity:0.5;"></div>
                    ${afterPos != null ? `<div class="kr-det-emo-bar-thumb" style="left: ${afterPos}%; background:#5C7E60;"></div>` : ''}
                  </div>
                  <span class="text-tiny text-muted">つらい</span>
                </div>
                <p class="text-tiny text-muted" style="margin-top:6px;">うすい印 = 行動前 / 濃い印 = 行動後</p>

            <p>${escapeHtml(reactionLabel)}</p>

      </div>
    </div>

}

// ============================================================
// 思考のクセ レーダーチャート（仕様書 §6）
// ============================================================
function viewKirokuRadar() {
  const records = state.moyamoyaRecords || [];
  const distortions = analyzeDistortions(records, 28);
  // レーダー軸: 主要5パターン
  const axes = [
    distortions.find(d => d.id === 'overgeneralization') || { name: '過度な一般化', score: 0 },
    distortions.find(d => d.id === 'mind_reading')       || { name: '心の読みすぎ', score: 0 },
    distortions.find(d => d.id === 'labeling')           || { name: 'レッテル貼り', score: 0 },
    distortions.find(d => d.id === 'all_or_nothing')     || { name: '感情的決めつけ', score: 0 },
    distortions.find(d => d.id === 'should')             || { name: 'べき思考', score: 0 },
  ];

  // SVGレーダーチャート
  const cx = 150, cy = 150, R = 110;
  const N = axes.length;
  const angle = (i) => -Math.PI / 2 + (2 * Math.PI * i / N);
  const point = (i, frac) => `${cx + Math.cos(angle(i)) * R * frac},${cy + Math.sin(angle(i)) * R * frac}`;

  // 同心円（4段階）
  const grid = [0.25, 0.5, 0.75, 1].map(f => {
    const pts = Array.from({length: N}, (_, i) => point(i, f)).join(' ');
    return `<polygon points="${pts}" fill="none" stroke="var(--divider)" stroke-width="1" />`;
  }).join('');

  // 平均参考線（全部30%固定）
  const avgPts = Array.from({length: N}, (_, i) => point(i, 0.3)).join(' ');
  // ユーザーデータ
  const userPts = axes.map((a, i) => point(i, Math.min(1, a.score / 100))).join(' ');
  // 軸線
  const axisLines = Array.from({length: N}, (_, i) => `<line x1="${cx}" y1="${cy}" x2="${point(i, 1).split(',')[0]}" y2="${point(i, 1).split(',')[1]}" stroke="var(--divider)" stroke-width="1" />`).join('');
  // ラベル
  const labels = axes.map((a, i) => {
    const lp = point(i, 1.18).split(',');
    return `<text x="${lp[0]}" y="${lp[1]}" text-anchor="middle" font-size="11" fill="var(--text)" alignment-baseline="middle">${a.name}</text>`;
  }).join('');
  // ラベル下の状態
  const subLabels = axes.map((a, i) => {
    const lp = point(i, 1.32).split(',');
    const lvl = distortionLabel(a.score || 0);
    return `<text x="${lp[0]}" y="${lp[1]}" text-anchor="middle" font-size="10" fill="${lvl.color}">${lvl.label}</text>`;
  }).join('');

  return `
    <div class="screen active" style="padding-bottom:40px;">
      <div class="kr-det-page-h">
        <button class="kr-det-back" data-act="open-trend">‹</button>
        <span style="font-size:14px; font-weight:500;">思考のクセのバランス</span>
        <span style="width:36px;"></span>
      </div>
      <div style="padding: 0 16px;">
        <div class="kr-radar-legend">
          <div class="kr-radar-legend-item"><span class="kr-radar-legend-dot" style="background:#D77B5B;"></span>あなた</div>
          <div class="kr-radar-legend-item"><span class="kr-radar-legend-dot" style="background:var(--text-muted);"></span>平均</div>
        </div>
        <div class="kr-radar-wrap">
          <svg viewBox="0 0 300 320" style="width:100%; height:auto;" aria-label="思考のクセのバランス">
            ${grid}
            ${axisLines}
            <polygon points="${avgPts}" fill="rgba(120,120,120,0.08)" stroke="var(--text-muted)" stroke-width="1" stroke-dasharray="4 3" />
            <polygon points="${userPts}" fill="rgba(215,123,91,0.18)" stroke="#D77B5B" stroke-width="1.5" />
            ${axes.map((a, i) => {
              const p = point(i, Math.min(1, a.score / 100)).split(',');
              return `<circle cx="${p[0]}" cy="${p[1]}" r="3" fill="#D77B5B" />`;
            }).join('')}
            ${labels}
            ${subLabels}
          </svg>
        </div>

        <div class="ippo-do-card" style="margin-top: 14px;">
          <div style="margin: 0 auto 6px;">${suplan({ stage: 'futaba', expression: 'calm', size: 48 })}</div>
          <p style="margin: 4px 0; font-size: 13px; line-height: 1.85;">
            バランスを知ることで、もっと自分をラクにしてあげようね。<br>
            強く出ているクセほど、ちょっとしたきっかけで気づきやすいよ。
          </p>
        </div>

        <div style="display:grid; gap: 10px; margin-top: 18px;">
          <button class="btn btn-primary" data-act="open-action">行動のヒントを見る</button>
          <button class="btn-ghost" data-act="open-trend">‹ 推移に戻る</button>
        </div>
      </div>
    </div>
  `;
}

// ============================================================
// AI分析レポート: 気分グラフ用 ヘルパー関数群
// ============================================================
// moodScore (1-5) → 0-10 に変換
function moodScoreTo10(s) {
  if (s == null) return null;
  return ((s - 1) / 4) * 10;
}

// 日ごとのトピックスを生成（カテゴリ・コメントから推測）
function topicForMoodLog(m) {
  if (!m) return '-';
  if (m.comment && m.comment.length > 0) return m.comment.slice(0, 14);
  const cats = (m.categories || []).map(id => (CATEGORIES.find(c => c.id === id) || {}).name).filter(Boolean);
  if (cats.length > 0) return cats[0];
  if (m.moodScore >= 4) return 'いい感じ';
  if (m.moodScore <= 2) return 'モヤモヤした';
  return 'ふつうの日';
}

// 日付別: 直近 N 日（既定7日）の平均気分
function computeMoodByDate(logs, days = 7) {
  const points = [];
  const labels = [];
  const today = new Date();
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(today.getFullYear(), today.getMonth(), today.getDate() - i);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const sameDay = logs.filter(m => {
      const md = new Date(m.createdAt);
      return md.getFullYear() === d.getFullYear() && md.getMonth() === d.getMonth() && md.getDate() === d.getDate();
    });
    const avg = sameDay.length > 0 ? sameDay.reduce((s, m) => s + moodScoreTo10(m.moodScore), 0) / sameDay.length : null;
    const moodScoreAvg = sameDay.length > 0 ? sameDay.reduce((s, m) => s + m.moodScore, 0) / sameDay.length : null;
    const last = sameDay[sameDay.length - 1];
    const wd = ['日','月','火','水','木','金','土'][d.getDay()];
    labels.push(`${d.getMonth()+1}/${d.getDate()}\n${wd}`);
    points.push({
      key,
      value: avg,
      moodScore: moodScoreAvg,
      mood: last ? last.moodScore : null,
      topic: last ? topicForMoodLog(last) : null,
      isToday: i === 0,
    });
  }
  return { points, labels };
}

// 時間帯別: 4時間刻み 6バケット
function computeMoodByHour(logs) {
  const buckets = [
    { id: 0, label: '深夜（0時〜3時）',   icon: '🌙', range: [0, 4],   note: '休息の時間帯です' },
    { id: 1, label: '朝（4時〜9時）',     icon: '🌅', range: [4, 10],  note: '気分が上がりやすい時間帯です' },
    { id: 2, label: '昼（10時〜15時）',   icon: '☀️', range: [10, 16], note: '気分が安定しやすい時間帯です' },
    { id: 3, label: '夕方（16時〜19時）', icon: '🌇', range: [16, 20], note: '少し気分が下がりやすい時間帯です' },
    { id: 4, label: '夜（20時〜23時）',   icon: '🌃', range: [20, 24], note: '気分が下がりやすい時間帯です' },
  ];
  buckets.forEach(b => { b.values = []; b.recent = null; });
  logs.forEach(m => {
    const h = new Date(m.createdAt).getHours();
    const b = buckets.find(x => h >= x.range[0] && h < x.range[1]);
    if (b) {
      b.values.push(moodScoreTo10(m.moodScore));
      if (!b.recent || new Date(m.createdAt) > new Date(b.recent.createdAt)) b.recent = m;
    }
  });
  buckets.forEach(b => {
    b.value = b.values.length > 0 ? b.values.reduce((s, v) => s + v, 0) / b.values.length : null;
    b.topic = b.recent ? topicForMoodLog(b.recent) : null;
  });
  // ラインチャート用
  const labels = ['0時','4時','8時','12時','16時','20時','24時'];
  const points = [];
  for (let i = 0; i < 7; i++) {
    if (i === 0) points.push({ value: buckets[0].value, topic: buckets[0].topic });
    else if (i === 6) points.push({ value: buckets[0].value, topic: buckets[0].topic });
    else points.push({ value: buckets[i-1].value, topic: buckets[i-1].topic });
  }
  return { points, labels, buckets };
}

// 曜日別: 月-日 7曜日の平均気分
function computeMoodByWeekday(logs) {
  // 月始まり: 月,火,水,木,金,土,日 (index 0..6)
  const labels = ['月','火','水','木','金','土','日'];
  const buckets = labels.map(() => ({ values: [], topics: {}, recent: null }));
  logs.forEach(m => {
    const d = new Date(m.createdAt);
    const idx = (d.getDay() + 6) % 7; // 月=0
    const b = buckets[idx];
    b.values.push(moodScoreTo10(m.moodScore));
    const t = topicForMoodLog(m);
    b.topics[t] = (b.topics[t] || 0) + 1;
    if (!b.recent || new Date(m.createdAt) > new Date(b.recent.createdAt)) b.recent = m;
  });
  const points = buckets.map(b => {
    const value = b.values.length > 0 ? b.values.reduce((s, v) => s + v, 0) / b.values.length : null;
    const topic = b.recent ? topicForMoodLog(b.recent) : null;
    return { value, topic };
  });
  return { points, labels };
}

// シンプル ライン折れ線チャート
function renderLineChart(points, labels) {
  const W = 320, H = 180, padX = 28, padY = 18;
  const innerW = W - padX * 2;
  const innerH = H - padY * 2;
  const N = points.length;
  const x = (i) => padX + (innerW * (i / Math.max(1, N - 1)));
  const y = (v) => padY + innerH - (innerH * (Math.max(0, Math.min(10, v)) / 10));

  // y軸グリッド (0,5,10)
  const gridLines = [0, 5, 10].map(v => `
    <line x1="${padX}" x2="${W - padX}" y1="${y(v)}" y2="${y(v)}" stroke="var(--divider)" stroke-width="1" stroke-dasharray="3 3" />
    <text x="${padX - 4}" y="${y(v) + 3}" text-anchor="end" font-size="9" fill="var(--text-muted)">${v}</text>
  `).join('');

  // パス（null は飛ばす）
  let pathD = '';
  let started = false;
  points.forEach((p, i) => {
    if (p.value == null) { started = false; return; }
    if (!started) { pathD += `M ${x(i)} ${y(p.value)}`; started = true; }
    else { pathD += ` L ${x(i)} ${y(p.value)}`; }
  });

  // ドット + 値ラベル
  const dots = points.map((p, i) => {
    if (p.value == null) return '';
    const cx = x(i), cy = y(p.value);
    const color = p.value >= 7 ? '#7BA876' : p.value >= 4 ? '#D4A867' : '#B57272';
    return `<circle cx="${cx}" cy="${cy}" r="3.5" fill="${color}" stroke="#fff" stroke-width="1.5" />`;
  }).join('');

  // x軸ラベル
  const xLabels = labels.map((lab, i) => {
    const lines = String(lab).split('\n');
    return lines.map((l, li) => `
      <text x="${x(i)}" y="${H - padY + 12 + li * 10}" text-anchor="middle" font-size="9" fill="var(--text-muted)">${escapeHtml(l)}</text>
    `).join('');
  }).join('');

  return `
    <div class="kr-graph-svg-wrap">
      <svg viewBox="0 0 ${W} ${H + 14}" preserveAspectRatio="xMidYMid meet" style="width:100%; height:auto;">
        ${gridLines}
        <path d="${pathD}" fill="none" stroke="#7BA876" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        ${dots}
        ${xLabels}
      </svg>
    </div>
  `;
}

// シンプル 棒グラフ（曜日別）
function renderBarChart(points, labels) {
  const W = 320, H = 180, padX = 28, padY = 18;
  const innerW = W - padX * 2;
  const innerH = H - padY * 2;
  const N = points.length;
  const slot = innerW / N;
  const barW = Math.min(28, slot * 0.55);

  const yBase = padY + innerH;
  const y = (v) => padY + innerH - (innerH * (Math.max(0, Math.min(10, v)) / 10));

  const gridLines = [0, 5, 10].map(v => `
    <line x1="${padX}" x2="${W - padX}" y1="${y(v)}" y2="${y(v)}" stroke="var(--divider)" stroke-width="1" stroke-dasharray="3 3" />
    <text x="${padX - 4}" y="${y(v) + 3}" text-anchor="end" font-size="9" fill="var(--text-muted)">${v}</text>
  `).join('');

  const bars = points.map((p, i) => {
    if (p.value == null) return '';
    const cx = padX + slot * i + slot / 2;
    const top = y(p.value);
    const color = p.value >= 7 ? '#7BA876' : p.value >= 4 ? '#D4A867' : '#B57272';
    return `<rect x="${cx - barW/2}" y="${top}" width="${barW}" height="${yBase - top}" fill="${color}" rx="3" />`;
  }).join('');

  const xLabels = labels.map((lab, i) => `
    <text x="${padX + slot * i + slot / 2}" y="${H - padY + 12}" text-anchor="middle" font-size="10" fill="var(--text-muted)">${escapeHtml(lab)}</text>
  `).join('');

  return `
    <div class="kr-graph-svg-wrap">
      <svg viewBox="0 0 ${W} ${H + 14}" preserveAspectRatio="xMidYMid meet" style="width:100%; height:auto;">
        ${gridLines}
        ${bars}
        ${xLabels}
      </svg>
    </div>
  `;
}

function weekdayBg(i) {
  // 月-日
  const colors = ['#E8F0E2', '#F5E8C8', '#E2EFE8', '#E8E2F0', '#FCE8D6', '#DDE8F0', '#F0DDE8'];
  return colors[i] || '#EEE';
}
function weekdayFg(i) {
  const colors = ['#5C7E60', '#A37D2C', '#5C7E60', '#7B5CA0', '#B07F2F', '#5C7898', '#A0567C'];
  return colors[i] || '#444';
}

// すぷらん ひとこと（タブごと）
function generateGraphSuplanMessage(tab, data) {
  const valid = (data.points || []).filter(p => p.value != null);
  if (valid.length === 0) return '記録がたまってくると、ここにすぷらんからのひとことが表示されるよ。';
  const avg = valid.reduce((s, p) => s + p.value, 0) / valid.length;

  if (tab === 'date') {
    const lows = (data.points || []).filter(p => p.value != null && p.value < 4);
    const highs = (data.points || []).filter(p => p.value != null && p.value >= 7);
    if (lows.length >= 2 && highs.length === 0) {
      return 'ここ最近は気分が落ち込みやすい日が続いているみたい。\n小さなセルフケアを大切にしようね。';
    }
    if (highs.length >= 2 && lows.length === 0) {
      return 'いい感じの日が続いてるみたい。\nこのリズムを大切に、無理しない範囲で続けてみよう。';
    }
    return '気分には波があるのが自然なこと。\n上がる日も下がる日も、そっと書きとめておくのが大事だよ。';
  }
  if (tab === 'hour') {
    const sorted = (data.buckets || []).filter(b => b.value != null).sort((a, b) => b.value - a.value);
    if (sorted.length === 0) return '記録がたまってくると、時間帯ごとの傾向が見えてくるよ。';
    const top = sorted[0];
    const bottom = sorted[sorted.length - 1];
    return `あなたは${top.label.split('（')[0]}に気分が上がりやすくて、\n${bottom.label.split('（')[0]}は少し下がりやすいみたいだよ。`;
  }
  if (tab === 'weekday') {
    const wdLabels = ['月','火','水','木','金','土','日'];
    const valued = (data.points || []).map((p, i) => ({ ...p, label: wdLabels[i] })).filter(p => p.value != null);
    if (valued.length === 0) return '曜日ごとの記録がたまると、傾向が見えてくるよ。';
    const sorted = [...valued].sort((a, b) => b.value - a.value);
    const top = sorted[0], bottom = sorted[sorted.length - 1];
    return `あなたは${top.label}曜日に気分が上がりやすく、\n${bottom.label}曜日は少しゆっくり休む時間にしてみよう。`;
  }
  return '';
}

// 傾向まとめ メッセージ
function generateGraphTrendSummary(tab, logs) {
  if (!logs || logs.length < 3) return null;
  if (tab === 'date') {
    return '気分が上がった日は、好きな香りや音楽など\n「リラックスする行動」をしていることが多いよ';
  }
  if (tab === 'hour') {
    return '夜のモヤモヤ対策に、「お風呂に入る」「深呼吸する」などの\nリラックス行動が役立っているよ';
  }
  if (tab === 'weekday') {
    return '平日の中で調子が上がりやすい日と下がりやすい日があるみたい！\n下がる日は「休む日」として、自分をいたわってあげてね';
  }
  return null;
}
