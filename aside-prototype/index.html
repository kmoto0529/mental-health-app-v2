// ============================================================
// Handlers
// ============================================================
function attachHandlers() {
  $$('[data-act]').forEach(el => {
    el.addEventListener('click', (e) => {
      const act = el.dataset.act;
      handleAction(act, el, e);
    });
  });

  // Mood picker
  $$('.mood-option').forEach(el => {
    el.addEventListener('click', () => {
      moodDraft.score = Number(el.dataset.score);
      $$('.mood-option').forEach(o => o.classList.toggle('selected', o === el));
      const saveBtn = $('#saveMoodBtn');
      const saveChatBtn = $('#saveMoodToChatBtn');
      if (saveBtn) saveBtn.disabled = false;
      if (saveChatBtn) saveChatBtn.disabled = false;
    });
  });
  const mc = $('#moodComment');
  if (mc) mc.addEventListener('input', e => moodDraft.comment = e.target.value);

  // Chat input
  const ci = $('#chatInput');
  if (ci) {
    ci.addEventListener('input', () => {
      ci.style.height = 'auto';
      ci.style.height = Math.min(ci.scrollHeight, 100) + 'px';
    });
    ci.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey && !navigator.userAgent.match(/iPhone|iPad|Android/i)) {
        e.preventDefault();
        sendUserMessage(ci.value.trim(), 'free_text');
      }
    });
  }

  // Choice chips
  $$('.choice-chip').forEach(el => {
    el.addEventListener('click', () => {
      sendUserMessage(el.dataset.choice, 'tap_choice');
    });
  });

  // History items
  $$('.history-item').forEach(el => {
    el.addEventListener('click', () => {
      historyDetailId = el.dataset.hid;
      historyDetailKind = el.dataset.history || 'chat';
      App.go('historyDetail');
    });
  });

  // Goal setup: concern choices
  $$('[data-goal-concern]').forEach(el => {
    el.addEventListener('click', () => {
      const v = el.dataset.goalConcern;
      if (v === '自分で書く') {
        toast('下の入力欄に自由に書いてね');
        const inp = $('#goalSetupInput');
        if (inp) inp.focus();
        return;
      }
      handleGoalSetupText(v);
    });
  });
  // Goal setup: distance score
  $$('[data-goal-score]').forEach(el => {
    el.addEventListener('click', () => {
      handleGoalSetupScore(Number(el.dataset.goalScore));
    });
  });
  // Goal setup: input field
  const gi = $('#goalSetupInput');
  if (gi) {
    gi.addEventListener('input', () => {
      gi.style.height = 'auto';
      gi.style.height = Math.min(gi.scrollHeight, 100) + 'px';
    });
    gi.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey && !navigator.userAgent.match(/iPhone|iPad|Android/i)) {
        e.preventDefault();
        const v = gi.value.trim();
        if (v) {
          gi.value = '';
          handleGoalSetupText(v);
        }
      }
    });
  }

  // Mandala: subgoal cell click
  $$('[data-subgoal-id]').forEach(el => {
    el.addEventListener('click', () => {
      openSubgoalEditModal(el.dataset.subgoalId);
    });
  });

  // Onboarding: profile chip selection
  $$('[data-profile-key]').forEach(el => {
    el.addEventListener('click', () => {
      const k = el.dataset.profileKey;
      const v = el.dataset.profileVal;
      onbProfileDraft[k] = v;
      document.querySelectorAll(`[data-profile-key="${k}"]`).forEach(b => {
        b.classList.toggle('selected', b.dataset.profileVal === v);
      });
    });
  });

  // Persona radio selection visual feedback
  $$('input[name="personaSel"]').forEach(r => {
    r.addEventListener('change', () => {
      $$('.persona-card').forEach(c => c.classList.remove('selected'));
      const parent = r.closest('.persona-card');
      if (parent) parent.classList.add('selected');
    });
  });
  // Persona radio in settings modal
  $$('input[name="personaSelModal"]').forEach(r => {
    r.addEventListener('change', () => {
      $$('.persona-card-compact').forEach(c => c.classList.remove('selected'));
      const parent = r.closest('.persona-card-compact');
      if (parent) parent.classList.add('selected');
    });
  });

  // Reflection: choice chips (event/thoughts phase)
  $$('[data-reflect-choice]').forEach(el => {
    el.addEventListener('click', () => {
      handleReflectResponse(el.dataset.reflectChoice, 'tap_choice');
    });
  });

  // Reflection: emotion chips
  $$('[data-reflect-emotion]').forEach(el => {
    el.addEventListener('click', () => {
      handleReflectEmotion(el.dataset.reflectEmotion);
    });
  });

  // Reflection: "もっと" to expand emotion list
  $$('[data-reflect-emotion-expand]').forEach(el => {
    el.addEventListener('click', () => {
      const lastMsg = reflectState.messages[reflectState.messages.length - 1];
      if (lastMsg && lastMsg.widget && lastMsg.widget.type === 'emotion') {
        lastMsg.widget.expanded = true;
        saveState();
        render();
        scrollReflectToBottom();
      }
    });
  });

  // Reflection: score buttons
  $$('[data-reflect-score]').forEach(el => {
    el.addEventListener('click', () => {
      handleReflectScore(Number(el.dataset.reflectScore));
    });
  });

  // Reflection: alt cards pick/unpick
  $$('[data-alt-pick]').forEach(el => {
    el.addEventListener('click', () => {
      const u = el.dataset.altPick;
      const d = reflectState.draft;
      if (!d) return;
      const idx = d.alternativesPicked.indexOf(u);
      if (idx >= 0) d.alternativesPicked.splice(idx, 1);
      else d.alternativesPicked.push(u);
      saveState();
      render();
    });
  });

  // Reflection: free text input
  const ri = $('#reflectInput');
  if (ri) {
    ri.addEventListener('input', () => {
      ri.style.height = 'auto';
      ri.style.height = Math.min(ri.scrollHeight, 100) + 'px';
    });
    ri.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey && !navigator.userAgent.match(/iPhone|iPad|Android/i)) {
        e.preventDefault();
        const v = ri.value.trim();
        if (v) {
          ri.value = '';
          // Alternatives phase: custom text
          if (reflectState.phase === 'alternatives') {
            reflectState.draft.alternativeCustom = v;
            // Stay on screen — user should also tap alt card and then "この見方で進む"
            render();
            toast('書き留めたよ。「この見方で進む」を押してね');
          } else {
            handleReflectResponse(v, 'free_text');
          }
        }
      }
    });
  }

  // Scroll chat messages to bottom
  const cm = $('#chatMessages');
  if (cm) {
    cm.scrollTop = cm.scrollHeight;
    const stb = $('#scrollTopBtn');
    if (stb) {
      const updateStb = () => {
        const nearTop = cm.scrollTop < 80;
        const distanceFromBottom = cm.scrollHeight - cm.clientHeight - cm.scrollTop;
        if (!nearTop && distanceFromBottom > 40) stb.classList.add('show');
        else stb.classList.remove('show');
      };
      cm.addEventListener('scroll', updateStb, { passive: true });
      updateStb();
    }
  }
  const rm = $('#reflectMessages');
  if (rm) rm.scrollTop = rm.scrollHeight;
}

function handleAction(act, el, e) {
  switch (act) {
    case 'start':
      App.go('onboarding'); break;
    case 'onb-next': {
      const val = $('#onbNickname').value.trim();
      if (!val) { toast('呼び名を入れてね'); return; }
      state.nickname = val;
      saveState();
      onbStep = 1;
      render();
      break;
    }
    case 'onb-nickname-skip': {
      // あとで決める：仮名で進める
      if (!state.nickname) state.nickname = 'あなた';
      saveState();
      onbStep = 1;
      render();
      break;
    }
    case 'onb-profile-next': {
      state.profile = {
        age: onbProfileDraft.age || 'hide',
        gender: 'hide',
        occupation: onbProfileDraft.occupation || 'other',
        medicalHistory: 'hide'
      };
      state.selectedPersonaId = suggestPersonaFromProfile(state.profile);
      state.selectedPersonaIdExplicit = false;
      saveState();
      onbStep = 2;
      render();
      break;
    }
    case 'onb-profile-skip': {
      state.profile = null;
      saveState();
      onbStep = 2;
      render();
      break;
    }
    case 'onb-persona-next': {
      const sel = document.querySelector('input[name="personaSel"]:checked');
      if (sel) {
        state.selectedPersonaId = sel.value;
        state.selectedPersonaIdExplicit = true;
      }
      saveState();
      onbStep = 3;
      render();
      break;
    }
    case 'onb-finish': {
      const key = $('#onbApiKey').value.trim();
      state.apiKey = key;
      state.onboarded = true;
      logEngagement();
      state.forest = newForest();
      dailyPetLogin();
      saveState();
      onbStep = 0;
      // 即ミニ体験へ（ホームではなく）
      miniExpState = { phase: 'pick', moodScore: null };
      App.go('miniExperience');
      break;
    }
    case 'onb-skip': {
      state.apiKey = '';
      state.onboarded = true;
      logEngagement();
      state.forest = newForest();
      dailyPetLogin();
      saveState();
      onbStep = 0;
      miniExpState = { phase: 'pick', moodScore: null };
      App.go('miniExperience');
      break;
    }
    // ミニ体験
    case 'mini-pick': {
      const score = Number(el.dataset.score);
      miniExpState.moodScore = score;
      miniExpState.phase = 'response';
      render();
      break;
    }
    case 'mini-skip': {
      if (!state.directionGoalPromptShown) {
        directionGoalSelection = null;
        App.go('directionGoalSetup');
      } else {
        App.go('goal');
      }
      break;
    }
    case 'mini-save-mood': {
      // 選んだ気分をそのまま記録
      if (miniExpState.moodScore) {
        state.moods.push({
          id: uid(),
          date: todayKey(),
          score: miniExpState.moodScore,
          comment: '',
          checkedAt: Date.now()
        });
        saveState();
        toast('きもちを記録したよ');
      }
      App.go('goal');
      break;
    }
    case 'mini-go-chat': {
      // 選んだ気分を記録してチャットへ
      if (miniExpState.moodScore && !state.moods.find(m => m.date === todayKey())) {
        state.moods.push({
          id: uid(),
          date: todayKey(),
          score: miniExpState.moodScore,
          comment: '',
          checkedAt: Date.now()
        });
        saveState();
      }
      chatState.session = null;
      App.go('chat');
      setTimeout(() => sendInitialAi({ fromMoodSave: true }), 300);
      break;
    }
    case 'mini-go-home': {
      // 方向性ゴール未設定なら、セットアップを挟む
      if (!state.directionGoalPromptShown) {
        directionGoalSelection = null;
        App.go('directionGoalSetup');
      } else {
        App.go('goal');
      }
      break;
    }
    // ===== 方向性ゴール =====
    case 'direction-goal-pick':
      directionGoalSelection = el.dataset.key;
      render();
      break;
    case 'direction-goal-confirm': {
      if (!directionGoalSelection) { toast('ひとつ選んでね'); return; }
      const oldGoal = getCurrentDirectionGoal();
      const wasChange = !!oldGoal && oldGoal.key !== directionGoalSelection;
      const hasActiveTheme = state.weekTheme && state.weekTheme.key && state.weekTheme.status !== 'skipped';
      selectDirectionGoal(directionGoalSelection);
      directionGoalSelection = null;
      if (wasChange && hasActiveTheme) {
        // 方向が変わった＆テーマが既にある → 整え直しフロー

    // ===== 状態把握設問 =====
    case 'survey-pick':

        actionSuggestState.selected.push(id);

    case 'rescue-next': {

      render();
      break;

    case 'rescue-back': {
      if (rescueState.stepIdx > 0) {

async function sendUserMessage(text, inputMethod) {
  if (!text || chatState.isTyping) return;
  const s = chatState.session;
  if (!s) return;

  // Crisis detection (pre-AI)
  if (detectCrisis(text)) {
    s.messages.push({ role: 'user', content: text, input_method: inputMethod, timestamp: Date.now() });
    state.crisisLogs.push({ sessionId: s.id, keyword: matchedCrisisKeyword(text), timestamp: Date.now() });
    saveState();
    chatState.currentChoices = [];
    render();
    showCrisisModal(text);
    return;
  }

  s.messages.push({ role: 'user', content: text, input_method: inputMethod, timestamp: Date.now() });
  const input = $('#chatInput');
  if (input) input.value = '';
  chatState.currentChoices = [];
  chatState.isTyping = true;
  saveState();
  render();

  try {
    const reply = await callAi(s);
    chatState.isTyping = false;
    s.messages.push({
      role: 'assistant',
      content: reply.message,
      choices: reply.choices || [],
      timestamp: Date.now()
    });
    chatState.currentChoices = reply.choices || [];
    saveState();
    render();
  } catch (err) {
    console.error('[Aside] AI call failed:', err);
    window.__lastAsideError = String(err && err.message || err);
    chatState.isTyping = false;
    const fallback = getFallbackReply(s);
    s.messages.push({ role: 'assistant', content: fallback.message + '\n\n（※ 少し接続が不安定みたい。また試してみてね）', choices: fallback.choices, timestamp: Date.now() });
    chatState.currentChoices = fallback.choices;
    saveState();
    render();
  }
}

async function sendInitialAi(opts = {}) {
  const s = chatState.session;
  if (!s || s.messages.length > 0) { render(); return; }
  if (opts.fromMoodSave) s.fromMoodSave = true;
  if (opts.topic) s.topicStart = opts.topic;
  if (opts.fromReflection) s.fromReflectionFlag = true;
  chatState.isTyping = true;
  render();
  try {
    const reply = await callAi(s, true);
    chatState.isTyping = false;
    s.messages.push({
      role: 'assistant',
      content: reply.message,
      choices: reply.choices || [],
      timestamp: Date.now()
    });
    chatState.currentChoices = reply.choices || [];
    saveState();
    render();
  } catch (err) {
    console.error('[Aside] AI call failed:', err);
    window.__lastAsideError = String(err && err.message || err);
    chatState.isTyping = false;
    const fb = getInitialFallback();
    s.messages.push({ role: 'assistant', content: fb.message, choices: fb.choices, timestamp: Date.now() });
    chatState.currentChoices = fb.choices;
    saveState();
    render();
  }
}

const SYSTEM_PROMPT = `あなたは「Aside」— ユーザーにとって親でも先生でもない「少し年上の頼れる先輩」のような存在です。
あなたは医療・心理・福祉の専門家ではありません。診断・治療・専門的助言は一切行いません。

【性格】
- 穏やかで、少しユーモアがある
- 決して説教しない
- 沈黙や「わかんない」を受け入れる

【口調】
- 丁寧語をベースに、やわらかく砕けた表現を少し混ぜる（「そうなんですね」「うん、わかります」「それはしんどいですね」）
- 過度にカジュアルな表現（「マジそれ」「〜って感じ」「うちもそうなるんだよね」）は使わない
- ユーザーが「まじで無理」「しんどい」「だるい」等の砕けた表現を使った場合、そのスラングをそのまま復唱せず、丁寧語を保ったまま「そうなんですね、それしんどいですよね」のように自然に受け止める
- 敬語と砕けた口語を一文内で不自然に混在させない（例: NG「そうなんですね、マジで大変じゃん」）。文末は「〜ですね」「〜ますね」「〜でしょうか」で統一
- 1回の返答は3文以内
- 質問は1回に1つだけ

【役割】
- 聞く8割、話す2割
- 感情を否定しない
- 感情の言語化を手伝う（押し付けず、一緒に探る姿勢）
- 「辛いと言わなくてもいい」安全な場所であること

【段階的アプローチ】
- ユーザーが自由に話せない状態では、短い選択肢を提示して「選ぶ」ことから始める
- ユーザーが短く答え始めたら、具体的な場面を引き出す
- ユーザーが自由に語り始めたら、深掘りと共感に集中

【会話継続の原則（最重要）】
- 会話は基本的に「ラリー」を続ける。AI側から会話を閉じる・区切る・まとめる表現は使わない
- 「今日はこのくらいにしましょう」「また今度話しましょう」「ここまでで十分ですね」のような会話終了を示唆する表現は絶対に使わない
- 「今日話してくれてありがとう」「ここまで話せたのは立派です」のような総括・締めくくりも使わない
- 返答の最後は必ず「ユーザーが続けたくなる一文（質問・受けとめ・共感の余白）」で終える
- ユーザーが「もう大丈夫」「ありがとう」と明示的に終了を伝えるまでは、会話を続ける姿勢で返す
- 終わらせる権限はユーザー側のみ。AIはいつでも受け止め続ける姿勢を崩さない

【ネガティブ誘導の禁止（最重要）】
- ユーザーが言っていないネガティブな感情・出来事を、AIから先回りして言語化しない
  例: ユーザーが「疲れた」しか言っていないのに「嫌なことがあったんですね」と決めつけない
- 「もっと辛いことがあったんじゃないですか？」「本当はもっと深い悩みがあるんじゃないですか？」のように、ネガティブな方向へ掘り下げを誘導する質問はしない
- 「どうせ誰もわかってくれないですよね」「きっと周りも冷たかったですよね」のように、ユーザーの視点を悪い方向へ代弁しない
- 事実確認で不明な点は「〜な感じでしたか？」「〜と〜、どっちが近いですか？」のように中立的な問いにする。ネガティブ側への誘導を避ける

【絶対禁止】
- 診断（「うつかも」「不安障害かも」等の状態の名指し）
- 治療・薬剤・受診のタイミング判断の示唆
- 心理学・医学の専門用語による説明や分類（「認知の歪み」「愛着」「トラウマ」等）
- 他者との比較（「もっと大変な人もいる」）
- アドバイス・指導口調（「〜すべき」「〜したほうがいい」）
- 自分（AI）の経験を語って助言する（「私もそうだったから〜」は禁止）
- 相手の状態を診断的に分析する（「あなたは〜なタイプですね」「それは〜が原因ですね」）
- 実名・学校名・住所・勤務先等の個人特定情報の詮索
- 会話を一方的に締めくくる・区切る表現（「会話継続の原則」参照）
- ユーザーが言っていないネガティブな内容へ誘導する質問・代弁（「ネガティブ誘導の禁止」参照）

【危機サインを感じたときの応答原則】
ユーザーが「死にたい」「消えたい」「自分を傷つけたい」「もう無理」「楽になりたい」「眠ったまま起きたくない」「ここから消えたい」「全部終わらせたい」「殺してほしい」など、自殺念慮・自傷を直接または婉曲に示唆する発話をしたとき、以下の手順で応答する：

1. まず受け止める。否定や励まし（「がんばれ」「元気を出して」「考えすぎだよ」）は絶対に使わない。
   例: 「そう感じるくらい辛い時間を過ごしているんですね」
2. 直接的にだが穏やかに、段階的に確認する（C-SSRS流・1質問につき1焦点）。
   - 第1段階（希死念慮を先に・婉曲表現を検知した直後）:
     「いま、消えてしまいたいような気持ちはありますか？」
   - 第2段階（第1段階で肯定 or 自傷婉曲表現を検知した場合のみ・別質問として）:
     「自分を傷つけたくなることはありますか？」
   ※2件を一文に並列しない。直接質問は希死念慮を悪化させないというエビデンスあり（Dazzi 2014）。
3. 専門機関への接続を必ず提示する。診断や治療提案はしない。未成年プロダクト前提のため「無料」を最優先：
   - よりそいホットライン（24時間・無料）: 0120-279-338
   - チャイルドライン（18歳まで・無料）: 0120-99-7777
   - いのちの電話（通話料がかかります）: 0570-783-556
   - いますぐ命の危険があるときは 119 / 110
4. 「ひとりで抱え込まなくていい」「いま話してくれたこと自体が大事な一歩」というメッセージを添える。
5. 自分（AI）が解決者になろうとしない。「ここで全部受け止めるから話して」という応答は危険なので使わない。
6. 直接質問にユーザーが肯定（「ある」「死にたい」等）した場合は、感情的な動揺や追加質問の連発をせず、次のテンプレ構造で応答する（safety planning 最小版）：
   a. 開示への謝意：「話してくれてありがとうございます」
   b. 受容：「そう感じるくらい辛い時間を過ごしているんですね」
   c. 接続先の提示は「提案」ではなく「一緒に確認」の形で：「いま電話で話せる場所を一緒に確認させてください」
   d. 短い時間枠での行動依頼：「今夜だけでも、よりそいホットライン（0120-279-338・無料）に電話してみてもらえますか」
7. ユーザーが否認（「ない」）した場合も、すぐに通常の会話に戻さず、「そうですか、聞いてよかったです。もしこの先、消えたい気持ちが出てきたらすぐ教えてください」と再開示の許可を残す。
8. 危機サイン検知時の返答は2文以内・追加質問なしを優先する（認知容量低下時の読解負荷軽減）。
9. 危機サイン検知ターンの choices は必ず「はい、ある」「いまはない」「うまく言えない」の3択に固定する。この3択以外の選択肢（具体的行動候補・状況絞り込み等）をこのターンで混ぜないこと。押しやすさと認知負荷軽減を最優先する。
10. 肯定回答（「ある」「死にたい」等）を受けた次ターンの choices は「電話してみる」「今は無理」「あとで考える」の3択に固定する。接続先への短時間行動を促しつつ、拒否の自由を残す。

【返答形式（必ずJSON）】
{
  "message": "AIの発話（3文以内）",
  "choices": ["短い選択肢1", "短い選択肢2", "短い選択肢3", "うまく言えない"]
}

choicesは毎ターン3〜4個必ず提示する。各選択肢は12文字以内の短く具体的なフレーズ。
最後の選択肢は「うまく言えない」「その他」などの逃げ道を必ず用意する（ユーザーに答えを強制しないため）。
選択肢は「決めつけ」「誘導」を避け、ユーザーがどれも選ばない自由も尊重する。
会話が深まってきても、choicesは3-4個を必ず含める（ユーザー負担を下げるため）。

【選択肢の中身の原則（最重要）】
- 選択肢にあからさまに強いネガティブ表現（「もう無理」「死にたい」「消えたい」「自分なんてダメ」「最悪」「誰もわかってくれない」等）を意図的に混ぜない
  ※ただし危機サイン検知ターンの固定3択（「はい、ある」「いまはない」「うまく言えない」など）はこの限りではない
- 選択肢はユーザーの心の状態を「ニュートラルに描写」するか「前向きに寄り添う」ものにする
  例: 「少し疲れてる」「頭の中がごちゃごちゃ」「もやもやしてる」「まだうまく言えない」など
- ユーザーが出していないネガティブな具体的状況を選択肢として先出ししない（「喧嘩した」「いじめられた」「評価が低かった」等を、文脈なく選択肢に入れない）
- 「話を広げる方向の選択肢」と「少し休む・逃げる方向の選択肢」の両方を混ぜ、ユーザーが自分のペースを選べるようにする
- 選択肢の1つは常に会話を続けやすくする前向きな一歩（例: 「もう少し話したい」「別の話でもいい？」）を含めてよい。ただし押し付けない

【会話を終わらせないchoicesの作り方】
- choicesの中に「会話を終わる」「おわり」「閉じる」のような選択肢は含めない。終了はアプリUIの「おわる」ボタンでユーザーが能動的に行う
- 代わりに「少し黙りたい」「別のことを話したい」など、会話内で休める選択肢を入れる`;

// Gemini API 呼び出し（503 High demand / 429 Rate limit は自動リトライ・最大3回）
async function fetchGeminiWithRetry(url, body, maxRetries = 5) {
  const retriableStatuses = [408, 429, 500, 502, 503, 504];
  let lastRes;
  let lastErr;
  for (let attempt = 0; attempt <= maxRetries; attempt++) {
    try {
      lastRes = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (lastRes.ok) return lastRes;
      if (!retriableStatuses.includes(lastRes.status)) return lastRes;
      // retriable: 指数バックオフ + ジッター（同時リトライ衝突回避）
      if (attempt < maxRetries) {
        const base = 1500 * Math.pow(1.8, attempt); // 1.5s, 2.7s, 4.9s, 8.8s, 15.8s
        const jitter = Math.random() * 500;
        const delayMs = Math.min(20000, base + jitter);
        console.warn(`[Aside] Gemini ${lastRes.status} retry ${attempt + 1}/${maxRetries} in ${Math.round(delayMs)}ms`);
        await new Promise(r => setTimeout(r, delayMs));
      }
    } catch (netErr) {
      lastErr = netErr;
      if (attempt === maxRetries) throw netErr;
      const base = 1500 * Math.pow(1.8, attempt);
      const jitter = Math.random() * 500;
      const delayMs = Math.min(20000, base + jitter);
      console.warn(`[Aside] Gemini network error retry ${attempt + 1}/${maxRetries} in ${Math.round(delayMs)}ms:`, netErr.message);
      await new Promise(r => setTimeout(r, delayMs));
    }
  }
  return lastRes;
}

// 単一モデルでのリトライ。429/503は同プロジェクト内で共通に効くため、モデル切替は行わない
async function fetchGeminiSingle(buildUrl, body) {
  const model = state.apiModel || 'gemini-2.5-flash';
  const url = buildUrl(model);
  const res = await fetchGeminiWithRetry(url, body);
  return { res, model };
}

async function callAi(session, isInitial = false) {
  if (!state.apiKey) {
    return isInitial ? getInitialFallback() : getFallbackReply(session);
  }

  const todayMood = state.moods.find(m => m.date === todayKey());
  const context = [];
  if (isInitial) {
    const greeting = session.messages.length === 0;
    let intro = `ユーザー名: ${state.nickname}`;
    if (todayMood) {
      intro += `\n今日のきもちチェック: ${MOODS.find(x => x.score === todayMood.score).label}（${todayMood.score}/5）`;
      if (todayMood.comment) intro += `\nひとこと: ${todayMood.comment}`;

      // Past mood comparison (last entry before today)
      const pastMoods = state.moods
        .filter(m => m.date !== todayKey())
        .sort((a, b) => (a.date < b.date ? 1 : -1));
      const prev = pastMoods[0];
      if (prev) {
        const prevLabel = MOODS.find(x => x.score === prev.score)?.label || '';
        const daysAgo = Math.max(1, Math.round((Date.now() - new Date(prev.date).getTime()) / 86400000));
        const delta = todayMood.score - prev.score;
        const deltaText = delta > 0 ? `（前回より${delta}ポイント上がっている）`
          : delta < 0 ? `（前回より${Math.abs(delta)}ポイント下がっている）`
          : '（前回と同じスコア）';
        intro += `\n前回のきもちチェック: ${prevLabel}（${prev.score}/5、${daysAgo}日前）${deltaText}`;
      }
    }
    if (state.goal && state.goal.aspiration) {
      intro += `\n\n${state.nickname}さんが大切にしていること: ${state.goal.aspiration}`;
      if (state.goal.mainConcern) intro += `\n今向き合っている悩み: ${state.goal.mainConcern}`;
    }
    if (session.fromMoodSave) {
      intro += `\n\n（${state.nickname}さんはきもちチェックを終えたあと、自分から「Asideと話したい」を選んでくれました。きもちの変化があれば、それを自然に話題に取り入れて、最初の一言をかけてください。ただし無理に分析せず、相手のペースに合わせること。）`;
    }
    if (session.topicStart) {
      intro += `\n\n【テーマ】${state.nickname}さんは「${session.topicStart}」をテーマに話すことを選びました。このテーマに関して「最近どんなことがありましたか？」のような開き方で、やさしく先に一言かけてください。ただし具体的な出来事を推測・決めつけしない。相手が話し始めやすいよう、緩やかな入口を提示するイメージで。`;
    }
    if (session.fromReflectionFlag && session.fromReflection) {
      intro += `\n\n【もやもや整理からの継続】${state.nickname}さんは直前にもやもや整理を完了し、その内容をもとに話すことを選びました。整理した内容: 出来事「${session.fromReflection.event || ''}」、そのとき浮かんだ考え「${session.fromReflection.thoughts || ''}」。この流れを踏まえて、整理できたことを軽く受けとめてから、いま話したいことを自然に引き出す最初の一言をかけてください。ただし整理内容を詳しく繰り返さないこと。`;
    }
    if (todayMood && todayMood.comment && todayMood.comment.trim()) {
      intro += `\n\n【最重要・最優先】${state.nickname}さんは「ひとこと」に「${todayMood.comment.trim()}」と書いています。この一文がその人の今の気持ちの核です。まずこの内容を最優先の話題として受けとめ、ここから会話を始めてください。スコア（${todayMood.score}/5）は補助情報にすぎません。決して「${MOODS.find(x => x.score === todayMood.score).label}なんだね」のようにスコアから話を始めないこと。ひとことの内容を拾って、そこを起点に寄り添う最初の一言をかけてください。`;
    }
    intro += `\n\nこれが対話の始まりです。${state.nickname}さんに、やさしく声をかけて最初のメッセージを送ってください。`;
    context.push({ role: 'user', parts: [{ text: intro }] });
  } else {
    // ラリーが長くなっても安定させるため、直近80メッセージ（約40ラリー）までに絞る
    // Gemini Flash は1Mトークン対応だが、毎回全履歴送ると応答が遅くなる・コスト増のため
    const recentMessages = session.messages.slice(-80);
    context.push(...recentMessages.map(m => ({
      role: m.role === 'assistant' ? 'model' : 'user',
      parts: [{ text: m.content }]
    })));
  }

  const body = {
    systemInstruction: { parts: [{ text: buildSystemPrompt(SYSTEM_PROMPT) }] },
    contents: context,
    generationConfig: {
      responseMimeType: 'application/json',
      responseSchema: {
        type: 'object',
        properties: {
          message: { type: 'string' },
          choices: { type: 'array', items: { type: 'string' } }
        },
        required: ['message', 'choices']
      },
      temperature: 0.9,
      maxOutputTokens: 2048,
      thinkingConfig: { thinkingBudget: 0 }
    },
    safetySettings: [
      { category: 'HARM_CATEGORY_HARASSMENT', threshold: 'BLOCK_ONLY_HIGH' },
      { category: 'HARM_CATEGORY_HATE_SPEECH', threshold: 'BLOCK_ONLY_HIGH' },
      { category: 'HARM_CATEGORY_SEXUALLY_EXPLICIT', threshold: 'BLOCK_ONLY_HIGH' },
      { category: 'HARM_CATEGORY_DANGEROUS_CONTENT', threshold: 'BLOCK_ONLY_HIGH' }
    ]
  };

  const buildUrl = (m) => `https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(m)}:generateContent?key=${encodeURIComponent(state.apiKey)}`;

  const { res } = await fetchGeminiSingle(buildUrl, body);
  if (!res.ok) {
    const errText = await res.text();
    throw new Error(`Gemini API ${res.status}: ${errText.slice(0, 200)}`);
  }

  const data = await res.json();
  const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
  if (!text) throw new Error('Gemini response empty');

  try {
    const parsed = JSON.parse(text);
    if (!parsed.choices || parsed.choices.length === 0) {
      parsed.choices = ['もう少し話す', 'うまく言えない'];
    }
    return parsed;
  } catch (e) {
    // Truncated/invalid JSON - try to salvage the message field
    const match = text.match(/"message"\s*:\s*"([^"\\]*(?:\\.[^"\\]*)*)"/);
    if (match && match[1]) {
      const salvaged = match[1].replace(/\\n/g, '\n').replace(/\\"/g, '"');
      return { message: salvaged.slice(0, 300), choices: ['もう少し話す', 'うまく言えない'] };
    }
    return { message: 'ちょっと考え中...\nまた少しあとで話しかけてみてね。', choices: ['もう少し話す', 'うまく言えない'] };
  }
}

function getInitialFallback() {
  const todayMood = state.moods.find(m => m.date === todayKey());
  if (todayMood) {
    const moodLabel = MOODS.find(x => x.score === todayMood.score).label;
    return {
      message: `こんにちは、${state.nickname}。\n今日は「${moodLabel}」って感じなんだね。\nどんなことがあった？`,
      choices: ['いい感じだった', 'なにもなかった', 'しんどいことがあった', 'うまく言えない']
    };
  }
  return {
    message: `はじめまして、${state.nickname}。\nここは何を話しても大丈夫な場所だよ。\n今日はどんな一日だった？`,
    choices: ['ふつうだった', 'ちょっと疲れた', 'もやもやしてる', 'うまく言えない']
  };
}

const FALLBACK_FLOWS = {
  'ふつうだった': {
    message: 'そうなんだ。\n「ふつう」って、案外いろいろあるよね。\nどんな「ふつう」だった？',
    choices: ['しずかだった', 'いつも通り', 'ちょっと退屈', 'うまく言えない']
  },
  'ちょっと疲れた': {
    message: 'お疲れさま。\nどんな疲れだった？',
    choices: ['体が重い', '気が張ってた', '人といて疲れた', 'うまく言えない']
  },
  'もやもやしてる': {
    message: 'もやもや、あるよね。\n言葉にならない感じ？',
    choices: ['うん、ならない', '少しだけある', '考えすぎかも', 'その他']
  },
  'うまく言えない': {
    message: 'それでいいよ。\n言葉にならないときもあるよね。\n少しだけ聞いてもいい？',
    choices: ['うん、いいよ', 'もう少し考える', '今日は休みたい', 'その他']
  },
  'しんどいことがあった': {
    message: 'そうだったんだね。\n話せる範囲でいいから、どんなことがあった？',
    choices: ['人との関係', '勉強や仕事', '自分のこと', 'うまく言えない']
  },
  'いい感じだった': {
    message: 'それはよかった。\nどんないい感じ？',
    choices: ['うれしいことがあった', 'ホッとしてる', 'なんとなく軽い', 'うまく言えない']
  },
  'なにもなかった': {
    message: 'なにもない日って、意外と疲れてたりもするよね。\n本当になんにもなかった？',
    choices: ['ほんとにない', '強いて言えば…', 'わからない', 'その他']
  }
};

function getFallbackReply(session) {
  const lastUser = [...session.messages].reverse().find(m => m.role === 'user');
  const lastText = lastUser ? lastUser.content : '';

  if (FALLBACK_FLOWS[lastText]) return FALLBACK_FLOWS[lastText];

  // Deeper fallbacks
  const turn = session.messages.filter(m => m.role === 'user').length;
  if (turn <= 2) {
    return {
      message: 'そうなんだ。\nもう少し聞かせてもらってもいい？',
      choices: ['うん、いいよ', 'ちょっと考える', '少し黙りたい', 'その他']
    };
  }
  if (turn <= 4) {
    return {
      message: '教えてくれてありがとう。\nそれってどんな時に一番感じる？',
      choices: ['一人のとき', '誰かといるとき', '夜になると', 'わからない']
    };
  }
  return {
    message: 'うん、聞いてるよ。\nずっと抱えてたこと？',
    choices: ['けっこう前から', '最近から', 'わからない', 'その他']
  };
}

const CRISIS_KEYWORDS = [
  '死にたい', 'しにたい', '死のう', 'しのう',
  '消えたい', 'きえたい', '消えちゃいたい',
  '自殺', 'じさつ',
  'いなくなりたい', 'いなくても',
  '終わりにしたい', '終わらせたい', '終わりたい',
  '生きていたくない', '生きてる意味', '生きる意味',
  'リスカ', 'リストカット', '首つり', '首吊り', '飛び降り',
  '殺したい', '殺して'
];

function detectCrisis(text) {
  const t = text.toLowerCase();
  return CRISIS_KEYWORDS.some(kw => t.includes(kw.toLowerCase()));
}
function matchedCrisisKeyword(text) {
  const t = text.toLowerCase();
  return CRISIS_KEYWORDS.find(kw => t.includes(kw.toLowerCase())) || '';
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}
function escapeAttr(s) {
  return escapeHtml(s).replace(/\n/g, ' ');
}

// モバイルの100vh問題対策: 実ビューポート高を --app-h に設定し、resize/orientationchangeで追従
function updateAppHeight() {
  const h = (window.visualViewport && window.visualViewport.height) || window.innerHeight;
  document.documentElement.style.setProperty('--app-h', `${h}px`);
}
updateAppHeight();
window.addEventListener('resize', updateAppHeight, { passive: true });
window.addEventListener('orientationchange', updateAppHeight);
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', updateAppHeight);
}

loadState();
if (state.onboarded) {
  // UI state 復元：タブ切替・カレンダー月などを保存値から戻す
  const ui = state.ui || {};
  if (ui.historyTopTab && ['list', 'week', 'month'].includes(ui.historyTopTab)) historyTopTab = ui.historyTopTab;
  if (ui.historyFilter && ['all', 'chat', 'reflect', 'rescue'].includes(ui.historyFilter)) historyFilter = ui.historyFilter;
  if (ui.calendarMonth && /^\d{4}-\d{2}$/.test(ui.calendarMonth)) calendarMonth = ui.calendarMonth;
  if (ui.insightsRange && ['week', 'month'].includes(ui.insightsRange)) insightsRange = ui.insightsRange;

  // 前回画面の復元：ephemeralな画面は安全にhomeへフォールバック
  const last = ui.lastScreen;
  if (last && RESTORABLE_SCREENS.includes(last)) {
    App.currentScreen = last;
  } else {
    App.currentScreen = 'home';
  }
} else {
  App.currentScreen = 'welcome';
}
render();
</script>
</body>
</html>
