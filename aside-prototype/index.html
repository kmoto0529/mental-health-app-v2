<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Aside — 認知行動療法アプリ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Noto+Serif+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FAF6F0;
  --bg-card: #FFFFFF;
  --bg-soft: #F3EDE3;
  --bg-warm: #EFE5D6;
  --text: #3D342A;
  --text-soft: #8B7F70;
  --text-muted: #B3A896;
  --accent: #C68B5E;
  --accent-soft: #E8D5C0;
  --accent-deep: #9E6B40;
  --sage: #8FA68C;
  --sage-soft: #D7E0D2;
  --danger: #C85450;
  --divider: rgba(61, 52, 42, 0.08);
  --shadow-soft: 0 2px 12px rgba(61, 52, 42, 0.05);
  --shadow-card: 0 4px 20px rgba(61, 52, 42, 0.08);
  --shadow-lift: 0 8px 28px rgba(61, 52, 42, 0.12);
  --r-sm: 12px;
  --r-md: 18px;
  --r-lg: 24px;
  --r-xl: 32px;
  --ease: cubic-bezier(0.22, 0.61, 0.36, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body { height: 100%; }

body {
  font-family: 'Zen Kaku Gothic New', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 16px;
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}

#app {
  width: 100%;
  max-width: 420px;
  min-height: 100vh;
  margin: 0 auto;
  background: var(--bg);
  position: relative;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
}

@media (min-width: 421px) {
  body { padding: 20px 0; background: linear-gradient(180deg, #F5EDE1, #EDE3D2); }
  #app { min-height: calc(100vh - 40px); border-radius: 32px; box-shadow: 0 20px 60px rgba(61,52,42,.15); overflow: hidden; }
}

.screen {
  display: none;
  flex-direction: column;
  flex: 1;
  min-height: 100vh;
  animation: fadeIn .35s var(--ease);
}
@media (min-width: 421px) { .screen { min-height: calc(100vh - 40px); } }
.screen.active { display: flex; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

/* ---------- Welcome ---------- */
.welcome {
  background: linear-gradient(180deg, #FAF6F0 0%, #EFE5D6 100%);
  padding: 80px 32px 48px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
.welcome-brand {
  font-family: 'Noto Serif JP', serif;
  font-size: 36px;
  letter-spacing: 0.02em;
  color: var(--accent-deep);
  font-weight: 500;
}
.welcome-sub {
  font-size: 13px;
  color: var(--text-soft);
  margin-top: 4px;
  letter-spacing: 0.08em;
}
.welcome-hero {
  margin-top: 64px;
  font-family: 'Noto Serif JP', serif;
  font-size: 26px;
  line-height: 1.7;
  color: var(--text);
  letter-spacing: 0.01em;
}
.welcome-hero em {
  font-style: normal;
  color: var(--accent);
  border-bottom: 2px solid var(--accent-soft);
  padding-bottom: 2px;
}
.welcome-desc {
  margin-top: 28px;
  color: var(--text-soft);
  font-size: 14.5px;
  line-height: 1.8;
}
.welcome-visual {
  margin: 48px auto 24px;
  width: 140px;
  height: 140px;
  position: relative;
}
.welcome-blob {
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 35% 35%, var(--accent-soft), var(--bg-warm) 70%);
  border-radius: 50%;
  animation: breathe 5s var(--ease) infinite;
}
.welcome-blob::after {
  content: '';
  position: absolute;
  inset: 20%;
  background: radial-gradient(circle at 40% 40%, #fff, var(--accent-soft));
  border-radius: 50%;
  opacity: 0.7;
}
@keyframes breathe {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

/* ---------- Buttons ---------- */
.btn {
  appearance: none;
  border: none;
  cursor: pointer;
  font-family: inherit;
  font-size: 16px;
  font-weight: 500;
  padding: 16px 28px;
  border-radius: 999px;
  transition: transform .2s var(--ease), box-shadow .2s var(--ease), background .2s var(--ease);
  letter-spacing: 0.02em;
}
.btn:active { transform: scale(0.97); }
.btn-primary {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 4px 16px rgba(198, 139, 94, 0.3);
  width: 100%;
}
.btn-primary:hover { background: var(--accent-deep); }
.btn-secondary {
  background: var(--bg-card);
  color: var(--text);
  border: 1px solid var(--divider);
  width: 100%;
}
.btn-ghost {
  background: transparent;
  color: var(--text-soft);
  font-size: 14px;
  padding: 12px;
}
.btn-danger {
  background: transparent;
  color: var(--danger);
  border: 1px solid var(--danger);
  width: 100%;
}

/* ---------- Onboarding ---------- */
.onb {
  padding: 60px 28px 32px;
  display: flex;
  flex-direction: column;
  flex: 1;
}
.onb-step {
  font-size: 12px;
  color: var(--text-muted);
  letter-spacing: 0.1em;
  margin-bottom: 16px;
}
.onb-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 24px;
  line-height: 1.6;
  margin-bottom: 12px;
}
.onb-hint {
  color: var(--text-soft);
  font-size: 14px;
  line-height: 1.8;
  margin-bottom: 36px;
}
.input {
  width: 100%;
  padding: 18px 20px;
  background: var(--bg-card);
  border: 1px solid var(--divider);
  border-radius: var(--r-md);
  font-family: inherit;
  font-size: 17px;
  color: var(--text);
  transition: border-color .2s var(--ease), box-shadow .2s var(--ease);
  outline: none;
}
.input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.input-hint {
  margin-top: 8px;
  font-size: 12px;
  color: var(--text-muted);
  padding-left: 4px;
}
.onb-footer {
  margin-top: auto;
  padding-top: 24px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* ---------- Home ---------- */
.home-header {
  padding: 32px 24px 16px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.home-greet {
  font-family: 'Noto Serif JP', serif;
  font-size: 20px;
  letter-spacing: 0.01em;
}
.home-greet-sub {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 4px;
}
.home-settings-btn {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: var(--bg-card);
  border: none;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--text-soft);
}

.home-content {
  padding: 16px 20px 120px;
  flex: 1;
  overflow-y: auto;
}

.mood-strip {
  display: flex;
  gap: 6px;
  padding: 16px 20px;
  margin: 0 -20px 20px;
  overflow-x: auto;
  scrollbar-width: none;
}
.mood-strip::-webkit-scrollbar { display: none; }
.mood-strip-item {
  flex-shrink: 0;
  width: 46px;
  text-align: center;
}
.mood-strip-dot {
  width: 46px; height: 46px;
  border-radius: 50%;
  background: var(--bg-card);
  border: 1px solid var(--divider);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  margin: 0 auto 6px;
}
.mood-strip-dot.active { background: var(--accent-soft); border-color: var(--accent); }
.mood-strip-dot.today {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
  box-shadow: 0 4px 12px rgba(198,139,94,.3);
}
.mood-strip-date {
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.05em;
}

.card {
  background: var(--bg-card);
  border-radius: var(--r-lg);
  padding: 24px;
  box-shadow: var(--shadow-soft);
  margin-bottom: 16px;
}
.card-title {
  font-size: 13px;
  color: var(--text-soft);
  letter-spacing: 0.08em;
  margin-bottom: 8px;
}
.card-body {
  font-size: 17px;
  line-height: 1.7;
}
.card-action {
  margin-top: 16px;
}

.cta-big {
  background: linear-gradient(135deg, #F0E0CB, #E8D5C0);
  border-radius: var(--r-xl);
  padding: 28px 24px;
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  transition: transform .2s var(--ease);
}
.cta-big:active { transform: scale(0.98); }
.cta-big::before {
  content: '';
  position: absolute;
  right: -40px; top: -40px;
  width: 160px; height: 160px;
  background: radial-gradient(circle, rgba(255,255,255,0.5), transparent);
  border-radius: 50%;
}
.cta-big-label {
  font-size: 12px;
  color: var(--accent-deep);
  letter-spacing: 0.1em;
  margin-bottom: 6px;
  position: relative;
}
.cta-big-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 22px;
  color: var(--text);
  line-height: 1.5;
  position: relative;
}
.cta-big-sub {
  margin-top: 6px;
  font-size: 13px;
  color: var(--text-soft);
  position: relative;
}

.today-card {
  background: var(--bg-card);
  border-radius: var(--r-lg);
  padding: 20px 24px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 16px;
  box-shadow: var(--shadow-soft);
}
.today-emoji { font-size: 36px; }
.today-text { flex: 1; }
.today-label {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.1em;
  margin-bottom: 2px;
}
.today-comment {
  font-size: 14px;
  color: var(--text);
  line-height: 1.5;
}

/* ---------- Bottom Nav ---------- */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 420px;
  background: rgba(250, 246, 240, 0.92);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-top: 1px solid var(--divider);
  padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
  display: flex;
  justify-content: space-around;
  z-index: 100;
}
@media (min-width: 421px) {
  .bottom-nav { position: absolute; border-radius: 0 0 32px 32px; }
}
.nav-btn {
  flex: 1;
  background: none;
  border: none;
  padding: 10px;
  cursor: pointer;
  color: var(--text-muted);
  font-family: inherit;
  font-size: 10px;
  letter-spacing: 0.05em;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  transition: color .2s;
}
.nav-btn.active { color: var(--accent); }
.nav-btn svg { width: 22px; height: 22px; }

/* ---------- Mood Check ---------- */
.mood-screen {
  padding: 40px 28px 32px;
  display: flex;
  flex-direction: column;
  flex: 1;
}
.mood-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 26px;
  line-height: 1.5;
  margin-bottom: 8px;
}
.mood-sub {
  font-size: 14px;
  color: var(--text-soft);
  margin-bottom: 40px;
}
.mood-picker {
  display: flex;
  justify-content: space-between;
  gap: 8px;
  padding: 16px 0 32px;
}
.mood-option {
  flex: 1;
  aspect-ratio: 1;
  background: var(--bg-card);
  border: 2px solid transparent;
  border-radius: var(--r-md);
  font-size: 32px;
  cursor: pointer;
  transition: all .2s var(--ease);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 4px;
  box-shadow: var(--shadow-soft);
}
.mood-option:active { transform: scale(0.94); }
.mood-option.selected {
  background: var(--accent-soft);
  border-color: var(--accent);
  box-shadow: 0 4px 16px rgba(198,139,94,.2);
}
.mood-option-label {
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.05em;
}
.mood-option.selected .mood-option-label { color: var(--accent-deep); }

.mood-comment-label {
  font-size: 13px;
  color: var(--text-soft);
  margin-bottom: 8px;
  margin-top: 16px;
}
.mood-comment {
  width: 100%;
  padding: 16px;
  background: var(--bg-card);
  border: 1px solid var(--divider);
  border-radius: var(--r-md);
  font-family: inherit;
  font-size: 15px;
  resize: none;
  outline: none;
}
.mood-comment:focus { border-color: var(--accent); }

.mood-footer {
  margin-top: auto;
  padding-top: 24px;
}

/* ---------- Chat ---------- */
.chat-screen {
  display: flex;
  flex-direction: column;
  height: 100vh;
}
@media (min-width: 421px) { .chat-screen { height: calc(100vh - 40px); } }

.chat-header {
  display: flex;
  align-items: center;
  padding: 16px 20px;
  border-bottom: 1px solid var(--divider);
  background: rgba(250, 246, 240, 0.92);
  backdrop-filter: blur(12px);
  gap: 12px;
}
.chat-back {
  width: 36px; height: 36px;
  border: none;
  background: var(--bg-soft);
  border-radius: 50%;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-soft);
}
.chat-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, var(--p-accent, var(--accent-soft)), var(--p-color, var(--accent)));
  position: relative;
  flex-shrink: 0;
}
.chat-avatar::after {
  content: '';
  position: absolute;
  inset: 25%;
  background: radial-gradient(circle at 40% 40%, #fff, var(--accent-soft));
  border-radius: 50%;
  opacity: 0.6;
}
.chat-title {
  flex: 1;
}
.chat-name {
  font-family: 'Noto Serif JP', serif;
  font-size: 17px;
  line-height: 1.2;
}
.chat-status {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.05em;
}
.chat-end {
  background: none;
  border: none;
  font-family: inherit;
  font-size: 12px;
  color: var(--text-soft);
  cursor: pointer;
  padding: 8px;
}

.goal-context-pill {
  margin: 0 16px 8px;
  padding: 8px 12px;
  background: var(--bg-soft);
  border-radius: 10px;
  font-size: 11px;
  color: var(--text-soft);
  line-height: 1.5;
  border: 1px solid var(--accent-soft);
}
.goal-context-pill .goal-context-label {
  color: var(--accent-deep, var(--accent));
  font-weight: 500;
  margin-right: 6px;
  letter-spacing: 0.04em;
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.msg-group {
  display: flex;
  gap: 10px;
  align-items: flex-end;
  animation: slideUp .35s var(--ease);
}
@keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

.msg-group.user { justify-content: flex-end; }
.msg-avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, var(--p-accent, var(--accent-soft)), var(--p-color, var(--accent)));
  flex-shrink: 0;
  position: relative;
  margin-bottom: 4px;
}
.msg-avatar::after {
  content: '';
  position: absolute;
  inset: 25%;
  background: radial-gradient(circle at 40% 40%, #fff, var(--accent-soft));
  border-radius: 50%;
  opacity: 0.6;
}

.msg-bubble {
  max-width: 78%;
  padding: 14px 18px;
  line-height: 1.7;
  font-size: 15px;
  word-wrap: break-word;
  position: relative;
}
.msg-bubble.ai {
  background: var(--bg-card);
  border-radius: 4px 20px 20px 20px;
  color: var(--text);
  box-shadow: var(--shadow-soft);
  border: 1px solid rgba(61, 52, 42, 0.04);
}
.msg-bubble.user {
  background: var(--accent);
  color: #fff;
  border-radius: 20px 20px 4px 20px;
}

.typing {
  display: inline-flex;
  gap: 4px;
  padding: 4px 0;
}
.typing span {
  width: 6px; height: 6px;
  background: var(--text-muted);
  border-radius: 50%;
  animation: typing 1.2s infinite ease-in-out;
}
.typing span:nth-child(2) { animation-delay: .15s; }
.typing span:nth-child(3) { animation-delay: .3s; }
@keyframes typing {
  0%, 60%, 100% { transform: scale(0.8); opacity: 0.4; }
  30% { transform: scale(1.2); opacity: 1; }
}

.choices {
  padding: 6px 16px 0 54px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  animation: slideUp .45s var(--ease);
}
.choice-chip {
  background: var(--bg-card);
  border: 1.5px solid var(--accent-soft);
  color: var(--accent-deep);
  padding: 10px 16px;
  border-radius: 999px;
  font-family: inherit;
  font-size: 14px;
  cursor: pointer;
  transition: all .2s var(--ease);
  font-weight: 500;
}
.choice-chip:active { transform: scale(0.95); }
.choice-chip:hover { background: var(--accent-soft); }
.choice-chip.other {
  background: transparent;
  border-color: var(--divider);
  color: var(--text-soft);
}

.chat-input-area {
  padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
  background: rgba(250, 246, 240, 0.92);
  backdrop-filter: blur(12px);
  border-top: 1px solid var(--divider);
}
.chat-input-hint {
  text-align: center;
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 6px;
  letter-spacing: 0.05em;
}
.chat-input-row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
  background: var(--bg-card);
  border-radius: var(--r-lg);
  padding: 8px 8px 8px 16px;
  border: 1px solid var(--divider);
}
.chat-input {
  flex: 1;
  border: none;
  background: none;
  font-family: inherit;
  font-size: 15px;
  color: var(--text);
  resize: none;
  outline: none;
  line-height: 1.5;
  max-height: 100px;
  padding: 8px 0;
}
.chat-input::placeholder { color: var(--text-muted); }
.chat-icon-btn {
  width: 40px; height: 40px;
  border: none;
  background: var(--bg-soft);
  border-radius: 50%;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-soft);
  flex-shrink: 0;
}
.chat-icon-btn.send { background: var(--accent); color: #fff; }
.chat-icon-btn.send:disabled { background: var(--text-muted); opacity: .5; }

/* ---------- History ---------- */
.page-header {
  padding: 32px 24px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.page-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 24px;
}
.history-list {
  padding: 8px 20px 120px;
}
.history-item {
  background: var(--bg-card);
  border-radius: var(--r-lg);
  padding: 18px 20px;
  margin-bottom: 12px;
  cursor: pointer;
  box-shadow: var(--shadow-soft);
  transition: transform .15s var(--ease);
}
.history-item:active { transform: scale(0.98); }
.history-date {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.08em;
  margin-bottom: 6px;
}
.history-preview {
  font-size: 14px;
  line-height: 1.6;
  color: var(--text);
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
.history-meta {
  margin-top: 10px;
  font-size: 11px;
  color: var(--text-muted);
  display: flex;
  gap: 12px;
}

.empty {
  text-align: center;
  padding: 80px 20px;
  color: var(--text-muted);
}
.empty-emoji { font-size: 40px; margin-bottom: 16px; opacity: 0.6; }
.empty-text { font-size: 14px; line-height: 1.8; }

/* ---------- Settings ---------- */
.settings-list { padding: 8px 20px 120px; }
.setting-group {
  background: var(--bg-card);
  border-radius: var(--r-lg);
  overflow: hidden;
  margin-bottom: 16px;
  box-shadow: var(--shadow-soft);
}
.setting-group-title {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.1em;
  padding: 16px 20px 6px;
  text-transform: uppercase;
}
.setting-row {
  padding: 14px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--divider);
  cursor: pointer;
}
.setting-row:last-child { border-bottom: none; }
.setting-label { font-size: 15px; }
.setting-value {
  font-size: 13px;
  color: var(--text-soft);
  max-width: 180px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ---------- Modal ---------- */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(61, 52, 42, 0.4);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: fadeIn .25s var(--ease);
}
.modal-backdrop.open { display: flex; }
.modal {
  background: var(--bg-card);
  border-radius: var(--r-xl);
  padding: 28px;
  max-width: 380px;
  width: 100%;
  box-shadow: var(--shadow-lift);
  animation: modalIn .3s var(--ease);
}
@keyframes modalIn {
  from { opacity: 0; transform: scale(.95) translateY(10px); }
  to { opacity: 1; transform: none; }
}
.modal-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 20px;
  margin-bottom: 12px;
}
.modal-body {
  font-size: 14px;
  line-height: 1.8;
  color: var(--text-soft);
  margin-bottom: 20px;
}
.modal-body textarea, .modal-body input {
  width: 100%;
  margin-top: 12px;
}
.modal-actions {
  display: flex;
  gap: 10px;
  flex-direction: column;
}

/* ---------- Crisis ---------- */
.crisis-modal {
  background: var(--bg-card);
  border-radius: var(--r-xl);
  padding: 28px 24px;
  max-width: 380px;
  width: 100%;
  border-top: 6px solid var(--danger);
}
.crisis-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 20px;
  margin-bottom: 8px;
  color: var(--text);
}
.crisis-msg {
  font-size: 14px;
  line-height: 1.8;
  color: var(--text);
  margin-bottom: 20px;
}
.crisis-hotlines {
  background: var(--bg-soft);
  border-radius: var(--r-md);
  padding: 16px;
  margin-bottom: 16px;
}
.hotline {
  padding: 12px 0;
  border-bottom: 1px solid var(--divider);
}
.hotline:last-child { border-bottom: none; }
.hotline-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
}
.hotline-num {
  display: block;
  margin-top: 4px;
  font-size: 17px;
  color: var(--accent-deep);
  text-decoration: none;
  font-weight: 500;
  letter-spacing: 0.02em;
}
.hotline-hours {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 2px;
}

/* ---------- Toast ---------- */
.toast {
  position: fixed;
  top: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(-80px);
  background: var(--text);
  color: #fff;
  padding: 12px 20px;
  border-radius: 999px;
  font-size: 13px;
  box-shadow: var(--shadow-lift);
  transition: transform .3s var(--ease);
  z-index: 300;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ---------- Utility ---------- */
.spacer { flex: 1; }
.text-center { text-align: center; }
.mt-16 { margin-top: 16px; }
.mt-24 { margin-top: 24px; }
.hidden { display: none !important; }

/* ---------- Reflection Flow ---------- */
.reflect-screen {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 100vh;
}
@media (min-width: 421px) { .reflect-screen { min-height: calc(100vh - 40px); } }

.reflect-header {
  padding: 20px 20px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.reflect-header-title {
  flex: 1;
  font-family: 'Noto Serif JP', serif;
  font-size: 18px;
}
.reflect-header-step {
  font-size: 12px;
  color: var(--text-muted);
  letter-spacing: 0.1em;
}

.reflect-progress {
  display: flex;
  gap: 6px;
  padding: 0 20px 20px;
}
.reflect-dot {
  flex: 1;
  height: 4px;
  background: var(--divider);
  border-radius: 2px;
  transition: background .3s var(--ease);
}
.reflect-dot.done { background: var(--accent); }
.reflect-dot.current { background: var(--accent); opacity: 0.5; }

.reflect-body {
  flex: 1;
  overflow-y: auto;
  padding: 0 24px 24px;
}

.reflect-prompt {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  margin-bottom: 24px;
}
.reflect-prompt .msg-avatar { width: 36px; height: 36px; }
.reflect-prompt-body {
  flex: 1;
}
.reflect-prompt-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 22px;
  line-height: 1.5;
  margin-bottom: 4px;
}
.reflect-prompt-sub {
  font-size: 13.5px;
  color: var(--text-soft);
  line-height: 1.7;
}

.reflect-textarea {
  width: 100%;
  padding: 16px 18px;
  background: var(--bg-card);
  border: 1px solid var(--divider);
  border-radius: var(--r-md);
  font-family: inherit;
  font-size: 15px;
  color: var(--text);
  resize: vertical;
  min-height: 120px;
  outline: none;
  line-height: 1.7;
}
.reflect-textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

.reflect-hints {
  margin-top: 14px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.reflect-hint {
  background: var(--bg-card);
  border: 1px solid var(--divider);
  padding: 8px 14px;
  border-radius: 999px;
  font-size: 13px;
  color: var(--text-soft);
  cursor: pointer;
  font-family: inherit;
  transition: all .2s var(--ease);
}
.reflect-hint:active { transform: scale(0.95); }
.reflect-hint:hover { background: var(--bg-soft); color: var(--text); }

.reflect-emotion-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 20px;
}
.reflect-emotion-btn {
  aspect-ratio: 1;
  background: var(--bg-card);
  border: 1.5px solid transparent;
  border-radius: var(--r-md);
  cursor: pointer;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 4px;
  box-shadow: var(--shadow-soft);
  font-family: inherit;
  transition: all .2s var(--ease);
}
.reflect-emotion-btn:active { transform: scale(0.94); }
.reflect-emotion-btn.selected {
  background: var(--accent-soft);
  border-color: var(--accent);
}
.reflect-emotion-emoji { font-size: 24px; }
.reflect-emotion-label {
  font-size: 11px;
  color: var(--text-soft);
  letter-spacing: 0.02em;
}
.reflect-emotion-btn.selected .reflect-emotion-label { color: var(--accent-deep); font-weight: 500; }

.reflect-slider-wrap {
  background: var(--bg-card);
  border-radius: var(--r-lg);
  padding: 20px;
  box-shadow: var(--shadow-soft);
  margin-bottom: 20px;
}
.reflect-slider-label {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 16px;
}
.reflect-slider-title {
  font-size: 13px;
  color: var(--text-soft);
}
.reflect-slider-value {
  font-family: 'Noto Serif JP', serif;
  font-size: 28px;
  color: var(--accent-deep);
  font-weight: 500;
}
.reflect-slider {
  width: 100%;
  -webkit-appearance: none;
  appearance: none;
  height: 8px;
  background: var(--bg-soft);
  border-radius: 4px;
  outline: none;
}
.reflect-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  box-shadow: 0 3px 8px rgba(198,139,94,.4);
}
.reflect-slider::-moz-range-thumb {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  border: none;
  box-shadow: 0 3px 8px rgba(198,139,94,.4);
}
.reflect-slider-ticks {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.05em;
}

.reflect-footer {
  padding: 16px 20px calc(16px + env(safe-area-inset-bottom));
  background: rgba(250, 246, 240, 0.92);
  backdrop-filter: blur(12px);
  border-top: 1px solid var(--divider);
  display: flex;
  gap: 10px;
}
.reflect-footer .btn { flex: 1; }

.alt-card {
  background: var(--bg-card);
  border: 1.5px solid var(--divider);
  border-radius: var(--r-lg);
  padding: 16px 18px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: all .2s var(--ease);
  position: relative;
}
.alt-card:hover { border-color: var(--accent-soft); }
.alt-card.picked {
  background: var(--accent-soft);
  border-color: var(--accent);
}
.alt-card-tag {
  display: inline-block;
  font-size: 10px;
  color: var(--accent-deep);
  background: var(--bg);
  padding: 3px 10px;
  border-radius: 999px;
  letter-spacing: 0.08em;
  margin-bottom: 8px;
  border: 1px solid var(--accent-soft);
}
.alt-card-text {
  font-size: 14.5px;
  line-height: 1.7;
}

.alt-loading {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-muted);
  font-size: 13px;
}
.alt-loading-dots {
  display: inline-flex;
  gap: 5px;
  margin-top: 12px;
}
.alt-loading-dots span {
  width: 8px; height: 8px;
  background: var(--accent-soft);
  border-radius: 50%;
  animation: typing 1.2s infinite ease-in-out;
}
.alt-loading-dots span:nth-child(2) { animation-delay: .15s; }
.alt-loading-dots span:nth-child(3) { animation-delay: .3s; }

.reflect-section-title {
  font-size: 12px;
  color: var(--text-muted);
  letter-spacing: 0.1em;
  margin: 20px 0 12px;
  text-transform: uppercase;
}

/* ---------- Reflection Report ---------- */
.report-screen {
  min-height: 100vh;
  padding-bottom: 40px;
}
@media (min-width: 421px) { .report-screen { min-height: calc(100vh - 40px); } }

.report-header {
  padding: 20px 20px 12px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.report-title {
  flex: 1;
  font-family: 'Noto Serif JP', serif;
  font-size: 18px;
}

.report-body {
  padding: 0 20px;
}

.report-section-label {
  display: flex;
  align-items: center;
  gap: 6px;
  justify-content: center;
  font-family: 'Noto Serif JP', serif;
  font-size: 16px;
  color: var(--accent-deep);
  margin: 20px 0 12px;
}
.report-section-label svg { width: 18px; height: 18px; }

.report-card {
  background: var(--bg-card);
  border-radius: var(--r-lg);
  padding: 20px 22px;
  box-shadow: var(--shadow-soft);
  margin-bottom: 6px;
}
.report-card-text {
  font-size: 15px;
  line-height: 1.8;
  color: var(--text);
  white-space: pre-wrap;
}

.report-arrow-down {
  display: flex;
  justify-content: center;
  padding: 8px 0;
}
.report-arrow-down svg { color: var(--accent-soft); }

.report-psycho {
  background: linear-gradient(135deg, #F3EDE3, #EFE5D6);
  border-radius: var(--r-lg);
  padding: 20px 22px;
  text-align: center;
  font-family: 'Noto Serif JP', serif;
  font-size: 14px;
  line-height: 1.9;
  color: var(--text);
  margin: 16px 0;
  position: relative;
}

.report-split {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  position: relative;
}
.report-split-arrows {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: -4px;
}
.report-split-arrow {
  display: flex;
  justify-content: center;
  color: var(--accent-soft);
}

.report-col {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.report-col-header {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--accent-deep);
  font-weight: 500;
  padding: 0 4px;
}
.report-col-header svg { width: 16px; height: 16px; }

.report-col-card {
  background: var(--bg-card);
  border-radius: var(--r-md);
  padding: 14px;
  box-shadow: var(--shadow-soft);
  font-size: 13.5px;
  line-height: 1.7;
  color: var(--text);
  white-space: pre-wrap;
  flex: 1;
  min-height: 90px;
}
.report-col-card.alt {
  background: linear-gradient(135deg, #FFFFFF, #F7EDDE);
}

.report-emotion-card {
  margin-top: 8px;
  background: var(--bg-card);
  border-radius: var(--r-md);
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  box-shadow: var(--shadow-soft);
}
.report-emotion-emoji { font-size: 22px; }
.report-emotion-info { flex: 1; }
.report-emotion-label {
  font-size: 12px;
  color: var(--text-soft);
}
.report-emotion-score {
  font-family: 'Noto Serif JP', serif;
  font-size: 18px;
  color: var(--text);
  font-weight: 500;
}

.report-summary {
  margin: 24px 0 20px;
  background: linear-gradient(135deg, var(--accent-soft), #F3EDE3);
  border-radius: var(--r-lg);
  padding: 24px;
  text-align: center;
}
.report-summary-title {
  font-size: 12px;
  color: var(--accent-deep);
  letter-spacing: 0.1em;
  margin-bottom: 10px;
}
.report-summary-change {
  font-family: 'Noto Serif JP', serif;
  font-size: 24px;
  color: var(--text);
  margin-bottom: 6px;
}
.report-summary-change span.from { color: var(--text-soft); }
.report-summary-change span.to { color: var(--accent-deep); font-weight: 500; }
.report-summary-delta {
  font-size: 13px;
  color: var(--text-soft);
  line-height: 1.6;
}

.report-footer {
  padding: 8px 20px 32px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.alt-editor {
  width: 100%;
  padding: 14px 16px;
  background: var(--bg-card);
  border: 1.5px solid var(--divider);
  border-radius: var(--r-md);
  font-family: inherit;
  font-size: 14.5px;
  color: var(--text);
  resize: vertical;
  min-height: 100px;
  outline: none;
  line-height: 1.7;
  margin-top: 4px;
}
.alt-editor:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

/* ---------- Reflection Chat Widgets ---------- */
.reflect-emotion-scroll {
  padding: 8px 16px 10px 16px;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  animation: slideUp .4s var(--ease);
}
.reflect-emotion-chip {
  background: var(--bg-card);
  border: 1.5px solid var(--accent-soft);
  color: var(--text);
  padding: 12px 18px;
  border-radius: 999px;
  font-family: inherit;
  font-size: 15px;
  cursor: pointer;
  transition: all .2s var(--ease);
  display: inline-flex;
  align-items: center;
  gap: 8px;
  line-height: 1.2;
  box-shadow: 0 1px 3px rgba(61, 52, 42, 0.05);
  min-height: 46px;
}
.reflect-emotion-chip:active { transform: scale(0.94); }
.reflect-emotion-chip:hover { background: var(--accent-soft); border-color: var(--accent); }
.reflect-emotion-chip > span:first-child { font-size: 22px; line-height: 1; }
.reflect-emotion-more {
  background: var(--bg-soft);
  border-color: var(--divider);
  color: var(--text-soft);
  font-weight: 500;
}
.reflect-emotion-more:hover { background: var(--bg-warm); color: var(--text); border-color: var(--accent-soft); }

.reflect-score-row {
  padding: 8px 20px 4px;
  display: flex;
  gap: 5px;
  animation: slideUp .4s var(--ease);
  align-items: center;
  justify-content: stretch;
}
.reflect-score-btn {
  flex: 1 1 0;
  min-width: 0;
  aspect-ratio: 1;
  max-height: 40px;
  border-radius: 50%;
  background: var(--bg-card);
  border: 1.5px solid var(--accent-soft);
  color: var(--accent-deep);
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s var(--ease);
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.reflect-score-btn:active { transform: scale(0.85); background: var(--accent); color: #fff; }
.reflect-score-btn:hover { background: var(--accent-soft); }
.reflect-score-legend {
  padding: 2px 20px 8px;
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.08em;
  display: flex;
  justify-content: space-between;
}
.reflect-score-legend span:first-child { padding-left: 2px; }
.reflect-score-legend span:last-child { padding-right: 2px; }

.reflect-widget-area {
  padding: 4px 16px 8px 54px;
  animation: slideUp .45s var(--ease);
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.reflect-widget-area .alt-card { margin-bottom: 0; }
.reflect-alt-actions {
  margin-top: 6px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.reflect-alt-actions .btn { width: 100%; }

/* ---------- Letter Report ---------- */
.letter-screen {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  background: linear-gradient(180deg, #EFE5D6 0%, #E8DCC9 100%);
}
@media (min-width: 421px) { .letter-screen { min-height: calc(100vh - 40px); } }

.letter-top {
  padding: 16px 16px 12px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.letter-top-title {
  flex: 1;
  text-align: center;
}
.letter-top-name {
  font-family: 'Noto Serif JP', serif;
  font-size: 15px;
  color: var(--text);
  letter-spacing: 0.05em;
}
.letter-top-date {
  font-size: 11px;
  color: var(--text-soft);
  letter-spacing: 0.05em;
  margin-top: 2px;
}

.letter-body {
  flex: 1;
  padding: 0 16px 12px;
  overflow-y: auto;
}

.letter-card {
  background: #FFFEF9;
  background-image:
    radial-gradient(ellipse at top left, rgba(198, 139, 94, 0.04), transparent 50%),
    radial-gradient(ellipse at bottom right, rgba(168, 179, 155, 0.04), transparent 50%);
  border-radius: 4px;
  padding: 40px 28px 32px;
  box-shadow:
    0 1px 2px rgba(61, 52, 42, 0.06),
    0 8px 24px rgba(61, 52, 42, 0.1),
    0 16px 48px rgba(61, 52, 42, 0.08);
  position: relative;
  overflow: hidden;
}
.letter-card::before,
.letter-card::after {
  content: '';
  position: absolute;
  background: linear-gradient(45deg, transparent 45%, rgba(198, 139, 94, 0.1) 45%, rgba(198, 139, 94, 0.1) 55%, transparent 55%);
  width: 20px;
  height: 20px;
}
.letter-corner {
  position: absolute;
  width: 24px;
  height: 24px;
  border: 1px solid rgba(198, 139, 94, 0.25);
  pointer-events: none;
}
.letter-corner.tl { top: 12px; left: 12px; border-right: none; border-bottom: none; }
.letter-corner.br { bottom: 12px; right: 12px; border-left: none; border-top: none; }

.letter-stamp {
  position: absolute;
  top: 14px;
  right: 14px;
  font-size: 9px;
  color: var(--accent-deep);
  opacity: 0.4;
  letter-spacing: 0.25em;
  font-weight: 500;
  border: 1px solid currentColor;
  padding: 3px 8px;
  border-radius: 2px;
}

.letter-greet {
  font-family: 'Noto Serif JP', serif;
  font-size: 22px;
  color: var(--text);
  margin-bottom: 8px;
  letter-spacing: 0.02em;
}
.letter-intro {
  font-size: 13.5px;
  color: var(--text-soft);
  line-height: 1.8;
  margin-bottom: 28px;
}

.letter-block {
  margin-bottom: 22px;
}

.letter-label {
  font-size: 10px;
  color: var(--accent-deep);
  letter-spacing: 0.18em;
  margin-bottom: 10px;
  font-weight: 500;
  display: inline-block;
  border-bottom: 1px solid var(--accent-soft);
  padding-bottom: 3px;
}

.letter-quote {
  font-size: 15px;
  line-height: 1.85;
  color: var(--text);
  font-family: 'Noto Serif JP', serif;
  white-space: pre-wrap;
  padding: 4px 2px;
}

.letter-connector {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 22px 0 18px;
}
.letter-connector-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(198, 139, 94, 0.3), transparent);
}
.letter-connector-label {
  font-size: 11px;
  color: var(--text-soft);
  letter-spacing: 0.08em;
}

.letter-thought-card {
  background: var(--bg-soft);
  border-left: 3px solid var(--accent-soft);
  border-radius: 0 12px 12px 0;
  padding: 16px 18px 16px 16px;
  position: relative;
}
.letter-thought-card.alt {
  background: linear-gradient(135deg, #F5EFE6, #EFE8DA);
  border-left-color: var(--accent);
}
.letter-thought-mark {
  position: absolute;
  top: -6px;
  left: 14px;
  font-family: 'Noto Serif JP', serif;
  font-size: 36px;
  color: var(--accent-soft);
  line-height: 1;
  font-weight: 500;
}
.letter-thought-card.alt .letter-thought-mark { color: var(--accent); }
.letter-thought-text {
  font-size: 14.5px;
  line-height: 1.85;
  color: var(--text);
  white-space: pre-wrap;
  padding-top: 6px;
}

.letter-emotion-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 8px;
}
.letter-emotion-label {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--text);
}
.letter-emotion-emoji { font-size: 18px; }
.letter-emotion-score {
  font-family: 'Noto Serif JP', serif;
  font-size: 26px;
  color: var(--text);
  font-weight: 500;
  line-height: 1;
}
.letter-emotion-score span {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 400;
  margin-left: 2px;
}
.letter-emotion-score.lighter { color: var(--sage); }
.letter-emotion-score.heavier { color: var(--danger); opacity: 0.8; }

.letter-emotion-bar {
  height: 10px;
  background: rgba(168, 179, 155, 0.15);
  border-radius: 999px;
  overflow: hidden;
  position: relative;
}
.letter-emotion-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent-soft), var(--accent));
  border-radius: 999px;
  width: 0;
  animation: barFill 1.1s var(--ease) 0.2s forwards;
}
.letter-emotion-fill.tone-after {
  background: linear-gradient(90deg, #DDE0D5, var(--sage));
  animation-delay: 0.9s;
}
@keyframes barFill {
  to { width: var(--target-width); }
}
.letter-emotion-delta {
  position: absolute;
  right: 8px;
  top: -22px;
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 999px;
  opacity: 0;
  animation: deltaIn 0.5s var(--ease) 1.5s forwards;
}
.letter-emotion-delta.down {
  background: var(--sage-soft);
  color: #5A6F56;
}
.letter-emotion-delta.up {
  background: #F5D9D6;
  color: var(--danger);
}
@keyframes deltaIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: none; }
}

.letter-shift {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  margin: 24px 0 18px;
  color: var(--accent);
}
.letter-shift-curve {
  width: 40px;
  height: 40px;
  color: var(--accent);
  opacity: 0.7;
}
.letter-shift-text {
  font-size: 12px;
  color: var(--accent-deep);
  letter-spacing: 0.1em;
  font-weight: 500;
}

.letter-closing {
  margin: 28px 0 8px;
  padding: 20px 16px;
  background: linear-gradient(135deg, var(--accent-soft), #F5EFE6);
  border-radius: 14px;
  font-family: 'Noto Serif JP', serif;
  font-size: 15px;
  line-height: 1.9;
  color: var(--text);
  text-align: center;
  position: relative;
}

.letter-signature {
  text-align: right;
  margin-top: 18px;
  font-family: 'Noto Serif JP', serif;
  font-size: 16px;
  color: var(--accent-deep);
  font-style: italic;
  letter-spacing: 0.05em;
}

.letter-footer {
  padding: 12px 20px calc(16px + env(safe-area-inset-bottom));
  display: flex;
  flex-direction: column;
  gap: 8px;
  background: rgba(239, 229, 214, 0.7);
  backdrop-filter: blur(10px);
}

/* ---------- Persona ---------- */
.onb-persona .onb-hint { white-space: pre-line; }
.persona-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 4px;
}
.persona-card {

}
.persona-card:hover { border-color: var(--accent-soft); }

}
.persona-card input[type="radio"] { display: none; }
.persona-card-compact {

}

.persona-card-compact.selected {

}
.persona-card-compact input[type="radio"] { display: none; }
.persona-avatar {

}
.persona-avatar span {

}
.persona-card-compact .persona-avatar { width: 44px; height: 44px; font-size: 18px; }
.persona-info { flex: 1; font-size: 13px; line-height: 1.6; }
.persona-name { font-size: 16px; color: var(--text); margin-bottom: 2px; }
.persona-name strong { font-family: 'Noto Serif JP', serif; font-weight: 500; }
.persona-age {
  font-size: 11px;
  color: var(--text-soft);
  background: var(--bg-soft);
  padding: 1px 6px;

  margin-left: 4px;
}
.persona-tagline {
  font-size: 12.5px;
  color: var(--accent-deep);
  margin-bottom: 6px;
  font-weight: 500;
}
.persona-bg {
  font-size: 12px;
  color: var(--text-soft);
  line-height: 1.7;
  margin-bottom: 4px;
}
.persona-specialty {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.05em;
}
.persona-mini-avatar {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 26px; height: 26px;
  border-radius: 50%;
  color: white;
  font-size: 13px;
  font-family: 'Noto Serif JP', serif;
  margin-right: 8px;

}

.modal-persona { max-width: 420px; }
.modal-persona .modal-body { max-height: 60vh; overflow-y: auto; padding-right: 4px; }

/* ---------- Goal Card ---------- */
.goal-card {
  background: var(--bg-card);
  border-radius: var(--r-lg);
  padding: 18px 20px;
  margin-bottom: 16px;
  box-shadow: var(--shadow-soft);

}
.goal-setup {
  background: linear-gradient(135deg, #F5EFE6, #EFE5D6);
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: transform .15s var(--ease);
  border: 1.5px dashed var(--accent-soft);
}
.goal-setup:active { transform: scale(0.98); }
.goal-setup-body { flex: 1; }
.goal-setup-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 17px;
  color: var(--text);
  margin-bottom: 2px;
}
.goal-setup-sub {
  font-size: 12px;
  color: var(--text-soft);
  line-height: 1.6;
}
.goal-icon { font-size: 28px; flex-shrink: 0; }
.goal-setup-arrow { font-size: 28px; color: var(--accent); font-weight: 300; }

.goal-active-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.goal-active-label {
  font-size: 12px;
  color: var(--accent-deep);
  letter-spacing: 0.1em;

  align-items: center;
  gap: 6px;
}
.goal-active-label .goal-icon { font-size: 16px; }
.goal-active-edit {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  padding: 4px;
  display: flex;
}
.goal-active-edit svg { width: 16px; height: 16px; }
.goal-active-body {
  font-family: 'Noto Serif JP', serif;
  font-size: 16.5px;
  line-height: 1.7;
  color: var(--text);
  margin-bottom: 14px;
}
.goal-progress-wrap { margin-bottom: 10px; }
.goal-progress-track {
  height: 8px;
  background: rgba(168, 179, 155, 0.15);
  border-radius: 999px;
  overflow: hidden;
}
.goal-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent-soft), var(--accent));
  border-radius: 999px;
  transition: width .6s var(--ease);
}
.goal-progress-meta {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-top: 6px;
  font-size: 11px;
  color: var(--text-soft);
  letter-spacing: 0.05em;
}
.goal-progress-score {
  font-family: 'Noto Serif JP', serif;
  font-size: 20px;
  color: var(--text);
  font-weight: 500;
}
.goal-progress-score span { font-size: 11px; color: var(--text-muted); margin-left: 2px; }
.goal-progress-trend {
  font-size: 11px;
  color: var(--text-soft);
  margin-bottom: 10px;
  padding: 6px 10px;

}
.goal-trend-up { color: var(--sage); font-weight: 500; }
.goal-trend-down { color: var(--danger); font-weight: 500; opacity: 0.7; }
.goal-checkin-btn { width: 100%; }

.modal-goal .modal-body { padding-right: 4px; }
.goal-modal-label {
  font-size: 12px;
  color: var(--accent-deep);
  letter-spacing: 0.05em;
  margin: 14px 0 6px;
  font-weight: 500;
}
.goal-modal-label:first-child { margin-top: 0; }
.goal-modal-input {
  font-size: 14px;
  padding: 12px 14px;
  line-height: 1.6;
}
.goal-modal-aspiration {
  font-family: 'Noto Serif JP', serif;
  font-size: 15.5px;
  line-height: 1.8;
  color: var(--text);
  padding: 12px 14px;
  background: var(--bg-soft);
  border-radius: var(--r-sm);
}
.reflect-score-btn.picked {
  background: var(--accent) !important;
  color: #fff !important;
  border-color: var(--accent);
}

/* ---------- Garden Card ---------- */
.garden-card {
  background: linear-gradient(180deg, #FFFEF9, #F3EDE3);

}
.garden-streak-row {
  display: flex;

}
.garden-streak-main {

}
.garden-streak-num {

}
.garden-streak-unit {
  font-size: 13px;

}
.garden-total {

}
.garden-visual {

}
.garden-plus {

  letter-spacing: 0.05em;

}
.garden-ground {

.garden-quote {

}

.setting-label {

}

/* ---------- Profile (onboarding step 2) ---------- */
.onb-profile .onb-hint { margin-bottom: 20px; }
.profile-group {
  margin-bottom: 18px;
}
.profile-group-label {

}
.profile-chips {

.profile-chip {

.profile-chip.selected {

}

/* Persona suggested badge */
.persona-suggested {

.persona-card .persona-avatar { position: relative; }

/* ---------- Talk tab: Persona Card ---------- */
.talk-persona-card {
  background: linear-gradient(135deg, var(--p-accent, var(--accent-soft)), var(--bg-card));
  border-radius: var(--r-lg);
  padding: 14px 16px 18px;
  margin-bottom: 16px;
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow-soft);

}
.talk-persona-card-body {
  display: flex;
  align-items: center;
  gap: 14px;
}
.talk-persona-avatar {
  width: 60px; height: 60px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, var(--p-accent), var(--p-color));
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Noto Serif JP', serif;
  font-size: 26px;
  font-weight: 500;
  flex-shrink: 0;
  box-shadow: 0 4px 12px rgba(61, 52, 42, 0.15);
}
.talk-persona-info { flex: 1; min-width: 0; }
.talk-persona-name {
  font-family: 'Noto Serif JP', serif;
  font-size: 17px;
  color: var(--text);
  margin-bottom: 2px;
}
.talk-persona-age {
  font-size: 11px;
  color: var(--text-muted);
  background: rgba(255,255,255,0.5);
  padding: 1px 6px;
  border-radius: 999px;
  margin-left: 4px;
}
.talk-persona-tag {
  font-size: 12px;
  color: var(--accent-deep);
  margin-bottom: 2px;
}
.talk-persona-specialty {
  font-size: 11px;
  color: var(--text-soft);
}
.talk-persona-change {
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
  text-align: right;

  color: var(--text-soft);
  line-height: 1.3;
  letter-spacing: 0.05em;
}
.talk-persona-chevron {
  font-size: 22px;
  color: var(--accent);
  line-height: 1;
}

/* ---------- Mandala Grid ---------- */
.mandala-wrap {
  margin-bottom: 20px;
  padding: 16px;
  background: linear-gradient(180deg, #F5EFE6, #EFE5D6);
  border-radius: var(--r-lg);
}
.mandala-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.mandala-label {
  font-size: 11px;
  color: var(--accent-deep);
  letter-spacing: 0.1em;
  font-weight: 500;
}
.mandala-checkin {
  background: var(--bg-card);
  color: var(--accent-deep);
  border: 1px solid var(--accent-soft);
  padding: 6px 12px;
  border-radius: 999px;
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
  transition: all .2s var(--ease);
}
.mandala-checkin:hover { background: var(--accent-soft); }
.mandala-checkin:active { transform: scale(0.95); }

.mandala-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  aspect-ratio: 1;
  max-width: 380px;
  margin: 0 auto;
}
.mandala-cell {
  aspect-ratio: 1;
  background: var(--bg-card);
  border-radius: var(--r-sm);
  padding: 8px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  cursor: pointer;
  transition: all .2s var(--ease);
  box-shadow: var(--shadow-soft);
  border: 1.5px solid transparent;
  overflow: hidden;
}
.mandala-cell:active { transform: scale(0.96); }
.mandala-cell:hover { border-color: var(--accent-soft); }
.mandala-cell.center {
  background: radial-gradient(circle at 30% 30%, var(--accent-soft), var(--accent));
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 6px;
  text-align: center;
  box-shadow: 0 4px 16px rgba(198, 139, 94, 0.25);
  border: none;
}
.mandala-center-icon {
  font-size: 22px;
  margin-bottom: 4px;
}
.mandala-center-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 10.5px;
  line-height: 1.3;
  color: #fff;
  word-break: break-all;
  max-height: 52px;
  overflow: hidden;
}
.mandala-center-meta {
  font-family: 'Noto Serif JP', serif;
  font-size: 13px;
  color: #fff;
  font-weight: 500;
  margin-top: 3px;
  opacity: 0.9;
}

.mandala-cell.sub {
  background: var(--bg-card);
  padding: 8px 6px;
  text-align: center;
  align-items: center;
  justify-content: space-between;
}
.mandala-sub-title {
  font-size: 11px;
  line-height: 1.35;
  color: var(--text);
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  line-clamp: 3;
  -webkit-box-orient: vertical;
  width: 100%;
  word-break: break-all;
}
.mandala-sub-progress {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 3px;
  align-items: center;
}
.mandala-sub-track {
  height: 4px;
  width: 100%;
  background: var(--bg-soft);
  border-radius: 999px;
  overflow: hidden;
}
.mandala-sub-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent-soft), var(--accent));
  border-radius: 999px;
  transition: width .5s var(--ease);
}
.mandala-sub-score {
  font-size: 10px;
  color: var(--text-soft);
  font-weight: 500;
  letter-spacing: 0.02em;
}
.mandala-cell.sub.done {
  background: linear-gradient(135deg, var(--sage-soft), #B8C9B2);
  border-color: var(--sage);
}
.mandala-cell.sub.done .mandala-sub-score { color: #5A6F56; }

.mandala-cell.empty {
  background: rgba(255, 255, 255, 0.4);
  border: 1.5px dashed var(--accent-soft);
  color: var(--accent);
  box-shadow: none;
  align-items: center;
  justify-content: center;
}
.mandala-empty-plus {
  font-size: 26px;
  color: var(--accent);
  opacity: 0.6;
  font-weight: 300;
}

.mandala-meta {
  margin-top: 12px;
  text-align: center;
}
.mandala-hint {
  font-size: 11px;
  color: var(--text-soft);
  line-height: 1.6;
}
.mandala-trend {
  margin-top: 10px;
  margin-bottom: 0;
}

/* Suggestion chips in subgoal modal */
.suggest-chip.used {
  opacity: 0.5;
  text-decoration: line-through;
}

/* 4-tab bottom nav adjustments */
.bottom-nav-4 .nav-btn { font-size: 9.5px; }

/* ---------- Forest Hero (v2: 31 days) ---------- */
.forest-hero {
  position: relative;

.forest-hero-progress {

  flex-direction: column;
  align-items: center;

.forest-hero-day {
  font-family: 'Noto Serif JP', serif;
  font-size: 13px;
  color: var(--text-soft);
  letter-spacing: 0.06em;
}
.forest-hero-day strong {
  font-size: 22px;
  color: var(--accent-deep);
  font-weight: 500;
  margin-right: 2px;
}
.forest-hero-stage {
  font-family: 'Noto Serif JP', serif;
  font-size: 15px;
  color: var(--text);
  letter-spacing: 0.08em;
  margin-top: 2px;

<script>
// ============================================================
// State management
// ============================================================
const STORAGE_KEY = 'aside_prototype_state_v1';

const defaultState = () => ({
  version: 2,
  nickname: '',
  apiKey: '',
  apiModel: 'gemini-2.5-flash',
  onboarded: false,
  notificationTime: '17:00',
  currentSessionId: null,
  currentReflectionId: null,
  selectedPersonaId: 'mina',
  profile: null,
  moods: [],
  sessions: [],
  reflections: [],
  crisisLogs: [],
  goal: null,
  engagement: { dates: [] },
  forest: null,
  // Login greeting state (was previously stored on state.pet)
  lastLoginDate: null,
  totalLoginDays: 0,
  currentSaying: '',
  currentSayingKind: ''
});

// ===== Forest growth system v2 (31 days, 7 stages) =====
const FOREST_STAGE_NAMES = {
  1: 'はじまりの土',
  2: '芽吹き',
  3: '若草の野',
  4: '木立のはじまり',
  5: '小さな森',
  6: '水辺の森',
  7: '静かな森'
};

function calcForestStage(day) {
  if (day >= 28) return 7;
  if (day >= 23) return 6;
  if (day >= 18) return 5;
  if (day >= 13) return 4;
  if (day >= 8)  return 3;
  if (day >= 4)  return 2;
  return 1;
}

function nextStageDaysAway(day) {
  const thresholds = [4, 8, 13, 18, 23, 28, 31];
  for (const t of thresholds) if (day < t) return t - day;
  return 0;
}

function newForest() {
  return {
    checkinDays: 0,
    lastCheckinDate: null,
    startedAt: Date.now(),
    completedAt: null
  };
}

function addForestCheckin() {
  if (!state.forest) state.forest = newForest();
  const today = todayKey();
  if (state.forest.lastCheckinDate === today) {
    return { gained: 0, stageChanged: false, day: state.forest.checkinDays };
  }
  const prevStage = calcForestStage(state.forest.checkinDays || 0);
  state.forest.checkinDays = Math.min(31, (state.forest.checkinDays || 0) + 1);
  state.forest.lastCheckinDate = today;
  const newStage = calcForestStage(state.forest.checkinDays);
  if (state.forest.checkinDays === 31 && !state.forest.completedAt) {
    state.forest.completedAt = Date.now();
  }
  saveState();
  return {
    gained: 1,
    stageChanged: newStage !== prevStage,
    day: state.forest.checkinDays
  };
}

// Greeting message type templates (fallback when no LLM)
const GREETING_TEMPLATES = {
  first_login_ever: [
    'きてくれてうれしいな。今日はゆっくりで大丈夫だよ',
    'はじめまして、{name}。ここは焦らなくて大丈夫な場所だよ',
    '会えてよかった。無理せず少しずつね'
  ],
  comeback_login: [
    'また来てくれてうれしいよ。今日はここからで大丈夫',
    'おかえり。何日ぶりでも、迎えるよ',
    '戻ってきてくれてありがとう。少しだけ一緒にいよう'
  ],
  low_mood_login: [
    'しんどい日にも来てくれてありがとう。無理しなくていいよ',
    'きょうは無理しないでね。ここにいるだけで十分だよ',
    'つらいときに来てくれたの、すごいよ'
  ],
  streak_login: [
    '{streak}日続けて会えたね。無理のないペースでいこう',
    '今日もありがとう。いい時間になりますように',
    '続けて来てくれるの、うれしいよ'
  ],
  night_login: [
    '今日もおつかれさま。少しだけ、ここでひと息つこう',
    '夜だね。ゆっくり整えていこう',
    'おつかれさま。今日をやわらかく閉じよう'
  ],
  good_mood_login: [
    '今日は調子よさそうだね。その感覚、味わおう',
    'いい感じだね。書き留めておく？',
    '調子よさそうでよかった'
  ],
  default_login: [
    '今日も会えてうれしいよ',
    'ここに来てくれてありがとう',
    'きょうはどんな一日だった？'
  ]
};

function daysBetween(aKey, bKey) {
  return Math.round((new Date(bKey) - new Date(aKey)) / 86400000);
}

function getTimeBand() {
  const h = new Date().getHours();
  if (h >= 22 || h < 5) return 'night';
  if (h < 11) return 'morning';
  return 'afternoon';
}

function latestMoodBand() {
  if (!state.moods || state.moods.length === 0) return null;
  const m = [...state.moods].sort((a, b) => (b.checkedAt || 0) - (a.checkedAt || 0))[0];
  if (!m) return null;
  if (m.score <= 1) return 'very_low';
  if (m.score <= 2) return 'low';
  if (m.score >= 4) return 'good';
  return 'neutral';
}

function decideGreetingMessageType(ctx) {
  // Priority order per spec
  if (ctx.isFirstLoginEver) return 'first_login_ever';
  if (ctx.daysSinceLast !== null && ctx.daysSinceLast >= 3) return 'comeback_login';
  if (ctx.moodBand === 'very_low' || ctx.moodBand === 'low') return 'low_mood_login';
  if (ctx.streak >= 3) return 'streak_login';
  if (ctx.timeBand === 'night') return 'night_login';
  if (ctx.moodBand === 'good') return 'good_mood_login';
  return 'default_login';
}

function renderTemplate(tpl, ctx) {
  return tpl
    .replace('{name}', state.nickname || 'あなた')
    .replace('{streak}', String(ctx.streak || 1));
}

function pickTemplateGreeting(messageType, ctx) {
  const list = GREETING_TEMPLATES[messageType] || GREETING_TEMPLATES.default_login;
  const tpl = list[Math.floor(Math.random() * list.length)];
  return renderTemplate(tpl, ctx);
}

async function generateLlmGreeting(messageType, ctx) {
  if (!state.apiKey) return null;
  const systemPrompt = `あなたはメンタルヘルスアプリのやさしい語り手。ユーザーにそっと一言かける。

【制約】
- 日本語、1〜2文、60文字以内
- やさしい、受容的、幼すぎない
- 医療判断・診断・強い断定は禁止
- ユーザーを責めない／不安を煽らない
- 説教・過度な励ましは禁止

【メッセージタイプ】${messageType}
【コンテキスト】
- ニックネーム: ${state.nickname || '不明'}
- 連続ログイン: ${ctx.streak}日
- 前回から: ${ctx.daysSinceLast === null ? '初回' : `${ctx.daysSinceLast}日ぶり`}
- 気分: ${ctx.moodBand || '不明'}
- 時間帯: ${ctx.timeBand}
- 森のステージ: ${ctx.forestStage}
- 話し相手ペルソナ: ${getCurrentPersona().name}

上記を踏まえ、静かでやわらかい一言を返してください。

【出力JSON】
{ "message": "..." }`;

  const model = state.apiModel || 'gemini-2.5-flash';
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(model)}:generateContent?key=${encodeURIComponent(state.apiKey)}`;
  const body = {
    systemInstruction: { parts: [{ text: systemPrompt }] },
    contents: [{ role: 'user', parts: [{ text: '今日の一言をお願い' }] }],
    generationConfig: {
      responseMimeType: 'application/json',
      responseSchema: {
        type: 'object',
        properties: { message: { type: 'string' } },
        required: ['message']
      },
      temperature: 0.85,
      maxOutputTokens: 200
    },
    safetySettings: [
      { category: 'HARM_CATEGORY_HARASSMENT', threshold: 'BLOCK_ONLY_HIGH' },
      { category: 'HARM_CATEGORY_HATE_SPEECH', threshold: 'BLOCK_ONLY_HIGH' },
      { category: 'HARM_CATEGORY_SEXUALLY_EXPLICIT', threshold: 'BLOCK_ONLY_HIGH' },
      { category: 'HARM_CATEGORY_DANGEROUS_CONTENT', threshold: 'BLOCK_ONLY_HIGH' }
    ]
  };
  try {
    const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    if (!res.ok) return null;
    const data = await res.json();
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
    if (!text) return null;
    const parsed = JSON.parse(text);
    return parsed.message || null;
  } catch (e) {
    console.warn('[Aside] LLM greeting failed:', e);
    return null;
  }
}

function dailyPetLogin() {
  if (!state.forest) state.forest = newForest();
  const today = todayKey();
  if (state.lastLoginDate === today) return { firstToday: false };

  const lastDate = state.lastLoginDate;
  const daysSinceLast = lastDate ? daysBetween(lastDate, today) : null;
  const isFirstLoginEver = !lastDate && (state.totalLoginDays || 0) === 0;

  state.lastLoginDate = today;
  state.totalLoginDays = (state.totalLoginDays || 0) + 1;
  // Note: ログインだけでは森を育てない（addForestCheckinは呼ばない）
  const result = { gained: 0 };

  // Determine greeting messageType
  const ctx = {
    isFirstLoginEver,
    daysSinceLast,
    streak: calcStreak() || 1,
    moodBand: latestMoodBand(),
    timeBand: getTimeBand(),
    forestStage: (state.forest ? calcForestStage(state.forest.checkinDays || 0) : 1)
  };
  const messageType = decideGreetingMessageType(ctx);
  const templateMsg = pickTemplateGreeting(messageType, ctx);
  state.currentSaying = templateMsg;
  state.currentSayingKind = messageType;

  // Log daily greeting
  if (!state.dailyGreetingLog) state.dailyGreetingLog = {};
  state.dailyGreetingLog[today] = {
    messageType,
    message: templateMsg,
    ctx,
    timestamp: Date.now(),
    source: 'template'
  };
  saveState();

  // Attempt LLM override in background
  if (state.apiKey) {
    generateLlmGreeting(messageType, ctx).then(msg => {
      if (msg && state.lastLoginDate === today) {
        state.currentSaying = msg;
        if (state.dailyGreetingLog[today]) {
          state.dailyGreetingLog[today].message = msg;
          state.dailyGreetingLog[today].source = 'llm';
        }
        saveState();
        if (App.currentScreen === 'goal') render();
      }
    });
  }

  return { firstToday: true, ...result, daysSinceLast, messageType };
}

function calcThisWeekCount() {
  if (!state.engagement || !state.engagement.dates) return 0;
  const now = new Date(todayKey());
  const monday = new Date(now);
  monday.setDate(now.getDate() - ((now.getDay() + 6) % 7));
  const keys = new Set(state.engagement.dates);
  let count = 0;
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    if (d > now) break;
    if (keys.has(d.toISOString().slice(0, 10))) count++;
  }
  return count;
}

function getCurrentPersona() {
  const p = PERSONAS.find(p => p.id === state.selectedPersonaId) || PERSONAS[0];
  // Apply user's custom name override if any
  const overrides = state.personaNames || {};
  const customName = overrides[p.id];
  if (customName && customName.trim()) {
    return { ...p, name: customName, originalName: p.name };
  }
  return { ...p, originalName: p.name };
}

function buildSystemPrompt(base) {
  const p = getCurrentPersona();
  const nick = (state.nickname || 'あなた').toString();
  const otherNames = ['ミナ','ケン','ハル','ノリ'].filter(n => n !== (p.originalName || p.name)).join('・');

  const nameHeader =
    `【あなたの名前】\n` +
    `あなたの名前は「${p.name}」です。自己紹介や発話の中でこの名前を一貫して使ってください。\n` +
    `ユーザーが別のペルソナ名（${otherNames}）であなたを呼んだ場合は、一度だけ柔らかく「自分の名前は${p.name}です」と訂正し、その後は相手の話を優先して通常通り会話を続けてください。訂正のために会話を止めたり、相手を責める言い方はしないこと。\n\n` +
    `【ユーザーについて】\n` +
    `このユーザーのニックネームは「${nick}」です。呼びかける時はこの名前を使い、別の名前で呼ばないでください。ニックネームは毎ターン参照してよいですが、1回の返答で2回以上連呼しないこと（自然さを保つため）。\n`;

  let addition = p.systemPromptAddition;
  if (p.originalName && p.name !== p.originalName) {
    addition += `\n\n【補足】ユーザーはあなたの名前を「${p.name}」に上書きしています。このカスタム名を優先してください（元の名前「${p.originalName}」は使わない）。`;
  }
  return nameHeader + '\n' + base + '\n\n' + addition;
}

let state = defaultState();

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state = { ...defaultState(), ...JSON.parse(raw) };
    // Migration: ensure goal.subgoals exists
    if (state.goal && !Array.isArray(state.goal.subgoals)) state.goal.subgoals = [];
    if (!state.engagement) state.engagement = { dates: [] };
    // Migration: convert legacy state.pet (XP-based) to state.forest (v2)
    if (state.pet && !state.forest) {
      const lv = state.pet.level || 1;
      const approxDays = Math.min(31, Math.max(0, Math.floor((lv * 1.5) / 1.5)));
      state.forest = newForest();
      state.forest.checkinDays = approxDays;
      if (approxDays >= 31) state.forest.completedAt = Date.now();
      // carry over greeting state
      if (state.pet.lastLoginDate && !state.lastLoginDate) state.lastLoginDate = state.pet.lastLoginDate;
      if (state.pet.totalLoginDays && !state.totalLoginDays) state.totalLoginDays = state.pet.totalLoginDays;
      if (state.pet.currentSaying && !state.currentSaying) state.currentSaying = state.pet.currentSaying;
      if (state.pet.currentSayingKind && !state.currentSayingKind) state.currentSayingKind = state.pet.currentSayingKind;
      delete state.pet;
      saveState();
    }
    // Migration: legacy forest (v1: actionCount / 12 stages) → v2 (checkinDays / 7 stages)
    if (state.forest && typeof state.forest.actionCount === 'number' && typeof state.forest.checkinDays !== 'number') {
      const approxDays = Math.min(31, Math.max(0, Math.floor(state.forest.actionCount / 1.5)));
      state.forest = {
        checkinDays: approxDays,
        lastCheckinDate: null,
        startedAt: state.forest.createdAt || Date.now(),
        completedAt: approxDays >= 31 ? Date.now() : null
      };
      saveState();
    }
    if (!state.forest) state.forest = newForest();
  } catch (e) { console.warn('state load failed', e); }
}
function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function resetState() {
  localStorage.removeItem(STORAGE_KEY);
  state = defaultState();
}

// ---------- Engagement (streak / garden) ----------
function logEngagement() {
  const today = todayKey();
  if (!state.engagement) state.engagement = { dates: [] };
  if (!state.engagement.dates.includes(today)) {
    state.engagement.dates.push(today);
    saveState();
  }
}
function calcStreak() {
  if (!state.engagement || !state.engagement.dates.length) return 0;
  const dates = new Set(state.engagement.dates);
  let streak = 0;
  const d = new Date(todayKey());
  for (let i = 0; i < 365; i++) {
    const key = d.toISOString().slice(0, 10);
    if (dates.has(key)) streak++;
    else break;
    d.setDate(d.getDate() - 1);
  }
  return streak;
}
function calcTotalDays() {
  return (state.engagement && state.engagement.dates || []).length;
}
function renderGardenFlowers(total) {
  const cap = 30;
  const n = Math.min(total, cap);
  let result = '';
  for (let i = 0; i < n; i++) {
    if (i < 3) result += '🌱';
    else if (i < 7) result += '🌿';
    else if (i < 14) result += '🌾';
    else if (i < 21) result += '🌷';
    else result += '🌸';
  }
  if (total > cap) result += `<span class="garden-plus">+${total - cap}</span>`;
  return result || '🌱';
}

                  <div class="mood-strip-date">${d.slice(5).replace('-', '/')}</div>
                </div>
              `;
            }).join('')}
          </div>
        </div>

        ${todayMood ? `
          <div class="today-card">
            <div class="today-emoji">${MOODS.find(x => x.score === todayMood.score).emoji}</div>
            <div class="today-text">
              <div class="today-label">きょうのきもち</div>
              <div class="today-comment">${escapeHtml(todayMood.comment || MOODS.find(x => x.score === todayMood.score).label)}</div>
            </div>
          </div>
        ` : `
          <div class="card" style="background: var(--sage-soft);">
            <div class="card-title">きょうのきもちチェック、まだだよ</div>
            <div class="card-body">30秒くらい。気分を選んで、気が向いたらひとこと添えてみて。</div>
            <div class="card-action">
              <button class="btn btn-secondary" data-act="goto-mood">きもちチェックする</button>
            </div>
          </div>
        `}
      </div>
      ${bottomNav('goal')}
    </div>
  `;
}

function renderForestSvg(day) {
  const d = Math.max(0, Math.min(31, day || 0));
  const stage = calcForestStage(d);
  const visibleElements = FOREST_DAY_ELEMENTS
    .filter(e => e.day <= d)
    .map(e => e.svg)
    .join('\n');
  // Always-visible: 空 + 遠くの雲（ただしDay 1でも地平線は出す）
  const skyAndClouds = d >= 1
    ? `<rect width="400" height="180" fill="url(#f-sky-grad)"/>
       <ellipse cx="80" cy="32" rx="30" ry="4.5" fill="white" opacity="0.5"/>
       <ellipse cx="74" cy="34" rx="20" ry="3" fill="white" opacity="0.38"/>`
    : `<rect width="400" height="180" fill="url(#f-sky-grad)"/>`;
  return `
    <svg class="forest-hero-svg" viewBox="0 0 400 260" preserveAspectRatio="xMidYMid slice" data-stage="${stage}" data-day="${d}">
      <defs>
        <linearGradient id="f-sky-grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#FFFEF9"/>
          <stop offset="60%" stop-color="#F5EFE3"/>
          <stop offset="100%" stop-color="#EFE0C9"/>
        </linearGradient>
        <linearGradient id="f-earth-grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#D4B89C"/>
          <stop offset="100%" stop-color="#A8876A"/>
        </linearGradient>
        <linearGradient id="f-water-grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#CDE0E3"/>
          <stop offset="100%" stop-color="#9CB8BE"/>
        </linearGradient>
        <linearGradient id="f-mountain-grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#B9BFB3"/>
          <stop offset="100%" stop-color="#9DA798"/>
        </linearGradient>
      </defs>
      ${skyAndClouds}
      ${visibleElements}
    </svg>
  `;
}

function renderForestHero() {
  if (!state.forest) state.forest = newForest();
  const day = state.forest.checkinDays || 0;
  const stage = calcForestStage(day);
  const stageName = FOREST_STAGE_NAMES[stage] || FOREST_STAGE_NAMES[1];
  return `
    <div class="forest-hero">

function renderGoalMandala() {
  const g = state.goal;
  if (!g) return '';
  if (!Array.isArray(g.subgoals)) g.subgoals = [];
  const subs = g.subgoals;
  const latest = g.checkpoints[g.checkpoints.length - 1];
  const initial = g.checkpoints[0];
  const currentScore = latest ? latest.score : 0;
  const startScore = initial ? initial.score : 0;
  const delta = currentScore - startScore;

  // Overall mandala progress = avg of subgoal progress (0 if none)
  const subAvg = subs.length > 0
    ? Math.round(subs.reduce((acc, s) => acc + (s.progress || 0), 0) / subs.length * 10) / 10
    : 0;

  // Build 9 cells: 8 subgoal slots + 1 center
  const cells = [];
  for (let i = 0; i < 9; i++) {
    if (i === 4) {
      // Center: main goal
      cells.push(`
        <div class="mandala-cell center" data-act="goal-edit">
          <div class="mandala-center-title">${escapeHtml(g.aspiration.slice(0, 40))}${g.aspiration.length > 40 ? '…' : ''}</div>
          <div class="mandala-center-meta">${subAvg}/10</div>
        </div>
      `);
    } else {
      const subIdx = i < 4 ? i : i - 1;
      const sub = subs[subIdx];
      if (sub) {
        const pct = Math.max(4, (sub.progress || 0) * 10);
        const isDone = (sub.progress || 0) >= 10;
        cells.push(`
          <div class="mandala-cell sub ${isDone ? 'done' : ''}" data-subgoal-id="${escapeAttr(sub.id)}">
            <div class="mandala-sub-title">${escapeHtml(sub.title)}</div>
            <div class="mandala-sub-progress">
              <div class="mandala-sub-track"><div class="mandala-sub-fill" style="width: ${pct}%"></div></div>
              <div class="mandala-sub-score">${sub.progress || 0}</div>
            </div>
          </div>
        `);
      } else {
        cells.push(`
          <div class="mandala-cell empty" data-act="subgoal-add">
            <div class="mandala-empty-plus">＋</div>
          </div>
        `);
      }
    }
  }

  return `
    <div class="mandala-wrap">
      <div class="mandala-header">
        <span class="mandala-label">ありたい姿と、小さなステップ</span>
        <button class="mandala-checkin" data-act="goal-checkin">進捗記録</button>
      </div>
      <div class="mandala-grid">
        ${cells.join('')}
      </div>
      <div class="mandala-meta">
        ${subs.length === 0
          ? `<span class="mandala-hint">中央をタップして大目標を見る／周りの「＋」で小さなステップを1つずつ追加しよう</span>`
          : subs.length < 8
          ? `<span class="mandala-hint">${subs.length}/8 埋まってる。あと1つ埋めるたび、ゴールに近づく感じがするはず。</span>`
          : `<span class="mandala-hint">8つ全部埋まったね。あとは進捗を書きためていこう。</span>`
        }
      </div>
      ${g.checkpoints.length > 1 ? `
        <div class="goal-progress-trend mandala-trend">
          ありたい姿への距離: スタート時 ${startScore}/10 → 今 ${currentScore}/10 ${delta > 0 ? `<span class="goal-trend-up">（+${delta}）</span>` : delta < 0 ? `<span class="goal-trend-down">（${delta}）</span>` : ''}
        </div>
      ` : ''}
    </div>
  `;
}

function renderGoalActiveCard() {
  const g = state.goal;
  const latest = g.checkpoints[g.checkpoints.length - 1];

  const current = latest ? latest.score : 0;

function saveGoal() {
  if (!goalDraft.aspiration.trim()) { toast('ありたい姿を書いてね'); return; }
  const today = todayKey();
  if (!state.goal) {
    state.goal = {
      mainConcern: goalDraft.mainConcern.trim(),
      aspiration: goalDraft.aspiration.trim(),
      createdAt: Date.now(),
      checkpoints: [{ date: today, score: goalDraft.score, note: '' }]
    };
  } else {
    state.goal.mainConcern = goalDraft.mainConcern.trim();
    state.goal.aspiration = goalDraft.aspiration.trim();
    const last = state.goal.checkpoints[state.goal.checkpoints.length - 1];
    if (last && last.date === today) {
      last.score = goalDraft.score;
    } else {
      state.goal.checkpoints.push({ date: today, score: goalDraft.score, note: '' });
    }
  }
  saveState();
  closeModal();
  render();
  toast('保存したよ');
}

// ---------- Goal AI Setup (chat-style) ----------
const GOAL_CONCERN_CHOICES = [
  '人間関係で悩んでる',
  '仕事や学校がしんどい',
  '自分のことで悩んでる',
  '体調・生活リズムが崩れてる',
  'よくわからないけど辛い',
  '自分で書く'
];

let goalSetupState = {
  phase: null,
  messages: [],
  draft: { mainConcern: '', aspiration: '', initialScore: 5 },
  isEditing: false,
  aiLoading: false
};

function startGoalSetup(editing = false) {
  goalSetupState = {
    phase: 'concern',
    messages: [],
    draft: editing && state.goal
      ? { mainConcern: state.goal.mainConcern || '', aspiration: state.goal.aspiration || '', initialScore: (state.goal.checkpoints[0] && state.goal.checkpoints[0].score) || 5 }
      : { mainConcern: '', aspiration: '', initialScore: 5 },
    isEditing: editing,
    aiLoading: false
  };
  const persona = getCurrentPersona();
  const intro = editing
    ? `また一緒に考えようね。\n今の悩みって、どのあたり？${state.goal && state.goal.mainConcern ? `（前は「${state.goal.mainConcern}」だったね）` : ''}`
    : `${state.nickname}、目標を決めるのを手伝うね。\n\nまず、いま一番引っかかってることって、どんなこと？\n話せる範囲で大丈夫だよ。`;
  pushGoalAi(intro, { type: 'choices', options: GOAL_CONCERN_CHOICES });
}

function pushGoalAi(text, widget = null) {
  goalSetupState.messages.push({ role: 'ai', text, widget, timestamp: Date.now() });
}
function pushGoalUser(text) {
  goalSetupState.messages.push({ role: 'user', text, timestamp: Date.now() });
}

function viewGoalSetup() {
  if (!goalSetupState.phase) startGoalSetup(false);
  const last = goalSetupState.messages[goalSetupState.messages.length - 1];
  const widget = (last && last.role === 'ai') ? last.widget : null;
  const showInput = widget && (widget.type === 'choices' || widget.type === 'text');
  const p = getCurrentPersona();
  return `
    <div class="screen active chat-screen" style="--p-accent: ${p.avatarAccent}; --p-color: ${p.avatarColor};">
      <div class="chat-header">
        <button class="chat-back" data-act="goal-setup-back">${icon('arrow-left')}</button>
        <div class="chat-avatar"></div>
        <div class="chat-title">
          <div class="chat-name">目標をきめる</div>
          <div class="chat-status">${escapeHtml(p.name)}と一緒に</div>
        </div>
        <button class="chat-end" data-act="goal-setup-back">やめる</button>
      </div>
      <div class="chat-messages" id="goalSetupMessages">
        ${goalSetupState.messages.map(renderGoalSetupMsg).join('')}
        ${goalSetupState.aiLoading ? `
          <div class="msg-group"><div class="msg-avatar"></div><div class="msg-bubble ai"><div class="typing"><span></span><span></span><span></span></div></div></div>
        ` : ''}
      </div>
      ${widget && !goalSetupState.aiLoading ? renderGoalSetupWidget(widget) : ''}
      ${showInput ? `
        <div class="chat-input-area">
          <div class="chat-input-hint">${widget.type === 'text' ? '自由に書いてみて' : '選んでも、自由に書いてもOK'}</div>
          <div class="chat-input-row">
            <textarea class="chat-input" id="goalSetupInput" rows="1" placeholder="${widget.type === 'text' ? '例：朝、自分のペースで動けるようになる' : '自由に書いてみて'}"></textarea>
            <button class="chat-icon-btn send" data-act="goal-setup-send">${icon('send')}</button>
          </div>
        </div>
      ` : ''}
    </div>
  `;
}

function renderGoalSetupMsg(m) {
  if (m.role === 'ai') {
    return `<div class="msg-group"><div class="msg-avatar"></div><div class="msg-bubble ai">${escapeHtml(m.text).replace(/\n/g, '<br>')}</div></div>`;
  }
  return `<div class="msg-group user"><div class="msg-bubble user">${escapeHtml(m.text).replace(/\n/g, '<br>')}</div></div>`;
}

function renderGoalSetupWidget(w) {
  if (w.type === 'choices') {
    return `
      <div class="choices">
        ${w.options.map(opt => `
          <button class="choice-chip ${opt === '自分で書く' ? 'other' : ''}" data-goal-concern="${escapeAttr(opt)}">${escapeHtml(opt)}</button>
        `).join('')}
      </div>
    `;
  }
  if (w.type === 'score') {
    return `
      <div class="reflect-score-row">
        ${Array.from({length: 10}, (_, i) => i + 1).map(n => `
          <button class="reflect-score-btn" data-goal-score="${n}">${n}</button>
        `).join('')}
      </div>
      <div class="reflect-score-legend"><span>遠い</span><span>近づいてる</span></div>
    `;
  }
  if (w.type === 'confirm') {
    return `
      <div class="reflect-widget-area">
        <button class="btn btn-primary" data-act="goal-setup-confirm">この内容で設定する</button>
        <button class="btn btn-ghost" data-act="goal-setup-restart">もう一度考える</button>
      </div>
    `;
  }
  return '';
}

function handleGoalSetupText(text) {
  if (!text) return;
  pushGoalUser(text);
  if (goalSetupState.phase === 'concern') {
    goalSetupState.draft.mainConcern = text;
    goalSetupState.phase = 'aspiration';
    pushGoalAi(
      '教えてくれてありがとう。\nじゃあ、どんな自分になれたらいいなと思う？ありたい姿を、ことばにしてみて。',
      { type: 'text' }
    );
  } else if (goalSetupState.phase === 'aspiration') {
    goalSetupState.draft.aspiration = text;
    goalSetupState.phase = 'distance';
    pushGoalAi(
      `いいね、ことばにできたね。\n今、そこにどれくらい近づいてる？10段階で。`,
      { type: 'score' }
    );
  }
  saveState();
  render();
  setTimeout(() => {
    const el = document.getElementById('goalSetupMessages');
    if (el) el.scrollTop = el.scrollHeight;
  }, 50);
}

function handleGoalSetupScore(n) {
  goalSetupState.draft.initialScore = n;
  pushGoalUser(`${n}点`);
  goalSetupState.phase = 'summary';
  const d = goalSetupState.draft;
  pushGoalAi(
    `整理するね。\n\n◆いまの悩み:\n${d.mainConcern}\n\n◆ありたい姿:\n${d.aspiration}\n\n◆距離感: ${n}/10\n\nこれで目標として設定していい？`,
    { type: 'confirm' }
  );
  saveState();
  render();
  setTimeout(() => {
    const el = document.getElementById('goalSetupMessages');
    if (el) el.scrollTop = el.scrollHeight;
  }, 50);
}

function confirmGoalSetup() {
  const d = goalSetupState.draft;
  if (!d.aspiration || !d.mainConcern) { toast('もう少しだけ教えてね'); return; }
  const today = todayKey();
  if (!state.goal || !goalSetupState.isEditing) {
    state.goal = {
      mainConcern: d.mainConcern,
      aspiration: d.aspiration,
      createdAt: Date.now(),
      checkpoints: [{ date: today, score: d.initialScore, note: '' }],
      subgoals: []
    };
  } else {
    state.goal.mainConcern = d.mainConcern;
    state.goal.aspiration = d.aspiration;
    const last = state.goal.checkpoints[state.goal.checkpoints.length - 1];
    if (last && last.date === today) last.score = d.initialScore;
    else state.goal.checkpoints.push({ date: today, score: d.initialScore, note: '' });
  }
  saveState();
  goalSetupState = { phase: null, messages: [], draft: { mainConcern: '', aspiration: '', initialScore: 5 }, isEditing: false, aiLoading: false };
  App.go('goal');
  toast(goalSetupState.isEditing ? '目標を更新したよ' : '目標を設定したよ');
}
