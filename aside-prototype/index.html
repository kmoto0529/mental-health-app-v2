<html lang="ja">
<head>

<title>Aside — ひとりで抱えてる、を、ちょっとずつ整理する。</title>

<style>
/* ============================================================
   Aside v2.1 — ナナメトーンデザインシステム
   ============================================================ */
:root {
  /* ============================================================
     Aside Design Tokens v2 — デザイン部統合版 2026-04-30
     - Primary: Sage Green (デザイン部 v1 準拠)
     - Secondary/FAB: Warm Sand (ブリーフ「ブラウン系」準拠)
     - Crisis: Sage (ブリーフ「赤NG・ブラウン or 緑」準拠)
     ============================================================ */
  /* 背景 — Warm Minimal */
  --bg: #FAF7F2;          /* warm white */
  --bg-card: #FFFFFF;
  --bg-soft: #F0EDE6;     /* surface variant */
  --bg-warm: #EAE0CB;     /* warm sand subtle */

  /* テキスト */
  --text: #2D2D2D;
  --text-soft: #6B6B6B;
  --text-muted: #9E9E9E;

  /* Primary — Sage Green（ブランドメイン） */
  --primary: #6B8F71;
  --primary-light: #9BB89F;
  --primary-dark: #4A6B4F;
  --primary-soft: #E0EBE2;

  /* Secondary — Warm Sand（FAB / 補色アクセント） */
  --secondary: #D4A574;
  --secondary-light: #E8C9A4;
  --secondary-dark: #B8874E;
  --secondary-soft: #F5E8D6;

  /* Legacy 互換 — accent → primary 経由でほぼsage化 */
  --accent: #6B8F71;          /* primary と同期 */
  --accent-soft: #E0EBE2;
  --accent-deep: #4A6B4F;

  /* Crisis — Sage（赤NG。穏やかな緑で寄り添い） */
  --sage: #8FA68C;
  --sage-soft: #D7E0D2;

  --divider: #E0DCD4;
  --shadow-soft: 0 2px 12px rgba(45, 45, 45, 0.05);
  --shadow-card: 0 4px 20px rgba(45, 45, 45, 0.08);
  --shadow-lift: 0 8px 28px rgba(45, 45, 45, 0.12);

  /* 発光トークン（ダーク時のみ視認） */
  --glow-primary: 0 0 16px rgba(167, 196, 160, 0.0);
  --glow-strong:  0 0 24px rgba(167, 196, 160, 0.0);
}

/* ============================================================
   Deep Forest（夜モード 18:00-5:00 自動切替）
   ============================================================ */
[data-theme="dark"] {
  /* 背景 */
  --bg: #1F2A2A;
  --bg-card: #2F3E3E;
  --bg-soft: #2A3838;
  --bg-warm: #2A3A2A;

  /* テキスト */
  --text: #EAEAEA;
  --text-soft: #B0B8B5;
  --text-muted: #7A8580;

  /* Primary — Deep Teal */
  --primary: #4E7C7B;
  --primary-light: #6B9494;
  --primary-dark: #2F5E5D;
  --primary-soft: #2F4040;

  /* Secondary — Sage（光るアクセント） */
  --secondary: #A7C4A0;
  --secondary-light: #DCEBD8;
  --secondary-dark: #87A582;
  --secondary-soft: #2A3A2A;

  /* Legacy alias — accent は sage に */
  --accent: #A7C4A0;
  --accent-soft: #2A3A2A;
  --accent-deep: #DCEBD8;

  /* Crisis — sage 強め */
  --sage: #A7C4A0;
  --sage-soft: #2A3A2A;

  --divider: #3A4949;
  --shadow-soft: 0 2px 12px rgba(0, 0, 0, 0.35);
  --shadow-card: 0 4px 20px rgba(0, 0, 0, 0.45);
  --shadow-lift: 0 8px 28px rgba(0, 0, 0, 0.55);

  /* 発光（夜のみ ON） */
  --glow-primary: 0 0 16px rgba(167, 196, 160, 0.4), 0 0 32px rgba(167, 196, 160, 0.18);
  --glow-strong:  0 0 24px rgba(167, 196, 160, 0.55), 0 0 48px rgba(167, 196, 160, 0.25);

  /* 角丸 */
  --r-sm: 12px;
  --r-md: 18px;
  --r-lg: 24px;
  --r-xl: 32px;

  /* イージング */
  --ease: cubic-bezier(0.22, 0.61, 0.36, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
html {
  background: var(--bg);
  transition: background-color 0.5s var(--ease);
}
body {
  font-family: 'Noto Sans JP', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  font-weight: 400;
  font-size: 15px;
  line-height: 1.7;
  letter-spacing: 0.02em;
  color: var(--text);
  background: var(--bg);
  transition: background-color 0.5s var(--ease), color 0.5s var(--ease);
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  overscroll-behavior: none;
}

button { font-family: inherit; font-size: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, textarea { font-family: inherit; font-size: inherit; color: inherit; border: none; background: transparent; outline: none; }
ul, ol { list-style: none; }
a { color: var(--accent-deep); text-decoration: none; }

/* 見出しは Noto Serif JP で「手紙・日記」のような温かさを演出
   （ナナメの関係＝先生でも友達でもない、の視覚化） */
h1, h2, h3 { font-family: 'Noto Serif JP', 'Noto Sans JP', serif; font-weight: 500; line-height: 1.4; color: var(--text); letter-spacing: 0.01em; }
h1 { font-size: 24px; font-weight: 600; line-height: 1.3; }
h2 { font-size: 18px; font-weight: 500; }
h3 { font-size: 16px; font-weight: 500; }

/* ============================================================
   レイアウト
   ============================================================ */
#app {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  background: var(--bg);
  position: relative;
  padding-bottom: 80px; /* タブバー分 */
}

.screen {
  display: none;
  padding: 20px 20px 40px;
  min-height: 100vh;
  animation: fadeIn 0.4s var(--ease);
}
.screen.active { display: block; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ============================================================
   ボタン
   ============================================================ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  min-height: 52px;
  padding: 14px 28px;
  border-radius: 999px;             /* ピル型 */
  font-family: inherit;
  font-weight: 600;
  font-size: 15px;
  letter-spacing: 0.03em;
  transition: transform 0.15s var(--ease), box-shadow 0.3s var(--ease), background-color 0.3s var(--ease), color 0.3s var(--ease);
  width: 100%;
}
.btn:active { transform: scale(0.97); }

.btn-primary {
  background: var(--primary);
  color: #fff;
  box-shadow: var(--shadow-soft);
}
.btn-primary:hover { background: var(--primary-dark); }
[data-theme="dark"] .btn-primary {
  background: var(--secondary);
  color: #1F2A2A;                   /* 濃い背景に黒文字で読みやすく */
  box-shadow: var(--glow-primary);
}
[data-theme="dark"] .btn-primary:hover {
  background: var(--secondary-light);
  box-shadow: var(--glow-strong);
}

.btn-secondary {
  background: var(--bg-card);
  color: var(--text);
  border: 1px solid var(--divider);
}
.btn-secondary:hover { background: var(--bg-soft); }
[data-theme="dark"] .btn-secondary {
  background: transparent;
  border-color: var(--divider);
}

.btn-ghost {
  background: transparent;
  color: var(--text-soft);
  font-size: 13px;
}
.btn-ghost:hover { color: var(--text); }

.btn-sage {
  background: var(--sage);
  color: #fff;
}
.btn-sage:hover { background: #788C76; }

/* ============================================================
   カード
   ============================================================ */
.card {
  background: var(--bg-card);
  border-radius: var(--r-md);
  padding: 18px;
  box-shadow: var(--shadow-soft);
  margin-bottom: 14px;
  transition: background 0.5s var(--ease), border-color 0.5s var(--ease);
}
.card-soft {
  background: var(--bg-soft);
  border-radius: var(--r-md);
  padding: 18px;
  margin-bottom: 14px;
}
.card-warm {
  background: var(--bg-warm);
  border-radius: var(--r-md);
  padding: 18px;
  margin-bottom: 14px;
}
[data-theme="dark"] .card,
[data-theme="dark"] .card-soft,
[data-theme="dark"] .card-warm {
  background: rgba(47, 62, 62, 0.55);
  border: 1px solid var(--divider);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
[data-theme="dark"] .card-warm {
  background: rgba(58, 73, 73, 0.6);
}

/* ============================================================
   気分入力（天気マーク 5段階）
   ============================================================ */
.mood-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  margin: 16px 0;
}
.mood-item {
  background: var(--bg-card);
  border: 2px solid transparent;
  border-radius: var(--r-md);
  padding: 14px 4px 10px;
  text-align: center;
  transition: all 0.2s var(--ease);
  cursor: pointer;
}
.mood-item:active { transform: scale(0.95); }
.mood-item.selected {
  border-color: var(--accent);
  background: var(--accent-soft);
}
.mood-emoji { font-size: 28px; line-height: 1; margin-bottom: 6px; }
.mood-label { font-size: 11px; color: var(--text-soft); }
.mood-item.selected .mood-label { color: var(--accent-deep); font-weight: 500; }

/* ============================================================
   ドメイン選択（9個）
   ============================================================ */
.domain-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin: 16px 0;
}
.domain-item {
  background: var(--bg-card);
  border: 1px solid var(--divider);
  border-radius: var(--r-md);
  padding: 14px;
  text-align: left;
  transition: all 0.2s var(--ease);
}
.domain-item:active { transform: scale(0.97); }
.domain-item.selected {
  border-color: var(--accent);
  background: var(--accent-soft);
}
.domain-emoji { font-size: 22px; }
.domain-name { font-size: 14px; font-weight: 500; margin-top: 4px; }

/* ============================================================
   タブバー（3タブ）
   ============================================================ */
.tabbar {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  background: var(--bg-card);
  border-top: 1px solid var(--divider);
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  z-index: 100;
  padding-bottom: env(safe-area-inset-bottom);
  transition: background 0.5s var(--ease), border-color 0.5s var(--ease);
}
[data-theme="dark"] .tabbar {
  background: rgba(31, 42, 42, 0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.tabbar-item {
  padding: 10px 0 12px;
  text-align: center;
  color: var(--text-muted);
  background: transparent !important;
  background-color: transparent !important;
  background-image: none !important;
  border: none !important;
  outline: none;
  -webkit-appearance: none;
  appearance: none;
  -webkit-tap-highlight-color: transparent;
  transition: color 0.2s var(--ease);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  cursor: pointer;
  font: inherit;
}
.tabbar-item.active { color: var(--primary); }       /* ダークすぎ問題回避: brighter sage */
[data-theme="dark"] .tabbar-item.active { color: var(--secondary); }
.tabbar-icon {
  font-size: 22px;
  line-height: 1;
  background: transparent;
  color: inherit;
  display: block;
}
.tabbar-label {
  font-size: 12px;
  font-weight: 500;
  font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Yu Gothic UI', 'Meiryo', system-ui, sans-serif;
  color: inherit;
  background: transparent;
  text-decoration: none;
  text-shadow: none;
  letter-spacing: 0.02em;
  line-height: 1.3;
  display: block;
  white-space: nowrap;
}
.tabbar-item.active .tabbar-label { font-weight: 600; }

/* ============================================================
   フローティング 💬
   ============================================================ */
.fab {
  position: fixed;
  bottom: 90px;
  right: 20px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--secondary);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  box-shadow: var(--shadow-lift);
  z-index: 90;
  transition: transform 0.2s var(--ease), box-shadow 0.4s var(--ease), background 0.4s var(--ease);
}
.fab:hover { background: var(--secondary-dark); }
[data-theme="dark"] .fab {
  background: var(--bg-card);
  color: var(--secondary);
  border: 2px solid var(--secondary);
  box-shadow: var(--glow-primary);
  animation: fab-pulse 4s var(--ease) infinite;
}
[data-theme="dark"] .fab:hover {
  background: var(--secondary);
  color: var(--bg);
  box-shadow: var(--glow-strong);
}
@keyframes fab-pulse {
  0%, 100% { box-shadow: var(--glow-primary); }
  50% { box-shadow: var(--glow-strong); }
}
.fab:active { transform: scale(0.92); }
.fab.hidden { display: none; }

/* ============================================================
   AIメッセージ・吹き出し
   ============================================================ */
.msg {
  display: flex;
  margin-bottom: 14px;
  gap: 10px;
}
.msg-ai { justify-content: flex-start; }
.msg-user { justify-content: flex-end; }
.msg-bubble {
  max-width: 80%;
  padding: 12px 16px;
  border-radius: var(--r-md);
  line-height: 1.7;
  white-space: pre-wrap;
  word-wrap: break-word;
}
.msg-ai .msg-bubble {
  background: var(--bg-card);
  color: var(--text);
  border-bottom-left-radius: 6px;
}
.msg-user .msg-bubble {
  background: var(--accent);
  color: #fff;
  border-bottom-right-radius: 6px;
}
.msg-typing {
  background: var(--bg-card);
  display: inline-flex;
  gap: 4px;
  padding: 14px 18px;
  border-radius: var(--r-md);
  border-bottom-left-radius: 6px;
}
.msg-typing span {
  width: 6px; height: 6px;
  background: var(--text-muted);
  border-radius: 50%;
  animation: typing 1.2s infinite ease-in-out;
}
.msg-typing span:nth-child(2) { animation-delay: .15s; }
.msg-typing span:nth-child(3) { animation-delay: .3s; }
@keyframes typing {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
  40% { transform: scale(1); opacity: 1; }
}

/* ============================================================
   入力欄
   ============================================================ */
.input-row {
  display: flex;
  gap: 8px;
  padding: 12px 16px;
  background: var(--bg-card);
  border-top: 1px solid var(--divider);
  position: sticky;
  bottom: 0;
}
.input-text {
  flex: 1;
  background: var(--bg-soft);
  border-radius: var(--r-md);
  padding: 12px 14px;
  font-size: 15px;
  resize: none;
  max-height: 120px;
}
.input-send {
  background: var(--accent);
  color: #fff;
  border-radius: 50%;
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}
.input-send:disabled { background: var(--text-muted); }

/* 大きなテキストエリア */
.textarea-block {
  width: 100%;
  background: var(--bg-card);
  border-radius: var(--r-md);
  padding: 14px;
  font-size: 15px;
  line-height: 1.7;
  resize: none;
  min-height: 120px;
  border: 1px solid var(--divider);
}
.textarea-block:focus {
  border-color: var(--accent);
  background: #fff;
}

/* ============================================================
   注釈（医療行為ではなくAI推定）
   ============================================================ */
.disclaimer {
  font-size: 11px;
  color: var(--text-muted);
  background: var(--bg-soft);
  border-radius: 8px;
  padding: 8px 12px;
  margin: 12px 0;
  display: flex;
  align-items: flex-start;
  gap: 6px;
  line-height: 1.5;
}
.disclaimer-mini {
  font-size: 10px;
  color: var(--text-muted);
  text-align: center;
  padding: 6px;
  margin: 8px 0 0;
}

/* ============================================================
   トースト
   ============================================================ */
.toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--text);
  color: #fff;
  padding: 12px 20px;
  border-radius: var(--r-md);
  font-size: 14px;
  z-index: 200;
  transition: transform 0.3s var(--ease);
  pointer-events: none;
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ============================================================
   モーダル
   ============================================================ */
.modal-bg {
  position: fixed;
  inset: 0;
  background: rgba(61, 52, 42, 0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  z-index: 300;
  display: none;
}
.modal-bg.open { display: flex; }
.modal-card {
  background: var(--bg-card);
  border-radius: var(--r-lg);
  padding: 24px;
  max-width: 400px;
  width: 100%;
  box-shadow: var(--shadow-lift);
  max-height: 85vh;
  overflow-y: auto;
}
.modal-title { font-family: 'Noto Serif JP', serif; font-size: 18px; margin-bottom: 12px; font-weight: 500; }

/* ============================================================
   クライシス検知（穏やかな寄り添い色）
   ============================================================ */
.crisis-card {
  background: var(--sage-soft);
  border-radius: var(--r-lg);
  padding: 24px;
  margin: 16px 0;
}
.crisis-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 17px;
  color: #2C4A2C;
  margin-bottom: 12px;
}
.crisis-text {
  color: var(--text);
  margin-bottom: 16px;
  line-height: 1.8;
}
.crisis-link {
  display: block;
  background: var(--sage);
  color: #fff;
  padding: 14px 16px;
  border-radius: var(--r-md);
  text-decoration: none;
  margin-bottom: 8px;
  font-weight: 500;
  text-align: center;
}
.crisis-link-sub {
  display: block;
  font-size: 11px;
  margin-top: 2px;
  opacity: 0.9;
  font-weight: 400;
}
.crisis-secondary {
  background: transparent;
  border: 1px solid var(--sage);
  color: #2C4A2C;
  padding: 12px;
  border-radius: var(--r-md);
  width: 100%;
  margin-top: 8px;
  font-weight: 500;
}

/* ============================================================
   行動カード
   ============================================================ */
.action-list { display: flex; flex-direction: column; gap: 10px; margin: 14px 0; }
.action-card {
  background: var(--bg-card);
  border-radius: var(--r-md);
  padding: 14px 16px;
  display: flex;
  gap: 12px;
  align-items: flex-start;
  border: 1px solid transparent;
  transition: all 0.15s var(--ease);
  cursor: pointer;
  text-align: left;
}
.action-card:active { transform: scale(0.98); }
.action-card:hover { border-color: var(--accent-soft); }
.action-card.picked {
  background: var(--accent-soft);
  border-color: var(--accent);
}
.action-icon { font-size: 20px; flex-shrink: 0; }
.action-text { flex: 1; }
.action-title { font-weight: 500; font-size: 14px; margin-bottom: 2px; }
.action-desc { font-size: 12px; color: var(--text-soft); line-height: 1.5; }
.action-meta { font-size: 10px; color: var(--text-muted); margin-top: 4px; }

/* ============================================================
   傾向ビュー（バーチャート）
   ============================================================ */
.bar-row {
  display: grid;
  grid-template-columns: 100px 1fr 30px;
  gap: 10px;
  align-items: center;
  margin-bottom: 8px;
  font-size: 13px;
}
.bar-fill {
  background: var(--accent-soft);
  border-radius: 4px;
  height: 18px;
  position: relative;
  overflow: hidden;
}
.bar-fill::after {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--accent);
  width: var(--w, 0%);
  border-radius: 4px;
  transition: width 0.5s var(--ease);
}

/* ============================================================
   カレンダー
   ============================================================ */
.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  margin: 16px 0;
}
.cal-head {
  text-align: center;
  font-size: 11px;
  color: var(--text-muted);
  padding: 4px;

const STORAGE_KEY = 'aside_v3_state';
const STORAGE_KEY_V2 = 'aside_v2_state';   // 旧キー（マイグレーション用）

const defaultState = () => ({
  consent: { given: false, version: '', at: null },
  user: { nickname: '', createdAt: null, daysUsed: 0 },
  initialDone: false,
  guidedShown: false,

  // === v3 メインデータ（仕様書 §13 準拠） ===
  moodLogs: [],          // {id, moodScore, moodLabel, categories[], comment, createdAt}
  moyamoyaRecords: [],   // {id, eventText, emotion, emotionScoreBefore, alternativeView, emotionScoreAfter, letterTitle, letterBody, createdAt}
  goals: [],             // {id, goalText, sourceSummary, status, createdAt, updatedAt}
  policies: [],          // {id, goalId, policyText, depthLevel, createdAt}
  actions: [],           // {id, goalId, policyId, actionText, status, createdAt}
  actionLogs: [],        // {id, actionId, rating, comment, createdAt}
  aiChats: [],           // {id, sourceType, sourceId, messages[], summary, createdAt}

  // === UI状態（永続化される一時状態） ===
  ui: {
    currentTab: 'home',         // 'home' | 'action' | 'record'
    recordSubtab: 'calendar',   // 'calendar' | 'report'
  },

  // === ユーザープリファレンス ===
  preferences: { themeOverride: null }
});

let state = loadState();

function loadState() {
  try {
    // v3 を優先
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const loaded = JSON.parse(raw);
      return Object.assign(defaultState(), loaded);
    }
    // v3 が無ければ v2 から最低限を引き継ぐ
    const rawV2 = localStorage.getItem(STORAGE_KEY_V2);
    if (rawV2) {
      const v2 = JSON.parse(rawV2);
      const s = defaultState();
      if (v2.consent) s.consent = v2.consent;
      if (v2.user) s.user = v2.user;
      s.initialDone = !!v2.initialDone;
      // todayMood + records → moodLogs に集約
      const list = [];
      if (Array.isArray(v2.records)) {
        v2.records.forEach(r => {
          if (r && r.score) list.push({
            id: 'mig_' + Math.random().toString(36).slice(2, 9),
            moodScore: r.score,
            moodLabel: '',
            categories: r.domain ? [mapV2DomainToCategory(r.domain)] : [],
            comment: r.comment || '',
            createdAt: r.date ? new Date(r.date).toISOString() : new Date().toISOString()
          });
        });
      }
      if (v2.todayMood && v2.todayMood.score) {
        list.push({
          id: 'mig_today',
          moodScore: v2.todayMood.score,
          moodLabel: '',
          categories: [],
          comment: v2.todayMood.comment || '',
          createdAt: v2.todayMood.date ? new Date(v2.todayMood.date).toISOString() : new Date().toISOString()
        });
      }
      s.moodLogs = list;
      return s;
    }
    return defaultState();
  } catch (e) {
    console.warn('state load error:', e);
    return defaultState();
  }
}

function mapV2DomainToCategory(domain) {
  const map = { work:'work', relationship:'friend', self:'self', sleep:'health', sns:'other', money:'money', future:'future', good:'other', later:'other' };
  return map[domain] || 'other';
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) { console.warn('save error', e); }
}

function uid() {
  if (window.crypto && window.crypto.randomUUID) return window.crypto.randomUUID();
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, (c) => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

function todayKey(d = new Date()) {
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), dd = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}

function getMode() {
  const h = new Date().getHours();
  if (h >= 5 && h < 12) return 'morning';
  if (h >= 19 || h < 3) return 'night';
  return 'day';
}

// ビジュアルテーマ（Light Warm 5-18 / Deep Forest 18-5）
// ============================================================
function getVisualTheme() {
  // 手動上書き対応
  if (state.preferences && state.preferences.themeOverride) {
    return state.preferences.themeOverride;   // 'light' | 'dark'
  }
  const h = new Date().getHours();
  return (h >= 18 || h < 5) ? 'dark' : 'light';
}
function applyVisualTheme() {
  const theme = getVisualTheme();
  document.documentElement.setAttribute('data-theme', theme);
  // theme-color メタタグも切替
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.setAttribute('content', theme === 'dark' ? '#1F2A2A' : '#6B8F71');
}
function probeHeroImage() {
  const img = new Image();
  img.onload = () => { window.ASIDE_HAS_HERO = true; if (currentScreen === 'welcome') render(); };
  img.onerror = () => { window.ASIDE_HAS_HERO = false; if (currentScreen === 'welcome') render(); };
  img.src = './assets/welcome-hero.png';
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function detectDistortion(text) {
  const lower = (text || '').toLowerCase();
  for (const d of DISTORTIONS) {
    for (const ex of d.examples) {
      if (lower.includes(ex.toLowerCase())) return d;
    }
  }
  return null;
}

function detectCrisis(text) {
  const lower = (text || '').toLowerCase();
  let max = 0;
  for (const c of CRISIS_WORDS) {
    if (lower.includes(c.word)) max = Math.max(max, c.sev);
  }
  return max;
}

function getUserName() {
  return state.user.nickname || 'あなた';
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

function modal(html) {
  const m = document.getElementById('modal');
  document.getElementById('modalContent').innerHTML = html;
  m.classList.add('open');
  m.onclick = (e) => { if (e.target === m) closeModal(); };
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }

function renderMoodLogCard(m, compact = false) {

  const dateStr = `${date.getMonth()+1}/${date.getDate()} ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}`;
  return `
    <div class="card" style="padding:14px;">
      <div style="display:flex; align-items:center; gap:10px; margin-bottom:6px;">
        <span style="font-size:24px;">${moodObj ? moodObj.emoji : '📝'}</span>

      </div>
      ${m.comment ? `<p class="text-small ${compact ? 'text-soft' : ''}" style="margin-top:4px; ${compact ? 'overflow:hidden; text-overflow:ellipsis; white-space:nowrap;' : ''}">${escapeHtml(m.comment)}</p>` : ''}
    </div>
  `;
}

function viewMoodChat() {

      </div>

        <textarea class="input-text" id="moodChatInput" placeholder="気持ちを書いてみる…" rows="1" oninput="window.autoExpand(this)"></textarea>

      </div>

function startMoodChat(log) {
  moodChatSession = { logId: log.id, messages: [] };
  const opening = generateMoodAIOpening(log);
  moodChatSession.messages.push({ role: 'assistant', content: opening, createdAt: new Date().toISOString() });
  go('mood-chat');
}

function generateMoodAIOpening(log) {
  const mood = MOODS.find(m => m.id === log.moodScore);
  const cats = log.categories.map(id => CATEGORIES.find(c => c.id === id)?.name).filter(Boolean);
  const intro = mood && mood.id <= 2
    ? `「${mood.label}」な感じだったんだね。${cats.length ? cats.join('・') + 'のことかな。' : ''}しんどかったね。`
    : mood && mood.id === 3
    ? `${cats.length ? cats.join('・') + 'のことなんだね。' : ''}今日はくもり気味なんだね。`
    : `${cats.length ? cats.join('・') + 'のことだね。' : ''}少し光が差してきたかな。`;
  const ask = log.comment
    ? '書いてくれた言葉、もう少し聞かせてもらってもいい？'
    : 'よかったら、もう少し聞かせてくれる？';
  return `${intro}\n\n${ask}`;
}

function moodChatSend() {
  if (!moodChatSession) return;
  const input = document.getElementById('moodChatInput');
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';

  const crisis = detectCrisis(text);
  if (crisis && crisis.sev >= 4) { showCrisisModal(crisis.sev); return; }

  moodChatSession.messages.push({ role: 'user', content: text, createdAt: new Date().toISOString() });
  const log = state.moodLogs.find(l => l.id === moodChatSession.logId);
  const aiText = generateMoodAIReply(log, text, moodChatSession.messages);
  moodChatSession.messages.push({ role: 'assistant', content: aiText, createdAt: new Date().toISOString() });
  persistAIChat({ sourceType: 'mood_log', sourceId: moodChatSession.logId, messages: moodChatSession.messages.slice() });
  document.getElementById('main').innerHTML = viewMoodChat();
  setTimeout(scrollChatToBottom, 50);
}

function generateMoodAIReply(log, userText, history) {
  const turns = history.filter(m => m.role === 'user').length;
  if (turns === 1) {
    return 'そっか、教えてくれてありがとう。\n\nその気持ちの中で、いちばん近いのはどれだろう？\n（悲しい / 不安 / 怒り / 焦り / 恥ずかしい / 孤独 / 悔しい / 無力感 など）';
  }
  if (turns === 2) {
    return 'そう感じたんだね。\nその感情の強さを 0〜100 でいうと、どのくらい？\n\n（書いてくれてもいいし、感覚で大丈夫）';
  }
  if (turns === 3) {
    return 'わかった。その重さ、ちゃんと残しておくね。\n\n別の見方をすると、いまの状態だけが「あなた全部」じゃないんだ。\nもしよかったら、最後に「いま、ちょっとだけできそうなこと」を一つだけ、一緒に決めてみない？';
  }
  return '話してくれてありがとう。\n\n今日できそうな小さなこと：\n・3分だけ静かに呼吸する\n・湯船に5分つかる\n・誰かに「おつかれ」と送ってみる\n\nどれもしんどかったらスキップでOK。\n話したことは「きろく」に残しておいたよ。';
}

function endMoodChat() {
  if (moodChatSession && moodChatSession.messages.length > 1) {
    persistAIChat({ sourceType: 'mood_log', sourceId: moodChatSession.logId, messages: moodChatSession.messages.slice() });
  }
  moodChatSession = null;
  go('home');
}

function generateAlternativeView(eventText, emotion) {
  const short = (eventText || '').slice(0, 30) + ((eventText || '').length > 30 ? '…' : '');
  return `「${short}」というできごと、${emotion}を強く感じたんですね。\n\nもしかすると「自分は全部ダメだ」「全部自分のせいだ」と感じている部分があるかもしれません。\n\nでも別の見方をすると、\n「今回はうまくいかなかったけれど、あなたの全部が否定されたわけではない」\nとも考えられそうです。\n\n感情はあなたを守るために働いているサイン。それを否定する必要はありません。`;

function generateLetter(s) {
  const date = new Date();
  const dateStr = `${date.getMonth()+1}月${date.getDate()}日`;
  const eventShort = (s.eventText || '').slice(0, 20);
  const title = `${eventShort || '今日'}の整理（${dateStr}）`;
  const diff = (s.emotionScoreBefore || 0) - (s.emotionScoreAfter || 0);
  const closing = diff >= 10
    ? '少しだけ心が軽くなったね。それで十分です。'
    : diff > 0
    ? '気持ちは少しずつほぐれていきます。今日は書けただけでも一歩。'
    : '今日はまだ重く感じるかもしれない。それでも書いてくれたこと、覚えておこう。';
  const body = `今日起きたこと\n${s.eventText}\n\n感じていたこと\n${s.emotion}（強さ ${s.emotionScoreBefore}）\n\n別の見方\n${s.alternativeView}\n\n少し楽になるための一言\n${closing}`;
  return { title, body };
}

function activeGoal() { return state.goals.find(g => g.status === 'active') || null; }
function activePolicy() {
  const g = activeGoal();
  if (!g) return null;
  return state.policies.filter(p => p.goalId === g.id).pop() || null;
}
function activeAction() {
  const p = activePolicy();
  if (!p) return null;
  return state.actions.filter(a => a.policyId === p.id && a.status === 'active').pop() || null;
}
function sameDay(a, b) { return a.toDateString() === b.toDateString(); }
function formatDate(iso) {
  const d = new Date(iso);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function startGoalChat() {
  goalChat = {
    messages: [{ role: 'assistant', content: '今、いちばん変えたいことや、少し楽になりたいことはありますか？\n\nまとまっていなくて大丈夫。思っていることをそのまま書いてみてください。', createdAt: new Date().toISOString() }],
    proposedGoal: null, sourceSummary: null, awaitingConfirm: false
  };
}

function goalChatSend() {
  if (!goalChat) return;
  const input = document.getElementById('goalChatInput');
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';

  const crisis = detectCrisis(text);
  if (crisis && crisis.sev >= 4) { showCrisisModal(crisis.sev); return; }

  goalChat.messages.push({ role: 'user', content: text, createdAt: new Date().toISOString() });
  const turns = goalChat.messages.filter(m => m.role === 'user').length;

  if (turns < 2) {
    goalChat.messages.push({ role: 'assistant', content: '話してくれてありがとう。\n\nもう少し聞かせてください。それを変えたいと思うのは、最近どんな出来事があったからですか？', createdAt: new Date().toISOString() });
  } else {
    const proposal = generateGoalProposal(goalChat.messages);
    goalChat.proposedGoal = proposal.goalText;
    goalChat.sourceSummary = proposal.summary;
    goalChat.awaitingConfirm = true;
    goalChat.messages.push({ role: 'assistant', content: `話してくれてありがとう。\n\n今の話を整理すると、あなたは「${proposal.summary}」と感じているように見えます。\n\n目標としては、以下のように置くのはどうでしょうか？\n\n「${proposal.goalText}」\n\nこの目標で進めてもよさそうですか？`, createdAt: new Date().toISOString() });
  }

  document.getElementById('main').innerHTML = viewGoalChat();
  setTimeout(scrollChatToBottom, 50);
}

function generateGoalProposal(messages) {
  const userText = messages.filter(m => m.role === 'user').map(m => m.content).join(' ');
  let theme = '気持ちの揺れ';
  if (/仕事|職場|上司|会社|残業/.test(userText)) theme = '仕事での不安';
  else if (/恋愛|彼|恋人/.test(userText)) theme = '恋愛での不安';
  else if (/家族|親|母|父/.test(userText)) theme = '家族との関係';
  else if (/友|友達|友人/.test(userText)) theme = '友人との関係';
  else if (/将来|未来|キャリア/.test(userText)) theme = '将来への不安';
  const summary = `${theme}を減らして、自分を責めすぎずに過ごせるようになりたい`;
  const goalText = `${theme}を感じたときも、自分を責めすぎず、落ち着いて次の行動を選べるようになる`;
  return { summary, goalText };
}

function confirmGoal() {
  if (!goalChat || !goalChat.proposedGoal) return;
  const goal = {
    id: uid(),
    goalText: goalChat.proposedGoal,
    sourceSummary: goalChat.sourceSummary,
    status: 'active',
    createdAt: new Date().toISOString(),
    updatedAt: new Date().toISOString()
  };
  state.goals.forEach(g => { g.status = 'archived'; });
  state.goals.push(goal);
  persistAIChat({ sourceType: 'goal', sourceId: goal.id, messages: goalChat.messages.slice() });
  saveState();
  goalChat = null;
  if (window.AsideLogger) AsideLogger.event('goal_set');
  toast('目標を決めました');
  go('action');
}

function persistAIChat({ sourceType, sourceId, messages, summary }) {
  const idx = state.aiChats.findIndex(c => c.sourceType === sourceType && c.sourceId === sourceId);

    if (summary) state.aiChats[idx].summary = summary;

    state.aiChats.push({
      id: uid(), sourceType, sourceId, messages,

function viewCalendarSection() {
  const now = new Date();

  const days = new Date(year, month+1, 0).getDate();

  const moodMap = {};
  state.moodLogs.forEach(m => {
    const d = new Date(m.createdAt);
    const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if (!moodMap[k] || new Date(moodMap[k].createdAt) < d) moodMap[k] = m;
  });

  let html = `<div class="card">
    <h3 class="mb-3">${year}年 ${month+1}月</h3>
    <div class="calendar-grid">
      ${['日','月','火','水','木','金','土'].map(d => `<div class="cal-head">${d}</div>`).join('')}
      ${Array(first).fill('<div></div>').join('')}
      ${Array.from({length:days}, (_,i) => {
        const day = i+1;
        const dateKey = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        const m = moodMap[dateKey];
        const moodObj = m ? MOODS.find(x => x.id === m.moodScore) : null;
        return `<button class="cal-cell ${m?'has-data':''}" data-act="day-detail" data-date="${dateKey}" style="border:none; cursor:pointer;">

          <div class="cal-cell-emoji">${moodObj ? moodObj.emoji : ''}</div>
        </button>`;
      }).join('')}

  </div>`;

  const recentLogs = [...state.moodLogs].sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt)).slice(0, 10);
  const recentMoyamoya = [...state.moyamoyaRecords].sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt)).slice(0, 3);

  if (recentLogs.length === 0 && recentMoyamoya.length === 0) {
    html += `<div class="card mt-3 text-center text-soft" style="padding:30px 20px;">

    </div>`;

    html += '<h3 class="section-title">最近のきろく</h3>';

        <div class="card" style="padding:14px;">

        </div>
      `).join('');
    }
    html += recentLogs.map(m => renderMoodLogCard(m, false)).join('');
  }

  return html;
}

function generateReport() {
  if (state.moodLogs.length < 3) return null;
  const recent = state.moodLogs.filter(m => Date.now() - new Date(m.createdAt).getTime() < 7 * 86400000);
  if (recent.length === 0) return null;

  const catCount = {};
  recent.forEach(m => (m.categories || []).forEach(c => { catCount[c] = (catCount[c]||0)+1; }));
  const topCat = Object.entries(catCount).sort((a,b) => b[1]-a[1])[0];
  const topCatName = topCat ? CATEGORIES.find(c => c.id === topCat[0])?.name : '';

  const hourBuckets = { morning:0, day:0, evening:0, night:0 };
  recent.forEach(m => {
    const h = new Date(m.createdAt).getHours();
    if (h >= 5 && h < 12) hourBuckets.morning++;
    else if (h >= 12 && h < 17) hourBuckets.day++;
    else if (h >= 17 && h < 22) hourBuckets.evening++;
    else hourBuckets.night++;
  });
  const topHour = Object.entries(hourBuckets).sort((a,b) => b[1]-a[1])[0][0];
  const hourLabel = { morning:'朝', day:'昼', evening:'夕方〜夜', night:'夜中' }[topHour];

  const recentMoya = state.moyamoyaRecords.filter(r => Date.now() - new Date(r.createdAt).getTime() < 14 * 86400000);
  let distortionHint = null;
  if (recentMoya.length >= 2) {
    const eventTexts = recentMoya.map(r => r.eventText).join(' ');
    if (/全部|私が悪い|自分のせい|ダメ/.test(eventTexts)) {
      distortionHint = '記録を見ると、「自分が全部悪い」と感じやすい場面が何度か見られます。これは、もしかすると "過度な自己責任化" に近い考え方かもしれません。';
    }
  }

  let effectiveActions = null;
  if (state.actionLogs.length >= 2) {
    const high = state.actionLogs.filter(l => l.rating >= 4);
    if (high.length > 0) {
      const action = state.actions.find(a => a.id === high[high.length-1].actionId);
      if (action) effectiveActions = `「${action.actionText}」を実行した日は、気分の改善傾向が見られます。`;
    }
  }

  const nextSuggestion = recentMoya.length > 0
    ? '注意された内容を、事実・解釈・感情に分けて書いてみる。'
    : '寝る前に「今日できたこと」を1つだけ書く。';

  const summary = `ここ1週間は、${topCatName ? topCatName + 'に関する' : ''}記録が多く、${hourLabel}の時間帯に気分が下がりやすい傾向があります。${distortionHint ? '\n\nまた、' + distortionHint.split('。')[0] + '。' : ''}`;

  return { summary, distortionHint, effectiveActions, nextSuggestion };
}

// ============================================================
// 設定モーダル
// ============================================================
function viewSettingsModal() {
  const goal = activeGoal();
  const policy = activePolicy();
  const action = activeAction();
  return `
    <h2 class="modal-title">設定</h2>
    <div style="display:flex; flex-direction:column; gap:14px;">
      <div>
        <div class="text-tiny text-muted">プロフィール</div>
        <div class="mt-1">${escapeHtml(getUserName())}（利用 ${state.user.daysUsed || 0} 日）</div>
      </div>
      <div>
        <div class="text-tiny text-muted">現在の目標</div>
        <div class="mt-1 text-small">${goal ? escapeHtml(goal.goalText) : '未設定'}</div>
      </div>
      <div>
        <div class="text-tiny text-muted">行動方針</div>
        <div class="mt-1 text-small">${policy ? escapeHtml(policy.policyText) : '未設定'}</div>
      </div>
      <div>
        <div class="text-tiny text-muted">選択中のアクション</div>
        <div class="mt-1 text-small">${action ? escapeHtml(action.actionText) : '未設定'}</div>
      </div>
      <hr style="border:none; border-top:1px solid var(--divider); margin: 4px 0;">
      <a href="docs/terms-of-service-beta.md" target="_blank" rel="noopener" class="text-small">利用規約</a>
      <a href="docs/privacy-policy-beta.md" target="_blank" rel="noopener" class="text-small">プライバシーポリシー</a>
      <button class="btn-ghost" data-act="reset-data" style="color: var(--text-soft); font-size:13px; text-align:left; padding:0;">データをリセット</button>
      <p class="text-tiny text-muted text-center mt-2">Aside v0.3.0-beta.1</p>
    </div>
    <div style="margin-top:20px;">
      <button class="btn btn-secondary" data-act="close-modal">閉じる</button>
    </div>
  `;
}

// ============================================================
// アクションハンドラ（v3）
// ============================================================
function handleAction(act, el, ev) {
  // 共通: ナビ
  if (act === 'back-home')   { moodDraft = null; go('home'); return; }
  if (act === 'back-action') { go('action'); return; }
  if (act === 'back-record') { go('record'); return; }
  if (act === 'close-modal') { closeModal(); return; }

  // オンボーディング
  if (act === 'welcome-next') { go('consent'); return; }
  if (act === 'consent-agree') {
    state.consent = { given: true, version: (window.ASIDE_CONFIG && window.ASIDE_CONFIG.consentVersion) || 'v1', at: Date.now() };
    saveState();
    if (window.AsideLogger) AsideLogger.recordConsent();
    go('nickname');
    return;
  }
  if (act === 'consent-decline') {
    modal(`<h2 class="modal-title">またお待ちしています</h2><p>β版は同意いただいた上でのご利用をお願いしています。<br>このタブを閉じてください。</p><button class="btn btn-secondary mt-3" data-act="close-modal">閉じる</button>`);
    return;
  }
  if (act === 'nickname-save') {
    const v = (document.getElementById('nicknameInput')||{}).value || '';
    state.user.nickname = v.trim() || 'あなた';
    state.user.createdAt = Date.now();
    saveState();
    go('mood-input');
    return;
  }
  if (act === 'nickname-skip') {
    state.user.nickname = '';
    state.user.createdAt = Date.now();
    saveState();
    go('mood-input');
    return;
  }

  // 初回 mood-input（1問）
  if (act === 'mood-pick') {
    const score = Number(el.dataset.score);
    const mood = MOODS.find(m => m.id === score);
    state.moodLogs.push({
      id: uid(),
      moodScore: score,
      moodLabel: mood ? mood.label : '',
      categories: [], comment: '',
      createdAt: new Date().toISOString()
    });
    state.initialDone = true;
    saveState();
    if (window.AsideLogger) {
      AsideLogger.logEmotion(score, '');
      AsideLogger.setSessionMoodAfter(score);
    }
    toast('ありがとう、覚えとくね');
    go('home');
    return;
  }

  // 気持ち入力フル
  if (act === 'open-mood-full') { moodDraft = null; go('mood-full'); return; }
  if (act === 'mood-score') { ensureMoodDraft().moodScore = Number(el.dataset.score); render(); return; }
  if (act === 'mood-cat') {
    const d = ensureMoodDraft();
    const cid = el.dataset.cat;
    if (d.categories.includes(cid)) d.categories = d.categories.filter(x => x !== cid);
    else d.categories.push(cid);
    render();
    return;
  }
  if (act === 'mood-save-end') {
    const log = saveMoodLog();
    moodDraft = null;
    if (log) toast('記録しました。今日の気持ちを残せただけでも十分です。');
    go('home');
    return;
  }
  if (act === 'mood-save-talk') {
    const log = saveMoodLog();
    moodDraft = null;
    if (log) startMoodChat(log);
    return;
  }
  if (act === 'mood-chat-send') { moodChatSend(); return; }
  if (act === 'end-mood-chat')  { endMoodChat(); return; }

  // もやもや整理
  if (act === 'moyamoya-start') { moyamoya = { step: 1 }; go('moyamoya'); return; }
  if (act === 'moya-cancel')    { moyamoya = null; go('home'); return; }
  if (act === 'moya-step1-next') {
    const v = (document.getElementById('moyaInput')||{}).value || '';
    if (!v.trim()) { toast('短くてOK。何があったか書いてみて'); return; }
    moyamoya.eventText = v.trim();
    const c = detectCrisis(v);
    if (c && c.sev >= 4) { showCrisisModal(c.sev); return; }
    moyamoya.step = 2;
    render();
    return;
  }
  if (act === 'moya-step2-pick') { moyamoya.emotion = el.dataset.emotion; render(); return; }
  if (act === 'moya-step2-next') { if (moyamoya.emotion) { moyamoya.step = 3; render(); } return; }
  if (act === 'moya-step3-next') {
    if (moyamoya.emotionScoreBefore == null) moyamoya.emotionScoreBefore = 50;
    moyamoya.step = 4; render(); return;
  }
  if (act === 'moya-step4-next') { moyamoya.step = 5; render(); return; }
  if (act === 'moya-step5-next') {
    if (moyamoya.emotionScoreAfter == null) moyamoya.emotionScoreAfter = 50;
    moyamoya.step = 6; render(); return;
  }
  if (act === 'moya-save') {
    const r = saveMoyamoyaRecord();
    moyamoya = null;
    if (r) toast('レターを保存しました');
    go('home');
    return;
  }

  // FAB → もやもや整理
  if (act === 'open-dialog') { moyamoya = { step: 1 }; go('moyamoya'); return; }

  // 行動タブ - 目標
  if (act === 'goal-chat-start')  { startGoalChat(); go('goal-chat'); return; }
  if (act === 'goal-chat-cancel') { goalChat = null; go('action'); return; }
  if (act === 'goal-chat-send')   { goalChatSend(); return; }
  if (act === 'goal-confirm')     { confirmGoal(); return; }
  if (act === 'goal-redo') {
    if (!goalChat) return;
    goalChat.awaitingConfirm = false;
    goalChat.proposedGoal = null;
    goalChat.messages.push({ role: 'assistant', content: 'もう少し聞かせてください。', createdAt: new Date().toISOString() });
    document.getElementById('main').innerHTML = viewGoalChat();
    return;
  }

  // 行動タブ - 方針/アクション
  if (act === 'show-policies')  { go('policy-select'); return; }
  if (act === 'policy-pick')    { pickPolicy(decodeURIComponent(el.dataset.policyText), el.dataset.depth); return; }
  if (act === 'show-actions')   { go('action-select'); return; }
  if (act === 'action-pick')    { pickAction(decodeURIComponent(el.dataset.actionText)); return; }
  if (act === 'action-done')    { startActionEval(el.dataset.actionId); return; }
  if (act === 'action-skip') {
    state.actionLogs.push({
      id: uid(), actionId: el.dataset.actionId, rating: 0, comment: 'スキップ', createdAt: new Date().toISOString()
    });
    saveState();
    toast('今日はスキップ。明日また。');
    render();
    return;
  }
  if (act === 'action-talk') { moyamoya = { step: 1 }; go('moyamoya'); return; }
  if (act === 'action-change') {
    if (confirm('別のアクションに変更しますか？')) {
      const a = activeAction();
      if (a) a.status = 'inactive';
      saveState();
      go('action-select');
    }
    return;
  }
  if (act === 'eval-rating') { evalRating = Number(el.dataset.rating); render(); return; }
  if (act === 'eval-save')   { saveActionEval(); return; }

  // きろくサブタブ
  if (act === 'record-sub') {
    state.ui.recordSubtab = el.dataset.sub;
    saveState();
    render();
    return;
  }
  if (act === 'day-detail') { viewParams.dateKey = el.dataset.date; go('day-detail'); return; }

  // 設定
  if (act === 'open-settings') { modal(viewSettingsModal()); return; }
  if (act === 'reset-data') {
    if (confirm('本当にすべてのデータを削除しますか？元に戻せません。')) {
      localStorage.removeItem(STORAGE_KEY);
      localStorage.removeItem(STORAGE_KEY_V2);
      localStorage.removeItem('aside_user_id');
      localStorage.removeItem('aside_session_id');
      localStorage.removeItem('aside_consent_version');
      localStorage.removeItem('aside_user_row_created');
      location.reload();
    }
    return;
  }

  // 互換用ダミー
  if (act === 'crisis-close') { closeModal(); return; }

  console.warn('未定義 act:', act);
}

// 互換用: 一部ロガーから呼ばれる可能性のため残置
function endDialog() { moodChatSession = null; goalChat = null; go('home'); }

// ============================================================
// 起動
// ============================================================
document.addEventListener('click', (e) => {
  const target = e.target.closest('[data-act]');
  if (target) {
    handleAction(target.dataset.act, target, e);
  }

  const tab = e.target.closest('[data-tab]');
  if (tab) {
    const t = tab.dataset.tab;
    if (t === 'home')   go('home');
    if (t === 'action') go('action');
    if (t === 'record') go('record');
  }
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    const id = document.activeElement?.id;
    if (id === 'moodChatInput') { e.preventDefault(); moodChatSend(); }
    if (id === 'goalChatInput') { e.preventDefault(); goalChatSend(); }
  }
});

// 初期化
function init() {
  // 利用日数カウント
  if (state.user.createdAt) {
    state.user.daysUsed = Math.floor((Date.now() - state.user.createdAt) / 86400000) + 1;
    saveState();
  }

  // ビジュアルテーマ初期適用 + 定期チェック
  applyVisualTheme();
  setInterval(() => {
    const before = document.documentElement.getAttribute('data-theme');
    applyVisualTheme();
    const after = document.documentElement.getAttribute('data-theme');
    if (before !== after) render();   // 切替時に再描画（mood絵文字差替）
  }, 60_000);

  // ヒーロー画像の存在を確認（無ければ CSS フォールバック）
  probeHeroImage();

  // AsideLogger 初期化
  if (window.AsideLogger) {
    AsideLogger.init();
  }

  // ルーティング判定
  if (!state.consent.given) {
    go('welcome');
  } else if (!state.user.createdAt) {
    go('nickname');
  } else if (!state.initialDone) {
    go('mood-input');
  } else {
    go('home');
  }
}

// Service Worker 登録（PWA）
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js').catch(err => {
      console.warn('[Aside] SW registration failed:', err && err.message);
    });
  });
}

init();

</script>
